<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOGGYCO MISSION - V330 MAXIMA AUDIO</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --neon: #00f2ff; --green: #00ff88; --red: #ff3131; --gold: #ffd700; 
            --cat-purple: #bc13fe; --rabbit-orange: #ff8c00; --fox-red: #ff4500; --panda-white: #ffffff;
            --panel: rgba(0, 0, 0, 0.9);
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            background: #000; font-family: 'Orbitron', sans-serif; color: #fff; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-x: hidden; touch-action: none;
        }

        /* Fixed Background */
        #bg-fx { 
            position: fixed; inset: 0; 
            background-image: url('hintergrund.png'); /* Ensure this file exists! */
            background-size: cover; background-position: center; 
            z-index: -2; 
        }
        #bg-overlay {
            position: fixed; inset: 0; background: radial-gradient(circle at 50% 50%, rgba(17,17,17,0.8) 0%, rgba(0,0,0,0.95) 100%); z-index: -1; pointer-events: none;
        }

        header { padding: 15px 0; text-align: center; width: 100%; }
        header h1 { font-size: clamp(20px, 6vw, 32px); color: var(--neon); text-shadow: 0 0 15px var(--neon); text-transform: uppercase; transition: color 0.3s, text-shadow 0.3s; }

        #game-view { width: 100%; display: flex; justify-content: center; padding: 10px; }
        #game-wrap { 
            position:relative; width: 100%; max-width: 400px; height: 620px; 
            background: rgba(0,0,0,0.8); border: 4px solid var(--neon); border-radius: 40px; 
            overflow: hidden; box-shadow: 0 0 30px rgba(0, 242, 255, 0.2); transition: 0.4s;
        }

        /* HUD */
        #hud { position: absolute; top: 12px; width: 100%; z-index: 200; pointer-events: none; }
        #energy-container { width: 80%; height: 10px; margin: 0 auto 10px; background: rgba(0,0,0,0.6); border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.3); }
        #energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--red), var(--gold), var(--green)); transition: width 0.3s; }
        
        #stats-bar { 
            display: flex; justify-content: space-between; align-items: center; width: 92%; margin: 0 auto; 
            background: var(--panel); padding: 8px 12px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(8px);
        }
        .stat-val { font-weight: 900; font-size: 14px; text-shadow: 1px 1px 2px #000; }

        canvas { position: absolute; inset: 0; z-index: 50; width: 100%; height: 100%; }

        /* SCREENS */
        .screen { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; background: rgba(0,0,0,0.95); padding: 20px; text-align: center; }
        
        .mission-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-top: 15px; }
        .mission-btn { 
            padding: 15px 5px; border-radius: 15px; border: 2px solid var(--neon); background: rgba(255,255,255,0.05);
            color: #fff; cursor: pointer; transition: 0.2s; font-family: 'Orbitron'; font-size: 11px; text-transform: uppercase;
        }
        .mission-btn span { display: block; font-size: 32px; margin-bottom: 5px; }
        .mission-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.15); }

        .btn-full { grid-column: span 2; background: var(--green); color: #000; font-weight: 900; border: none; font-size: 14px; padding: 15px; margin-top: 10px;}

        input { 
            width: 100%; padding: 15px; border-radius: 10px; border: 2px solid var(--neon); 
            background: rgba(0,0,0,0.8); color: #fff; text-align: center; font-family: 'Orbitron'; margin-bottom: 15px; font-size: 16px;
        }
        input:focus { border-color: var(--gold); box-shadow: 0 0 15px var(--gold); }

        #controls { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; z-index: 300; }
        .ctrl-btn { 
            width: 80px; height: 80px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.3); 
            border-radius: 50%; color: #fff; font-size: 30px; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; user-select: none; backdrop-filter: blur(5px); transition: 0.1s;
        }
        .ctrl-btn:active { background: var(--neon); color: #000; border-color: var(--neon); transform: scale(0.9); }

        .info-panel { width: 95%; max-width: 400px; margin: 10px 0 20px 0; padding: 15px; background: var(--panel); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        
        .rank-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 12px; }
        .r1 { color: var(--gold); font-weight: bold; font-size: 14px; }
        
        .shake { animation: shakeAnim 0.3s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shakeAnim { 10%, 90% { transform: translate3d(-4px, 0, 0); } 20%, 80% { transform: translate3d(4px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-8px, 0, 0); } 40%, 60% { transform: translate3d(8px, 0, 0); } }
    </style>
</head>
<body>

<div id="bg-fx"></div>
<div id="bg-overlay"></div>
<header><h1 id="title">DOGGYCO MISSION</h1></header>

<div id="game-view">
    <div id="game-wrap">
        <div id="hud">
            <div id="energy-container"><div id="energy-fill"></div></div>
            <div id="stats-bar">
                <div id="hp-ui">❤️❤️❤️</div>
                <div id="score-ui" style="color:var(--gold)" class="stat-val">0 PTS</div>
                <div id="time-ui" style="color:var(--neon)" class="stat-val">30s</div>
                <div style="background:var(--neon); color:#000; padding:3px 8px; border-radius:5px; font-weight:900; font-size:12px;">LVL <span id="lvl-ui">1</span></div>
            </div>
        </div>

        <canvas id="canvas"></canvas>

        <div id="controls">
            <button class="ctrl-btn" onmousedown="move(-1)" ontouchstart="move(-1)">◀</button>
            <button class="ctrl-btn" onmousedown="move(1)" ontouchstart="move(1)">▶</button>
        </div>

        <div id="scr-name" class="screen">
            <h2 style="color:var(--neon); margin-bottom:20px; font-size:22px; text-shadow: 0 0 10px var(--neon);">AGENT ACCESS</h2>
            <input type="text" id="pName" placeholder="ENTER CODENAME" maxlength="12" autocomplete="off">
            <button class="mission-btn btn-full" onclick="initUser()">AUTHENTICATE</button>
        </div>

        <div id="scr-start" class="screen" style="display:none">
            <h3 style="margin-bottom:15px; font-size:14px; color:var(--gold)">SELECT ELITE UNIT</h3>
            <div class="mission-grid">
                <button class="mission-btn" style="border-color:#00f2ff" onclick="start('dog')"><span>🐶</span>DOG UNIT</button>
                <button class="mission-btn" style="border-color:#bc13fe" onclick="start('cat')"><span>🐱</span>CAT OPS</button>
                <button class="mission-btn" style="border-color:#ff8c00" onclick="start('rabbit')"><span>🐰</span>RABBIT SQD</button>
                <button class="mission-btn" style="border-color:#ff4500" onclick="start('fox')"><span>🦊</span>FOX TACTICAL</button>
                <button class="mission-btn" style="border-color:#ffffff; grid-column: span 2;" onclick="start('panda')"><span>🐼</span>PANDA FORCES</button>
            </div>
        </div>

        <div id="scr-end" class="screen" style="display:none">
            <h2 style="color:var(--red); font-size:24px; text-shadow: 0 0 15px var(--red);">MISSION FAILED</h2>
            <h1 id="final-score" style="font-size:55px; color:var(--gold); margin:15px 0">0</h1>
            <button class="mission-btn btn-full" onclick="location.reload()">RE-BOOT SYSTEM</button>
        </div>
    </div>
</div>

<div class="info-panel">
    <h3 style="color:var(--gold); font-size:14px; margin-bottom:10px; border-bottom: 1px solid rgba(255,215,0,0.3); padding-bottom: 5px;">🏆 GLOBAL RANKING</h3>
    <div id="leaderboard" style="color:#aaa; font-size: 12px; text-align: center;">Connecting to Mainframe...</div>
</div>

<script>
// --- SUPABASE SETUP ---
const SURL = 'https://ovmsstdroxkinisqwlhw.supabase.co';
// Replace with your actual anon key!
const SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92bXNzdGRyb3hraW5pc3F3bGh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMzM3OTEsImV4cCI6MjA4NzgwOTc5MX0.SOsi-Aeb_wSp40_TTymaiiU0Kn_3rhG_LnvLjJP66z8';
let supabase = null;

window.addEventListener('load', () => {
    try {
        if(window.supabase) {
            supabase = window.supabase.createClient(SURL, SKEY);
            updateRanks();
        }
    } catch(e) { 
        document.getElementById("leaderboard").innerHTML = "Database Offline"; 
    }
});

async function updateRanks() {
    if(!supabase) return;
    try {
        let { data, error } = await supabase.from('leaderboard').select('n, s').order('s', { ascending: false }).limit(5);
        if(data && data.length > 0) {
            document.getElementById("leaderboard").innerHTML = data.map((x, i) => {
                let rClass = i === 0 ? 'r1' : '';
                return `<div class="rank-item ${rClass}"><span>#${i+1} ${x.n}</span><span style="color:var(--gold)">${x.s} PTS</span></div>`;
            }).join('');
        } else {
            document.getElementById("leaderboard").innerHTML = "No scores yet.";
        }
    } catch(e) { document.getElementById("leaderboard").innerHTML = "Ranking failed to load."; }
}

// --- AUDIO SYNTHESIZER (Guaranteed sound without MP3 files) ---
let audioCtx = null;
function initAudio() {
    if (!audioCtx) {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if(AudioContext) audioCtx = new AudioContext();
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, type, duration, vol=0.1) {
    if(!audioCtx || audioCtx.state !== 'running') return;
    try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    } catch(e) {}
}

function sfxCollect() { playTone(600, 'sine', 0.1, 0.1); setTimeout(() => playTone(1200, 'sine', 0.15, 0.1), 80); }
function sfxHit() { playTone(150, 'sawtooth', 0.3, 0.2); setTimeout(() => playTone(100, 'square', 0.4, 0.2), 100); }
function sfxLevelUp() { [400, 500, 600, 800].forEach((f, i) => setTimeout(() => playTone(f, 'square', 0.2, 0.1), i*100)); }
function sfxGameOver() { [300, 250, 200, 150].forEach((f, i) => setTimeout(() => playTone(f, 'sawtooth', 0.4, 0.2), i*300)); }


// --- GAME LOGIC ---
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
// Internal resolution for crisp rendering and perfect collision mapping
let W = 400, H = 620; 
canvas.width = W; 
canvas.height = H;

// 5 Perfect Lanes based on width 400
let lanes = [40, 120, 200, 280, 360], currentLane = 2;
let playerX = lanes[currentLane], targetX = lanes[currentLane];
let active = false, mode = 'dog', agent = "AGENT";
let entities = [], floaters = [], lastT = 0;
let score = 0, hp = 3, energy = 100, level = 1, time = 30;

function initUser() {
    let n = document.getElementById("pName").value.trim();
    if(n) { 
        agent = n.toUpperCase(); 
        document.getElementById("scr-name").style.display = "none"; 
        document.getElementById("scr-start").style.display = "flex";
        initAudio(); // Initialize audio context on first user interaction
    } else {
        document.getElementById("pName").style.borderColor = "var(--red)";
        setTimeout(() => document.getElementById("pName").style.borderColor = "var(--neon)", 500);
    }
}

function start(m) {
    mode = m;
    const themes = { 'dog':'#00f2ff', 'cat':'#bc13fe', 'rabbit':'#ff8c00', 'fox':'#ff4500', 'panda':'#ffffff' };
    
    // Set UI Theme
    document.documentElement.style.setProperty('--neon', themes[mode]);
    document.getElementById("title").style.color = themes[mode];
    document.getElementById("title").style.textShadow = `0 0 15px ${themes[mode]}`;
    document.getElementById("game-wrap").style.borderColor = themes[mode];
    
    document.getElementById("scr-start").style.display = "none";
    
    // Reset State
    score = 0; hp = 3; energy = 100; level = 1; time = 30;
    entities = []; floaters = [];
    currentLane = 2; targetX = lanes[currentLane]; playerX = targetX;
    
    active = true; 
    lastT = performance.now();
    requestAnimationFrame(loop);
}

function move(dir) {
    if(!active) return;
    currentLane = Math.max(0, Math.min(4, currentLane + dir));
    targetX = lanes[currentLane];
}

function loop(t) {
    if(!active) return;
    
    let dt = (t - lastT) / 1000; 
    lastT = t;
    if(dt > 0.1) dt = 0.016; // Prevent huge jumps if tab is inactive

    ctx.clearRect(0,0,W,H);

    // Draw Lane Dividers
    ctx.strokeStyle = "rgba(255,255,255,0.05)";
    ctx.lineWidth = 1;
    [80, 160, 240, 320].forEach(lx => { 
        ctx.beginPath(); ctx.moveTo(lx, 0); ctx.lineTo(lx, H); ctx.stroke(); 
    });

    // Timing & Energy
    time -= dt; 
    energy -= (4 + level * 0.5) * dt;
    
    if(time <= 0) { 
        level++; time = 30; energy = Math.min(100, energy + 25); 
        sfxLevelUp();
        floaters.push({x: targetX, y: H/2, txt: "LEVEL UP!", c: "var(--gold)", s: 30, o: 1});
    }

    // HUD Update
    document.getElementById("hp-ui").innerText = "❤️".repeat(Math.max(0, hp));
    document.getElementById("score-ui").innerText = Math.floor(score) + " PTS";
    document.getElementById("time-ui").innerText = Math.ceil(time) + "s";
    document.getElementById("lvl-ui").innerText = level;
    document.getElementById("energy-fill").style.width = Math.max(0, energy) + "%";
    document.getElementById("energy-fill").style.background = energy < 20 ? "var(--red)" : "linear-gradient(90deg, var(--red), var(--gold), var(--green))";

    // Spawning Logic based on Mode
    let goodItem = '🦴';
    if(mode === 'cat') goodItem = '🐟';
    if(mode === 'rabbit') goodItem = '🥕';
    if(mode === 'fox') goodItem = '🍗';
    if(mode === 'panda') goodItem = '🎋';

    if(Math.random() < (0.04 + level*0.005)) {
        let l = Math.floor(Math.random()*5);
        entities.push({lane: l, x: lanes[l], y: -50, t: goodItem, isBad: false, s: 200 + (level*15)});
    }
    if(Math.random() < (0.015 + level*0.003)) {
        let l = Math.floor(Math.random()*5);
        entities.push({lane: l, x: lanes[l], y: -50, t: Math.random() < 0.5 ? '🕷️' : '👮', isBad: true, s: 250 + (level*20)});
    }

    // Hit Detection Zone
    const hitTop = H - 140;
    const hitBottom = H - 60;

    // Entity Movement & Collision (Reverse loop to avoid flicker)
    for (let i = entities.length - 1; i >= 0; i--) {
        let en = entities[i];
        en.y += en.s * dt;
        
        ctx.font = "40px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(en.t, en.x, en.y);

        // Check Collision
        if(en.lane === currentLane && en.y > hitTop && en.y < hitBottom) {
            if(en.isBad) {
                hp--; 
                energy -= 20; 
                sfxHit();
                document.getElementById("game-wrap").classList.remove("shake");
                void document.getElementById("game-wrap").offsetWidth; // trigger reflow
                document.getElementById("game-wrap").classList.add("shake");
                floaters.push({x: en.x, y: en.y, txt: "-LIFE", c: "var(--red)", s: 20, o: 1});
            } else {
                let pts = 10 * level;
                score += pts; 
                energy = Math.min(100, energy + 10); 
                sfxCollect();
                floaters.push({x: en.x, y: en.y, txt: "+"+pts, c: "var(--green)", s: 16, o: 1});
            }
            entities.splice(i, 1);
        } else if(en.y > H + 50) {
            entities.splice(i, 1); // Remove if off screen
        }
    }

    // Player Movement (Smooth)
    playerX += (targetX - playerX) * 0.3;
    
    ctx.font = "60px Arial";
    let pImg = { 'dog':'🐶', 'cat':'🐱', 'rabbit':'🐰', 'fox':'🦊', 'panda':'🐼' };
    ctx.fillText(pImg[mode], playerX, H - 80);

    // Draw Floaters (Points/Damage text)
    for (let i = floaters.length - 1; i >= 0; i--) {
        let f = floaters[i];
        f.y -= 2; 
        f.o -= 1.5 * dt;
        ctx.globalAlpha = Math.max(0, f.o); 
        ctx.fillStyle = f.c; 
        ctx.font = `bold ${f.s}px Orbitron`;
        ctx.fillText(f.txt, f.x, f.y);
        if(f.o <= 0) floaters.splice(i, 1);
    }
    ctx.globalAlpha = 1;

    // Check Game Over
    if(hp <= 0 || energy <= 0) {
        active = false;
        handleGameOver();
        return;
    }

    requestAnimationFrame(loop);
}

async function handleGameOver() {
    sfxGameOver();
    
    // Dim the canvas
    ctx.fillStyle = "rgba(0,0,0,0.8)";
    ctx.fillRect(0,0,W,H);
    
    document.getElementById("scr-end").style.display = "flex";
    document.getElementById("final-score").innerText = Math.floor(score);
    
    // Save to Supabase
    if(supabase) {
        try {
            await supabase.from('leaderboard').insert([{ n: agent, s: Math.floor(score) }]);
        } catch(e) { console.error("Could not save score"); }
    }
}
</script>
</body>
</html>
