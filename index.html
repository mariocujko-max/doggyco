<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOGGYCO MASTER ELITE - V121</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { 
            --neon: #00f2ff; --green: #00ff88; --red: #ff3131; --gold: #ffd700; 
            --silver: #e0e0e0; --rose: #ff66cc; --glass: rgba(0, 0, 0, 0.85);
            --milky: rgba(255, 255, 255, 0.12);
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { background: #000; font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        /* Hintergrund 100% gestreckt */
        #main-bg { position: fixed; inset: 0; background-image: url('hintergrund.png'); background-size: 100% 100%; z-index: -2; opacity: 1; transition: 1s ease; }

        header h1 { font-family: 'Orbitron'; font-size: clamp(30px, 12vw, 60px); color: var(--neon); text-align: center; padding: 30px; letter-spacing: 10px; animation: neonBlink 1.5s infinite alternate; }
        @keyframes neonBlink { 0% { text-shadow: 0 0 20px var(--neon); opacity: 1; } 100% { text-shadow: 0 0 5px var(--neon); opacity: 0.7; } }

        .wrapper { width: 100%; max-width: 500px; padding: 15px; display: flex; flex-direction: column; gap: 25px; z-index: 10; }

        .frame { background: var(--glass); backdrop-filter: blur(25px); border: 3px solid var(--neon); border-radius: 40px; text-align: center; transition: 0.3s; }
        
        /* Rahmen 1 massiv gestreckt */
        .f1 { padding: 80px 30px; min-height: 550px; display: flex; flex-direction: column; justify-content: center; box-shadow: 0 0 50px var(--neon); background: var(--milky); }
        .f2, .f3, .f4, .f5 { padding: 30px; box-shadow: 0 0 20px var(--neon); }

        #pName { width: 100%; padding: 22px; background: rgba(0,0,0,0.7); border: 3px solid var(--neon); border-radius: 20px; color: #fff; text-align: center; font-family: 'Orbitron'; font-size: 24px; margin-bottom: 30px; box-shadow: inset 0 0 15px var(--neon); }

        .btn { display: flex; align-items: center; justify-content: center; gap: 15px; width: 100%; padding: 20px; margin: 10px 0; border: none; border-radius: 22px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; transition: 0.3s; font-size: 16px; position: relative; }
        .btn:hover { transform: translateY(-10px); box-shadow: 0 15px 35px rgba(0,0,0,0.8); }
        
        .b-dog { background: var(--neon); color: #000; }
        .b-cat { background: #bc13fe; color: #fff; }
        .b-rab { background: #ff8e00; color: #fff; }
        .b-social { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid var(--neon); }

        .rank-row { display: flex; justify-content: space-between; padding: 15px 10px; border-bottom: 1px solid rgba(255,255,255,0.1); font-family: 'Orbitron'; font-size: 18px; }
        .r1 { color: var(--gold); } .r2 { color: var(--silver); } .r3 { color: var(--rose); }

        /* GAME OVERLAY */
        #game-view { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; align-items: center; }
        #hud { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; font-family: 'Orbitron'; font-size: 18px; z-index: 100; text-shadow: 2px 2px #000; pointer-events: none; }
        #energy-container { position: absolute; top: 60px; width: 85%; height: 16px; background: #222; border: 2px solid var(--neon); border-radius: 8px; overflow: hidden; }
        #energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--red), var(--gold), var(--green)); transition: width 0.3s; }
        
        .controls { position: absolute; bottom: 50px; width: 100%; display: flex; justify-content: space-evenly; }
        .arrow { width: 95px; height: 95px; border: 4px solid var(--neon); border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 45px; background: rgba(0,0,0,0.6); cursor: pointer; }
    </style>
</head>
<body onclick="unlockMusic()">

<div id="main-bg"></div>
<header id="top-header"><h1>DOGGYCO 🐶</h1></header>

<div class="wrapper" id="menu-ui">
    <div class="frame f1">
        <input type="text" id="pName" placeholder="PLAYER NAME" maxlength="12" autocomplete="off">
        <button class="btn b-dog" onclick="forceStart('dog')">DOGGY ADVENTURE</button>
        <button class="btn b-cat" onclick="forceStart('cat')">CATS WORLD 🔒</button>
        <button class="btn b-rab" onclick="forceStart('rab')">RABBIT LAND 🔒</button>
    </div>

    <div class="frame f2">
        <h3 style="font-family:'Orbitron'; color:var(--neon); margin-bottom:15px;">GLOBAL RANKING</h3>
        <div id="ranking-box">Syncing Database...</div>
    </div>

    <div class="frame f3">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <button class="btn b-social" onclick="window.open('https://tiktok.com')">TIKTOK</button>
            <button class="btn b-social" onclick="window.open('https://paypal.me')">PAYPAL</button>
        </div>
    </div>

    <div class="frame f4">
        <h3 style="font-family:'Orbitron'; color:var(--green);">MANUAL</h3>
        <p style="font-size:14px; text-align:left; line-height:1.7; margin-top:10px;">
            - USE ARROWS to move lanes.<br>
            - COLLECT treats for points.<br>
            - AVOID Spiders & Police 👮.
        </p>
    </div>

    <div class="frame f5">
        <p style="font-size:11px; opacity:0.6;">© 2026 DOGGYCO MASTER ELITE V121.</p>
    </div>
</div>

<div id="game-view">
    <div id="hud">
        <div id="h-n">-</div><div id="h-l">❤️❤️❤️</div><div id="h-s">🏆 0</div>
    </div>
    <div id="energy-container"><div id="energy-fill"></div></div>
    <canvas id="game-canvas"></canvas>
    <div class="controls">
        <div class="arrow" onmousedown="mv(-1)" ontouchstart="mv(-1)"><i class="fas fa-chevron-left"></i></div>
        <div class="arrow" onmousedown="mv(1)" ontouchstart="mv(1)"><i class="fas fa-chevron-right"></i></div>
    </div>
</div>

<audio id="bgMusic" src="musik.mp3" loop></audio>

<script>
// --- CORE CONFIG ---
const S_URL = 'https://ovmsstdroxkinisqwlhw.supabase.co';
const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92mXNzdGRyb3hraW5pc3F3bGh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMzM3OTEsImV4cCI6MjA4NzgwOTc5MX0.SOsi-Aeb_wSp40_TTymaiiU0Kn_3rhG_LnvLjJP66z8';
let supabase = null;

let isPlaying = false, score = 0, hearts = 3, energy = 100, lane = 2, lastT = 0;
let charX = 200, targetX = 200, items = [], enemies = [], floaters = [], mode = 'dog';

function unlockMusic() {
    const audio = document.getElementById("bgMusic");
    if(audio.paused) audio.play().catch(()=>{});
}

// Datenbank im Hintergrund laden (Stabilität!)
window.onload = () => {
    try {
        if(window.supabase) {
            supabase = window.supabase.createClient(S_URL, S_KEY);
            fetchRanking();
        }
    } catch(e) { console.log("DB Offline"); }
};

async function fetchRanking() {
    if(!supabase) return;
    const { data } = await supabase.from('leaderboard').select('n, s').order('s', { ascending: false }).limit(5);
    if(data) {
        const cls = ['r1', 'r2', 'r3', 'r4', 'r5'];
        document.getElementById("ranking-box").innerHTML = data.map((r, i) => `
            <div class="rank-row ${cls[i]}"><span>${i+1}. ${r.n}</span><span>${r.s} pts</span></div>
        `).join('');
    }
}

// START-BEFEHL (ABSULUTE PRIORITÄT)
function forceStart(m) {
    const name = document.getElementById("pName").value.trim();
    if(!name) return alert("ENTER YOUR NAME!");
    
    // UI sofort ausblenden
    mode = m;
    document.getElementById("menu-ui").style.display = "none";
    document.getElementById("top-header").style.display = "none";
    document.getElementById("game-view").style.display = "flex";
    document.getElementById("h-n").innerText = "PRO: " + name.toUpperCase();
    
    // Musik & Hintergrund
    const bg = document.getElementById("main-bg");
    const audio = document.getElementById("bgMusic");
    if(m === 'cat') {
        bg.style.filter = "hue-rotate(280deg)";
        audio.src = "cats_world_theme.mp3";
    }
    audio.play().catch(()=>{});
    
    // Engine anwerfen
    isPlaying = true;
    lastT = performance.now();
    const cvs = document.getElementById("game-canvas");
    cvs.width = 400; 
    cvs.height = window.innerHeight;
    requestAnimationFrame(loop);
}

function mv(dir) { lane = Math.max(0, Math.min(4, lane + dir)); targetX = lane * 80 + 40; }

function loop(t) {
    if(!isPlaying) return;
    const ctx = document.getElementById("game-canvas").getContext("2d");
    const cvs = document.getElementById("game-canvas");
    let dt = (t - lastT) / 1000; lastT = t;
    if(dt > 0.1) dt = 0.016;

    ctx.clearRect(0,0,400,cvs.height);

    // Energie-Verlust
    energy -= 5.5 * dt;
    document.getElementById("energy-fill").style.width = Math.max(0, energy) + "%";

    // Spawning (Items & Gegner)
    if(Math.random() < 0.04) {
        let l = Math.floor(Math.random()*5);
        items.push({ x: l*80+40, y: -60, lane: l, type: Math.random() < 0.8 ? '🦴' : '🥩' });
    }
    if(Math.random() < 0.018) {
        enemies.push({ x: Math.floor(Math.random()*5)*80+40, y: -60, lane: Math.floor(Math.random()*5), type: Math.random() < 0.6 ? '🕷️' : '👮' });
    }

    // Items Bewegung & Kollision
    items.forEach((it, i) => {
        it.y += (250 + score/15) * dt;
        ctx.font = "50px Arial"; ctx.textAlign = "center";
        ctx.fillText(it.type, it.x, it.y);
        if(it.lane === lane && it.y > cvs.height - 180 && it.y < cvs.height - 80) {
            score += (it.type === '🦴' ? 15 : 50);
            energy = Math.min(100, energy + 15);
            items.splice(i,1);
        }
        if(it.y > cvs.height) items.splice(i,1);
    });

    // Gegner Bewegung & Kollision
    enemies.forEach((en, i) => {
        en.y += (350 + score/15) * dt;
        ctx.fillText(en.type, en.x, en.y);
        if(en.lane === lane && en.y > cvs.height - 180 && en.y < cvs.height - 80) {
            hearts--; energy -= 20;
            enemies.splice(i,1);
        }
        if(en.y > cvs.height) enemies.splice(i,1);
    });

    // Charakter Zeichnen
    charX += (targetX - charX) * 0.22;
    ctx.font = "95px Arial";
    let icon = mode === 'dog' ? "🐶" : (mode === 'cat' ? "🐱" : "🐰");
    ctx.fillText(icon, charX, cvs.height - 130);

    // UI Stats
    document.getElementById("h-s").innerText = "🏆 " + Math.floor(score);
    document.getElementById("h-l").innerText = "❤️".repeat(Math.max(0, hearts));

    if(hearts <= 0 || energy <= 0) {
        if(supabase) supabase.from('leaderboard').insert([{ n: document.getElementById("pName").value, s: Math.floor(score) }]);
        isPlaying = false; alert("GAME OVER! SCORE: " + Math.floor(score)); location.reload();
    }
    requestAnimationFrame(loop);
}
</script>
</body>
</html>
