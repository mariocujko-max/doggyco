<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOGGYCO V420 - ZERO BUG</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@500;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --neon: #00f2ff; --green: #00ff88; --red: #ff3131; --gold: #ffd700; 
            --glass: rgba(255, 255, 255, 0.18);
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #000 url('forest_background.png') no-repeat center center fixed; 
            background-size: cover; font-family: 'Orbitron', sans-serif; color: #fff; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-x: hidden;
        }

        header { padding: 20px; text-align: center; }
        header h1 { font-size: 38px; color: var(--neon); text-shadow: 0 0 15px var(--neon); letter-spacing: 5px; }

        /* Spielfeld */
        #game-view { width: 100vw; height: 80vh; display: flex; justify-content: center; align-items: center; position: relative; }
        #game-wrap { 
            position:relative; width: 95vw; height: 100%; max-width: 450px; 
            background: rgba(0,0,0,0.8); border: 4px solid var(--neon); border-radius: 40px; 
            overflow: hidden; box-shadow: 0 0 40px var(--neon);
        }
        #bg-layer { position: absolute; inset: 0; background: url('hintergrund.png') center/cover; filter: brightness(0.3); z-index: 1; }
        canvas { position: absolute; inset: 0; z-index: 50; background: transparent; }

        /* HUD - Ganz oben */
        #ui-header { position: absolute; top: 15px; width: 100%; z-index: 100; pointer-events: none; }
        #energy-bar-wrap { width: 88%; height: 32px; margin: 0 auto; background: rgba(0,0,0,0.6); border: 2px solid #fff; border-radius: 16px; overflow: hidden; }
        #energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--red), var(--gold), var(--green)); transition: width 0.2s; }
        #hud-row { display: flex; justify-content: space-between; align-items: center; width: 85%; margin: 10px auto 0; font-size: 15px; font-weight: 900; text-shadow: 2px 2px 4px #000; }

        /* OVERLAYS - Absolut getrennt */
        .overlay { 
            position: absolute; inset: 0; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 500; 
            background: rgba(0,0,0,0.7); backdrop-filter: blur(15px);
        }
        
        #start-screen { z-index: 600; } /* Start immer über dem Rest beim Laden */
        #end-screen { z-index: 700; display: none; } /* Versteckt bis zum Tod */

        #pName { 
            padding: 18px; border-radius: 20px; border: 2px solid var(--neon); 
            background: rgba(255,255,255,0.2); color: #fff; text-align: center; 
            width: 80%; font-family: 'Orbitron'; font-size: 18px; outline: none; margin-bottom: 25px;
        }
        .neon-btn { padding: 18px 50px; background: var(--green); color: #000; border-radius: 35px; font-weight: 900; cursor: pointer; border: none; font-family: 'Orbitron'; box-shadow: 0 0 15px var(--green); }

        /* Kacheln */
        .frosted-tile { 
            background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 35px; padding: 25px; margin: 20px 0; 
            width: 92vw; max-width: 450px; text-align: center;
        }

        .rank-row { display: flex; justify-content: space-between; padding: 10px 15px; margin-bottom: 8px; border-radius: 15px; background: rgba(0,0,0,0.3); }

        /* Controls */
        #controls { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 35px; z-index: 200; pointer-events: none; }
        .btn-arrow { width: 70px; height: 70px; background: rgba(255,255,255,0.1); border: 2px solid var(--neon); border-radius: 50%; color: #fff; font-size: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; pointer-events: auto; }
    </style>
</head>
<body>

<header><h1>DOGGYCO</h1></header>

<div id="game-view">
    <div id="game-wrap">
        <div id="bg-layer"></div>
        <div id="ui-header">
            <div id="energy-bar-wrap"><div id="energy-fill"></div></div>
            <div id="hud-row">
                <span>❤️❤️❤️</span>
                <span id="lvl-display">LVL 1</span>
                <span id="timer-display">30S</span>
                <span id="score-display">0</span>
            </div>
        </div>
        
        <canvas id="game-canvas"></canvas>

        <div id="controls">
            <div id="btn-L" class="btn-arrow" onclick="mLeft()">◀</div>
            <div id="btn-R" class="btn-arrow" onclick="mRight()">▶</div>
        </div>

        <div id="start-screen" class="overlay">
            <input type="text" id="pName" placeholder="AGENT NAME">
            <button class="neon-btn" onclick="startGame()">START MISSION</button>
        </div>

        <div id="end-screen" class="overlay">
            <h2 style="color:var(--red); font-size: 32px;">GAME OVER</h2>
            <h1 id="f-score" style="font-size: 65px; color: var(--gold); margin: 20px 0;">0</h1>
            <button class="neon-btn" onclick="location.reload()">RETRY</button>
        </div>
    </div>
</div>

<div class="frosted-tile">
    <h3 style="color:var(--gold); margin-bottom:15px;">🏆 TOP AGENTS</h3>
    <div id="leaderboard">Syncing...</div>
</div>

<div class="frosted-tile">
    <h3 style="color:var(--neon); margin-bottom:15px;">🎁 SUPPORT MISSION</h3>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <a href="https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=give-me.org@gmx.net" target="_blank" style="padding:15px; background:#0070ba; border-radius:15px; text-decoration:none; color:#fff; font-size:11px; font-weight:800;">PAYPAL</a>
        <button onclick="navigator.clipboard.writeText('bc1qkm22c6w896u9n9cxp8ld049maef4xs5xn060ed'); alert('Copied!');" style="padding:15px; background:#f7931a; border-radius:15px; color:#fff; border:none; font-size:11px; font-weight:800; cursor:pointer;">COPY BTC</button>
        <button onclick="window.open('https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=bitcoin:bc1qkm22c6w896u9n9cxp8ld049maef4xs5xn060ed','_blank')" style="padding:15px; background:#444; border-radius:15px; color:#fff; border:none; font-size:11px; font-weight:800; cursor:pointer;">QR CODE</button>
        <a href="https://www.tiktok.com/@giveme.org" target="_blank" style="padding:15px; background:#000; border:1px solid #fff; border-radius:15px; text-decoration:none; color:#fff; font-size:11px; font-weight:800;">TIKTOK</a>
    </div>
</div>

<footer>
    <p style="font-size:12px; color:#777; line-height:1.6;">Private initiative. Contributions are personal gifts. © 2026 DOGGYCO | GIVE-ME.ORG</p>
</footer>

<script>
const SUPABASE_URL = 'https://ovmsstdroxkinisqwlhw.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92bXNzdGRyb3hraW5pc3F3bGh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMzM3OTEsImV4cCI6MjA4NzgwOTc5MX0.SOsi-Aeb_wSp40_TTymaiiU0Kn_3rhG_LnvLjJP66z8';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const canvas = document.getElementById("game-canvas");
const ctx = canvas.getContext("2d");
let W, H, laneW, dogX, targetX, dogLane = 2, active = false;
let items = [], spiders = [], clouds = [], birds = [], floaters = [];
let score = 0, hearts = 3, energy = 100, level = 1, timeLeft = 30;
let lastTime = 0, spawnTimer = 0, audioCtx, bgMusic, dogShake = 0;

function resize() {
    W = canvas.width = document.getElementById("game-wrap").offsetWidth;
    H = canvas.height = document.getElementById("game-wrap").offsetHeight;
    laneW = W / 5; targetX = (dogLane * laneW) + (laneW / 2); dogX = targetX;
}
window.onload = resize; window.onresize = resize;

// PC STEUERUNG FIX
window.addEventListener('keydown', e => {
    if(!active) return;
    if(e.key === "ArrowLeft" && dogLane > 0) { dogLane--; updateX(); }
    if(e.key === "ArrowRight" && dogLane < 4) { dogLane++; updateX(); }
});

function mLeft() { if(dogLane > 0) { dogLane--; updateX(); } }
function mRight() { if(dogLane < 4) { dogLane++; updateX(); } }
function updateX() { targetX = (dogLane * laneW) + (laneW / 2); }

function startGame() {
    if(!document.getElementById("pName").value) return alert("Enter Name!");
    document.getElementById("start-screen").style.display = "none";
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    bgMusic = new Audio('musik.mp3'); bgMusic.loop = true; bgMusic.volume = 0.05;
    bgMusic.play().catch(()=>{});
    active = true; resize(); lastTime = performance.now();
    requestAnimationFrame(loop);
}

function loop(t) {
    if(!active) return;
    let dt = (t - lastTime) / 1000; lastTime = t;
    if(dt > 0.1) dt = 0.016; 
    ctx.clearRect(0,0,W,H);

    timeLeft -= dt; energy -= (4.4 + level * 0.6) * dt;
    document.getElementById("energy-fill").style.width = Math.max(0, energy) + "%";
    document.getElementById("timer-display").innerText = Math.ceil(timeLeft) + "S";
    document.getElementById("score-display").innerText = Math.floor(score);
    document.getElementById("lvl-display").innerText = "LVL " + level;

    // Atmos
    if(clouds.length < 2) clouds.push({ x: -60, y: 150+Math.random()*100, s: 0.2 });
    ctx.font = "40px Arial"; clouds.forEach(c => { c.x += c.s; if(c.x > W+60) c.x = -60; ctx.fillText("☁️", c.x, c.y); });
    if(Math.random() < 0.005) birds.push({ x: W+50, y: 80+Math.random()*100, vx: -1.5 });
    ctx.font = "24px Arial"; birds.forEach((b, i) => { b.x += b.vx; ctx.fillText("🐦", b.x, b.y); if(b.x < -60) birds.splice(i, 1); });

    // VFX
    floaters.forEach((f, i) => { f.y -= 2.2; f.life -= dt; ctx.globalAlpha = f.life; ctx.fillStyle = f.col; ctx.font = "bold 20px Orbitron"; ctx.textAlign="center"; ctx.fillText(f.txt, f.x, f.y); if(f.life <= 0) floaters.splice(i,1); });
    ctx.globalAlpha = 1;

    // Spiders
    if(spiders.length < 2 && Math.random() < 0.012) {
        let occ = spiders.map(s => s.lane); let poss = [0,1,2,3,4].filter(l => !occ.includes(l));
        if(poss.length > 0) spiders.push({lane: poss[Math.floor(Math.random()*poss.length)], y: 0, dir: 1});
    }
    spiders.forEach((s, i) => {
        s.y += (220 + level * 15) * dt * s.dir; if(s.y > H - 160) s.dir = -1; if(s.y < 0) spiders.splice(i, 1);
        let sx = s.lane * laneW + laneW/2;
        ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, s.y); ctx.stroke();
        ctx.font = "38px Arial"; ctx.fillText("🕷️", sx, s.y + 25);
        if(s.lane === dogLane && s.y > H-170 && s.y < H-90) { 
            let dmg = Math.floor(30 * Math.pow(1.1, level - 1)); energy -= dmg * dt * 5; dogShake = 15;
            if(Math.random() < 0.05) floaters.push({x:sx, y:H-150, txt:"-"+dmg+"%", col:"red", life:1});
        }
    });

    // Items
    let interval = (28 / (60 * Math.pow(1.1, level - 1)));
    spawnTimer -= dt;
    if(spawnTimer <= 0) {
        let r = Math.random(); let type = '🦴';
        if(r < 0.08) type = '👮'; else if(r < 0.22) type = '🍗'; else if(r < 0.38) type = '🍪';
        items.push({lane: Math.floor(Math.random()*5), y: -60, type: type}); spawnTimer = interval;
    }
    items.forEach((it, i) => {
        it.y += (310 + level * 22) * dt; let ix = it.lane * laneW + laneW/2;
        ctx.font = "42px Arial"; ctx.fillText(it.type, ix, it.y);
        if(it.lane === dogLane && it.y > H-160 && it.y < H-80) {
            if(it.type === '👮') { hearts--; dogShake = 30; floaters.push({x:ix, y:it.y, txt:"-1 ❤️", col:"red", life:1.5}); }
            else { 
                let b = it.type === '🍗' ? 30 : (it.type === '🍪' ? 20 : 10);
                let p = Math.floor(b * Math.pow(1.1, level - 1)); score += p; energy = Math.min(100, energy + 8); 
                floaters.push({x:ix, y:it.y, txt:"+"+p, col: "lime", life:0.8});
            }
            items.splice(i, 1);
        }
    });

    dogX += (targetX - dogX) * 0.25;
    ctx.font = "80px Arial"; ctx.fillText("🐶", dogX-40 + (Math.random()-0.5)*dogShake, H - 110);
    if(dogShake > 0) dogShake *= 0.85;
    if(energy <= 0 || hearts <= 0) end(); else requestAnimationFrame(loop);
}

async function end() {
    active = false; document.getElementById("end-screen").style.display = "flex";
    document.getElementById("f-score").innerText = Math.floor(score);
    await supabaseClient.from('leaderboard').insert([{ n: document.getElementById("pName").value, s: Math.floor(score) }]);
    updateRanks();
}

async function updateRanks() {
    try {
        let { data } = await supabaseClient.from('leaderboard').select('*').order('s', { ascending: false }).limit(5);
        if(data) document.getElementById("leaderboard").innerHTML = data.map((x, i) => `<div class="rank-row"><span>${i+1}. ${x.n}</span><span>${x.s}</span></div>`).join('');
    } catch(e) {}
}
updateRanks();
</script>
</body>
</html>
