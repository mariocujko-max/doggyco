<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Hub - Desert & Rabbit Land</title>
    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            border: 4px solid #333;
            border-radius: 15px;
            overflow: hidden;
            transition: box-shadow 0.1s ease;
            /* Hintergrundbild für Start & Spiel identisch */
            background-image: url('dein-hintergrund.png');
            background-size: cover;
            background-position: center;
        }

        /* Der blaue Bewegungseffekt */
        .move-glow {
            box-shadow: inset 0 0 50px rgba(0, 123, 255, 0.8), 0 0 30px rgba(0, 123, 255, 0.5);
        }

        canvas {
            display: block;
        }

        /* Startbildschirm Overlay */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .menu-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
        }

        h1 { margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }

        .btn-list { display: flex; flex-direction: column; gap: 15px; }

        button {
            padding: 12px 30px;
            font-size: 18px;
            cursor: pointer;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            transition: 0.3s;
        }

        button:hover { background: #0056b3; transform: scale(1.05); }

        #status {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 14px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div id="ui-layer">
        <div class="menu-card">
            <h1>Spiele-Bibliothek</h1>
            <div class="btn-list">
                <button onclick="startGame('desert')">Wüste (Repariert)</button>
                <button onclick="startGame('rabbit')">Rabbit Land (Neu)</button>
                <button onclick="startGame('library')">Spielothek Klassik</button>
            </div>
        </div>
    </div>

    <div id="status">Steuerung: Pfeiltasten | Musik: Aktiv</div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('game-container');
    const uiLayer = document.getElementById('ui-layer');

    // --- VARIABLEN ---
    let gameRunning = false;
    let currentGame = '';
    let scrollX = 0;
    let player = { x: 100, y: 450, width: 50, height: 50 };
    
    // Hintergrund laden
    const bgImg = new Image();
    bgImg.src = 'dein-hintergrund.png'; // Dein PNG Name hier

    // --- REPARATUR: EWIGE WÜSTE ---
    function drawDesert() {
        scrollX += 3; // Geschwindigkeit
        let x = scrollX % canvas.width;

        // Nahtloser Loop: Zeichne das Bild zweimal
        ctx.drawImage(bgImg, -x, 0, canvas.width, canvas.height);
        ctx.drawImage(bgImg, canvas.width - x, 0, canvas.width, canvas.height);
        
        // Spieler (Platzhalter)
        ctx.fillStyle = '#007bff';
        ctx.fillRect(player.x, player.y, player.width, player.height);
    }

    function drawRabbitLand() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        // Spezielles Design für Rabbit Land
        ctx.fillStyle = '#2ecc71'; // Grünerer Ton für Rabbits
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'white';
        ctx.font = '30px Arial';
        ctx.fillText("Rabbit Land - Springe mit Pfeiltasten!", 200, 100);
        
        ctx.fillStyle = '#e67e22'; // Der "Hase"
        ctx.fillRect(player.x, player.y, player.width, player.height);
    }

    // --- INPUT & EFFEKTE ---
    window.addEventListener('keydown', (e) => {
        if (!gameRunning) return;

        if (e.key.startsWith('Arrow')) {
            // Blauer Bewegungseffekt aktivieren
            container.classList.add('move-glow');
            setTimeout(() => container.classList.remove('move-glow'), 150);

            // Bewegungslogik
            if (e.key === 'ArrowUp') player.y -= 20;
            if (e.key === 'ArrowDown') player.y += 20;
            if (e.key === 'ArrowLeft') player.x -= 20;
            if (e.key === 'ArrowRight') player.x += 20;
        }
    });

    // --- GAME LOOP ---
    function gameLoop() {
        if (!gameRunning) return;

        if (currentGame === 'desert') {
            drawDesert();
        } else if (currentGame === 'rabbit') {
            drawRabbitLand();
        }

        requestAnimationFrame(gameLoop);
    }

    function startGame(mode) {
        uiLayer.style.display = 'none';
        gameRunning = true;
        currentGame = mode;
        // Musik hier starten (falls Audio-Element vorhanden)
        console.log("Spiel gestartet: " + mode);
        gameLoop();
    }
</script>

</body>
</html>
