<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOGGYCO & CATS WORLD V98 - PERFECT CENTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --neon: #00f2ff; --green: #00ff88; --red: #ff3131; --gold: #ffd700; 
            --blue-glow: #0070ff; --cat-purple: #bc13fe;
        }
        
        /* KOMPLETTE ZENTRIERUNG */
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            width: 100%; height: 100%; 
            background: #000; overflow: hidden;
            display: flex; flex-direction: column;
        }

        body { 
            font-family: 'Orbitron', sans-serif; color: #fff; 
            align-items: center; justify-content: center;
        }

        /* FIXER HINTERGRUND */
        #main-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('hintergrund.png') center center / cover no-repeat #000;
            filter: brightness(0.35); z-index: -10;
        }

        header { width: 100%; text-align: center; padding: 10px 0; z-index: 10; }
        header h1 { font-size: clamp(24px, 5vw, 36px); color: var(--neon); text-shadow: 0 0 15px var(--neon); }

        /* DAS SPIELFELD-GEHÄUSE */
        #game-view { 
            flex: 1; display: flex; align-items: center; justify-content: center; 
            width: 100%; padding: 10px; z-index: 5;
        }
        
        #game-wrap { 
            position:relative; width: 100%; max-width: 380px; height: 100%; max-height: 620px;
            background: rgba(0,0,0,0.85); border: 3px solid var(--neon); border-radius: 40px; 
            overflow: hidden; box-shadow: 0 0 50px var(--neon);
            display: flex; flex-direction: column;
        }

        /* HUD */
        #ui-header { position: absolute; top: 15px; width: 100%; z-index: 200; pointer-events: none; }
        #energy-bar-wrap { width: 85%; height: 20px; margin: 0 auto; background: #111; border: 1.5px solid #fff; border-radius: 10px; overflow: hidden; }
        #energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--red), var(--gold), var(--green)); transition: width 0.2s; }
        #hud-row { display: flex; justify-content: space-between; width: 85%; margin: 5px auto; font-size: 13px; font-weight: 900; }

        /* CANVAS */
        #game-canvas { width: 100%; height: 100%; display: block; z-index: 50; }

        /* OVERLAYS (MILCHIG) */
        .overlay { 
            position: absolute; inset: 0; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 1000; 
            background: rgba(0,0,0,0.92); border-radius: 36px; padding: 25px; text-align: center; 
        }

        .glass-panel { 
            background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); 
            border: 2px solid var(--neon); border-radius: 25px; padding: 20px; width: 100%; 
        }

        .neon-btn { 
            padding: 16px; background: var(--green); color: #000; border-radius: 30px; 
            font-weight: 900; cursor: pointer; border: none; font-family: 'Orbitron'; 
            margin: 10px 0; width: 100%; box-shadow: 0 0 10px var(--green); transition: 0.2s; 
        }
        .neon-btn:active { transform: scale(0.96); }
        .cat-btn { background: var(--cat-purple); color: #fff; box-shadow: 0 0 10px var(--cat-purple); }

        /* STEUERUNG */
        #controls { position: absolute; bottom: 25px; width: 100%; display: flex; justify-content: space-between; padding: 0 35px; z-index: 300; }
        .btn-arrow { width: 75px; height: 75px; background: rgba(255,255,255,0.05); border: 2px solid var(--neon); border-radius: 50%; color: #fff; font-size: 35px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-arrow:active { background: var(--blue-glow); box-shadow: 0 0 30px var(--blue-glow); border-color: #fff; }

        #pName { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid var(--neon); background: #000; color: #fff; text-align: center; font-family: 'Orbitron'; outline: none; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="main-bg"></div>
<header><h1 id="main-title">DOGGYCO</h1></header>

<div id="game-view">
    <div id="game-wrap">
        <div id="ui-header">
            <div id="energy-bar-wrap"><div id="energy-fill"></div></div>
            <div id="hud-row">
                <div id="hearts-display">❤️❤️❤️</div>
                <div id="timer-display" style="color:var(--gold)">30s</div>
                <div>LVL <span id="lvl-num">1</span></div>
            </div>
        </div>
        
        <canvas id="game-canvas"></canvas>

        <div id="controls">
            <div class="btn-arrow" onmousedown="mLeft()" ontouchstart="mLeft(event)">◀</div>
            <div class="btn-arrow" onmousedown="mRight()" ontouchstart="mRight(event)">▶</div>
        </div>

        <div id="start-screen" class="overlay">
            <div class="glass-panel">
                <input type="text" id="pName" placeholder="AGENT NAME">
                <button class="neon-btn" onclick="startGame(false)">START DOGGYCO</button>
                <button class="neon-btn cat-btn" onclick="startGame(true)">START CATS WORLD</button>
            </div>
        </div>

        <div id="end-screen" class="overlay" style="display:none;">
            <h1 id="f-score" style="font-size: 45px; color: var(--gold); margin-bottom: 20px;">0</h1>
            <button class="neon-btn" onclick="location.reload()">RETRY</button>
        </div>
    </div>
</div>

<script>
// Supabase Initialisierung
const SUPABASE_URL = 'https://ovmsstdroxkinisqwlhw.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92bXNzdGRyb3hraW5pc3F3bGh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMzM3OTEsImV4cCI6MjA4NzgwOTc5MX0.SOsi-Aeb_wSp40_TTymaiiU0Kn_3rhG_LnvLjJP66z8';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const canvas = document.getElementById("game-canvas");
const ctx = canvas.getContext("2d");
let W, H, dogX, targetX, dogLane = 2, active = false, isCat = false;
let items = [], spiders = [], lastTime = 0, score = 0, hearts = 3, energy = 100, level = 1, timeLeft = 30;
let audioCtx;

function initSize() {
    W = canvas.width = canvas.offsetWidth;
    H = canvas.height = canvas.offsetHeight;
    targetX = (dogLane * (W/5)) + (W/10);
    dogX = targetX;
}

function startGame(catMode) {
    if(!document.getElementById("pName").value) return;
    initSize();
    isCat = catMode;
    document.getElementById("start-screen").style.display = "none";
    
    // Audio Unlock
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let music = new Audio(isCat ? 'cats_world_theme.mp3' : 'musik.mp3');
    music.loop = true; music.volume = 0.1; music.play().catch(() => {});

    if(isCat) {
        document.getElementById("main-title").innerText = "CATS WORLD";
        document.getElementById("main-title").style.color = "#bc13fe";
        document.getElementById("main-bg").style.filter = "hue-rotate(280deg) brightness(0.4)";
    }
    active = true; lastTime = performance.now();
    requestAnimationFrame(loop);
}

function mLeft(e) { if(e) e.preventDefault(); if(active && dogLane > 0) { dogLane--; targetX = (dogLane * (W/5)) + (W/10); } }
function mRight(e) { if(e) e.preventDefault(); if(active && dogLane < 4) { dogLane++; targetX = (dogLane * (W/5)) + (W/10); } }

function loop(t) {
    if(!active) return;
    let dt = (t - lastTime) / 1000; lastTime = t;
    if(dt > 0.1) dt = 0.016;
    ctx.clearRect(0,0,W,H);

    timeLeft -= dt; energy -= (5 + level * 0.5) * dt;
    if(timeLeft <= 0) { level++; timeLeft = 30; energy = 100; }

    document.getElementById("energy-fill").style.width = Math.max(0, energy) + "%";
    document.getElementById("timer-display").innerText = Math.ceil(timeLeft) + "s";
    document.getElementById("lvl-num").innerText = level;

    if(energy <= 0 || hearts <= 0) { active = false; document.getElementById("end-screen").style.display = "flex"; document.getElementById("f-score").innerText = "SCORE: " + score; return; }

    if(items.length < 5 && Math.random() < 0.03) {
        items.push({ lane: Math.floor(Math.random()*5), y: -50, type: Math.random() < 0.8 ? (isCat ? '🍼' : '🦴') : '🕷️' });
    }

    items.forEach((it, i) => {
        it.y += (220 + level * 15) * dt;
        let ix = it.lane * (W/5) + (W/10);
        ctx.font = "40px Arial"; ctx.textAlign = "center"; ctx.fillText(it.type, ix, it.y);
        if(it.lane === dogLane && it.y > H-130 && it.y < H-40) {
            if(it.type === '🕷️') energy -= 25; else { score += 10; energy = Math.min(100, energy+5); }
            items.splice(i, 1);
        }
        if(it.y > H) items.splice(i,1);
    });

    dogX += (targetX - dogX) * 0.15;
    ctx.font = "65px Arial"; ctx.fillText(isCat ? "🐱" : "🐶", dogX, H - 85);
    requestAnimationFrame(loop);
}

window.onload = initSize;
window.onresize = initSize;
</script>
</body>
</html>
