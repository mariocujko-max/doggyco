<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOGGYCO ULTIMATE PRO - V108 FINAL</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { 
            --neon: #00f2ff; --green: #00ff88; --red: #ff3131; --gold: #ffd700; 
            --silver: #e0e0e0; --rose: #ff66cc; --copper: #cd7f32; --wood: #8b4513;
            --glass-dark: rgba(0, 0, 0, 0.8);
            --milky: rgba(255, 255, 255, 0.1);
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            background: #000; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            overflow-x: hidden; 
        }
        
        /* Hintergrund 100% gestreckt */
        #main-bg { 
            position: fixed; 
            inset: 0; 
            background-image: url('hintergrund.png'); 
            background-size: 100% 100%; 
            z-index: -2; 
            opacity: 1; 
        }

        /* Neon Blink Animation */
        header h1 { 
            font-family: 'Orbitron'; 
            font-size: clamp(35px, 12vw, 65px); 
            color: var(--neon); 
            text-align: center; 
            padding: 30px; 
            letter-spacing: 10px; 
            animation: neonBlink 1.5s infinite alternate; 
        }
        @keyframes neonBlink {
            0% { text-shadow: 0 0 20px var(--neon); opacity: 1; }
            100% { text-shadow: 0 0 5px var(--neon); opacity: 0.8; }
        }

        .wrapper { 
            width: 100%; 
            max-width: 500px; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 25px; 
            z-index: 10; 
        }

        /* DIE FÜNF MILCHIGEN RAHMEN */
        .frame { 
            background: var(--glass-dark); 
            backdrop-filter: blur(25px); 
            border: 3px solid var(--neon); 
            border-radius: 40px; 
            text-align: center; 
            transition: 0.3s ease;
        }

        /* Erster Rahmen massiv gestreckt */
        .f1 { 
            padding: 80px 30px; 
            min-height: 580px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            box-shadow: 0 0 50px var(--neon);
        }
        .f2 { padding: 30px; box-shadow: 0 0 25px var(--neon); }
        .f3 { padding: 25px; box-shadow: 0 0 15px var(--neon); }
        .f4 { padding: 25px; box-shadow: 0 0 10px var(--neon); }
        .f5 { padding: 20px; border-color: rgba(0, 242, 255, 0.2); }

        #pName { 
            width: 100%; 
            padding: 22px; 
            background: rgba(255,255,255,0.05); 
            border: 2px solid var(--neon); 
            border-radius: 15px; 
            color: #fff; 
            text-align: center; 
            font-family: 'Orbitron'; 
            font-size: 24px; 
            margin-bottom: 30px;
        }

        /* BUTTONS MIT LIFT EFFEKT */
        .btn { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 15px; 
            width: 100%; 
            padding: 20px; 
            margin: 10px 0; 
            border: none; 
            border-radius: 20px; 
            font-family: 'Orbitron'; 
            font-weight: 900; 
            cursor: pointer; 
            transition: 0.3s; 
            font-size: 16px; 
        }
        .btn:hover { transform: translateY(-10px); box-shadow: 0 15px 35px rgba(0,0,0,0.8); }
        
        .b-dog { background: var(--neon); color: #000; }
        .b-cat { background: #bc13fe; color: #fff; }
        .b-rab { background: #ff8e00; color: #fff; }
        .b-social { background: rgba(0,0,0,0.5); color: #fff; border: 1px solid var(--neon); }

        /* RANKING */
        .rank-row { display: flex; justify-content: space-between; padding: 15px 10px; border-bottom: 1px solid rgba(255,255,255,0.1); font-family: 'Orbitron'; font-size: 18px; }
        .r1 { color: var(--gold); } .r2 { color: var(--silver); } .r3 { color: var(--rose); } .r4 { color: var(--copper); } .r5 { color: var(--wood); }

        /* GAME HUD */
        #game-view { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; align-items: center; }
        #hud { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; font-family: 'Orbitron'; font-size: 18px; z-index: 100; text-shadow: 2px 2px #000; }
        #energy-bar { position: absolute; top: 60px; width: 85%; height: 14px; background: #222; border: 2px solid var(--neon); border-radius: 7px; overflow: hidden; }
        #energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--red), var(--gold), var(--green)); transition: width 0.3s; }
        
        .controls { position: absolute; bottom: 50px; width: 100%; display: flex; justify-content: space-evenly; }
        .arrow { width: 95px; height: 95px; border: 4px solid var(--neon); border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 45px; background: rgba(0,0,0,0.5); cursor: pointer; }
    </style>
</head>
<body onclick="playMusic()">

<div id="main-bg"></div>
<header><h1>DOGGYCO 🐶</h1></header>

<div class="wrapper" id="menu">
    <div class="frame f1">
        <input type="text" id="pName" placeholder="ENTER YOUR NAME" maxlength="12">
        <button class="btn b-dog" onclick="launchGame('dog')"><i class="fas fa-dog"></i> DOGGY ADVENTURE</button>
        <button class="btn b-cat" onclick="launchGame('cat')"><i class="fas fa-cat"></i> CATS WORLD <i class="fas fa-lock"></i></button>
        <button class="btn b-rab" onclick="launchGame('rab')"><i class="fas fa-rabbit"></i> RABBIT LAND <i class="fas fa-lock"></i></button>
    </div>

    <div class="frame f2">
        <h3 style="font-family:'Orbitron'; color:var(--neon); margin-bottom:15px;"><i class="fas fa-trophy"></i> GLOBAL RANKING</h3>
        <div id="ranking-box">Syncing Scores...</div>
    </div>

    <div class="frame f3">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn b-social" onclick="window.open('https://tiktok.com')">TIKTOK</button>
            <button class="btn b-social" onclick="window.open('https://paypal.me')">PAYPAL</button>
            <button class="btn b-social" onclick="copyBTC()">BTC WALLET</button>
            <button class="btn b-social" onclick="alert('bc1qkm22c6w896u9n9cxp8ld049maef4xs5xn060ed')">QR CODE</button>
        </div>
    </div>

    <div class="frame f4">
        <h3 style="font-family:'Orbitron'; color:var(--green);">HOW TO PLAY</h3>
        <p style="font-size:14px; text-align:left; line-height:1.7; margin-top:10px;">
            - USE ARROWS to switch between 5 lanes.<br>
            - COLLECT treats for points & energy.<br>
            - AVOID Spiders & Police 👮!<br>
            - DON'T lose your 3 hearts!
        </p>
    </div>

    <div class="frame f5">
        <p style="font-size:11px; opacity:0.6;">© 2026 DOGGYCO ULTIMATE PRO. V108 MASTER.</p>
    </div>
</div>

<div id="game-view">
    <div id="hud">
        <div id="h-n">-</div><div id="h-l">❤️❤️❤️</div><div id="h-s">🏆 0</div>
    </div>
    <div id="energy-bar"><div id="energy-fill"></div></div>
    <canvas id="game-canvas"></canvas>
    <div class="controls">
        <div class="arrow" onmousedown="mv(-1)" ontouchstart="mv(-1)"><i class="fas fa-chevron-left"></i></div>
        <div class="arrow" onmousedown="mv(1)" ontouchstart="mv(1)"><i class="fas fa-chevron-right"></i></div>
    </div>
</div>

<audio id="bgMusic" src="musik.mp3" loop></audio>

<script>
// --- DATABASE ---
const S_URL = 'https://ovmsstdroxkinisqwlhw.supabase.co';
const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92bXNzdGRyb3hraW5pc3F3bGh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMzM3OTEsImV4cCI6MjA4NzgwOTc5MX0.SOsi-Aeb_wSp40_TTymaiiU0Kn_3rhG_LnvLjJP66z8';
const supabase = window.supabase ? window.supabase.createClient(S_URL, S_KEY) : null;

// --- GAME STATE ---
let isLive = false, score = 0, hearts = 3, energy = 100, lane = 2, lastT = 0;
let charX = 200, targetX = 200, items = [], enemies = [], floaters = [], mode = 'dog';

function playMusic() {
    const audio = document.getElementById("bgMusic");
    if(audio.paused) audio.play().catch(()=>{});
}

// ENTER KEY LISTENER
document.getElementById("pName").addEventListener("keypress", (e) => {
    if(e.key === "Enter") launchGame('dog');
});

async function loadRanking() {
    if(!supabase) return;
    try {
        const { data } = await supabase.from('leaderboard').select('n, s').order('s', { ascending: false }).limit(5);
        if(data) {
            const cls = ['r1', 'r2', 'r3', 'r4', 'r5'];
            document.getElementById("ranking-box").innerHTML = data.map((r, i) => `
                <div class="rank-row ${cls[i]}"><span>${i+1}. ${r.n}</span><span>${r.s} pts</span></div>
            `).join('');
        }
    } catch(e) { document.getElementById("ranking-box").innerText = "Database Offline"; }
}

function launchGame(m) {
    const nameInput = document.getElementById("pName").value.trim();
    if(!nameInput) return alert("PLEASE ENTER YOUR NAME!");
    
    mode = m;
    document.getElementById("menu").style.display = "none";
    document.getElementById("game-view").style.display = "flex";
    document.getElementById("h-n").innerText = "PRO: " + nameInput.toUpperCase();
    
    const bg = document.getElementById("main-bg");
    if(m === 'cat') {
        bg.style.backgroundImage = "url('forest_background.png')";
        bg.style.filter = "hue-rotate(280deg) brightness(0.8)";
        document.getElementById("bgMusic").src = "cats_world_theme.mp3";
    }
    document.getElementById("bgMusic").play().catch(()=>{});
    
    isLive = true;
    lastT = performance.now();
    const cvs = document.getElementById("game-canvas");
    cvs.width = 400; cvs.height = window.innerHeight;
    requestAnimationFrame(gameLoop);
}

function mv(dir) { lane = Math.max(0, Math.min(4, lane + dir)); targetX = lane * 80 + 40; }

function gameLoop(t) {
    if(!isLive) return;
    const ctx = document.getElementById("game-canvas").getContext("2d");
    const cvs = document.getElementById("game-canvas");
    let dt = (t - lastT) / 1000; lastT = t;
    if(dt > 0.1) dt = 0.016;

    ctx.clearRect(0,0,400,cvs.height);

    energy -= 5.5 * dt;
    document.getElementById("energy-fill").style.width = Math.max(0, energy) + "%";

    if(Math.random() < 0.04) {
        let l = Math.floor(Math.random()*5);
        let r = Math.random();
        items.push({ x: l*80+40, y: -60, lane: l, type: r < 0.7 ? '🦴' : (r < 0.9 ? '🥩' : '🍪') });
    }
    if(Math.random() < 0.02) {
        enemies.push({ x: Math.floor(Math.random()*5)*80+40, y: -60, lane: Math.floor(Math.random()*5), type: Math.random() < 0.6 ? '🕷️' : '👮' });
    }

    items.forEach((it, i) => {
        it.y += (250 + score/20) * dt;
        ctx.font = "50px Arial"; ctx.textAlign = "center";
        ctx.fillText(it.type, it.x, it.y);
        if(it.lane === lane && it.y > cvs.height - 180 && it.y < cvs.height - 80) {
            score += (it.type === '🦴' ? 15 : 50);
            energy = Math.min(100, energy + 20);
            floaters.push({ x: it.x, y: it.y, txt: "+PTS", a: 1, c: "0, 255, 136" });
            items.splice(i,1);
        }
        if(it.y > cvs.height) items.splice(i,1);
    });

    enemies.forEach((en, i) => {
        en.y += (340 + score/15) * dt;
        ctx.fillText(en.type, en.x, en.y);
        if(en.lane === lane && en.y > cvs.height - 180 && en.y < cvs.height - 80) {
            hearts--; energy -= 25;
            floaters.push({ x: en.x, y: en.y, txt: "-LIFE", a: 1, c: "255, 49, 49" });
            enemies.splice(i,1);
        }
        if(en.y > cvs.height) enemies.splice(i,1);
    });

    charX += (targetX - charX) * 0.22;
    ctx.font = "90px Arial";
    let icon = mode === 'dog' ? "🐶" : (mode === 'cat' ? "🐱" : "🐰");
    ctx.fillText(icon, charX, cvs.height - 130);

    floaters.forEach((f, i) => {
        f.y -= 2.5; f.a -= 0.025;
        ctx.fillStyle = `rgba(${f.c}, ${f.a})`;
        ctx.font = "bold 30px Orbitron";
        ctx.fillText(f.txt, f.x, f.y);
        if(f.a <= 0) floaters.splice(i,1);
    });

    document.getElementById("h-s").innerText = "🏆 " + Math.floor(score);
    document.getElementById("h-l").innerText = "❤️".repeat(Math.max(0, hearts));

    if(hearts <= 0 || energy <= 0) {
        if(supabase) supabase.from('leaderboard').insert([{ n: document.getElementById("pName").value, s: Math.floor(score) }]);
        isLive = false; alert("GAME OVER! SCORE: " + Math.floor(score)); location.reload();
    }
    requestAnimationFrame(gameLoop);
}

function copyBTC() {
    navigator.clipboard.writeText('bc1qkm22c6w896u9n9cxp8ld049maef4xs5xn060ed');
    alert("WALLET COPIED!");
}

window.onload = loadRanking;
</script>
</body>
</html>
