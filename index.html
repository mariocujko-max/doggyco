<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOGGYCO & CATS WORLD V61000 - FINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --neon: #00f2ff; --green: #00ff88; --red: #ff3131; --gold: #ffd700; 
            --glass: rgba(255, 255, 255, 0.1); --blue-active: #0070ff; --cat-purple: #bc13fe;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #000; font-family: 'Orbitron', sans-serif; color: #fff; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-y: auto; overflow-x: hidden;
        }

        /* HINTERGRUND SYSTEM */
        #main-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url('hintergrund.png'); background-size: cover; background-position: center;
            z-index: -1; transition: 1.5s;
        }

        /* NEON BLINKENDE ÜBERSCHRIFT */
        @keyframes neonFlash {
            0%, 100% { text-shadow: 0 0 20px var(--neon), 0 0 40px var(--neon); opacity: 1; }
            50% { text-shadow: 0 0 5px var(--neon); opacity: 0.8; }
        }
        header h1 { font-size: 40px; color: var(--neon); animation: neonFlash 1.5s infinite; padding: 30px; text-align: center; }

        #game-view { width: 100vw; height: 85vh; display: flex; justify-content: center; align-items: center; position: relative; }
        #game-wrap { 
            position:relative; width: 400px; height: 98%; 
            background: rgba(0,0,0,0.8); border: 4px solid var(--neon); border-radius: 40px; 
            overflow: hidden; box-shadow: 0 0 50px var(--neon);
        }
        #game-wrap.cat-theme { border-color: var(--cat-purple); box-shadow: 0 0 50px var(--cat-purple); }

        /* HUD */
        #ui-header { position: absolute; top: 15px; width: 100%; z-index: 200; pointer-events: none; }
        #energy-bar-wrap { width: 85%; height: 25px; margin: 0 auto; background: rgba(0,0,0,0.9); border: 2px solid #fff; border-radius: 12px; overflow: hidden; }
        #energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #ff4e50, #f9d423, #00ff88); transition: width 0.2s; }
        #hud-row { display: flex; justify-content: space-between; align-items: center; width: 85%; margin: 10px auto; font-size: 14px; font-weight: 900; }

        canvas { position: absolute; inset: 0; z-index: 50; background: transparent; pointer-events: none; }

        /* INPUT & OVERLAYS */
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(20px); z-index: 1000; background: rgba(0,0,0,0.85); border-radius: 36px; }
        #pName { 
            padding: 18px; border-radius: 20px; border: 2px solid var(--neon); 
            background: rgba(255,255,255,0.05); color: #fff; text-align: center; 
            width: 80%; font-family: 'Orbitron'; margin-bottom: 20px; outline: none;
            backdrop-filter: blur(10px);
        }
        .neon-btn { padding: 18px 45px; background: var(--green); color: #000; border-radius: 35px; font-weight: 900; cursor: pointer; border: none; font-family: 'Orbitron'; margin: 8px; box-shadow: 0 0 15px var(--green); transition: 0.2s; width: 80%; }
        .cat-btn { background: var(--cat-purple); color: #fff; box-shadow: 0 0 15px var(--cat-purple); }

        /* BUTTON LEISTE SUPPORT */
        .btn-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; width: 100%; margin-top: 20px; }
        .small-btn { padding: 10px 15px; font-size: 10px; border-radius: 10px; }

        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; z-index: 300; }
        .btn-arrow { width: 85px; height: 85px; background: rgba(255,255,255,0.1); border: 3px solid var(--neon); border-radius: 50%; color: #fff; font-size: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-arrow:active { background: var(--blue-active); box-shadow: 0 0 30px var(--blue-active); }

        .tile { background: var(--glass); backdrop-filter: blur(30px); border: 2px solid var(--neon); border-radius: 35px; padding: 35px; width: 92vw; max-width: 500px; text-align: center; margin: 20px 0; }
        .legal-box { font-size: 13px; color: #fff; line-height: 1.6; text-align: center; background: rgba(255,0,0,0.1); border: 1px solid var(--red); padding: 20px; border-radius: 20px; }
    </style>
</head>
<body>

<div id="main-bg"></div>

<header><h1 id="main-title">DOGGYCO</h1></header>

<div id="game-view">
    <div id="game-wrap">
        <div id="ui-header">
            <div id="energy-bar-wrap"><div id="energy-fill"></div></div>
            <div id="hud-row">
                <div id="hearts-display">❤️❤️❤️</div>
                <div id="lvl-display" style="color:var(--gold)">LVL: 1</div>
                <div id="timer-display" style="color:var(--neon)">⏳ 30s</div>
                <div id="score-display">🏆 0</div>
            </div>
        </div>
        
        <canvas id="game-canvas"></canvas>

        <div id="controls">
            <div class="btn-arrow" onmousedown="mLeft()">◀</div>
            <div class="btn-arrow" onmousedown="mRight()">▶</div>
        </div>

        <div id="start-screen" class="overlay">
            <input type="text" id="pName" placeholder="DEIN NAME" autofocus>
            <button class="neon-btn" onclick="startGame(false)">START DOGGYCO</button>
            <button class="neon-btn cat-btn" onclick="startGame(true)">START CATS WORLD</button>
        </div>

        <div id="end-screen" class="overlay" style="display:none;">
            <h1 id="f-score" style="font-size: 60px; color: var(--gold);">0</h1>
            <button class="neon-btn" onclick="location.reload()">NEUSTART</button>
        </div>
    </div>
</div>

<div class="tile">
    <h3 style="color:var(--gold); margin-bottom:20px;">🏆 RANGLISTE</h3>
    <div id="leaderboard">Lädt...</div>
</div>

<div class="tile" style="border-color: var(--gold);">
    <h3 style="color:var(--gold);">💎 SUPPORT & SPENDEN</h3>
    <div class="btn-grid">
        <button class="neon-btn small-btn" onclick="window.open('https://tiktok.com/@DEIN_TIKTOK')">TIKTOK</button>
        <button class="neon-btn small-btn" style="background:#0070ba; color:#fff;" onclick="window.open('https://paypal.me/DEIN_LINK')">PAYPAL</button>
    </div>
    <div style="background:#fff; padding:15px; border-radius:20px; display:inline-block; margin-top:20px;">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=BITCOIN_ADRESSE" width="150">
        <p style="color:#000; font-size:10px; font-weight:bold; margin-top:5px;">BTC ADRESSE</p>
    </div>
</div>

<div class="tile legal-box">
    <h3 style="color:var(--red); margin-bottom:10px;">⚖️ RECHTLICHE HINWEISE</h3>
    Privatprojekt. Alle Zuwendungen sind freiwillige Geschenke. EU-Recht: Digitale Inhalte ohne physischen Datenträger. Keine kommerzielle Gewinnerzielung. © 2026 DOGGYCO.
</div>

<script>
const SUPABASE_URL = 'https://ovmsstdroxkinisqwlhw.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92bXNzdGRyb3hraW5pc3F3bGh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMzM3OTEsImV4cCI6MjA4NzgwOTc5MX0.SOsi-Aeb_wSp40_TTymaiiU0Kn_3rhG_LnvLjJP66z8';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const canvas = document.getElementById("game-canvas");
const ctx = canvas.getContext("2d");
const W = 400; 
let H, dogX, targetX, dogLane = 2, active = false, isCat = false;
let items = [], spiders = [], lastTime = 0, score = 0, hearts = 3, energy = 100, level = 1, timeLeft = 30;
let dogShake = 0, jumpY = 0;

let dogMusic = new Audio('musik.mp3'); 
let catMusic = new Audio('cats_world_theme.mp3'); 
dogMusic.loop = catMusic.loop = true;

function init() {
    canvas.width = W; 
    H = canvas.height = document.getElementById("game-wrap").offsetHeight;
    targetX = (dogLane * 80) + 40; dogX = targetX;
}

function startGame(catMode) {
    if(!document.getElementById("pName").value) return;
    isCat = catMode;
    document.getElementById("start-screen").style.display = "none";
    
    if(isCat) {
        document.getElementById("main-bg").style.backgroundImage = "url('forest_background.png')";
        document.getElementById("game-wrap").classList.add("cat-theme");
        document.getElementById("main-title").innerText = "CATS WORLD";
        document.getElementById("main-title").style.color = "var(--cat-purple)";
        catMusic.play();
    } else {
        dogMusic.play();
    }
    
    active = true; lastTime = performance.now();
    requestAnimationFrame(loop);
}

function mLeft() { if(active && dogLane > 0) { dogLane--; targetX = (dogLane * 80) + 40; } }
function mRight() { if(active && dogLane < 4) { dogLane++; targetX = (dogLane * 80) + 40; } }

window.addEventListener('keydown', e => {
    if(e.key === "Enter" && !active) startGame(false);
    if(e.key === "ArrowLeft") mLeft();
    if(e.key === "ArrowRight") mRight();
});

function loop(t) {
    if(!active) return;
    let dt = (t - lastTime) / 1000; lastTime = t;
    if(dt > 0.1) dt = 0.016;
    ctx.clearRect(0,0,W,H);

    timeLeft -= dt; energy -= (4 + level * 0.5) * dt;
    if(timeLeft <= 0) { level++; timeLeft = 30; energy = Math.min(100, energy + 20); }

    document.getElementById("energy-fill").style.width = Math.max(0, energy) + "%";
    document.getElementById("score-display").innerText = "🏆 " + Math.floor(score);
    document.getElementById("timer-display").innerText = "⏳ " + Math.ceil(timeLeft) + "s";
    document.getElementById("lvl-display").innerText = "LVL: " + level;

    if(energy <= 0 || hearts <= 0) { active = false; document.getElementById("end-screen").style.display = "flex"; return; }

    // Gegner (Schlange ganzer Körper)
    if(spiders.length < 2 && Math.random() < 0.015) spiders.push({lane: Math.floor(Math.random()*5), y: 0});
    spiders.forEach((s, i) => {
        s.y += (180 + level * 15) * dt;
        let sx = (s.lane * 80) + 40;
        if(isCat) {
            ctx.fillStyle = "#00ff00"; ctx.fillRect(sx - 6, 0, 12, s.y);
            ctx.font = "40px Arial"; ctx.fillText("🐍", sx, s.y + 25);
        } else {
            ctx.font = "40px Arial"; ctx.fillText("🕷️", sx, s.y + 25);
        }
        if(s.lane === dogLane && s.y > H-180 && s.y < H-80) { energy -= 30; dogShake = 20; spiders.splice(i,1); }
        if(s.y > H) spiders.splice(i,1);
    });

    // Items
    if(Math.random() < 0.02) items.push({lane: Math.floor(Math.random()*5), y: -60, type: isCat?'🍼':'🦴'});
    items.forEach((it, i) => {
        it.y += (250 + level * 10) * dt; let ix = (it.lane * 80) + 40;
        ctx.font = "42px Arial"; ctx.textAlign = "center"; ctx.fillText(it.type, ix, it.y);
        if(it.lane === dogLane && it.y > H-160 && it.y < H-80) {
            score += 25; energy = Math.min(100, energy + 10); jumpY = -15; items.splice(i, 1);
        }
    });

    dogX += (targetX - dogX) * 0.22;
    ctx.fillText(isCat ? "🐱" : "🐶", dogX + (Math.random()-0.5)*dogShake, H - 110 + jumpY);
    if(dogShake > 0) dogShake *= 0.9; if(jumpY < 0) jumpY += 1.5; else jumpY = 0;

    requestAnimationFrame(loop);
}

async function updateRanks() {
    try {
        let { data } = await supabaseClient.from('leaderboard').select('*').order('s', { ascending: false }).limit(5);
        if(data) document.getElementById("leaderboard").innerHTML = data.map((x, i) => {
            let m = i===0?'🥇':(i===1?'🥈':(i===2?'🥉':(i===3?'🧱':'🪵')));
            return `<div class="rank-row"><span>${m} ${x.n}</span><span>${x.s}</span></div>`;
        }).join('');
    } catch(e) {}
}
window.onload = () => { init(); updateRanks(); };
</script>
</body>
</html>
