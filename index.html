<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOGGYCO & CATS WORLD V62000 - ULTIMATE STABLE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --neon: #00f2ff; --green: #00ff88; --red: #ff3131; --gold: #ffd700; 
            --glass: rgba(255, 255, 255, 0.08); --blue-active: #0070ff; --cat-purple: #bc13fe;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #000; font-family: 'Orbitron', sans-serif; color: #fff; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-y: auto; overflow-x: hidden;
        }

        #main-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url('hintergrund.png'); background-size: cover; background-position: center;
            z-index: -1; transition: 1.5s;
        }

        @keyframes neonBlink {
            0%, 100% { text-shadow: 0 0 20px var(--neon), 0 0 40px var(--neon); opacity: 1; }
            50% { text-shadow: 0 0 5px var(--neon); opacity: 0.7; }
        }
        header h1 { font-size: 38px; color: var(--neon); animation: neonBlink 1.5s infinite; padding: 25px; text-align: center; }

        #game-view { width: 100vw; height: 80vh; display: flex; justify-content: center; align-items: center; position: relative; }
        #game-wrap { 
            position:relative; width: 400px; height: 98%; 
            background: rgba(0,0,0,0.8); border: 4px solid var(--neon); border-radius: 40px; 
            overflow: hidden; box-shadow: 0 0 50px var(--neon); transition: 0.5s;
        }
        #game-wrap.cat-theme { border-color: var(--cat-purple); box-shadow: 0 0 50px var(--cat-purple); }

        #ui-header { position: absolute; top: 15px; width: 100%; z-index: 200; pointer-events: none; }
        #energy-bar-wrap { width: 85%; height: 25px; margin: 0 auto; background: rgba(0,0,0,0.9); border: 2px solid #fff; border-radius: 12px; overflow: hidden; }
        #energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--red), var(--gold), var(--green)); transition: width 0.2s; }
        #hud-row { display: flex; justify-content: space-between; align-items: center; width: 85%; margin: 10px auto; font-size: 14px; font-weight: 900; text-shadow: 2px 2px 4px #000; }

        canvas { position: absolute; inset: 0; z-index: 50; background: transparent; pointer-events: none; }

        /* MENU & UI */
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(20px); z-index: 1000; background: rgba(0,0,0,0.85); border-radius: 36px; }
        #pName { 
            padding: 18px; border-radius: 20px; border: 2px solid var(--neon); 
            background: rgba(255,255,255,0.05); color: #fff; text-align: center; 
            width: 80%; font-family: 'Orbitron'; margin-bottom: 20px; outline: none;
            backdrop-filter: blur(10px);
        }
        .neon-btn { padding: 18px 45px; background: var(--green); color: #000; border-radius: 35px; font-weight: 900; cursor: pointer; border: none; font-family: 'Orbitron'; margin: 10px; box-shadow: 0 0 15px var(--green); transition: 0.2s; width: 85%; }
        .cat-btn { background: var(--cat-purple); color: #fff; box-shadow: 0 0 15px var(--cat-purple); }

        /* CONTROLS */
        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; z-index: 300; }
        .btn-arrow { width: 85px; height: 85px; background: rgba(255,255,255,0.1); border: 3px solid var(--neon); border-radius: 50%; color: #fff; font-size: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-arrow:active { background: var(--blue-active); box-shadow: 0 0 30px var(--blue-active); }

        /* SCROLLABLE SECTION */
        .content-area { width: 100%; display: flex; flex-direction: column; align-items: center; padding: 50px 0 150px; gap: 40px; }
        .tile { background: var(--glass); backdrop-filter: blur(30px); border: 2px solid var(--neon); border-radius: 35px; padding: 35px; width: 92vw; max-width: 500px; text-align: center; }
        
        /* SPENDEN-BOARD */
        .support-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .support-btn { padding: 12px; font-size: 11px; border-radius: 15px; border: none; font-weight: 900; cursor: pointer; font-family: 'Orbitron'; color: #fff; }
        .qr-frame { background: #fff; padding: 15px; border-radius: 20px; display: inline-block; border: 4px solid var(--gold); }
        .rank-row { display: flex; justify-content: space-between; padding: 14px; margin-bottom: 12px; border-radius: 15px; background: rgba(0,0,0,0.6); border: 1px solid var(--neon); font-size: 15px; }
    </style>
</head>
<body>

<div id="main-bg"></div>

<header><h1 id="main-title">DOGGYCO</h1></header>

<div id="game-view">
    <div id="game-wrap">
        <div id="ui-header">
            <div id="energy-bar-wrap"><div id="energy-fill"></div></div>
            <div id="hud-row">
                <div id="hearts-display">❤️❤️❤️</div>
                <div id="lvl-display" style="color:var(--gold)">LVL: 1</div>
                <div id="timer-display" style="color:var(--neon)">⏳ 30s</div>
                <div id="score-display">🏆 0</div>
            </div>
        </div>
        
        <canvas id="game-canvas"></canvas>

        <div id="controls">
            <div class="btn-arrow" onmousedown="mLeft()" ontouchstart="mLeft()">◀</div>
            <div class="btn-arrow" onmousedown="mRight()" ontouchstart="mRight()">▶</div>
        </div>

        <div id="start-screen" class="overlay">
            <h2 style="color:var(--gold); margin-bottom:15px;">MISSION START</h2>
            <input type="text" id="pName" placeholder="DEIN NAME" autofocus>
            <button class="neon-btn" onclick="startGame(false)">START DOGGYCO</button>
            <button class="neon-btn cat-btn" onclick="startGame(true)">START CATS WORLD</button>
        </div>

        <div id="end-screen" class="overlay" style="display:none;">
            <h1 id="f-score" style="font-size: 60px; color: var(--gold);">0</h1>
            <button class="neon-btn" onclick="location.reload()">NEUSTART</button>
        </div>
    </div>
</div>

<div class="content-area">
    <div class="tile">
        <h3 style="color:var(--gold); margin-bottom:20px;">🏆 WELTRANGLISTE</h3>
        <div id="leaderboard">Ranking lädt...</div>
    </div>

    <div class="tile" style="border-color: var(--gold);">
        <h3 style="color:var(--gold); margin-bottom:15px;">💎 SUPPORT UNS</h3>
        <div class="support-grid">
            <button class="support-btn" style="background:#ff0050;" onclick="window.open('https://tiktok.com/@DEIN_NAME')">TIKTOK</button>
            <button class="support-btn" style="background:#0070ba;" onclick="window.open('https://paypal.me/DEIN_NAME')">PAYPAL</button>
            <button class="support-btn" style="background:#f7931a;" onclick="navigator.clipboard.writeText('DEINE_BITCOIN_ADRESSE')">BITCOIN WALLET</button>
            <button class="support-btn" style="background:#333;" onclick="navigator.clipboard.writeText('DEINE_ETH_ADRESSE')">OTHER WALLET</button>
        </div>
        <div class="qr-frame">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=DEINE_BITCOIN_ADRESSE" width="150">
            <p style="color:#000; font-size:10px; font-weight:bold; margin-top:5px;">SCAN TO DONATE BTC</p>
        </div>
    </div>

    <div class="tile" style="border-color: var(--red);">
        <p style="font-size:12px; line-height:1.6;">
            ⚖️ RECHTLICHES: Private Initiative. Freiwillige Geschenke. EU-Recht: Digitale Inhalte ohne physischen Datenträger. © 2026 DOGGYCO.
        </p>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://ovmsstdroxkinisqwlhw.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92bXNzdGRyb3hraW5pc3F3bGh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMzM3OTEsImV4cCI6MjA4NzgwOTc5MX0.SOsi-Aeb_wSp40_TTymaiiU0Kn_3rhG_LnvLjJP66z8';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const canvas = document.getElementById("game-canvas");
const ctx = canvas.getContext("2d");
const W = 400; 
let H, dogX, targetX, dogLane = 2, active = false, isCat = false;
let items = [], spiders = [], floaters = [], lastTime = 0, score = 0, hearts = 3, energy = 100, level = 1, timeLeft = 30;
let dogShake = 0, jumpY = 0;

let dogMusic = new Audio('musik.mp3'); 
let catMusic = new Audio('cats_world_theme.mp3'); 
dogMusic.loop = catMusic.loop = true;

function init() {
    canvas.width = W; 
    H = canvas.height = document.getElementById("game-wrap").offsetHeight;
    targetX = (dogLane * 80) + 40; dogX = targetX;
}

function playSfx(f, t, d, v=0.1) {
    try {
        let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
        g.gain.setValueAtTime(v, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + d);
    } catch(e){}
}

function startGame(catMode) {
    if(!document.getElementById("pName").value) return;
    isCat = catMode;
    document.getElementById("start-screen").style.display = "none";
    
    if(isCat) {
        document.getElementById("main-bg").style.backgroundImage = "url('forest_background.png')";
        document.getElementById("game-wrap").classList.add("cat-theme");
        document.getElementById("main-title").innerText = "CATS WORLD";
        document.getElementById("main-title").style.color = "var(--cat-purple)";
        catMusic.play().catch(e=>console.log("Audio blockiert"));
    } else {
        dogMusic.play().catch(e=>console.log("Audio blockiert"));
    }
    
    active = true; lastTime = performance.now();
    requestAnimationFrame(loop);
}

function mLeft() { if(active && dogLane > 0 && Math.abs(dogX - targetX) < 5) { dogLane--; targetX = (dogLane * 80) + 40; } }
function mRight() { if(active && dogLane < 4 && Math.abs(dogX - targetX) < 5) { dogLane++; targetX = (dogLane * 80) + 40; } }

window.addEventListener('keydown', e => {
    if(e.key === "ArrowLeft") mLeft();
    if(e.key === "ArrowRight") mRight();
    if(e.key === "Enter" && !active) startGame(false);
});

function loop(t) {
    if(!active) return;
    let dt = (t - lastTime) / 1000; lastTime = t;
    if(dt > 0.1) dt = 0.016;
    ctx.clearRect(0,0,W,H);

    timeLeft -= dt; energy -= (4.5 + level * 0.4) * dt;
    if(timeLeft <= 0) { level++; timeLeft = 30; energy = Math.min(100, energy + 20); playSfx(800, 'sine', 0.5); }

    document.getElementById("energy-fill").style.width = Math.max(0, energy) + "%";
    document.getElementById("score-display").innerText = "🏆 " + Math.floor(score);
    document.getElementById("timer-display").innerText = "⏳ " + Math.ceil(timeLeft) + "s";
    document.getElementById("lvl-display").innerText = "LVL: " + level;
    document.getElementById("hearts-display").innerText = "❤️".repeat(Math.max(0, hearts));

    if(energy <= 0 || hearts <= 0) { active = false; document.getElementById("end-screen").style.display = "flex"; return; }

    // GEGNER (Schlange & Spinne fahren rauf/runter)
    if(spiders.length < 2 && Math.random() < 0.015) spiders.push({lane: Math.floor(Math.random()*5), y: 0, d: 1});
    spiders.forEach((s, i) => {
        s.y += (190 + level * 12) * dt * s.d;
        if(s.y > H - 180) s.d = -1; 
        if(s.y < 0) spiders.splice(i, 1);
        let sx = (s.lane * 80) + 40;
        
        ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, s.y); ctx.stroke();
        
        ctx.font = "40px Arial"; ctx.textAlign = "center"; 
        ctx.fillText(isCat?"🐍":"🕷️", sx, s.y + 25);
        
        if(s.lane === dogLane && s.y > H-180 && s.y < H-80) { 
            energy -= 30; dogShake = 20; 
            playSfx(150, 'sawtooth', 0.3); 
            spiders.splice(i,1); 
        }
    });

    // ITEMS (Flasche/Knochen)
    if(Math.random() < 0.02) {
        let type = isCat ? '🍼' : '🦴';
        if(Math.random() < 0.1) type = '👮';
        items.push({lane: Math.floor(Math.random()*5), y: -60, type});
    }
    items.forEach((it, i) => {
        it.y += (260 + level * 10) * dt; let ix = (it.lane * 80) + 40;
        ctx.font = "42px Arial"; ctx.textAlign = "center"; ctx.fillText(it.type, ix, it.y);
        if(it.lane === dogLane && it.y > H-160 && it.y < H-80) {
            if(it.type === '👮') { hearts--; dogShake = 20; playSfx(100, 'square', 0.4); }
            else { 
                score += 25; energy = Math.min(100, energy + 12); jumpY = -18; 
                playSfx(isCat?1200:600, 'sine', 0.1);
            }
            items.splice(i, 1);
        }
        if(it.y > H) items.splice(i,1);
    });

    // KOPF (80px - GROSS UND ZENTRIERT)
    dogX += (targetX - dogX) * 0.22;
    ctx.font = "80px Arial"; ctx.textAlign = "center"; 
    ctx.fillText(isCat ? "🐱" : "🐶", dogX + (Math.random()-0.5)*dogShake, H - 110 + jumpY);
    if(dogShake > 0) dogShake *= 0.9; if(jumpY < 0) jumpY += 1.5; else jumpY = 0;

    requestAnimationFrame(loop);
}

async function updateRanks() {
    try {
        let { data } = await supabaseClient.from('leaderboard').select('*').order('s', { ascending: false }).limit(5);
        if(data) document.getElementById("leaderboard").innerHTML = data.map((x, i) => {
            let m = i===0?'🥇 Gold':(i===1?'🥈 Silber':(i===2?'🥉 Bronze':(i===3?'🧱 Kupfer':'🪵 Holz')));
            return `<div class="rank-row"><span>${m}: ${x.n}</span><span>${x.s}</span></div>`;
        }).join('');
    } catch(e) {}
}
window.onload = () => { init(); updateRanks(); };
</script>
</body>
</html>
