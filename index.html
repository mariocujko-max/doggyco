<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOGGYCO & CATS WORLD V97 - PERFECT ALIGN</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --neon: #00f2ff; --green: #00ff88; --red: #ff3131; --gold: #ffd700; 
            --blue-glow: #0070ff; --cat-purple: #bc13fe;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        
        /* ZENTRIERUNG DES GESAMTEN INHALTS */
        body { 
            background: #000; font-family: 'Orbitron', sans-serif; color: #fff; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; width: 100vw; overflow-x: hidden;
        }

        #main-bg {
            position: fixed; inset: 0;
            background: url('hintergrund.png') center/cover no-repeat #000;
            filter: brightness(0.35); z-index: -1;
        }

        header h1 { font-size: 32px; color: var(--neon); text-shadow: 0 0 15px var(--neon); margin-bottom: 10px; text-align: center; }

        /* DAS SPIELGEHÄUSE - JETZT ZENTRIERT */
        #game-view { width: 100%; display: flex; justify-content: center; align-items: center; margin: 10px 0; }
        
        #game-wrap { 
            position:relative; width: 380px; height: 600px; 
            background: rgba(0,0,0,0.85); border: 3px solid var(--neon); border-radius: 40px; 
            overflow: hidden; box-shadow: 0 0 50px var(--neon);
        }

        /* HUD */
        #ui-header { position: absolute; top: 15px; width: 100%; z-index: 200; pointer-events: none; }
        #energy-bar-wrap { width: 85%; height: 20px; margin: 0 auto; background: #111; border: 1.5px solid #fff; border-radius: 10px; overflow: hidden; }
        #energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--red), var(--gold), var(--green)); transition: width 0.2s; }
        #hud-row { display: flex; justify-content: space-between; width: 85%; margin: 5px auto; font-size: 13px; font-weight: 900; text-shadow: 2px 2px #000; }

        /* CANVAS */
        #game-canvas { position: absolute; inset: 0; z-index: 50; display: block; }

        /* FENSTER DESIGN */
        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 2px solid var(--neon); border-radius: 25px; padding: 20px;
            width: 92vw; max-width: 480px; margin: 10px 0; text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; background: rgba(0,0,0,0.9); border-radius: 36px; padding: 20px; }

        .neon-btn { padding: 16px; background: var(--green); color: #000; border-radius: 30px; font-weight: 900; cursor: pointer; border: none; font-family: 'Orbitron'; margin: 8px; width: 100%; box-shadow: 0 0 10px var(--green); transition: 0.2s; }
        .neon-btn:active { transform: scale(0.95); }
        .cat-btn { background: var(--cat-purple); color: #fff; box-shadow: 0 0 10px var(--cat-purple); }

        #controls { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 35px; z-index: 300; }
        .btn-arrow { width: 75px; height: 75px; background: rgba(255,255,255,0.05); border: 2px solid var(--neon); border-radius: 50%; color: #fff; font-size: 35px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-arrow:active { background: var(--blue-glow); box-shadow: 0 0 30px var(--blue-glow); border-color: #fff; }

        #pName { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid var(--neon); background: #000; color: #fff; text-align: center; font-family: 'Orbitron'; outline: none; margin-bottom: 10px; }
        
        .rank-row { display: flex; justify-content: space-between; padding: 8px; margin-bottom: 5px; border-radius: 10px; background: rgba(0,0,0,0.5); border: 1px solid var(--neon); font-size: 14px; }
    </style>
</head>
<body>

<div id="main-bg"></div>
<header><h1 id="main-title">DOGGYCO</h1></header>

<div id="game-view">
    <div id="game-wrap">
        <div id="ui-header">
            <div id="energy-bar-wrap"><div id="energy-fill"></div></div>
            <div id="hud-row">
                <div id="hearts-display">❤️❤️❤️</div>
                <div id="timer-display" style="color:var(--gold)">30s</div>
                <div>LVL <span id="lvl-num">1</span></div>
            </div>
        </div>
        
        <canvas id="game-canvas"></canvas>

        <div id="controls">
            <div class="btn-arrow" onmousedown="mLeft()" ontouchstart="mLeft(event)">◀</div>
            <div class="btn-arrow" onmousedown="mRight()" ontouchstart="mRight(event)">▶</div>
        </div>

        <div id="start-screen" class="overlay">
            <div class="glass-panel" style="border:none; background:none;">
                <input type="text" id="pName" placeholder="AGENT NAME">
                <button class="neon-btn" onclick="startGame(false)">START DOGGYCO</button>
                <button class="neon-btn cat-btn" onclick="startGame(true)">START CATS WORLD</button>
            </div>
        </div>

        <div id="end-screen" class="overlay" style="display:none;">
            <h1 id="f-score" style="font-size: 50px; color: var(--gold);">0</h1>
            <button class="neon-btn" onclick="location.reload()">RETRY</button>
        </div>
    </div>
</div>

<div class="glass-panel">
    <h3 style="color:var(--gold); margin-bottom:10px;">🏆 GLOBAL RANKING</h3>
    <div id="leaderboard">Loading ranking...</div>
</div>

<div class="glass-panel">
    <h3 style="color:var(--green); margin-bottom:10px;">💎 SUPPORT PROJECT</h3>
    <button class="neon-btn" style="background:#ff0050; color:#fff; width: 45%; display: inline-block;" onclick="window.open('https://tiktok.com')">TikTok</button>
    <button class="neon-btn" style="background:#0070ba; color:#fff; width: 45%; display: inline-block;" onclick="window.open('https://paypal.me')">PayPal</button>
    <div style="background:#fff; padding:10px; border-radius:15px; display:inline-block; margin-top:10px;">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=BTC_WALLET" width="100" height="100">
    </div>
</div>

<script>
// Supabase
const SUPABASE_URL = 'https://ovmsstdroxkinisqwlhw.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92bXNzdGRyb3hraW5pc3F3bGh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMzM3OTEsImV4cCI6MjA4NzgwOTc5MX0.SOsi-Aeb_wSp40_TTymaiiU0Kn_3rhG_LnvLjJP66z8';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const canvas = document.getElementById("game-canvas");
const ctx = canvas.getContext("2d");
let W, H, dogX, targetX, dogLane = 2, active = false, isCat = false;
let items = [], spiders = [], floaters = [], lastTime = 0;
let score = 0, hearts = 3, energy = 100, level = 1, timeLeft = 30;
let audioCtx;

// INITIALISIERUNG
function init() {
    W = canvas.width = canvas.offsetWidth;
    H = canvas.height = canvas.offsetHeight;
    targetX = (dogLane * (W/5)) + (W/10);
    dogX = targetX;
}

// AUDIO UNLOCKER
function unlockAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

function playSfx(f, t, d, v=0.2) {
    if(!audioCtx) return;
    let o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
    g.gain.setValueAtTime(v, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + d);
}

function startGame(catMode) {
    if(!document.getElementById("pName").value) return;
    unlockAudio();
    init();
    isCat = catMode;
    document.getElementById("start-screen").style.display = "none";
    if(isCat) {
        document.getElementById("main-title").innerText = "CATS WORLD";
        document.getElementById("main-title").style.color = "#bc13fe";
        document.getElementById("main-bg").style.filter = "hue-rotate(280deg) brightness(0.4)";
    }
    
    // Hintergrundmusik starten (falls vorhanden)
    let music = new Audio(isCat ? 'cats_world_theme.mp3' : 'musik.mp3');
    music.loop = true; music.volume = 0.1; music.play().catch(e => console.log("Audio waiting for interaction"));

    active = true; lastTime = performance.now();
    requestAnimationFrame(loop);
}

function mLeft(e) { if(e) e.preventDefault(); if(active && dogLane > 0) { dogLane--; targetX = (dogLane * (W/5)) + (W/10); playSfx(300, 'sine', 0.1); } }
function mRight(e) { if(e) e.preventDefault(); if(active && dogLane < 4) { dogLane++; targetX = (dogLane * (W/5)) + (W/10); playSfx(300, 'sine', 0.1); } }

function loop(t) {
    if(!active) return;
    let dt = (t - lastTime) / 1000; lastTime = t;
    if(dt > 0.1) dt = 0.016;
    ctx.clearRect(0,0,W,H);

    timeLeft -= dt; energy -= (4.8 + level * 0.4) * dt;
    if(timeLeft <= 0) { level++; timeLeft = 30; energy = 100; playSfx(880, 'sine', 0.5); }

    document.getElementById("energy-fill").style.width = Math.max(0, energy) + "%";
    document.getElementById("timer-display").innerText = Math.ceil(timeLeft) + "s";
    document.getElementById("lvl-num").innerText = level;
    document.getElementById("hearts-display").innerText = "❤️".repeat(Math.max(0, hearts));

    if(energy <= 0 || hearts <= 0) { active = false; document.getElementById("end-screen").style.display = "flex"; return; }

    // Spawn
    if(items.length + spiders.length < 4 && Math.random() < 0.02) {
        let lane = Math.floor(Math.random()*5);
        if(Math.random() < 0.7) items.push({lane, y: -60, type: isCat?'🍼':'🦴'});
        else spiders.push({lane, y: 0, d: 1});
    }

    // Gegner
    spiders.forEach((s, i) => {
        s.y += (180 + level * 15) * dt * s.d;
        if(s.y > H - 150) s.d = -1; if(s.y < 0) spiders.splice(i, 1);
        let sx = s.lane * (W/5) + (W/10);
        ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, s.y); ctx.stroke();
        ctx.font = "35px Arial"; ctx.textAlign = "center"; ctx.fillText(isCat?"🐍":"🕷️", sx, s.y + 25);
        if(s.lane === dogLane && s.y > H-150 && s.y < H-50) { energy -= 25; playSfx(150, 'sawtooth', 0.3); spiders.splice(i,1); }
    });

    // Items
    items.forEach((it, i) => {
        it.y += (240 + level * 10) * dt; let ix = it.lane * (W/5) + (W/10);
        ctx.font = "40px Arial"; ctx.textAlign = "center"; ctx.fillText(it.type, ix, it.y);
        if(it.lane === dogLane && it.y > H-140 && it.y < H-40) { 
            score += 25; energy = Math.min(100, energy + 10); 
            playSfx(isCat?1200:600, 'sine', 0.1); items.splice(i, 1); 
        }
        if(it.y > H) items.splice(i,1);
    });

    // Player
    dogX += (targetX - dogX) * 0.2;
    ctx.font = "70px Arial"; ctx.textAlign = "center";
    ctx.fillText(isCat ? "🐱" : "🐶", dogX, H - 70);

    requestAnimationFrame(loop);
}

async function updateRanks() {
    try {
        let { data } = await supabaseClient.from('leaderboard').select('*').order('s', { ascending: false }).limit(5);
        if(data) document.getElementById("leaderboard").innerHTML = data.map((x, i) => `<div class="rank-row"><span>${x.n}</span><span>${x.s}</span></div>`).join('');
    } catch(e) { document.getElementById("leaderboard").innerHTML = "Ranking currently unavailable"; }
}

window.onload = () => { init(); updateRanks(); };
window.onresize = init;
</script>
</body>
</html>
