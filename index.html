<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOGGYCO & CATS WORLD - VERSION 4600</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --neon: #00f2ff; --green: #00ff88; --red: #ff3131; --gold: #ffd700; 
            --glass: rgba(255, 255, 255, 0.1); --blue-active: #0070ff; --cat-purple: #bc13fe;
            --blur: blur(15px);
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #000; font-family: 'Orbitron', sans-serif; color: #fff; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow: hidden;
        }

        /* --- EINHEITLICHES MILCHGLAS DESIGN --- */
        .glass-panel {
            background: var(--glass);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        #game-view { 
            width: 100vw; height: 80vh; display: flex; justify-content: center; align-items: center; position: relative; 
            background-size: cover; background-position: center;
        }
        .bg-dog { background-image: url('hintergrund.png'); }
        .bg-cat { background-image: url('forest_background.png'); }

        #game-wrap { 
            position:relative; width: 400px; height: 95%; 
            background: rgba(0,0,0,0.6); border: 4px solid var(--neon); border-radius: 40px; 
            overflow: hidden; box-shadow: 0 0 40px var(--neon);
        }

        /* --- HARMONISCHE PFEILE --- */
        .motion-arrow {
            position: absolute; width: 0; height: 0;
            border-left: 10px solid transparent; border-right: 10px solid transparent;
            border-bottom: 20px solid var(--neon);
            pointer-events: none; z-index: 60;
            animation: arrowFade 0.6s ease-out forwards;
        }
        @keyframes arrowFade { to { opacity: 0; transform: translateY(-40px) scale(0.5); } }

        /* --- UI OVERLAYS --- */
        .overlay { 
            position: absolute; inset: 0; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 1000; 
            background: rgba(0,0,0,0.85); backdrop-filter: var(--blur); border-radius: 36px;
        }

        input#pName {
            background: rgba(255,255,255,0.1); border: 1px solid var(--neon);
            padding: 15px; border-radius: 15px; color: white; margin: 15px 0;
            text-align: center; font-family: 'Orbitron'; outline: none; width: 80%;
        }

        .neon-btn { padding: 15px 30px; border-radius: 30px; font-weight: 900; cursor: pointer; border: none; font-family: 'Orbitron'; margin: 5px; width: 80%; }
        
        /* --- LEADERBOARD & RECHTLICHES --- */
        .info-scroll { width: 100%; display: flex; flex-direction: column; align-items: center; padding: 20px 0 80px; overflow-y: auto; }
        
        .frosted-tile { 
            background: var(--glass); backdrop-filter: var(--blur); 
            border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; 
            padding: 20px; margin: 10px 0; width: 90vw; max-width: 450px; text-align: center; 
        }

        #ui-header { position: absolute; top: 15px; width: 100%; z-index: 200; }
        #energy-bar-wrap { width: 85%; height: 15px; margin: 0 auto; background: rgba(0,0,0,0.8); border-radius: 10px; overflow: hidden; }
        #energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--red), var(--green)); transition: width 0.3s; }

        canvas { position: absolute; inset: 0; z-index: 50; pointer-events: none; }
    </style>
</head>
<body>

<header><h1 id="main-title">DOGGYCO</h1></header>

<div id="game-view" class="bg-dog">
    <div id="game-wrap">
        <div id="ui-header">
            <div id="energy-bar-wrap"><div id="energy-fill"></div></div>
            <div id="hud-row" style="display: flex; justify-content: space-between; padding: 10px 30px; font-size: 12px;">
                <span id="hearts-display">❤️❤️❤️</span>
                <span id="score-display">🏆 0</span>
            </div>
        </div>
        
        <canvas id="game-canvas"></canvas>

        <div id="start-screen" class="overlay">
            <h2 style="color:var(--gold);">INSTRUCTIONS</h2>
            <p style="font-size: 10px; margin-bottom: 10px;">🦴/🥣 = +25 PTS | 👮 = -1 HEART</p>
            
            <input type="text" id="pName" placeholder="DEIN NAME...">
            
            <button class="neon-btn" style="background:var(--green);" onclick="startGame(false)">START DOGGYCO</button>
            <button class="neon-btn" style="background:var(--cat-purple); color:white;" onclick="startGame(true)">START CATS WORLD</button>
            
            <div style="margin-top: 20px; font-size: 10px; opacity: 0.7;">
                <p>INSTITUTION: DOGGYCO ACADEMY</p>
                <p style="text-decoration: underline; cursor: pointer;">RECHTLICHE LINIEN</p>
            </div>
        </div>

        <div id="end-screen" class="overlay" style="display:none;">
            <h2 style="color:var(--red);">GAME OVER</h2>
            <h1 id="f-score" style="font-size: 50px; color: var(--gold);">0</h1>
            <button class="neon-btn" style="background:var(--green);" onclick="location.reload()">RESTART</button>
        </div>
    </div>
</div>

<div class="info-scroll">
    <div class="frosted-tile">
        <h3 style="color:var(--gold); margin-bottom:10px;">🏆 GLOBAL RANK</h3>
        <div id="leaderboard">Ranking loading...</div>
    </div>
    
    <div class="frosted-tile" style="font-size: 11px;">
        <h4 style="color:var(--neon);">SUPPORT</h4>
        <p>Email: help@doggyco.world</p>
        <hr style="margin: 10px 0; border: 0.5px solid rgba(255,255,255,0.1);">
        <p>© 2026 DOGGYCO & CATS WORLD. Rechtliche Linien & Impressum.</p>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://ovmsstdroxkinisqwlhw.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // Gekürzt für Übersicht
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const canvas = document.getElementById("game-canvas");
const ctx = canvas.getContext("2d");
let W = 400, H, dogX, targetX, dogLane = 2, active = false, isCat = false;
let items = [], floaters = [], score = 0, hearts = 3, energy = 100;

function init() {
    canvas.width = W; 
    H = canvas.height = document.getElementById("game-wrap").offsetHeight;
    targetX = (dogLane * 80) + 40; dogX = targetX;
}
window.onload = () => { init(); updateRanks(); };

function startGame(catMode) {
    if(!document.getElementById("pName").value) return;
    isCat = catMode;
    document.getElementById("start-screen").style.display = "none";
    active = true;
    requestAnimationFrame(loop);
}

// STEUERUNG MIT PFEIL-EFFEKT
function move(dir) {
    if(!active) return;
    if(dir === 'L' && dogLane > 0) dogLane--;
    if(dir === 'R' && dogLane < 4) dogLane++;
    targetX = (dogLane * 80) + 40;
    spawnArrow(targetX, H - 110);
}

function spawnArrow(x, y) {
    const a = document.createElement('div');
    a.className = 'motion-arrow';
    a.style.left = x + 'px';
    a.style.top = y + 'px';
    a.style.borderBottomColor = isCat ? 'var(--cat-purple)' : 'var(--neon)';
    document.getElementById("game-wrap").appendChild(a);
    setTimeout(() => a.remove(), 600);
}

window.addEventListener('keydown', e => {
    if(e.key === "ArrowLeft") move('L');
    if(e.key === "ArrowRight") move('R');
});

function loop() {
    if(!active) return;
    ctx.clearRect(0,0,W,H);
    
    energy -= 0.15;
    document.getElementById("energy-fill").style.width = energy + "%";
    document.getElementById("score-display").innerText = "🏆 " + score;
    document.getElementById("hearts-display").innerText = "❤️".repeat(hearts);

    if(energy <= 0 || hearts <= 0) { active = false; document.getElementById("end-screen").style.display = "flex"; document.getElementById("f-score").innerText = score; return; }

    // Spawn Logic
    if(Math.random() < 0.03) items.push({lane: Math.floor(Math.random()*5), y: -50, type: Math.random()<0.1?'👮':(isCat?'🥣':'🦴')});

    items.forEach((it, i) => {
        it.y += 5;
        let ix = (it.lane * 80) + 40;
        ctx.font = "40px Arial"; ctx.textAlign = "center"; ctx.fillText(it.type, ix, it.y);
        
        if(it.lane === dogLane && it.y > H-150 && it.y < H-80) {
            if(it.type === '👮') { 
                hearts--; 
                spawnFloater(ix, it.y, "-1 ❤️", "var(--red)");
            } else { 
                score += 25; energy = Math.min(100, energy + 5); 
                spawnFloater(ix, it.y, "+25", "var(--green)");
            }
            items.splice(i, 1);
        }
        if(it.y > H) items.splice(i, 1);
    });

    dogX += (targetX - dogX) * 0.2;
    ctx.font = "70px Arial"; ctx.fillText(isCat ? "🐱" : "🐶", dogX, H - 110);

    floaters.forEach((f, i) => {
        f.y -= 2; f.life -= 0.02;
        ctx.globalAlpha = f.life; ctx.fillStyle = f.col; ctx.font = "bold 20px Orbitron";
        ctx.fillText(f.txt, f.x, f.y); ctx.globalAlpha = 1;
        if(f.life <= 0) floaters.splice(i,1);
    });

    requestAnimationFrame(loop);
}

function spawnFloater(x, y, txt, col) {
    floaters.push({x: x, y: y, txt: txt, col: col, life: 1});
}

async function updateRanks() {
    // Hier bleibt deine Supabase-Logik gleich
    document.getElementById("leaderboard").innerHTML = "Ranking aktiv...";
}
</script>
</body>
</html>
