<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOGGYCO & CATS WORLD - COMPLETE MASTER EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --neon: #00f2ff; --green: #00ff88; --red: #ff3131; --gold: #ffd700; 
            --glass: rgba(255, 255, 255, 0.15); --cat-purple: #bc13fe; --blur: blur(20px);
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            width: 100%; height: 100%; overflow-x: hidden; font-family: 'Orbitron', sans-serif; background: #000; color: #fff;
        }

        #main-bg {
            position: fixed; inset: 0; background-image: url('hintergrund.png'); 
            background-size: cover; background-position: center; z-index: 1; transition: background 1s ease;
        }

        /* --- STARTSEITE (5 FELDER SYSTEM) --- */
        #ui-layer {
            position: relative; z-index: 100; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(5px);
        }

        .neon-title {
            font-size: clamp(2rem, 8vw, 3.5rem); color: var(--neon); text-shadow: 0 0 20px var(--neon);
            margin-bottom: 30px; text-align: center; animation: neonPulse 1.5s infinite alternate;
        }
        @keyframes neonPulse { from { opacity: 0.7; } to { opacity: 1; text-shadow: 0 0 35px var(--neon); } }

        .glass-box {
            background: var(--glass); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            border: 1px solid rgba(255,255,255,0.3); border-radius: 25px;
            padding: 20px; margin: 10px; width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        input#pName {
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--neon);
            background: rgba(0,0,0,0.4); color: white; text-align: center; font-family: 'Orbitron'; outline: none; margin-bottom: 15px;
        }

        .btn-row { display: flex; gap: 10px; width: 100%; }
        .start-btn { flex: 1; padding: 15px; border-radius: 15px; border: none; font-weight: 900; cursor: pointer; font-family: 'Orbitron'; transition: 0.3s; }
        .dog-btn { background: var(--green); color: #000; }
        .cat-btn { background: var(--cat-purple); color: #fff; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 90%; max-width: 400px; }
        .small-box { padding: 15px; font-size: 0.75rem; cursor: pointer; transition: 0.2s; }
        .small-box:hover { background: rgba(255,255,255,0.25); }

        /* --- GAMEPLAY --- */
        #game-wrap { 
            position: relative; width: 400px; height: 85vh; margin: auto; top: 5vh;
            border: 4px solid var(--neon); border-radius: 40px; overflow: hidden; display: none; background: rgba(0,0,0,0.75);
            z-index: 50; box-shadow: 0 0 50px var(--neon);
        }
        canvas { width: 100%; height: 100%; }

        #hud {
            position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-around;
            font-size: 14px; font-weight: bold; text-shadow: 2px 2px #000; pointer-events: none; z-index: 200;
        }

        /* --- CONTROLS & ANIMATION --- */
        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; z-index: 300; }
        .btn-arrow { width: 80px; height: 80px; background: rgba(255,255,255,0.1); border: 3px solid var(--neon); border-radius: 50%; color: white; font-size: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.1s; }
        .btn-arrow.active { background: var(--neon); box-shadow: 0 0 30px var(--neon); transform: scale(1.1); }

        .shake { animation: shakeAnim 0.3s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shakeAnim { 10%, 90% { transform: translate3d(-3px, 0, 0); } 20%, 80% { transform: translate3d(5px, 0, 0); } }

        /* LEADERBOARD SCROLL */
        .rank-container { margin-top: 20px; text-align: left; max-height: 150px; overflow-y: auto; font-size: 0.8rem; }
    </style>
</head>
<body>

<div id="main-bg"></div>

<div id="ui-layer">
    <h1 class="neon-title" id="title-tag">DOGGYCO</h1>
    
    <div class="glass-box">
        <input type="text" id="pName" placeholder="SPIELERNAME">
        <div class="btn-row">
            <button class="start-btn dog-btn" onclick="startApp(false)">DOGGY START</button>
            <button class="start-btn cat-btn" onclick="startApp(true)">CATS START</button>
        </div>
    </div>

    <div class="info-grid">
        <div class="glass-box small-box" onclick="showRank()">🏆 GLOBAL RANK</div>
        <div class="glass-box small-box">🛠️ SUPPORT</div>
        <div class="glass-box small-box">📖 ANLEITUNG</div>
        <div class="glass-box small-box">⚖️ RECHTLICHES</div>
    </div>
</div>

<div id="game-wrap">
    <div id="hud">
        <span id="scoreS">🏆 0</span>
        <span id="lvlS" style="color:var(--gold)">LVL 1</span>
        <span id="heartS">❤️❤️❤️</span>
    </div>
    <canvas id="c"></canvas>
    <div id="controls">
        <div id="bL" class="btn-arrow" onmousedown="m('L')" ontouchstart="m('L')">◀</div>
        <div id="bR" class="btn-arrow" onmousedown="m('R')" ontouchstart="m('R')">▶</div>
    </div>
</div>

<script>
    // Supabase Initialization
    const SUPABASE_URL = 'https://ovmsstdroxkinisqwlhw.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // Deine Key
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");
    let score = 0, level = 1, hearts = 3, active = false, isCat = false;
    let items = [], floaters = [], dogX = 200, dogLane = 2, lastLvlTime = 0;
    let speed = 4;

    function startApp(cat) {
        if(!document.getElementById("pName").value) return;
        isCat = cat;
        document.getElementById("ui-layer").style.display = "none";
        document.getElementById("game-wrap").style.display = "block";
        if(isCat) {
            document.getElementById("main-bg").style.backgroundImage = "url('forest_background.png')";
            document.getElementById("title-tag").style.color = "var(--cat-purple)";
            document.getElementById("game-wrap").style.borderColor = "var(--cat-purple)";
        }
        canvas.width = 400; canvas.height = 600;
        active = true; lastLvlTime = Date.now();
        new Audio('musik.mp3').play().catch(()=>{});
        setInterval(spawn, 900);
        requestAnimationFrame(tick);
    }

    function m(d) {
        const b = document.getElementById("b" + d);
        b.classList.add("active");
        setTimeout(() => b.classList.remove("active"), 150);
        if(d === 'L' && dogLane > 0) dogLane--;
        if(d === 'R' && dogLane < 4) dogLane++;
        dogX = (dogLane * 80) + 40;
        addF(dogX, 500, "▲", "var(--neon)"); // Bewegungs-Pfeil
    }

    function spawn() {
        if(!active) return;
        let lane = Math.floor(Math.random() * 5);
        let rand = Math.random();
        let type = rand > 0.3 ? (isCat ? '🥣' : '🦴') : (rand > 0.1 ? '👮' : (isCat ? '🐍' : '🕷️'));
        items.push({ x: lane * 80 + 40, y: -50, type: type });
    }

    function tick() {
        if(!active) return;
        ctx.clearRect(0, 0, 400, 600);

        // Level Logic: +10% Speed alle 30 Sek
        if(Date.now() - lastLvlTime > 30000) {
            level++; speed *= 1.1; lastLvlTime = Date.now();
        }

        items.forEach((it, i) => {
            it.y += speed;
            ctx.font = "40px Arial"; ctx.textAlign = "center";
            ctx.fillText(it.type, it.x, it.y);

            // Collision
            if(it.y > 500 && it.y < 560 && Math.abs(it.x - dogX) < 40) {
                if(it.type === '👮' || it.type === '🕷️' || it.type === '🐍') {
                    hearts--; 
                    document.getElementById("game-wrap").classList.add("shake");
                    setTimeout(()=>document.getElementById("game-wrap").classList.remove("shake"), 300);
                    addF(it.x, it.y, "-1 ❤️", "var(--red)");
                } else {
                    let gain = 10 * level;
                    score += gain;
                    addF(it.x, it.y, "+" + gain, "var(--green)");
                }
                items.splice(i, 1);
            }
            if(it.y > 600) items.splice(i, 1);
        });

        // Draw Player
        ctx.font = "70px Arial";
        ctx.fillText(isCat ? "🐱" : "🐶", dogX, 550);

        // Floating Scores & Arrows
        floaters.forEach((f, i) => {
            f.y -= 2; f.l -= 0.02;
            ctx.globalAlpha = f.l; ctx.fillStyle = f.c; ctx.font = "bold 22px Orbitron";
            ctx.fillText(f.t, f.x, f.y);
            if(f.l <= 0) floaters.splice(i, 1);
        });
        ctx.globalAlpha = 1;

        // HUD Update
        document.getElementById("scoreS").innerText = "🏆 " + score;
        document.getElementById("heartS").innerText = "❤️".repeat(Math.max(0, hearts));
        document.getElementById("lvlS").innerText = "LVL " + level;

        if(hearts <= 0) { active = false; save(); alert("GAME OVER! Score: " + score); location.reload(); }
        requestAnimationFrame(tick);
    }

    function addF(x, y, t, c) { floaters.push({ x, y, t, c, l: 1.0 }); }

    async function save() {
        const n = document.getElementById("pName").value;
        await supabase.from('leaderboard').insert([{ n, s: score }]);
    }
</script>
</body>
</html>
