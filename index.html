<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOGGYCO & CATS WORLD V101</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --neon: #00f2ff; --green: #00ff88; --red: #ff3131; --gold: #ffd700; 
            --blue-glow: #0070ff; --cat-purple: #bc13fe;
        }
        
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            width: 100%; height: 100%; 
            background: #000; overflow-x: hidden; 
            display: flex; flex-direction: column; align-items: center; 
        }

        /* DYNAMISCHER HINTERGRUND */
        #main-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000;
            background-size: cover; background-position: center;
            z-index: -10; transition: 1s;
        }
        
        /* Ersatz-Hintergrund falls Bild fehlt */
        .fallback-bg {
            background: radial-gradient(circle at center, #001a1a 0%, #000 100%);
            background-image: linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        header { width: 100%; text-align: center; padding: 15px 0; z-index: 10; }
        header h1 { font-size: clamp(28px, 8vw, 38px); color: var(--neon); text-shadow: 0 0 20px var(--neon); }

        #game-view { flex: 0 0 auto; display: flex; align-items: center; justify-content: center; width: 100%; padding: 10px; z-index: 5; }
        
        #game-wrap { 
            position:relative; width: 380px; height: 620px; 
            background: rgba(0,0,0,0.85); border: 4px solid var(--neon); border-radius: 40px; 
            overflow: hidden; box-shadow: 0 0 50px var(--neon);
        }

        #ui-header { position: absolute; top: 15px; width: 100%; z-index: 200; pointer-events: none; }
        #energy-bar-wrap { width: 85%; height: 25px; margin: 0 auto; background: #111; border: 2px solid #fff; border-radius: 12px; overflow: hidden; }
        #energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--red), var(--gold), var(--green)); transition: width 0.2s; }
        #hud-row { display: flex; justify-content: space-between; width: 85%; margin: 8px auto; font-size: 14px; font-weight: 900; text-shadow: 2px 2px #000; }

        canvas { position: absolute; inset: 0; z-index: 50; background: transparent; pointer-events: none; }

        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; background: rgba(0,0,0,0.85); border-radius: 36px; padding: 25px; }
        
        .glass-panel { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 2px solid var(--neon); border-radius: 30px; padding: 25px; width: 100%; text-align: center; 
        }

        .neon-btn { padding: 16px; background: var(--green); color: #000; border-radius: 30px; font-weight: 900; cursor: pointer; border: none; font-family: 'Orbitron'; margin: 10px 0; width: 100%; box-shadow: 0 0 15px var(--green); }
        .cat-btn { background: var(--cat-purple); color: #fff; box-shadow: 0 0 15px var(--cat-purple); border-color: var(--cat-purple); }

        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; z-index: 300; }
        .btn-arrow { width: 80px; height: 80px; background: rgba(255,255,255,0.05); border: 2px solid var(--neon); border-radius: 50%; color: #fff; font-size: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-arrow:active { background: var(--blue-glow); box-shadow: 0 0 30px var(--blue-glow); border-color: #fff; }

        #pName { width: 100%; padding: 18px; border-radius: 15px; border: 2px solid var(--neon); background: rgba(0,0,0,0.5); color: #fff; text-align: center; font-family: 'Orbitron'; outline: none; margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="main-bg" class="fallback-bg"></div>
<header><h1 id="main-title">DOGGYCO</h1></header>

<div id="game-view">
    <div id="game-wrap">
        <div id="ui-header">
            <div id="energy-bar-wrap"><div id="energy-fill"></div></div>
            <div id="hud-row">
                <div id="hearts-display">❤️❤️❤️</div>
                <div id="timer-display" style="color:var(--gold)">30s</div>
                <div style="background:#fff; color:#000; padding:2px 8px; border-radius:10px;">LVL <span id="lvl-num">1</span></div>
            </div>
        </div>
        
        <canvas id="game-canvas"></canvas>

        <div id="controls">
            <div class="btn-arrow" onmousedown="mLeft()" ontouchstart="mLeft(event)">◀</div>
            <div class="btn-arrow" onmousedown="mRight()" ontouchstart="mRight(event)">▶</div>
        </div>

        <div id="start-screen" class="overlay">
            <div class="glass-panel">
                <input type="text" id="pName" placeholder="AGENT NAME">
                <button class="neon-btn" onclick="startGame(false)">START DOGGYCO</button>
                <button class="neon-btn cat-btn" onclick="startGame(true)">START CATS WORLD</button>
            </div>
        </div>

        <div id="end-screen" class="overlay" style="display:none;">
            <h1 id="f-score" style="font-size: 65px; color: var(--gold);">0</h1>
            <button class="neon-btn" onclick="location.reload()">RETRY</button>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById("game-canvas");
const ctx = canvas.getContext("2d");
let W, H, dogX, targetX, dogLane = 2, active = false, isCat = false;
let items = [], spiders = [], floaters = [], lastTime = 0;
let score = 0, hearts = 3, energy = 100, level = 1, timeLeft = 30;

function checkBackground() {
    const bg = document.getElementById("main-bg");
    const img = new Image();
    img.onload = () => {
        bg.style.backgroundImage = "url('hintergrund.png')";
        bg.classList.remove('fallback-bg');
    };
    img.src = 'hintergrund.png';
}

function init() {
    W = canvas.width = 400; 
    H = canvas.height = 620;
    targetX = (dogLane * 80) + 40; dogX = targetX;
    checkBackground();
}

function startGame(catMode) {
    if(!document.getElementById("pName").value) return;
    isCat = catMode;
    document.getElementById("start-screen").style.display = "none";
    if(isCat) {
        document.getElementById("main-title").innerText = "CATS WORLD";
        document.getElementById("main-title").style.color = "#bc13fe";
        document.getElementById("main-bg").style.filter = "hue-rotate(280deg) brightness(0.5)";
    }
    active = true; lastTime = performance.now();
    requestAnimationFrame(loop);
}

function mLeft(e) { if(e) e.preventDefault(); if(active && dogLane > 0) { dogLane--; targetX = (dogLane * 80) + 40; } }
function mRight(e) { if(e) e.preventDefault(); if(active && dogLane < 4) { dogLane++; targetX = (dogLane * 80) + 40; } }

function loop(t) {
    if(!active) return;
    let dt = (t - lastTime) / 1000; lastTime = t;
    if(dt > 0.1) dt = 0.016;
    ctx.clearRect(0,0,W,H);

    timeLeft -= dt; energy -= (4.5 + level * 0.4) * dt;
    if(timeLeft <= 0) { level++; timeLeft = 30; energy = 100; }

    document.getElementById("energy-fill").style.width = Math.max(0, energy) + "%";
    document.getElementById("timer-display").innerText = Math.ceil(timeLeft) + "s";
    document.getElementById("lvl-num").innerText = level;
    document.getElementById("hearts-display").innerText = "❤️".repeat(Math.max(0, hearts));

    if(energy <= 0 || hearts <= 0) { active = false; document.getElementById("end-screen").style.display = "flex"; document.getElementById("f-score").innerText = Math.floor(score); return; }

    if(items.length + spiders.length < 4 && Math.random() < 0.025) {
        let lane = Math.floor(Math.random()*5);
        if(Math.random() < 0.75) {
            let r = Math.random(), type = isCat?'🍼':'🦴';
            if(r < 0.1) type = '👮'; else if(r < 0.3) type = isCat?'🐟':'🥩'; else if(r < 0.45) type = '🍪';
            items.push({lane, y: -60, type});
        } else spiders.push({lane, y: 0, d: 1});
    }

    spiders.forEach((s, i) => {
        s.y += (185 + level * 15) * dt * s.d;
        if(s.y > H - 180) s.d = -1; if(s.y < 0) spiders.splice(i, 1);
        let sx = s.lane * 80 + 40;
        ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, s.y); ctx.stroke();
        ctx.font = "40px Arial"; ctx.textAlign = "center"; ctx.fillText(isCat?"🐍":"🕷️", sx, s.y + 25);
        if(s.lane === dogLane && s.y > H-180 && s.y < H-80) { energy -= 30; floaters.push({x: sx, y: s.y, txt: "-30%", c: "red", l: 1}); spiders.splice(i,1); }
    });

    items.forEach((it, i) => {
        it.y += (255 + level * 12) * dt; let ix = it.lane * 80 + 40;
        ctx.font = "42px Arial"; ctx.fillText(it.type, ix, it.y);
        if(it.lane === dogLane && it.y > H-160 && it.y < H-80) {
            if(it.type === '👮') { hearts--; floaters.push({x: ix, y: it.y, txt: "-❤️", c: "red", l: 1}); }
            else { score += 25; energy = Math.min(100, energy + 12); floaters.push({x: ix, y: it.y, txt: "+25", c: "var(--green)", l: 1}); }
            items.splice(i, 1);
        }
        if(it.y > H) items.splice(i,1);
    });

    dogX += (targetX - dogX) * 0.22;
    ctx.font = "80px Arial"; ctx.fillText(isCat ? "🐱" : "🐶", dogX, H - 110);

    floaters.forEach((f, i) => { 
        f.y -= 2; f.l -= dt; ctx.globalAlpha = f.l; ctx.fillStyle = f.c;
        ctx.font = "bold 24px Orbitron"; ctx.fillText(f.txt, f.x, f.y); 
        if(f.l <= 0) floaters.splice(i,1); 
    });
    ctx.globalAlpha = 1;
    requestAnimationFrame(loop);
}

window.onload = init;
</script>
</body>
</html>
