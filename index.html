<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOGGYCO & CATS WORLD V99 - COMPLETE LEGACY</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --neon: #00f2ff; --green: #00ff88; --red: #ff3131; --gold: #ffd700; 
            --blue-glow: #0070ff; --cat-purple: #bc13fe;
        }
        
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { width: 100%; height: 100%; background: #000; overflow-x: hidden; display: flex; flex-direction: column; align-items: center; }

        /* FIXER HINTERGRUND FÜR ALLES */
        #main-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('hintergrund.png') center center / cover no-repeat #000;
            filter: brightness(0.4); z-index: -10;
        }

        header { width: 100%; text-align: center; padding: 15px 0; z-index: 10; }
        header h1 { font-size: 38px; color: var(--neon); text-shadow: 0 0 20px var(--neon); animation: blink 2s infinite; }
        @keyframes blink { 50% { opacity: 0.7; } }

        /* SPIEL-CONTAINER */
        #game-view { flex: 0 0 auto; display: flex; align-items: center; justify-content: center; width: 100%; padding: 10px; z-index: 5; }
        
        #game-wrap { 
            position:relative; width: 380px; height: 620px; 
            background: rgba(0,0,0,0.8); border: 4px solid var(--neon); border-radius: 40px; 
            overflow: hidden; box-shadow: 0 0 50px var(--neon);
        }

        /* HUD */
        #ui-header { position: absolute; top: 15px; width: 100%; z-index: 200; pointer-events: none; }
        #energy-bar-wrap { width: 85%; height: 25px; margin: 0 auto; background: #111; border: 2px solid #fff; border-radius: 12px; overflow: hidden; }
        #energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--red), var(--gold), var(--green)); transition: width 0.2s; }
        #hud-row { display: flex; justify-content: space-between; width: 85%; margin: 8px auto; font-size: 14px; font-weight: 900; }

        canvas { position: absolute; inset: 0; z-index: 50; background: transparent; pointer-events: none; }

        /* MENÜS & KACHELN */
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; background: rgba(0,0,0,0.8); border-radius: 36px; padding: 25px; }
        .glass-panel { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 2px solid var(--neon); border-radius: 30px; padding: 25px; width: 92vw; max-width: 480px; margin: 15px 0; text-align: center; }

        .neon-btn { padding: 16px; background: var(--green); color: #000; border-radius: 30px; font-weight: 900; cursor: pointer; border: none; font-family: 'Orbitron'; margin: 10px 0; width: 100%; box-shadow: 0 0 15px var(--green); transition: 0.2s; }
        .cat-btn { background: var(--cat-purple); color: #fff; box-shadow: 0 0 15px var(--cat-purple); }

        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; z-index: 300; }
        .btn-arrow { width: 85px; height: 85px; background: rgba(255,255,255,0.05); border: 3px solid var(--neon); border-radius: 50%; color: #fff; font-size: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-arrow:active { background: rgba(0, 112, 255, 0.5); box-shadow: 0 0 35px var(--blue-glow); border-color: #fff; }

        #pName { width: 100%; padding: 18px; border-radius: 15px; border: 2px solid var(--neon); background: rgba(255,255,255,0.1); color: #fff; text-align: center; font-family: 'Orbitron'; outline: none; margin-bottom: 15px; }
        .rank-row { display: flex; justify-content: space-between; padding: 12px; margin-bottom: 8px; border-radius: 12px; background: rgba(0,0,0,0.5); border: 1px solid var(--neon); }
    </style>
</head>
<body>

<div id="main-bg"></div>
<header><h1 id="main-title">DOGGYCO</h1></header>

<div id="game-view">
    <div id="game-wrap">
        <div id="ui-header">
            <div id="energy-bar-wrap"><div id="energy-fill"></div></div>
            <div id="hud-row">
                <div id="hearts-display">❤️❤️❤️</div>
                <div id="timer-display" style="color:var(--gold)">30s</div>
                <div style="background:#fff; color:#000; padding:2px 8px; border-radius:10px;">LVL <span id="lvl-num">1</span></div>
            </div>
        </div>
        
        <canvas id="game-canvas"></canvas>

        <div id="controls">
            <div class="btn-arrow" onmousedown="mLeft()" ontouchstart="mLeft(event)">◀</div>
            <div class="btn-arrow" onmousedown="mRight()" ontouchstart="mRight(event)">▶</div>
        </div>

        <div id="start-screen" class="overlay">
            <div class="glass-panel" style="border:none; background:none; box-shadow:none;">
                <input type="text" id="pName" placeholder="ENTER AGENT NAME">
                <button class="neon-btn" onclick="startGame(false)">START DOGGY GO</button>
                <button class="neon-btn cat-btn" onclick="startGame(true)">START CATS WORLD</button>
            </div>
        </div>

        <div id="end-screen" class="overlay" style="display:none;">
            <h1 id="f-score" style="font-size: 65px; color: var(--gold);">0</h1>
            <button class="neon-btn" onclick="location.reload()">RETRY</button>
        </div>
    </div>
</div>

<div class="glass-panel">
    <h3 style="color:var(--gold); margin-bottom:15px;">🏆 GLOBAL RANKING</h3>
    <div id="leaderboard">Loading...</div>
</div>

<div class="glass-panel">
    <h3 style="color:var(--green); margin-bottom:15px;">💎 SUPPORT PROJECT</h3>
    <button class="neon-btn" style="background:#ff0050; color:#fff;" onclick="window.open('https://tiktok.com/@TIKTOK')">TikTok</button>
    <button class="neon-btn" style="background:#0070ba; color:#fff;" onclick="window.open('https://paypal.me/PAYPAL')">PayPal</button>
    <div style="background:#fff; padding:15px; border-radius:20px; display:inline-block; margin-top:15px; border:3px solid var(--gold);">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=BITCOIN_ADRESSE" width="150">
    </div>
</div>

<script>
const SUPABASE_URL = 'https://ovmsstdroxkinisqwlhw.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92bXNzdGRyb3hraW5pc3F3bGh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMzM3OTEsImV4cCI6MjA4NzgwOTc5MX0.SOsi-Aeb_wSp40_TTymaiiU0Kn_3rhG_LnvLjJP66z8';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const canvas = document.getElementById("game-canvas");
const ctx = canvas.getContext("2d");
let W, H, dogX, targetX, dogLane = 2, active = false, isCat = false;
let items = [], spiders = [], floaters = [], lastTime = 0;
let score = 0, hearts = 3, energy = 100, level = 1, timeLeft = 30;
let audioCtx, music;

function init() {
    W = canvas.width = 400; 
    H = canvas.height = 620;
    targetX = (dogLane * 80) + 40; dogX = targetX;
}

function startGame(catMode) {
    if(!document.getElementById("pName").value) return;
    isCat = catMode;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    // Musik
    music = new Audio(isCat ? 'cats_world_theme.mp3' : 'musik.mp3');
    music.loop = true; music.volume = 0.15; music.play().catch(()=>{});

    document.getElementById("start-screen").style.display = "none";
    if(isCat) {
        document.getElementById("main-title").innerText = "CATS WORLD";
        document.getElementById("main-title").style.color = "#bc13fe";
        document.getElementById("main-bg").style.filter = "hue-rotate(280deg) brightness(0.5)";
    }
    active = true; lastTime = performance.now();
    requestAnimationFrame(loop);
}

function mLeft(e) { if(e) e.preventDefault(); if(active && dogLane > 0) { dogLane--; targetX = (dogLane * 80) + 40; } }
function mRight(e) { if(e) e.preventDefault(); if(active && dogLane < 4) { dogLane++; targetX = (dogLane * 80) + 40; } }

function loop(t) {
    if(!active) return;
    let dt = (t - lastTime) / 1000; lastTime = t;
    if(dt > 0.1) dt = 0.016;
    ctx.clearRect(0,0,W,H);

    timeLeft -= dt; energy -= (4.8 + level * 0.4) * dt;
    if(timeLeft <= 0) { level++; timeLeft = 30; energy = 100; }

    document.getElementById("energy-fill").style.width = Math.max(0, energy) + "%";
    document.getElementById("timer-display").innerText = Math.ceil(timeLeft) + "s";
    document.getElementById("lvl-num").innerText = level;
    document.getElementById("score-display").innerText = "🏆 " + Math.floor(score);
    document.getElementById("hearts-display").innerText = "❤️".repeat(Math.max(0, hearts));

    if(energy <= 0 || hearts <= 0) { active = false; document.getElementById("end-screen").style.display = "flex"; return; }

    // Spawn Items & Spiders
    if(items.length + spiders.length < 4 && Math.random() < 0.025) {
        let lane = Math.floor(Math.random()*5);
        if(Math.random() < 0.75) {
            let r = Math.random(), type = isCat?'🍼':'🦴';
            if(r < 0.1) type = '👮'; else if(r < 0.3) type = isCat?'🐟':'🥩'; else if(r < 0.45) type = '🍪';
            items.push({lane, y: -60, type});
        } else spiders.push({lane, y: 0, d: 1});
    }

    spiders.forEach((s, i) => {
        s.y += (185 + level * 15) * dt * s.d;
        if(s.y > H - 180) s.d = -1; if(s.y < 0) spiders.splice(i, 1);
        let sx = s.lane * 80 + 40;
        ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, s.y); ctx.stroke();
        ctx.font = "40px Arial"; ctx.textAlign = "center"; ctx.fillText(isCat?"🐍":"🕷️", sx, s.y + 25);
        if(s.lane === dogLane && s.y > H-180 && s.y < H-80) { energy -= 30; floaters.push({x: sx, y: s.y, txt: "-30%", c: "red", l: 1}); spiders.splice(i,1); }
    });

    items.forEach((it, i) => {
        it.y += (255 + level * 12) * dt; let ix = it.lane * 80 + 40;
        ctx.font = "42px Arial"; ctx.fillText(it.type, ix, it.y);
        if(it.lane === dogLane && it.y > H-160 && it.y < H-80) {
            if(it.type === '👮') { hearts--; floaters.push({x: ix, y: it.y, txt: "-❤️", c: "red", l: 1}); }
            else { score += 25; energy = Math.min(100, energy + 12); floaters.push({x: ix, y: it.y, txt: "+25", c: "var(--green)", l: 1}); }
            items.splice(i, 1);
        }
        if(it.y > H) items.splice(i,1);
    });

    dogX += (targetX - dogX) * 0.22;
    ctx.font = "80px Arial"; ctx.fillText(isCat ? "🐱" : "🐶", dogX, H - 110);

    floaters.forEach((f, i) => { 
        f.y -= 2; f.l -= dt; ctx.globalAlpha = f.l; ctx.fillStyle = f.c;
        ctx.font = "bold 24px Orbitron"; ctx.fillText(f.txt, f.x, f.y); 
        if(f.l <= 0) floaters.splice(i,1); 
    });
    ctx.globalAlpha = 1;
    requestAnimationFrame(loop);
}

async function updateOnlineRanks() {
    try {
        let { data } = await supabaseClient.from('leaderboard').select('*').order('s', { ascending: false }).limit(5);
        if(data) document.getElementById("leaderboard").innerHTML = data.map((x, i) => `<div class="rank-row"><span>${x.n}</span><span>${x.s}</span></div>`).join('');
    } catch(e) {}
}
window.onload = () => { init(); updateOnlineRanks(); };
</script>
</body>
</html>
