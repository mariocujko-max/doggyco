<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOGGYCO - ULTIMATE MASTER VERSION</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-green: #00ff88;
            --neon-red: #ff3131;
            --gold: #ffd700;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Das Spielfeld */
        #game-container {
            position: relative;
            width: 100vw;
            max-width: 400px; /* 5 Bahnen à 80px */
            height: 85vh;
            border: 4px solid var(--neon-blue);
            background: linear-gradient(180deg, #050505 0%, #111 100%);
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.2);
            overflow: hidden;
        }

        canvas { display: block; }

        /* HUD & UI */
        .hud {
            position: absolute;
            top: 0; width: 100%;
            padding: 20px;
            z-index: 100;
            pointer-events: none;
        }

        #energy-bar {
            width: 100%; height: 15px;
            background: rgba(255,255,255,0.1);
            border: 2px solid #fff;
            border-radius: 10px;
            overflow: hidden;
        }

        #energy-fill {
            width: 100%; height: 100%;
            background: linear-gradient(90deg, var(--neon-red), var(--neon-green));
            transition: width 0.2s linear;
        }

        .stats {
            display: flex; justify-content: space-between;
            margin-top: 10px; font-weight: 900; font-size: 18px;
        }

        /* Overlays */
        .overlay {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 1000; text-align: center;
        }

        .btn-start {
            padding: 20px 40px;
            background: var(--neon-green);
            color: #000; font-weight: 900;
            border: none; border-radius: 50px;
            cursor: pointer; box-shadow: 0 0 20px var(--neon-green);
        }

        /* Floating Score Animation */
        .floating-score {
            position: absolute;
            font-weight: 900;
            color: var(--neon-green);
            pointer-events: none;
            animation: floatUp 1s forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        /* Mobile Controls */
        #controls {
            display: flex; width: 100%; max-width: 400px;
            justify-content: space-between; padding: 10px;
        }
        .ctrl-btn {
            width: 80px; height: 80px;
            background: rgba(255,255,255,0.1);
            border: 2px solid var(--neon-blue);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px;
        }
    </style>
</head>
<body>

<h1 style="color: var(--neon-blue); margin: 10px;">DOGGYCO</h1>

<div id="game-container">
    <div class="hud">
        <div id="energy-bar"><div id="energy-fill"></div></div>
        <div class="stats">
            <span id="hearts">❤️❤️❤️</span>
            <span id="score">0</span>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="start-screen" class="overlay">
        <h2 style="color:var(--neon-blue); margin-bottom:20px;">BEREIT FÜR DOGGYCO?</h2>
        <button class="btn-start" onclick="startGame()">START MISSION</button>
    </div>

    <div id="game-over" class="overlay" style="display:none;">
        <h1 style="color:var(--neon-red);">MISSION FEHLGESCHLAGEN</h1>
        <h2 id="final-score" style="color:var(--gold); font-size: 50px;">0</h2>
        <button class="btn-start" onclick="location.reload()">NEUSTART</button>
    </div>
</div>

<div id="controls">
    <div class="ctrl-btn" ontouchstart="moveLeft()">◀</div>
    <div class="ctrl-btn" ontouchstart="moveRight()">▶</div>
</div>

<audio id="bgMusic" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
<audio id="collectSound" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

<script>
/**
 * DOGGYCO ENGINE - ENDGÜLTIGE STRUKTUR
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const bgMusic = document.getElementById('bgMusic');
const collectSound = document.getElementById('collectSound');

// Spiel-Konfiguration
let gameActive = false;
let score = 0;
let energy = 100;
let hearts = 3;
let currentLane = 2; // Start in der Mitte (0,1,2,3,4)
const laneWidth = 80;

let items = [];
let spiders = [];
let particles = [];

// Hund-Objekt
const dog = {
    x: 200,
    y: 0,
    targetX: 200,
    width: 60
};

function init() {
    canvas.width = 400;
    canvas.height = document.getElementById('game-container').offsetHeight;
    dog.y = canvas.height - 120;
}

function startGame() {
    document.getElementById('start-screen').style.display = 'none';
    gameActive = true;
    bgMusic.play();
    gameLoop();
}

function moveLeft() { if(currentLane > 0) currentLane--; }
function moveRight() { if(currentLane < 4) currentLane++; }

// Tastatur-Support
window.addEventListener('keydown', (e) => {
    if(e.key === "ArrowLeft") moveLeft();
    if(e.key === "ArrowRight") moveRight();
});

function spawnEntity() {
    if(!gameActive) return;
    
    // Items (Knochen oder Hindernisse)
    if(Math.random() < 0.03) {
        items.push({
            x: (Math.floor(Math.random() * 5) * laneWidth) + 40,
            y: -50,
            type: Math.random() > 0.2 ? '🦴' : '👮',
            speed: 5 + (score / 100)
        });
    }

    // Spinnen-Logik (Max 2!)
    if(spiders.length < 2 && Math.random() < 0.01) {
        spiders.push({
            x: (Math.floor(Math.random() * 5) * laneWidth) + 40,
            y: -100,
            speed: 3
        });
    }
}

function createFloatingScore(x, y, text) {
    const el = document.createElement('div');
    el.className = 'floating-score';
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.innerText = text;
    document.getElementById('game-container').appendChild(el);
    setTimeout(() => el.remove(), 1000);
}

function update() {
    if(!gameActive) return;

    // Energie-Verbrauch
    energy -= 0.1;
    document.getElementById('energy-fill').style.width = energy + "%";
    if(energy <= 0) gameOver();

    // Hund-Symmetrie Bewegung
    dog.targetX = (currentLane * laneWidth) + 40;
    dog.x += (dog.targetX - dog.x) * 0.2;

    // Items
    items.forEach((it, i) => {
        it.y += it.speed;
        // Kollision
        if(Math.abs(it.x - dog.x) < 40 && Math.abs(it.y - dog.y) < 40) {
            if(it.type === '🦴') {
                score += 10;
                energy = Math.min(100, energy + 10);
                collectSound.play();
                createFloatingScore(it.x, it.y, "+10");
            } else {
                hearts--;
                energy -= 20;
            }
            items.splice(i, 1);
        }
        if(it.y > canvas.height) items.splice(i, 1);
    });

    // Spinnen
    spiders.forEach((s, i) => {
        s.y += s.speed;
        if(Math.abs(s.x - dog.x) < 40 && Math.abs(s.y - dog.y) < 40) {
            energy -= 30;
            spiders.splice(i, 1);
        }
        if(s.y > canvas.height) spiders.splice(i, 1);
    });

    if(hearts <= 0) gameOver();
    
    document.getElementById('score').innerText = score;
    document.getElementById('hearts').innerText = "❤️".repeat(hearts);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Bahnen zeichnen
    ctx.strokeStyle = "rgba(0, 242, 255, 0.1)";
    for(let i=1; i<5; i++) {
        ctx.beginPath();
        ctx.moveTo(i * laneWidth, 0);
        ctx.lineTo(i * laneWidth, canvas.height);
        ctx.stroke();
    }

    // Items zeichnen
    ctx.font = "40px Arial";
    items.forEach(it => ctx.fillText(it.type, it.x - 20, it.y));

    // Spinnen zeichnen (mit Faden)
    spiders.forEach(s => {
        ctx.strokeStyle = "#fff";
        ctx.beginPath();
        ctx.moveTo(s.x, 0);
        ctx.lineTo(s.x, s.y);
        ctx.stroke();
        ctx.fillText("🕷️", s.x - 20, s.y);
    });

    // Hund zeichnen
    ctx.font = "70px Arial";
    ctx.fillText("🐶", dog.x - 35, dog.y + 25);
}

function gameLoop() {
    update();
    draw();
    spawnEntity();
    if(gameActive) requestAnimationFrame(gameLoop);
}

function gameOver() {
    gameActive = false;
    bgMusic.pause();
    document.getElementById('game-over').style.display = 'flex';
    document.getElementById('final-score').innerText = score;
}

window.onload = init;
</script>
</body>
</html>
