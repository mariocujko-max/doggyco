<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOGGYCO - V220 FINAL CORRECTION</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --neon: #00f2ff; --green: #00ff88; --red: #ff3131; --gold: #ffd700; 
            --blue-glow: #0070ff; --cat-purple: #bc13fe; --rabbit-orange: #ff8c00;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            background: #000; font-family: 'Orbitron', sans-serif; color: #fff; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-x: hidden;
        }

        #main-bg {
            position: fixed; inset: 0;
            background: url('hintergrund.png') center/cover no-repeat #000;
            filter: brightness(0.7); z-index: -10;
        }

        @keyframes neonPulse { 0%, 100% { border-color: var(--neon); box-shadow: 0 0 15px var(--neon); } 50% { border-color: #fff; box-shadow: 0 0 30px var(--neon); } }
        header h1 { font-size: clamp(20px, 6vw, 36px); color: var(--neon); text-shadow: 0 0 15px var(--neon); padding: 15px; text-align: center; }

        /* RESPONSIVE GAME CONTAINER */
        #game-view { width: 100%; display: flex; justify-content: center; padding: 10px; z-index: 5; }
        #game-wrap { 
            position:relative; width: 100%; max-width: 400px; height: 600px; 
            background: rgba(0,0,0,0.6); border: 4px solid var(--neon); border-radius: 40px; 
            overflow: hidden; animation: neonPulse 3s infinite;
        }

        /* HUD */
        #ui-header { position: absolute; top: 10px; width: 100%; z-index: 200; pointer-events: none; }
        #energy-bar-wrap { width: 90%; height: 18px; margin: 0 auto 8px; background: rgba(0,0,0,0.8); border: 2px solid #fff; border-radius: 9px; overflow: hidden; }
        #energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--red), var(--gold), var(--green)); transition: width 0.3s; }
        #hud-main { display: flex; justify-content: space-between; width: 92%; margin: 0 auto; font-size: 11px; font-weight: 900; background: rgba(0,0,0,0.6); padding: 6px 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.3); }

        canvas { position: absolute; inset: 0; z-index: 50; display: block; }

        /* GLASS PANELS */
        .glass-panel { 
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 2px solid var(--neon); border-radius: 25px; padding: 20px; 
            width: 95vw; max-width: 400px; margin: 10px 0; text-align: center; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; background: rgba(0,0,0,0.9); padding: 25px; }
        .neon-btn { padding: 15px; background: var(--green); color: #000; border-radius: 30px; font-weight: 900; cursor: pointer; border: none; font-family: 'Orbitron'; margin: 8px 0; width: 100%; box-shadow: 0 0 10px var(--green); font-size: 14px; }

        /* STEERING - NO BLUE SQUARE */
        #controls { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 35px; z-index: 300; }
        .btn-arrow { width: 75px; height: 75px; background: rgba(255,255,255,0.1); border: 3px solid var(--neon); border-radius: 50%; color: #fff; font-size: 35px; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; }
        .btn-arrow:active { background: var(--blue-glow); box-shadow: 0 0 30px var(--blue-glow); }

        #pName { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid var(--neon); background: #000; color: #fff; text-align: center; font-family: 'Orbitron'; margin-bottom: 10px; }
        .rank-row { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid var(--neon); font-size: 14px; }
    </style>
</head>
<body>

<div id="main-bg"></div>
<header><h1 id="main-title">DOGGY MISSION</h1></header>

<div id="game-view">
    <div id="game-wrap">
        <div id="ui-header">
            <div id="energy-bar-wrap"><div id="energy-fill"></div></div>
            <div id="hud-main">
                <div id="hud-name">AGENT</div>
                <div id="hearts-display">❤️❤️❤️</div>
                <div style="color:var(--gold)">⏱️<span id="timer-display">30</span></div>
                <div>🏆<span id="score-display">0</span></div>
            </div>
        </div>
        <canvas id="game-canvas"></canvas>
        <div id="controls">
            <div class="btn-arrow" onmousedown="mLeft()" ontouchstart="mLeft()">◀</div>
            <div class="btn-arrow" onmousedown="mRight()" ontouchstart="mRight()">▶</div>
        </div>

        <div id="name-screen" class="overlay">
            <div class="glass-panel" style="border:none; background:none;">
                <input type="text" id="pName" placeholder="DEIN NAME">
                <button class="neon-btn" onclick="toMenu()">BESTÄTIGEN</button>
            </div>
        </div>

        <div id="start-screen" class="overlay" style="display:none;">
            <div class="glass-panel" style="border:none; background:none;">
                <button class="neon-btn" onclick="startGame('dog')">START DOGGY MISSION</button>
                <button class="neon-btn" style="background:var(--cat-purple); color:#fff;" onclick="startGame('cat')">START CATS WORLD</button>
                <button class="neon-btn" style="background:var(--rabbit-orange); color:#fff;" onclick="startGame('rabbit')">START RABBIT FOREST</button>
            </div>
        </div>

        <div id="end-screen" class="overlay" style="display:none;">
            <h1 id="final-msg" style="color:#fff; font-size:24px; margin-bottom:10px;">AGENT ...</h1>
            <h1 id="f-score" style="font-size: 50px; color: var(--gold); margin-bottom:20px;">0</h1>
            <button class="neon-btn" onclick="location.reload()">NEUSTART</button>
        </div>
    </div>
</div>

<div class="glass-panel">
    <h3 style="color:var(--gold); margin-bottom:10px;">🏆 GLOBAL RANKING</h3>
    <div id="leaderboard">Lade Highscores...</div>
</div>

<div class="glass-panel">
    <h3 style="color:var(--green); margin-bottom:10px;">💎 SUPPORT</h3>
    <button class="neon-btn" style="background:#ff0050; color:#fff;" onclick="window.open('https://tiktok.com')">TikTok</button>
    <div style="background:#fff; padding:10px; border-radius:15px; display:inline-block; margin-top:10px; border:3px solid var(--gold);">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=130x130&data=BITCOIN_ADDRESS" width="130">
    </div>
</div>

<div class="glass-panel">
    <h3 style="color:var(--neon); margin-bottom:10px;">📖 ANLEITUNG</h3>
    <p style="font-size:11px; text-align:left;">Sammle Items für grüne Pluspunkte. Weiche blinkenden Gefahren aus. Jedes Level (+10% Pkt/Abzug) bringt neue Herausforderungen.</p>
</div>

<div class="glass-panel" style="border-color:var(--red);">
    <p style="font-size:10px; opacity:0.6;">© 2026 DOGGYCO | Private Project | Keine Haftung.</p>
</div>

<script>
const canvas = document.getElementById("game-canvas");
const ctx = canvas.getContext("2d");
let W, H, dogX, targetX, dogLane = 2, active = false, mode = 'dog', pName = "AGENT";
let items = [], spiders = [], floaters = [], lastTime = 0;
let score = 0, hearts = 3, energy = 100, level = 1, timeLeft = 30, shakeTime = 0;

function init() {
    W = canvas.width = canvas.offsetWidth;
    H = canvas.height = canvas.offsetHeight;
    targetX = (dogLane * (W / 5)) + (W / 10);
    dogX = targetX;
}

function toMenu() {
    let input = document.getElementById("pName").value;
    if(input) {
        pName = input.toUpperCase();
        document.getElementById("hud-name").innerText = pName;
        document.getElementById("name-screen").style.display = "none";
        document.getElementById("start-screen").style.display = "flex";
    }
}

function startGame(m) {
    mode = m;
    document.getElementById("start-screen").style.display = "none";
    let color = (mode==='cat') ? 'var(--cat-purple)' : (mode==='rabbit' ? 'var(--rabbit-orange)' : 'var(--neon)');
    document.documentElement.style.setProperty('--neon', color);
    init();
    active = true; lastTime = performance.now();
    requestAnimationFrame(loop);
}

function mLeft() { if(active && dogLane > 0) { dogLane--; targetX = (dogLane * (W / 5)) + (W / 10); } }
function mRight() { if(active && dogLane < 4) { dogLane++; targetX = (dogLane * (W / 5)) + (W / 10); } }

window.addEventListener('keydown', e => {
    if(e.key === "ArrowLeft") mLeft();
    if(e.key === "ArrowRight") mRight();
});

function loop(t) {
    if(!active) return;
    let dt = (t - lastTime) / 1000; lastTime = t;
    ctx.clearRect(0,0,W,H);

    timeLeft -= dt; 
    let drain = 4.5 * Math.pow(1.1, level - 1);
    energy -= drain * dt;
    if(timeLeft <= 0) { level++; timeLeft = 30; energy = 100; }

    document.getElementById("energy-fill").style.width = Math.max(0, energy) + "%";
    document.getElementById("timer-display").innerText = Math.ceil(timeLeft);
    document.getElementById("score-display").innerText = Math.floor(score);
    document.getElementById("hearts-display").innerText = "❤️".repeat(Math.max(0, hearts));

    if(energy <= 0 || hearts <= 0) {
        active = false;
        document.getElementById("end-screen").style.display = "flex";
        document.getElementById("final-msg").innerText = "AGENT " + pName;
        document.getElementById("f-score").innerText = Math.floor(score);
        return;
    }

    // SPAWNING - Strict 5 Lanes
    if(items.length < 5 && Math.random() < 0.03) {
        let lane = Math.floor(Math.random() * 5);
        let mult = Math.pow(1.1, level - 1);
        let r = Math.random();
        let type = (mode==='rabbit') ? '🥕' : (mode==='cat' ? '🍼' : '🦴');
        let val = 20 * mult;
        items.push({lane, y: -50, type, val, blink: false});
    }

    // Hazard Blink
    if(Math.random() < 0.008) {
        items.push({lane: Math.floor(Math.random()*5), y: -50, type: '🦊', val: -999, blink: true});
    }

    items.forEach((it, i) => {
        it.y += (220 + level * 15) * dt;
        let ix = (it.lane * (W / 5)) + (W / 10);
        
        if(it.blink && Math.floor(t/150)%2===0) ctx.globalAlpha = 0.3;
        ctx.font = "35px Arial"; ctx.textAlign = "center";
        ctx.fillText(it.type, ix, it.y);
        ctx.globalAlpha = 1;

        if(it.lane === dogLane && it.y > H-130 && it.y < H-40) {
            if(it.val === -999) { hearts--; shakeTime = 20; }
            else { 
                score += it.val; energy = Math.min(100, energy + 10);
                floaters.push({x: ix, y: it.y, txt: "+"+Math.floor(it.val), c: "var(--green)"});
            }
            items.splice(i, 1);
        }
        if(it.y > H) items.splice(i, 1);
    });

    // Player with Shake
    dogX += (targetX - dogX) * 0.2;
    let visualX = dogX;
    if(shakeTime > 0) { visualX += Math.sin(shakeTime) * 5; shakeTime--; }
    ctx.font = "60px Arial"; ctx.textAlign = "center";
    ctx.fillText(mode==='rabbit' ? "🐰" : (mode==='cat' ? "🐱" : "🐶"), visualX, H - 70);

    // Green Floaters - Rising diagonal
    floaters.forEach((f, i) => {
        f.y -= 2; f.x += 0.5;
        ctx.fillStyle = f.c; ctx.font = "bold 20px Orbitron";
        ctx.fillText(f.txt, f.x, f.y);
        if(f.y < 0) floaters.splice(i, 1);
    });

    requestAnimationFrame(loop);
}

window.onload = init;
window.onresize = init;
</script>
</body>
</html>
