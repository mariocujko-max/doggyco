<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOGGYCO ULTIMATE PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --neon: #00f2ff; --green: #00ff88; --red: #ff3131; --gold: #ffd700; 
            --glass: rgba(255, 255, 255, 0.08); --cat-purple: #bc13fe;
        }
        
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #000; font-family: 'Orbitron', sans-serif; color: #fff; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-y: auto; overflow-x: hidden;
        }

        #main-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url('hintergrund.png'); background-size: cover; background-position: center;
            z-index: -2;
        }

        /* NEON BLINKING TITLE */
        header h1 { 
            font-size: clamp(35px, 10vw, 65px); 
            color: var(--neon); 
            text-shadow: 0 0 10px var(--neon), 0 0 20px var(--neon);
            padding: 30px; text-align: center; letter-spacing: 10px;
            animation: neonBlink 2s infinite alternate;
        }

        @keyframes neonBlink {
            0%, 100% { opacity: 1; text-shadow: 0 0 20px var(--neon), 0 0 40px var(--neon); }
            50% { opacity: 0.7; text-shadow: 0 0 5px var(--neon); }
        }

        #game-view { width: 100vw; height: 80vh; display: flex; justify-content: center; align-items: center; position: relative; }
        
        #game-wrap { 
            position:relative; width: 400px; height: 100%; 
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(15px);
            border: 4px solid var(--neon); border-radius: 40px; 
            overflow: hidden; box-shadow: 0 0 40px rgba(0, 242, 255, 0.4);
        }

        #ui-header { position: absolute; top: 15px; width: 100%; z-index: 200; pointer-events: none; }
        #energy-bar-wrap { width: 85%; height: 20px; margin: 0 auto; background: rgba(0,0,0,0.6); border: 1px solid #fff; border-radius: 10px; overflow: hidden; }
        #energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--red), var(--gold), var(--green)); transition: width 0.2s; }
        #hud-row { display: flex; justify-content: space-between; width: 85%; margin: 8px auto; font-size: 14px; font-weight: 900; }

        canvas { position: absolute; inset: 0; z-index: 50; background: transparent; }

        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(25px); z-index: 1000; background: rgba(0,0,0,0.5); border-radius: 36px; }
        
        .neon-btn { 
            padding: 15px 35px; background: var(--glass); color: #fff; border: 2px solid var(--neon); 
            border-radius: 30px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; margin: 8px;
            box-shadow: 0 0 15px var(--neon); transition: 0.3s; width: 220px;
        }
        .neon-btn:hover { background: var(--neon); color: #000; }

        #pName { padding: 15px; border-radius: 12px; border: 2px solid var(--neon); background: rgba(255,255,255,0.1); color: #fff; text-align: center; font-family: 'Orbitron'; margin-bottom: 20px; outline: none; width: 220px; }

        .content-area { width: 100%; max-width: 500px; padding: 40px 20px; display: flex; flex-direction: column; gap: 20px; }
        .tile { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid var(--neon); border-radius: 30px; padding: 25px; text-align: center; }

        /* BUTTON GRID */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .social-btn { padding: 12px; border-radius: 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--neon); color: #fff; text-decoration: none; font-size: 12px; font-weight: bold; }

        #controls { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; z-index: 300; }
        .btn-arrow { width: 75px; height: 75px; background: rgba(255,255,255,0.1); border: 2px solid var(--neon); border-radius: 50%; color: #fff; font-size: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* LEGAL FOOTER */
        .legal-box { font-size: 10px; color: #888; text-align: center; margin: 20px 0 50px; line-height: 1.8; }
        .legal-link { color: var(--neon); text-decoration: none; margin: 0 10px; }
    </style>
</head>
<body>

<div id="main-bg"></div>
<header><h1>DOGGYCO</h1></header>

<div id="game-view">
    <div id="game-wrap">
        <div id="ui-header">
            <div id="energy-bar-wrap"><div id="energy-fill"></div></div>
            <div id="hud-row">
                <div id="hearts">❤️❤️❤️</div>
                <div id="score">🏆 0</div>
            </div>
        </div>
        
        <canvas id="game-canvas"></canvas>

        <div id="controls">
            <div class="btn-arrow" onmousedown="move(-1)" ontouchstart="move(-1)">◀</div>
            <div class="btn-arrow" onmousedown="move(1)" ontouchstart="move(1)">▶</div>
        </div>

        <div id="start-screen" class="overlay">
            <h2 style="color:var(--gold); margin-bottom:20px;">READY?</h2>
            <input type="text" id="pName" placeholder="YOUR NAME">
            <button class="neon-btn" onclick="start(false)">START DOGGY</button>
            <button class="neon-btn" style="border-color:var(--cat-purple); box-shadow: 0 0 15px var(--cat-purple);" onclick="start(true)">START CAT</button>
        </div>

        <div id="end-screen" class="overlay" style="display:none;">
            <h1 id="final-score" style="color:var(--gold); font-size:35px;">0</h1>
            <button class="neon-btn" onclick="location.reload()">RETRY</button>
        </div>
    </div>
</div>

<div class="content-area">
    <div class="tile">
        <h3 style="color:var(--neon)">WORLD RANKING</h3>
        <div id="board" style="margin-top:15px;">Connecting...</div>
    </div>
    
    <div class="tile">
        <h3 style="color:var(--gold)">SUPPORT & LINKS</h3>
        <div style="background:#fff; padding:10px; display:inline-block; border-radius:15px; margin:15px 0;">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=bc1qkm22c6w896u9n9cxp8ld049maef4xs5xn060ed" alt="QR">
        </div>
        <p style="font-size:9px; color:var(--gold); margin-bottom:15px;">bc1qkm22c6w896u9n9cxp8ld049maef4xs5xn060ed</p>
        
        <div class="btn-grid">
            <a href="https://tiktok.com" class="social-btn">TIKTOK</a>
            <a href="https://paypal.me" class="social-btn">PAYPAL</a>
            <a href="#" class="social-btn" onclick="navigator.clipboard.writeText('bc1qkm22c6w896u9n9cxp8ld049maef4xs5xn060ed')">COPY WALLET</a>
            <a href="#rules" class="social-btn">HOW TO PLAY</a>
        </div>
    </div>

    <div class="legal-box">
        <p>© 2026 DOGGYCO & CATS WORLD | PRIVATE GAMING PROJECT</p>
        <p>
            <a href="#" class="legal-link">Terms of Service</a> | 
            <a href="#" class="legal-link">Privacy Policy</a> | 
            <a href="#" class="legal-link">Imprint</a>
        </p>
    </div>
</div>

<audio id="bgMusic" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<script>
const SUPABASE_URL = 'https://ovmsstdroxkinisqwlhw.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92bXNzdGRyb3hraW5pc3F3bGh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMzM3OTEsImV4cCI6MjA4NzgwOTc5MX0.SOsi-Aeb_wSp40_TTymaiiU0Kn_3rhG_LnvLjJP66z8';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const canvas = document.getElementById("game-canvas");
const ctx = canvas.getContext("2d");
const music = document.getElementById("bgMusic");
const W = 400;
let H, active = false, isCat = false, score = 0, energy = 100, hearts = 3, lane = 2, dogX = 200;
let items = [], spiders = [], floaters = [], lastTime = 0;

function init() {
    canvas.width = W;
    H = canvas.height = document.getElementById("game-wrap").offsetHeight;
}

const audio = new (window.AudioContext || window.webkitAudioContext)();
function playBeep(f, d, t='sine') {
    if(audio.state === 'suspended') audio.resume();
    let o = audio.createOscillator(), g = audio.createGain();
    o.type = t; o.frequency.value = f; g.gain.value = 0.05;
    o.connect(g); g.connect(audio.destination);
    o.start(); g.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime + d);
    o.stop(audio.currentTime + d);
}

function start(cat) {
    if(!document.getElementById("pName").value) { alert("Enter Name!"); return; }
    isCat = cat;
    document.getElementById("start-screen").style.display = "none";
    music.play().catch(() => console.log("Music blocked by browser"));
    active = true; lastTime = performance.now();
    requestAnimationFrame(loop);
}

function move(dir) { if(active && lane + dir >= 0 && lane + dir <= 4) lane += dir; }

function loop(t) {
    if(!active) return;
    let dt = (t - lastTime) / 1000; lastTime = t;
    ctx.clearRect(0,0,W,H);

    energy -= 6 * dt;
    document.getElementById("energy-fill").style.width = energy + "%";
    document.getElementById("score").innerText = "🏆 " + Math.floor(score);
    document.getElementById("hearts").innerText = "❤️".repeat(hearts);
    if(energy <= 0 || hearts <= 0) endGame();

    // SPIDERS
    if(spiders.length < 2 && Math.random() < 0.012) {
        let nL = Math.floor(Math.random()*5);
        if(!spiders.some(s => s.lane === nL)) spiders.push({lane: nL, y: -50, dir: 1, speed: 190});
    }
    spiders.forEach((s, i) => {
        s.y += s.speed * dt * s.dir;
        if(s.y > H * 0.7) s.dir = -1; 
        if(s.y < -60) spiders.splice(i, 1);
        let sx = s.lane * 80 + 40;
        ctx.strokeStyle = "#fff"; ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, s.y); ctx.stroke();
        ctx.font = "30px Arial"; ctx.fillText("🕷️", sx-15, s.y+20);
        if(s.lane === lane && s.y > H-150 && s.y < H-80) {
            energy -= 20; spiders.splice(i, 1); playBeep(140, 0.3, 'sawtooth');
            floaters.push({x: sx, y: s.y, txt: "-20", c: "#ff3131", vx: -1.2, vy: -2});
        }
    });

    // ITEMS
    if(Math.random() < 0.035) {
        let r = Math.random();
        let itm = r < 0.6 ? {e: '🦴', p: 10} : (r < 0.85 ? {e: '🍪', p: 25} : {e: '🥩', p: 50});
        items.push({lane: Math.floor(Math.random()*5), y: -50, ...itm});
    }
    items.forEach((it, i) => {
        it.y += (230 + score/8) * dt;
        let ix = it.lane * 80 + 40;
        ctx.font = "35px Arial"; ctx.fillText(it.e, ix-17, it.y);
        if(it.lane === lane && it.y > H-150 && it.y < H-80) {
            score += it.p; energy = Math.min(100, energy + 10);
            playBeep(500 + it.p*6, 0.1);
            floaters.push({x: ix, y: it.y, txt: "+"+it.p, c: "#00ff88", vx: 1.2, vy: -2});
            items.splice(i, 1);
        }
        if(it.y > H) items.splice(i, 1);
    });

    floaters.forEach((f, i) => {
        f.x += f.vx; f.y += f.vy;
        ctx.fillStyle = f.c; ctx.font = "bold 20px Orbitron"; ctx.fillText(f.txt, f.x, f.y);
        if(f.y < 0) floaters.splice(i, 1);
    });

    let targetX = lane * 80 + 40;
    dogX += (targetX - dogX) * 0.2;
    ctx.font = "75px Arial";
    ctx.fillText(isCat ? "🐱" : "🐶", dogX-38, H-100);

    requestAnimationFrame(loop);
}

function endGame() {
    active = false; music.pause();
    document.getElementById("end-screen").style.display = "flex";
    document.getElementById("final-score").innerText = "SCORE: " + Math.floor(score);
    save();
}

async function save() {
    const n = document.getElementById("pName").value;
    await supabase.from('leaderboard').insert([{ n, s: Math.floor(score) }]);
    loadRanks();
}

async function loadRanks() {
    try {
        const { data } = await supabase.from('leaderboard').select('*').order('s', { ascending: false }).limit(5);
        if(data) document.getElementById("board").innerHTML = data.map((r,i) => `<div style="margin-bottom:5px;">${i+1}. ${r.n}: ${r.s}</div>`).join('');
    } catch(e) { document.getElementById("board").innerText = "Offline Mode"; }
}

window.onload = () => { init(); loadRanks(); };
</script>
</body>
</html>
