<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOGGYCO & CATS WORLD V60000 - ULTIMATE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --neon: #00f2ff; --green: #00ff88; --red: #ff3131; --gold: #ffd700; 
            --glass: rgba(255, 255, 255, 0.12); --blue-active: #0070ff; --cat-purple: #bc13fe;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #000; font-family: 'Orbitron', sans-serif; color: #fff; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-y: auto; overflow-x: hidden;
        }

        #main-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url('hintergrund.png'); background-size: cover; background-position: center;
            z-index: -1; transition: 1.5s;
        }

        header h1 { font-size: 38px; color: var(--neon); text-shadow: 0 0 20px var(--neon); padding: 30px; text-align: center; }

        #game-view { width: 100vw; height: 85vh; display: flex; justify-content: center; align-items: center; position: relative; }
        #game-wrap { 
            position:relative; width: 400px; height: 98%; 
            background: rgba(0,0,0,0.85); border: 4px solid var(--neon); border-radius: 40px; 
            overflow: hidden; box-shadow: 0 0 50px var(--neon);
        }
        #game-wrap.cat-theme { border-color: var(--cat-purple); box-shadow: 0 0 50px var(--cat-purple); }

        /* HUD DESIGN AUS DEINEM BILD */
        #ui-header { position: absolute; top: 15px; width: 100%; z-index: 200; pointer-events: none; }
        #energy-bar-wrap { width: 85%; height: 25px; margin: 0 auto; background: rgba(0,0,0,0.9); border: 2px solid #fff; border-radius: 12px; overflow: hidden; }
        #energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #ff4e50, #f9d423, #00ff88); transition: width 0.2s; }
        #hud-row { display: flex; justify-content: space-between; align-items: center; width: 85%; margin: 10px auto; font-size: 14px; font-weight: 900; }
        .hud-icon { display: flex; align-items: center; gap: 5px; }

        canvas { position: absolute; inset: 0; z-index: 50; background: transparent; pointer-events: none; }

        /* OVERLAYS */
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(20px); z-index: 1000; background: rgba(0,0,0,0.8); border-radius: 36px; }
        .neon-btn { padding: 18px 45px; background: var(--green); color: #000; border-radius: 35px; font-weight: 900; cursor: pointer; border: none; margin: 10px; box-shadow: 0 0 15px var(--green); transition: 0.2s; }
        .cat-btn { background: var(--cat-purple); color: #fff; box-shadow: 0 0 15px var(--cat-purple); }
        .neon-btn:active { transform: scale(0.95); }

        /* CONTROLS */
        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; z-index: 300; }
        .btn-arrow { width: 85px; height: 85px; background: rgba(255,255,255,0.1); border: 3px solid var(--neon); border-radius: 50%; color: #fff; font-size: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-arrow:active { background: var(--blue-active); box-shadow: 0 0 30px var(--blue-active); }

        /* CONTENT BEREICH */
        .content-area { width: 100%; display: flex; flex-direction: column; align-items: center; padding: 50px 0 150px; gap: 50px; }
        .tile { background: var(--glass); backdrop-filter: blur(30px); border: 2px solid var(--neon); border-radius: 35px; padding: 35px; width: 92vw; max-width: 500px; text-align: center; }
        
        /* BITCOIN SEKTION */
        .qr-box { background: #fff; padding: 20px; border-radius: 25px; display: inline-block; margin-top: 20px; border: 4px solid var(--gold); }
        .rank-row { display: flex; justify-content: space-between; padding: 14px; margin-bottom: 12px; border-radius: 15px; background: rgba(0,0,0,0.6); border: 1px solid var(--neon); }
    </style>
</head>
<body>

<div id="main-bg"></div>

<header><h1 id="main-title">DOGGYCO</h1></header>

<div id="game-view">
    <div id="game-wrap">
        <div id="ui-header">
            <div id="energy-bar-wrap"><div id="energy-fill"></div></div>
            <div id="hud-row">
                <div class="hud-icon">❤️❤️❤️</div>
                <div style="color:var(--gold)">LVL: 1</div>
                <div style="color:var(--neon)">⏳ 30s</div>
                <div>🏆 0</div>
            </div>
        </div>
        
        <canvas id="game-canvas"></canvas>

        <div id="controls">
            <div class="btn-arrow" onmousedown="mLeft()" ontouchstart="mLeft()">◀</div>
            <div class="btn-arrow" onmousedown="mRight()" ontouchstart="mRight()">▶</div>
        </div>

        <div id="start-screen" class="overlay">
            <h2 style="color:var(--gold); margin-bottom:20px;">START MISSION</h2>
            <input type="text" id="pName" placeholder="DEIN NAME" style="padding:15px; border-radius:15px; margin-bottom:20px; text-align:center; font-family:'Orbitron'; outline:none; border:2px solid var(--neon); background:rgba(0,0,0,0.5); color:#fff;">
            <button class="neon-btn" onclick="startGame(false)">START DOGGYCO</button>
            <button class="neon-btn cat-btn" onclick="startGame(true)">START CATS WORLD</button>
        </div>

        <div id="end-screen" class="overlay" style="display:none;">
            <h1 id="f-score" style="font-size: 60px; color: var(--gold);">0</h1>
            <button class="neon-btn" onclick="location.reload()">NEUSTART</button>
        </div>
    </div>
</div>

<div class="content-area">
    <div class="tile">
        <h3 style="color:var(--gold); margin-bottom:25px;">🏆 WELTRANGLISTE</h3>
        <div id="leaderboard">Ranking lädt...</div>
    </div>

    <div class="tile" style="border-color: var(--gold);">
        <h3 style="color:var(--gold); margin-bottom:15px;">💎 SUPPORT UNS</h3>
        <p style="font-size:13px;">Unterstütze die Entwicklung mit Bitcoin!</p>
        <div class="qr-box">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=BITCOIN_ADRESSE_HIER" width="160" height="160">
            <p style="color:#000; font-size:12px; margin-top:10px; font-weight:bold;">BTC WALLET</p>
        </div>
        <p style="font-size:10px; margin-top:20px; color:var(--gold); word-break: break-all;">Adresse: BITCOIN_ADRESSE_TEXT_HIER</p>
    </div>

    <div class="tile" style="border-color: #444; opacity: 0.8;">
        <p style="font-size:11px; color:#aaa;">© 2026 DOGGYCO & CATS WORLD. Privates Projekt. Keine kommerzielle Haftung.</p>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://ovmsstdroxkinisqwlhw.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92bXNzdGRyb3hraW5pc3F3bGh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMzM3OTEsImV4cCI6MjA4NzgwOTc5MX0.SOsi-Aeb_wSp40_TTymaiiU0Kn_3rhG_LnvLjJP66z8';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const canvas = document.getElementById("game-canvas");
const ctx = canvas.getContext("2d");
const W = 400; 
let H, dogX, targetX, dogLane = 2, active = false, isCat = false;
let items = [], spiders = [], floaters = [], lastTime = 0;
let score = 0, hearts = 3, energy = 100, level = 1, timeLeft = 30;
let dogShake = 0, jumpY = 0;

// AUDIO SETUP
let audioCtx;
let bgMusic = new Audio('musik.mp3'); 
bgMusic.loop = true;

function init() {
    canvas.width = W; 
    H = canvas.height = document.getElementById("game-wrap").offsetHeight;
    targetX = (dogLane * 80) + 40; dogX = targetX;
}

function playSfx(f, t, d, v=0.1) {
    if(!audioCtx) return;
    let o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
    g.gain.setValueAtTime(v, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + d);
}

function startGame(catMode) {
    if(!document.getElementById("pName").value) return;
    isCat = catMode;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    if(isCat) {
        document.getElementById("main-bg").style.filter = "hue-rotate(280deg) brightness(0.6)";
        document.getElementById("game-wrap").classList.add("cat-theme");
        document.getElementById("main-title").innerText = "CATS WORLD";
        document.getElementById("main-title").style.color = "var(--cat-purple)";
    }
    
    document.getElementById("start-screen").style.display = "none";
    bgMusic.play().catch(() => {});
    active = true; lastTime = performance.now();
    requestAnimationFrame(loop);
}

// STEUERUNG OHNE SPRINGEN (Lane Lock)
function mLeft() { if(active && dogLane > 0 && Math.abs(dogX - targetX) < 5) { dogLane--; targetX = (dogLane * 80) + 40; } }
function mRight() { if(active && dogLane < 4 && Math.abs(dogX - targetX) < 5) { dogLane++; targetX = (dogLane * 80) + 40; } }

window.addEventListener('keydown', e => {
    if(e.key === "Enter" && !active) startGame(false);
    if(!active) return;
    if(e.key === "ArrowLeft") mLeft();
    if(e.key === "ArrowRight") mRight();
});

function loop(t) {
    if(!active) return;
    let dt = (t - lastTime) / 1000; lastTime = t;
    if(dt > 0.1) dt = 0.016;
    ctx.clearRect(0,0,W,H);

    // LOGIK: Level & Timer
    timeLeft -= dt; energy -= (4 + level * 0.45) * dt;
    if(timeLeft <= 0) { level++; timeLeft = 30; energy = Math.min(100, energy + 20); playSfx(800, 'sine', 0.5); }
    
    // HUD UPDATE
    document.getElementById("energy-fill").style.width = Math.max(0, energy) + "%";
    document.getElementById("score-display").innerText = "🏆 " + Math.floor(score);
    // Hier HUD Text-Elemente direkt aktualisieren (Referenz zum Bild)
    
    if(energy <= 0 || hearts <= 0) { endGame(); return; }

    // GEGNER (Schlange Körper-Design)
    if(spiders.length < 2 && Math.random() < 0.012) spiders.push({lane: Math.floor(Math.random()*5), y: 0});
    spiders.forEach((s, i) => {
        s.y += (185 + level * 15) * dt;
        let sx = (s.lane * 80) + 40;
        if(isCat) {
            ctx.fillStyle = "rgba(0, 255, 0, 0.8)";
            ctx.fillRect(sx - 6, 0, 12, s.y); 
            ctx.font = "42px Arial"; ctx.fillText("🐍", sx, s.y + 25);
        } else {
            ctx.font = "40px Arial"; ctx.fillText("🕷️", sx, s.y + 25);
        }
        if(s.lane === dogLane && s.y > H-180 && s.y < H-80) { energy -= 30; dogShake = 20; playSfx(100, 'sawtooth', 0.3); spiders.splice(i,1); }
        if(s.y > H) spiders.splice(i,1);
    });

    // ITEMS
    if(Math.random() < 0.02) items.push({lane: Math.floor(Math.random()*5), y: -60, type: isCat?'🍼':'🦴'});
    items.forEach((it, i) => {
        it.y += (260 + level * 10) * dt; let ix = (it.lane * 80) + 40;
        ctx.font = "42px Arial"; ctx.textAlign = "center"; ctx.fillText(it.type, ix, it.y);
        if(it.lane === dogLane && it.y > H-160 && it.y < H-80) {
            score += 25; energy = Math.min(100, energy + 12); jumpY = -15; 
            playSfx(isCat ? 1100 : 600, 'sine', 0.1);
            floaters.push({x: ix, y: it.y, txt: "+25", life: 1});
            items.splice(i, 1);
        }
        if(it.y > H) items.splice(i,1);
    });

    // CHARACTER (Absolut Zentriert Mitte-Mitte)
    dogX += (targetX - dogX) * 0.22;
    ctx.font = "80px Arial"; ctx.textAlign = "center"; 
    ctx.fillText(isCat ? "🐱" : "🐶", dogX + (Math.random()-0.5)*dogShake, H - 110 + jumpY);
    if(dogShake > 0) dogShake *= 0.9; if(jumpY < 0) jumpY += 1.5; else jumpY = 0;

    // FLOATERS (Punkte Animation)
    floaters.forEach((f, i) => { f.y -= 2; f.life -= dt; ctx.globalAlpha = f.life; ctx.fillStyle = "var(--green)"; ctx.font = "bold 24px Orbitron"; ctx.fillText(f.txt, f.x, f.y); if(f.life <= 0) floaters.splice(i,1); });
    ctx.globalAlpha = 1;

    requestAnimationFrame(loop);
}

function endGame() { active = false; bgMusic.pause(); document.getElementById("end-screen").style.display = "flex"; saveToDb(); }

async function saveToDb() {
    const n = document.getElementById("pName").value;
    await supabaseClient.from('leaderboard').insert([{ n, s: Math.floor(score) }]);
    updateRanks();
}

async function updateRanks() {
    try {
        let { data } = await supabaseClient.from('leaderboard').select('*').order('s', { ascending: false }).limit(5);
        if(data) document.getElementById("leaderboard").innerHTML = data.map((x, i) => {
            let m = i===0?'🥇 Gold':(i===1?'🥈 Silber':(i===2?'🥉 Bronze':(i===3?'🧱 Kupfer':'🪵 Holz')));
            return `<div class="rank-row"><span>${m}: ${x.n}</span><span>${x.s}</span></div>`;
        }).join('');
    } catch(e) {}
}
window.onload = () => { init(); updateRanks(); };
</script>
</body>
</html>
