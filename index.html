<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoggyCo - Ultimate Edition</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.15);
            --border: rgba(255, 255, 255, 0.3);
            --blur: blur(15px);
            --font-main: 'Segoe UI', Roboto, sans-serif;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: var(--font-main);
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
        }

        /* --- STARTSEITE / UI --- */
        #ui-layer {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; z-index: 100;
            background: rgba(0, 0, 0, 0.4);
        }

        .glass-box {
            background: var(--glass);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            margin: 10px;
            width: 320px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }

        input#player-name {
            width: 80%; background: rgba(255,255,255,0.1);
            border: 1px solid var(--border); border-radius: 10px;
            padding: 12px; color: white; text-align: center;
            font-size: 1.1rem; outline: none;
        }

        .small-row { display: flex; gap: 15px; width: 370px; }
        .small-box { flex: 1; padding: 15px; font-size: 0.9rem; cursor: pointer; }

        .start-btn {
            background: rgba(46, 204, 113, 0.4);
            font-weight: bold; font-size: 1.4rem; cursor: pointer;
            border: 2px solid rgba(46, 204, 113, 0.6);
        }
        .start-btn:hover { background: rgba(46, 204, 113, 0.7); }

        /* --- SPIEL-EFFEKTE --- */
        .falling-obj {
            position: absolute; width: 40px; height: 40px;
            border-radius: 50%; cursor: pointer; z-index: 10;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .floating-score {
            position: absolute; font-size: 1.8rem; font-weight: 800;
            pointer-events: none; z-index: 110;
            animation: moveUpFade 1.2s ease-out forwards;
        }

        @keyframes moveUpFade {
            0% { transform: translateY(0); opacity: 1; scale: 1; }
            100% { transform: translateY(-120px); opacity: 0; scale: 1.5; }
        }

        /* --- HARMONISCHER BLAUER PFEIL --- */
        .trail-arrow {
            position: absolute; width: 0; height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 20px solid #00d4ff;
            pointer-events: none; z-index: 5;
            opacity: 0.6; animation: fadeOut 0.6s linear forwards;
        }

        @keyframes fadeOut { to { opacity: 0; transform: scale(0.5); } }

        #score-display {
            position: absolute; top: 20px; left: 20px; font-size: 2rem;
            font-weight: bold; text-shadow: 2px 2px 10px black; z-index: 200;
            display: none;
        }
    </style>
</head>
<body>

    <div id="score-display">Punkte: 0</div>

    <div id="ui-layer">
        <div class="glass-box">
            <h2 style="margin-top:0">Willkommen</h2>
            <input type="text" id="player-name" placeholder="Dein Name...">
        </div>

        <button class="glass-box start-btn" onclick="initGame()">JETZT SPIELEN</button>

        <div class="small-row">
            <div class="glass-box small-box">🏆 Global Rank</div>
            <div class="glass-box small-box">🛠️ Support</div>
        </div>

        <div class="glass-box" style="width: 340px;">
            <h4 style="margin:5px">Institution</h4>
            <p style="font-size:0.8rem; opacity:0.8">Offizielle DoggyCo Bildungsplattform</p>
            <hr style="border:0.5px solid var(--border); margin:15px 0;">
            <p style="font-size:0.7rem; cursor:pointer; text-decoration: underline;">Rechtliche Linien & Impressum</p>
        </div>
    </div>

    <script>
        let score = 0;
        let gameActive = false;

        function initGame() {
            document.getElementById('ui-layer').style.display = 'none';
            document.getElementById('score-display').style.display = 'block';
            gameActive = true;
            spawnLoop();
        }

        // 1. Harmonische Bewegung mit blauen Pfeilen
        document.addEventListener('mousemove', (e) => {
            if(!gameActive) return;
            createTrail(e.pageX, e.pageY);
        });

        function createTrail(x, y) {
            const arrow = document.createElement('div');
            arrow.className = 'trail-arrow';
            arrow.style.left = (x - 10) + 'px';
            arrow.style.top = (y - 10) + 'px';
            
            // Pfeil in Bewegungsrichtung drehen (simpel)
            arrow.style.transform = `rotate(${Math.random() * 360}deg)`;
            
            document.body.appendChild(arrow);
            setTimeout(() => arrow.remove(), 600);
        }

        // 2. Fallende Objekte (Punkte)
        function spawnLoop() {
            if(!gameActive) return;
            createFallingObject();
            setTimeout(spawnLoop, 800 + Math.random() * 1000);
        }

        function createFallingObject() {
            const obj = document.createElement('div');
            const isGood = Math.random() > 0.3;
            obj.className = 'falling-obj';
            obj.style.background = isGood ? 'radial-gradient(circle, #2ecc71, #27ae60)' : 'radial-gradient(circle, #e74c3c, #c0392b)';
            obj.style.left = Math.random() * (window.innerWidth - 50) + 'px';
            obj.style.top = '-50px';
            
            document.body.appendChild(obj);

            let pos = -50;
            const speed = 3 + Math.random() * 4;

            const fall = setInterval(() => {
                pos += speed;
                obj.style.top = pos + 'px';
                
                if (pos > window.innerHeight) {
                    clearInterval(fall);
                    obj.remove();
                }
            }, 20);

            obj.onclick = (e) => {
                clearInterval(fall);
                const points = isGood ? 10 : -5;
                score += points;
                document.getElementById('score-display').innerText = "Punkte: " + score;
                
                showFloatingText(e.pageX, e.pageY, (points > 0 ? "+" : "") + points, isGood ? "#2ecc71" : "#ff4d4d");
                obj.remove();
            };
        }

        // 3. Aufsteigende Punkt-Animation
        function showFloatingText(x, y, txt, color) {
            const el = document.createElement('div');
            el.className = 'floating-score';
            el.innerText = txt;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            el.style.color = color;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1200);
        }
    </script>
</body>
</html>
