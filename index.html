<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOGGYCO ULTIMATE PRO - V124 EMERGENCY START</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { 
            --neon: #00f2ff; --green: #00ff88; --red: #ff3131; --gold: #ffd700; 
            --glass: rgba(0, 0, 0, 0.9);
            --milky: rgba(255, 255, 255, 0.15);
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { background: #000; font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; overflow: hidden; width: 100vw; height: 100vh; }
        
        #main-bg { position: fixed; inset: 0; background-image: url('hintergrund.png'); background-size: 100% 100%; z-index: -2; }

        .wrapper { width: 100%; max-width: 500px; padding: 15px; display: flex; flex-direction: column; gap: 20px; margin: 0 auto; z-index: 100; position: relative; }

        .frame { background: var(--glass); backdrop-filter: blur(25px); border: 3px solid var(--neon); border-radius: 40px; text-align: center; }
        .f1 { padding: 60px 30px; min-height: 500px; display: flex; flex-direction: column; justify-content: center; box-shadow: 0 0 40px var(--neon); background: var(--milky); }
        .f2, .f3, .f4 { padding: 25px; margin-top: 10px; border: 2px solid var(--neon); }

        header h1 { font-family: 'Orbitron'; color: var(--neon); text-align: center; padding: 20px; font-size: 40px; text-shadow: 0 0 15px var(--neon); }

        #pName { width: 100%; padding: 20px; background: #000; border: 3px solid var(--neon); border-radius: 20px; color: #fff; text-align: center; font-family: 'Orbitron'; font-size: 22px; margin-bottom: 25px; }

        .btn { width: 100%; padding: 20px; margin: 10px 0; border: none; border-radius: 22px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; font-size: 16px; display: block; position: relative; z-index: 200; }
        
        .b-dog { background: var(--neon); color: #000; }
        .b-cat { background: #bc13fe; color: #fff; }

        /* GAME OVERLAY */
        #game-view { position: fixed; inset: 0; background: #000; z-index: 99999; display: none; flex-direction: column; align-items: center; justify-content: flex-start; }
        #hud { width: 100%; display: flex; justify-content: space-around; padding: 20px; font-family: 'Orbitron'; font-size: 18px; color: #fff; background: rgba(0,0,0,0.5); }
        
        #game-canvas { background: transparent; display: block; }

        .controls { position: absolute; bottom: 50px; width: 100%; display: flex; justify-content: space-evenly; pointer-events: auto; }
        .arrow { width: 90px; height: 90px; border: 4px solid var(--neon); border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 45px; background: rgba(0,0,0,0.7); cursor: pointer; }
    </style>
</head>
<body onclick="startAudio()">

<div id="main-bg"></div>

<div class="wrapper" id="menu-screen">
    <header><h1>DOGGYCO 🐶</h1></header>
    <div class="frame f1">
        <input type="text" id="pName" placeholder="ENTER NAME" autocomplete="off">
        <button class="btn b-dog" onclick="emergencyLaunch('dog')">DOGGY START</button>
        <button class="btn b-cat" onclick="emergencyLaunch('cat')">CAT WORLD START</button>
    </div>
    <div class="frame f2">
        <h3 style="font-family:'Orbitron'; color:var(--neon);">RANKING</h3>
        <div id="ranking-box" style="font-size:14px; margin-top:10px;">Offline Mode Active</div>
    </div>
</div>

<div id="game-view">
    <div id="hud">
        <div id="h-n">-</div><div id="h-l">❤️❤️❤️</div><div id="h-s">🏆 0</div>
    </div>
    <canvas id="game-canvas"></canvas>
    <div class="controls">
        <div class="arrow" onmousedown="mv(-1)" ontouchstart="mv(-1)"><i class="fas fa-chevron-left"></i></div>
        <div class="arrow" onmousedown="mv(1)" ontouchstart="mv(1)"><i class="fas fa-chevron-right"></i></div>
    </div>
</div>

<audio id="bgMusic" src="musik.mp3" loop></audio>

<script>
// --- BASIS VARIABLEN ---
let isLive = false, score = 0, hearts = 3, lane = 2, lastT = 0;
let charX = 0, targetX = 0, items = [], enemies = [], mode = 'dog';

function startAudio() {
    const a = document.getElementById("bgMusic");
    if(a.paused) a.play().catch(()=>{});
}

// --- DER STARTBEFEHL (DARF NICHT FEHLERSCHLAGEN) ---
function emergencyLaunch(m) {
    const nameVal = document.getElementById("pName").value.trim();
    if(!nameVal) { alert("ENTER NAME!"); return; }

    try {
        // UI UMSCHALTUNG
        mode = m;
        document.getElementById("menu-screen").style.display = "none";
        document.getElementById("game-view").style.display = "flex";
        document.getElementById("h-n").innerText = nameVal.toUpperCase();

        // CANVAS SETUP
        const cvs = document.getElementById("game-canvas");
        cvs.width = window.innerWidth;
        cvs.height = window.innerHeight;
        
        targetX = window.innerWidth / 2;
        charX = targetX;

        // MUSIK
        const audio = document.getElementById("bgMusic");
        if(m === 'cat') audio.src = "cats_world_theme.mp3";
        audio.play().catch(()=>{});

        // ENGINE START
        isLive = true;
        lastT = performance.now();
        requestAnimationFrame(gameLoop);
    } catch (err) {
        alert("CRITICAL ERROR: " + err.message);
    }
}

function mv(dir) {
    lane = Math.max(0, Math.min(4, lane + dir));
    targetX = (window.innerWidth / 5) * lane + (window.innerWidth / 10);
}

function gameLoop(t) {
    if(!isLive) return;
    const cvs = document.getElementById("game-canvas");
    const ctx = cvs.getContext("2d");
    let dt = (t - lastT) / 1000; lastT = t;
    if(dt > 0.1) dt = 0.016;

    ctx.clearRect(0, 0, cvs.width, cvs.height);

    // SPAWNING
    if(Math.random() < 0.03) {
        let l = Math.floor(Math.random()*5);
        items.push({ x: (cvs.width/5)*l + (cvs.width/10), y: -50, lane: l, type: '🦴' });
    }
    if(Math.random() < 0.015) {
        let l = Math.floor(Math.random()*5);
        enemies.push({ x: (cvs.width/5)*l + (cvs.width/10), y: -50, lane: l, type: '🕷️' });
    }

    // ITEMS
    items.forEach((it, i) => {
        it.y += 300 * dt;
        ctx.font = "40px Arial"; ctx.textAlign = "center";
        ctx.fillText(it.type, it.x, it.y);
        if(it.lane === lane && it.y > cvs.height - 150 && it.y < cvs.height - 50) {
            score += 10; items.splice(i, 1);
        }
        if(it.y > cvs.height) items.splice(i, 1);
    });

    // GEGNER
    enemies.forEach((en, i) => {
        en.y += 400 * dt;
        ctx.fillText(en.type, en.x, en.y);
        if(en.lane === lane && en.y > cvs.height - 150 && en.y < cvs.height - 50) {
            hearts--; enemies.splice(i, 1);
        }
        if(en.y > cvs.height) enemies.splice(i, 1);
    });

    // CHARAKTER
    charX += (targetX - charX) * 0.2;
    ctx.font = "80px Arial";
    let icon = mode === 'dog' ? "🐶" : "🐱";
    ctx.fillText(icon, charX, cvs.height - 80);

    // STATS
    document.getElementById("h-s").innerText = "🏆 " + score;
    document.getElementById("h-l").innerText = "❤️".repeat(Math.max(0, hearts));

    if(hearts <= 0) {
        isLive = false; alert("GAME OVER! SCORE: " + score); location.reload();
    }
    requestAnimationFrame(gameLoop);
}
</script>
</body>
</html>
