<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOGGYCO MASTER ELITE - V116 MASTER</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { 
            --neon: #00f2ff; --green: #00ff88; --red: #ff3131; --gold: #ffd700; 
            --silver: #e0e0e0; --rose: #ff66cc; --copper: #cd7f32; --wood: #8b4513;
            --glass-bg: rgba(0, 0, 0, 0.85);
            --milky-transparent: rgba(255, 255, 255, 0.15);
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            background: #000; font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; 
        }
        
        /* Hintergrund 100% gestreckt & sichtbar */
        #main-bg { 
            position: fixed; inset: 0; background-image: url('hintergrund.png'); 
            background-size: 100% 100%; z-index: -2; opacity: 1; transition: 1s ease;
        }

        /* Pulsierender Neon Header */
        header h1 { 
            font-family: 'Orbitron'; font-size: clamp(35px, 12vw, 65px); color: var(--neon); 
            text-align: center; padding: 30px; letter-spacing: 10px; 
            animation: neonBlink 1.5s infinite alternate; 
        }
        @keyframes neonBlink {
            0% { text-shadow: 0 0 20px var(--neon), 0 0 40px var(--neon); opacity: 1; }
            100% { text-shadow: 0 0 10px var(--neon), 0 0 20px var(--neon); opacity: 0.7; }
        }

        .wrapper { width: 100%; max-width: 500px; padding: 15px; display: flex; flex-direction: column; gap: 25px; z-index: 10; }

        /* DIE FÜNF MILCHIGEN RAHMEN */
        .frame { 
            background: var(--glass-bg); backdrop-filter: blur(25px); 
            border: 3px solid var(--neon); border-radius: 40px; 
            text-align: center; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Erster Rahmen massiv gestreckt (Spielfeld-Look) */
        .f1 { 
            padding: 80px 30px; min-height: 600px; display: flex; flex-direction: column; 
            justify-content: center; box-shadow: 0 0 50px var(--neon); 
            background: var(--milky-transparent);
        }
        .f2 { padding: 35px; box-shadow: 0 0 25px var(--neon); }
        .f3 { padding: 30px; box-shadow: 0 0 20px var(--neon); }
        .f4 { padding: 30px; box-shadow: 0 0 10px var(--neon); }
        .f5 { padding: 25px; border-color: rgba(0, 242, 255, 0.2); }

        #pName { 
            width: 100%; padding: 24px; background: rgba(0,0,0,0.7); 
            border: 2px solid var(--neon); border-radius: 20px; color: #fff; 
            text-align: center; font-family: 'Orbitron'; font-size: 26px; margin-bottom: 35px;
            box-shadow: inset 0 0 15px var(--neon);
        }

        /* BUTTONS MIT LIFT-EFFEKT */
        .btn { 
            display: flex; align-items: center; justify-content: center; gap: 15px; 
            width: 100%; padding: 20px; margin: 12px 0; border: none; border-radius: 22px; 
            font-family: 'Orbitron'; font-weight: 900; cursor: pointer; transition: 0.3s; 
            font-size: 16px; position: relative;
        }
        .btn:hover { transform: translateY(-10px); box-shadow: 0 15px 35px rgba(0,0,0,0.8); }
        
        .b-dog { background: var(--neon); color: #000; }
        .b-cat { background: #bc13fe; color: #fff; }
        .b-rab { background: #ff8e00; color: #fff; }

        /* RANGLISTE MEDAILLEN */
        .rank-row { display: flex; justify-content: space-between; padding: 15px 10px; border-bottom: 1px solid rgba(255,255,255,0.1); font-family: 'Orbitron'; font-size: 18px; }
        .r1 { color: var(--gold); } .r2 { color: var(--silver); } .r3 { color: var(--rose); } .r4 { color: var(--copper); } .r5 { color: var(--wood); }

        /* GAME HUD & ENGINE VIEW */
        #game-view { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; align-items: center; }
        #hud { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; font-family: 'Orbitron'; font-size: 18px; z-index: 100; text-shadow: 2px 2px #000; }
        #energy-container { position: absolute; top: 60px; width: 85%; height: 16px; background: #222; border: 2px solid var(--neon); border-radius: 8px; overflow: hidden; }
        #energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--red), var(--gold), var(--green)); transition: width 0.3s; }
        
        .controls { position: absolute; bottom: 50px; width: 100%; display: flex; justify-content: space-evenly; }
        .arrow { width: 95px; height: 95px; border: 4px solid var(--neon); border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 45px; background: rgba(0,0,0,0.6); cursor: pointer; }
    </style>
</head>
<body onclick="handleFirstClick()">

<div id="main-bg"></div>
<header><h1>DOGGYCO 🐶</h1></header>

<div class="wrapper" id="menu-ui">
    <div class="frame f1">
        <input type="text" id="pName" placeholder="PLAYER NAME" maxlength="12" autocomplete="off">
        <button class="btn b-dog" onclick="startMasterEngine('dog')"><i class="fas fa-dog"></i> DOGGY ADVENTURE</button>
        <button class="btn b-cat" onclick="startMasterEngine('cat')"><i class="fas fa-cat"></i> CATS WORLD <i class="fas fa-lock"></i></button>
        <button class="btn b-rab" onclick="startMasterEngine('rab')"><i class="fas fa-rabbit"></i> RABBIT LAND <i class="fas fa-lock"></i></button>
    </div>

    <div class="frame f2">
        <h3 style="font-family:'Orbitron'; color:var(--neon); margin-bottom:15px;"><i class="fas fa-medal"></i> GLOBAL RANKING</h3>
        <div id="ranking-box">Connecting Database...</div>
    </div>

    <div class="frame f3">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <button class="btn" style="background:rgba(0,0,0,0.6); color:#fff; border:1px solid var(--neon);" onclick="window.open('https://tiktok.com')">TIKTOK</button>
            <button class="btn" style="background:#003087; color:#fff;" onclick="window.open('https://paypal.me')">PAYPAL</button>
            <button class="btn" style="background:#f7931a; color:#fff;" onclick="copyBTC()">BTC WALLET</button>
            <button class="btn" style="background:#fff; color:#000;" onclick="alert('QR: bc1qkm22c6w896u9n9cxp8ld049maef4xs5xn060ed')">QR CODE</button>
        </div>
    </div>

    <div class="frame f4">
        <h3 style="font-family:'Orbitron'; color:var(--green);"><i class="fas fa-book-open"></i> GAME MANUAL</h3>
        <p style="font-size:14px; text-align:left; line-height:1.7; margin-top:10px;">
            - USE ARROWS to move between 5 lanes.<br>
            - COLLECT Bones (+15), Meat (+50), Cookies (+120).<br>
            - AVOID Spiders & Police 👮.<br>
            - KEEP energy bar high to survive!
        </p>
    </div>

    <div class="frame f5">
        <p style="font-size:11px; opacity:0.6;">© 2026 DOGGYCO ULTIMATE PRO. V116 MASTER EDITION.</p>
    </div>
</div>

<div id="game-view">
    <div id="hud">
        <div id="stat-n">PLAYER: -</div><div id="stat-l">❤️❤️❤️</div><div id="stat-s">🏆 0</div>
    </div>
    <div id="energy-container"><div id="energy-fill"></div></div>
    <canvas id="game-canvas"></canvas>
    <div class="controls">
        <div class="arrow" onmousedown="moveLane(-1)" ontouchstart="moveLane(-1)"><i class="fas fa-chevron-left"></i></div>
        <div class="arrow" onmousedown="moveLane(1)" ontouchstart="moveLane(1)"><i class="fas fa-chevron-right"></i></div>
    </div>
</div>

<audio id="bgMusic" src="musik.mp3" loop></audio>



<script>
// --- DB SETUP ---
const S_URL = 'https://ovmsstdroxkinisqwlhw.supabase.co';
const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92bXNzdGRyb3hraW5pc3F3bGh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMzM3OTEsImV4cCI6MjA4NzgwOTc5MX0.SOsi-Aeb_wSp40_TTymaiiU0Kn_3rhG_LnvLjJP66z8';
let supabaseClient = null;

// --- GAME STATE ---
let isStarted = false, score = 0, hearts = 3, energy = 100, lane = 2, lastTime = 0;
let charX = 200, targetX = 200, items = [], enemies = [], floaters = [], currentMode = 'dog';

function handleFirstClick() {
    const audio = document.getElementById("bgMusic");
    if(audio.paused) audio.play().catch(() => {});
}

// Initialisiere Supabase sicher im Hintergrund
window.addEventListener('load', () => {
    if(window.supabase) {
        supabaseClient = window.supabase.createClient(S_URL, S_KEY);
        loadRanking();
    }
});

async function loadRanking() {
    if(!supabaseClient) return;
    try {
        const { data } = await supabaseClient.from('leaderboard').select('n, s').order('s', { ascending: false }).limit(5);
        if(data) {
            const cls = ['r1', 'r2', 'r3', 'r4', 'r5'];
            document.getElementById("ranking-box").innerHTML = data.map((r, i) => `
                <div class="rank-row ${cls[i]}"><span>${i+1}. ${r.n}</span><span>${r.s} pts</span></div>
            `).join('');
        }
    } catch(e) { console.log("DB sync delayed."); }
}

// DER MASTER START-BEFEHL (SOFORT!)
function startMasterEngine(m) {
    const name = document.getElementById("pName").value.trim();
    if(!name) return alert("PLEASE ENTER YOUR NAME!");
    
    // UI-Wechsel sofort ausführen
    currentMode = m;
    document.getElementById("menu-ui").style.display = "none";
    document.getElementById("game-view").style.display = "flex";
    document.getElementById("stat-n").innerText = "PRO: " + name.toUpperCase();
    
    const bg = document.getElementById("main-bg");
    const audio = document.getElementById("bgMusic");
    
    if(m === 'cat') {
        bg.style.backgroundImage = "url('forest_background.png')";
        bg.style.filter = "hue-rotate(280deg) brightness(0.8)";
        audio.src = "cats_world_theme.mp3";
    }
    audio.play().catch(() => {});
    
    // ENGINE START
    isStarted = true;
    lastTime = performance.now();
    const cvs = document.getElementById("game-canvas");
    cvs.width = 400; 
    cvs.height = window.innerHeight;
    
    requestAnimationFrame(gameEngineLoop);
}

function moveLane(dir) { 
    lane = Math.max(0, Math.min(4, lane + dir)); 
    targetX = lane * 80 + 40; 
}

function gameEngineLoop(t) {
    if(!isStarted) return;
    const ctx = document.getElementById("game-canvas").getContext("2d");
    const cvs = document.getElementById("game-canvas");
    let dt = (t - lastTime) / 1000; lastTime = t;
    if(dt > 0.1) dt = 0.016;

    ctx.clearRect(0,0,400,cvs.height);

    // Energie-Logik
    energy -= 5.5 * dt;
    document.getElementById("energy-fill").style.width = Math.max(0, energy) + "%";

    // SPAWNING (Item-Logik aus der stabilen Version)
    if(Math.random() < 0.04) {
        let l = Math.floor(Math.random()*5);
        let r = Math.random();
        items.push({ x: l*80+40, y: -60, lane: l, type: r < 0.7 ? '🦴' : (r < 0.9 ? '🥩' : '🍪') });
    }
    if(Math.random() < 0.018) {
        enemies.push({ x: Math.floor(Math.random()*5)*80+40, y: -60, lane: Math.floor(Math.random()*5), type: Math.random() < 0.6 ? '🕷️' : '👮' });
    }

    // ITEMS VERARBEITEN
    items.forEach((it, i) => {
        it.y += (240 + score/18) * dt;
        ctx.font = "50px Arial"; ctx.textAlign = "center";
        ctx.fillText(it.type, it.x, it.y);
        if(it.lane === lane && it.y > cvs.height - 180 && it.y < cvs.height - 80) {
            let pts = it.type === '🦴' ? 15 : (it.type === '🥩' ? 50 : 120);
            score += pts; energy = Math.min(100, energy + 20);
            floaters.push({ x: it.x, y: it.y, txt: "+" + pts, a: 1, c: "0, 255, 136" });
            items.splice(i,1);
        }
        if(it.y > cvs.height) items.splice(i,1);
    });

    // GEGNER VERARBEITEN
    enemies.forEach((en, i) => {
        en.y += (350 + score/15) * dt;
        ctx.fillText(en.type, en.x, en.y);
        if(en.lane === lane && en.y > cvs.height - 180 && en.y < cvs.height - 80) {
            hearts--; energy -= 25;
            floaters.push({ x: en.x, y: en.y, txt: "-LIFE", a: 1, c: "255, 49, 49" });
            enemies.splice(i,1);
        }
        if(en.y > cvs.height) enemies.splice(i,1);
    });

    // SCHWEBENDE TEXTE
    floaters.forEach((f, i) => {
        f.y -= 2.5; f.a -= 0.025;
        ctx.fillStyle = `rgba(${f.c}, ${f.a})`;
        ctx.font = "bold 30px Orbitron";
        ctx.fillText(f.txt, f.x, f.y);
        if(f.a <= 0) floaters.splice(i,1);
    });

    // CHARAKTER ZEICHNEN & ANIMIEREN
    charX += (targetX - charX) * 0.22;
    ctx.font = "95px Arial";
    let icon = currentMode === 'dog' ? "🐶" : (currentMode === 'cat' ? "🐱" : "🐰");
    ctx.fillText(icon, charX, cvs.height - 130);

    // HUD AKTUALISIEREN
    document.getElementById("stat-s").innerText = "🏆 " + Math.floor(score);
    document.getElementById("stat-l").innerText = "❤️".repeat(Math.max(0, hearts));

    // GAME OVER LOGIK
    if(hearts <= 0 || energy <= 0) {
        if(supabaseClient) supabaseClient.from('leaderboard').insert([{ n: document.getElementById("pName").value, s: Math.floor(score) }]);
        isStarted = false; alert("GAME OVER! SCORE: " + Math.floor(score)); location.reload();
    }
    requestAnimationFrame(gameEngineLoop);
}

function copyBTC() {
    navigator.clipboard.writeText('bc1qkm22c6w896u9n9cxp8ld049maef4xs5xn060ed');
    alert("BTC ADDRESS COPIED!");
}
</script>
</body>
</html>
