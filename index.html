<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unity-Style Web Game</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.15);
            --border: rgba(255, 255, 255, 0.3);
            --blur: blur(12px);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle, #1a2a6c, #b21f1f, #fdbb2d);
            background-size: cover; color: white;
        }

        /* --- UI DESIGN (MILCHGLAS) --- */
        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; z-index: 10; pointer-events: none;
        }

        .glass-box {
            background: var(--glass);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            margin: 10px;
            width: 300px;
            text-align: center;
            pointer-events: auto;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        input {
            background: rgba(255,255,255,0.1); border: 1px solid var(--border);
            color: white; padding: 8px; border-radius: 5px; text-align: center; width: 80%;
        }

        .btn-row { display: flex; gap: 10px; width: 340px; justify-content: center; }
        .small-box { flex: 1; font-size: 0.8rem; cursor: pointer; }

        /* --- SPIEL-ELEMENTE --- */
        .falling-item {
            position: absolute; width: 30px; height: 30px; border-radius: 50%;
            cursor: pointer; z-index: 5;
        }

        .floating-point {
            position: absolute; font-weight: bold; font-size: 1.5rem;
            pointer-events: none; animation: floatUp 1s ease-out forwards;
            z-index: 100;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        .blue-arrow {
            position: absolute; width: 20px; height: 20px;
            background: #00d4ff; clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            opacity: 0.6; pointer-events: none; transition: transform 0.2s ease-out;
        }
    </style>
</head>
<body>

    <div class="ui-layer" id="menu">
        <div class="glass-box">
            <h3 style="margin-top:0">Spielerprofil</h3>
            <input type="text" placeholder="Dein Name...">
        </div>

        <div class="btn-row">
            <div class="glass-box small-box">🏆 Global Rank</div>
            <div class="glass-box small-box">🛠️ Support</div>
        </div>

        <div class="glass-box">
            <h4 style="margin:0">Institution</h4>
            <p style="font-size:0.8rem">Beispiel Akademie XY</p>
            <hr style="border:0.5px solid var(--border)">
            <p style="font-size:0.7rem; cursor:pointer">Rechtliche Linien & Impressum</p>
        </div>
        
        <button class="glass-box" style="background:rgba(76, 175, 80, 0.5); cursor:pointer" onclick="startGame()">
            SPIEL STARTEN
        </button>
    </div>

    <script>
        function startGame() {
            document.getElementById('menu').style.display = 'none';
            setInterval(spawnItem, 1000);
        }

        // 1. Blaue Pfeile (Steuerung/Bewegung)
        document.addEventListener('mousemove', (e) => {
            const arrow = document.createElement('div');
            arrow.className = 'blue-arrow';
            arrow.style.left = e.pageX + 'px';
            arrow.style.top = e.pageY + 'px';
            document.body.appendChild(arrow);
            
            // Pfeil verschwindet nach 0.5s
            setTimeout(() => arrow.remove(), 500);
        });

        // 2. Fallende Objekte
        function spawnItem() {
            const item = document.createElement('div');
            const isGood = Math.random() > 0.3;
            item.className = 'falling-item';
            item.style.backgroundColor = isGood ? '#4CAF50' : '#FF5252';
            item.style.left = Math.random() * window.innerWidth + 'px';
            item.style.top = '-50px';
            
            document.body.appendChild(item);

            // Fall-Animation
            let pos = -50;
            const fallSpeed = 2 + Math.random() * 3;
            const id = setInterval(() => {
                pos += fallSpeed;
                item.style.top = pos + 'px';
                if (pos > window.innerHeight) {
                    clearInterval(id);
                    item.remove();
                }
            }, 20);

            // 3. Punkte aufsteigen lassen bei Klick
            item.onclick = (e) => {
                e.stopPropagation();
                showPoints(e.pageX, e.pageY, isGood ? '+10' : '-5', isGood ? '#4CAF50' : '#FF5252');
                clearInterval(id);
                item.remove();
            };
        }

        function showPoints(x, y, text, color) {
            const p = document.createElement('div');
            p.className = 'floating-point';
            p.innerText = text;
            p.style.left = x + 'px';
            p.style.top = y + 'px';
            p.style.color = color;
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 1000);
        }
    </script>
</body>
</html>
