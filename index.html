<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOGGYCO MISSION - V330 ULTIMATE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --neon: #00f2ff; --green: #00ff88; --red: #ff3131; --gold: #ffd700; 
            --blue-glow: #0070ff; --cat-purple: #bc13fe; --rabbit-orange: #ff8c00;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; outline: none; border: none; }
        
        body { 
            background: #000; font-family: 'Orbitron', sans-serif; color: #fff; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-x: hidden; scroll-behavior: smooth;
        }

        #main-bg {
            position: fixed; inset: 0;
            background: url('hintergrund.png') center/cover no-repeat #000;
            filter: brightness(0.75); z-index: -10;
        }

        @keyframes neonPulse { 
            0%, 100% { border-color: var(--neon); box-shadow: 0 0 15px var(--neon); } 
            50% { border-color: #fff; box-shadow: 0 0 35px var(--neon); } 
        }

        header { padding: 25px 0; text-align: center; width: 100%; z-index: 10; }
        header h1 { 
            font-size: clamp(24px, 8vw, 45px); color: var(--neon); 
            text-shadow: 0 0 20px var(--neon); text-transform: uppercase;
        }

        /* SPIELFELD - SYMMETRISCH L/R */
        #game-view { width: 100%; display: flex; justify-content: center; padding: 10px; z-index: 5; }
        #game-wrap { 
            position:relative; width: 400px; height: 620px; 
            background: rgba(0,0,0,0.6); border: 4px solid var(--neon); border-radius: 50px; 
            overflow: hidden; animation: neonPulse 3s infinite; transition: 0.5s;
        }

        /* HUD */
        #ui-header { position: absolute; top: 12px; width: 100%; z-index: 200; pointer-events: none; }
        #energy-bar-wrap { width: 85%; height: 20px; margin: 0 auto 10px; background: rgba(0,0,0,0.8); border: 2px solid #fff; border-radius: 10px; overflow: hidden; }
        #energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--red), var(--gold), var(--green)); transition: width 0.3s; }
        #hud-main { 
            display: flex; justify-content: space-between; align-items: center; width: 92%; margin: 0 auto; 
            font-size: 11px; font-weight: 900; background: rgba(0,0,0,0.7); padding: 8px 12px; 
            border-radius: 15px; border: 1px solid var(--neon); backdrop-filter: blur(10px);
        }

        canvas { position: absolute; inset: 0; z-index: 50; display: block; }

        /* KACHELN (PANELS) */
        .glass-panel { 
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 3px solid var(--neon); border-radius: 35px; padding: 25px; 
            width: 95vw; max-width: 400px; margin: 15px 0; text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); animation: neonPulse 5s infinite;
        }

        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; background: rgba(0,0,0,0.85); border-radius: 46px; padding: 25px; }
        .neon-btn { padding: 16px; background: var(--green); color: #000; border-radius: 40px; font-weight: 900; cursor: pointer; font-family: 'Orbitron'; margin: 10px 0; width: 100%; box-shadow: 0 0 15px var(--green); transition: 0.3s; font-size: 14px; text-transform: uppercase; }

        /* STEUERUNG */
        #controls { position: absolute; bottom: 25px; width: 100%; display: flex; justify-content: space-between; padding: 0 45px; z-index: 300; }
        .btn-arrow { width: 85px; height: 85px; background: rgba(255,255,255,0.05); border: 3.5px solid var(--neon); border-radius: 50%; color: #fff; font-size: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; }
        .btn-arrow:active { background: var(--blue-glow); border-color: #fff; box-shadow: 0 0 40px var(--blue-glow); }

        input#pName { width: 100%; padding: 18px; border-radius: 15px; border: 3px solid var(--neon); background: #000; color: #fff; text-align: center; font-family: 'Orbitron'; margin-bottom: 15px; font-size: 18px; }
        .rank-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid var(--neon); font-size: 14px; }
    </style>
</head>
<body>

<div id="main-bg"></div>
<header><h1 id="main-title">🐶 DOGGYCO MISSION</h1></header>

<div id="game-view">
    <div id="game-wrap">
        <div id="ui-header">
            <div id="energy-bar-wrap"><div id="energy-fill"></div></div>
            <div id="hud-main">
                <div id="hearts-display">❤️❤️❤️</div>
                <div style="color:var(--gold)">⏱️<span id="timer-display">30</span></div>
                <div style="color:var(--neon)">🏆<span id="score-display">0</span></div>
                <div style="background:#fff; color:#000; padding:1px 5px; border-radius:4px;">L<span id="lvl-num">1</span></div>
            </div>
        </div>
        <canvas id="game-canvas"></canvas>
        <div id="controls">
            <div class="btn-arrow" onmousedown="mLeft(event)" ontouchstart="mLeft(event)">◀</div>
            <div class="btn-arrow" onmousedown="mRight(event)" ontouchstart="mRight(event)">▶</div>
        </div>

        <div id="name-screen" class="overlay">
            <div class="glass-panel" style="border-width: 4px; border-radius: 40px;">
                <div style="font-size: 50px; margin-bottom: 15px;">🐾</div>
                <input type="text" id="pName" placeholder="DEIN AGENTEN-NAME">
                <button class="neon-btn" onclick="toMenu()">BESTÄTIGEN</button>
            </div>
        </div>

        <div id="start-screen" class="overlay" style="display:none;">
            <div class="glass-panel" style="border:none; background:none; box-shadow:none;">
                <button class="neon-btn" onclick="startGame('dog')">DOGGY MISSION</button>
                <button class="neon-btn" style="background:var(--cat-purple); color:#fff;" onclick="startGame('cat')">CATS WORLD</button>
                <button class="neon-btn" style="background:var(--rabbit-orange); color:#fff;" onclick="startGame('rabbit')">RABBIT FOREST</button>
            </div>
        </div>

        <div id="end-screen" class="overlay" style="display:none;">
            <h1 id="f-agent" style="color:#fff; font-size:26px; margin-bottom:10px;">AGENT ...</h1>
            <h1 id="f-score" style="font-size: 65px; color: var(--gold); margin-bottom:20px;">0</h1>
            <button class="neon-btn" onclick="location.reload()">NEUSTART</button>
        </div>
    </div>
</div>

<div class="glass-panel">
    <h3 style="color:var(--gold); margin-bottom:12px;">🏆 GLOBAL RANKING</h3>
    <div id="leaderboard">Lade Highscores...</div>
</div>

<div class="glass-panel">
    <h3 style="color:var(--green); margin-bottom:15px;">💎 SUPPORT PROJECT</h3>
    <button class="neon-btn" style="background:#ff0050; color:#fff;" onclick="window.open('https://tiktok.com')">TikTok</button>
    <div style="background:#fff; padding:15px; border-radius:20px; display:inline-block; margin-top:10px; border:4px solid var(--gold);">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=BITCOIN_WALLET" width="140">
        <p style="color:#000; font-size:10px; font-weight:bold; margin-top:5px;">SCAN BTC QR</p>
    </div>
</div>

<div class="glass-panel">
    <h3 style="color:var(--neon); margin-bottom:10px;">📖 ANLEITUNG</h3>
    <p style="font-size:12px; text-align:left; line-height:1.6;">
        Sammle Items für grüne Pluspunkte (steigen schräg auf). <br>
        Der Teufel 😈 kostet 1 Herz. <br>
        Seile ziehen Energie ab. Alle 30s Level-Up.
    </p>
</div>

<script>
const canvas = document.getElementById("game-canvas");
const ctx = canvas.getContext("2d");
let W = 400, H = 600;
let dogLane = 2, lanes = [40, 120, 200, 280, 360]; // FIXIERTE BAHNEN FÜR SYMMETRIE
let dogX = lanes[2], targetX = lanes[2], active = false, mode = 'dog', pName = "AGENT";
let items = [], spiders = [], floaters = [], clouds = [], lastTime = 0;
let score = 0, hearts = 3, energy = 100, level = 1, timeLeft = 30, shake = 0;
let audioCtx;

function init() { 
    canvas.width = W; canvas.height = H; 
    for(let i=0; i<3; i++) clouds.push({x: Math.random()*W, y: 100+Math.random()*80, s: 0.3+Math.random()*0.4});
}

function toMenu() {
    let inp = document.getElementById("pName").value;
    if(inp) {
        pName = inp.toUpperCase();
        document.getElementById("name-screen").style.display = "none";
        document.getElementById("start-screen").style.display = "flex";
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
    }
}

function startGame(m) {
    mode = m;
    const wrap = document.getElementById("game-wrap");
    document.getElementById("start-screen").style.display = "none";
    
    let color = (mode==='cat') ? 'var(--cat-purple)' : (mode==='rabbit' ? 'var(--rabbit-orange)' : 'var(--neon)');
    document.documentElement.style.setProperty('--neon', color);
    document.getElementById("main-title").style.color = color;
    document.getElementById("main-title").innerText = "🐶 " + mode.toUpperCase() + " MISSION";

    let music = new Audio(mode + '.mp3');
    music.loop = true; music.volume = 0.2;
    music.play().catch(() => console.log("Musik fehlt, Spiel läuft lautlos."));

    spiders = [{lane: 1, y: 0, d: 1}, {lane: 3, y: 150, d: 1}];
    active = true; lastTime = performance.now();
    requestAnimationFrame(loop);
}

function mLeft(e) { if(e) e.preventDefault(); if(active && dogLane > 0) { dogLane--; targetX = lanes[dogLane]; } }
function mRight(e) { if(e) e.preventDefault(); if(active && dogLane < 4) { dogLane++; targetX = lanes[dogLane]; } }

function loop(t) {
    if(!active) return;
    let dt = (t - lastTime) / 1000; lastTime = t;
    ctx.clearRect(0,0,W,H);

    timeLeft -= dt; let mult = Math.pow(1.1, level-1); energy -= (4.8 * mult) * dt;
    if(timeLeft <= 0) { level++; timeLeft = 30; energy = 100; }

    document.getElementById("timer-display").innerText = Math.ceil(timeLeft);
    document.getElementById("score-display").innerText = Math.floor(score);
    document.getElementById("lvl-num").innerText = level;
    document.getElementById("hearts-display").innerText = "❤️".repeat(Math.max(0, hearts));
    document.getElementById("energy-fill").style.width = Math.max(0, energy) + "%";

    if(energy <= 0 || hearts <= 0) {
        active = false;
        document.getElementById("end-screen").style.display = "flex";
        document.getElementById("f-agent").innerText = "AGENT " + pName;
        document.getElementById("f-score").innerText = Math.floor(score);
        return;
    }

    // Sky
    ctx.font = "40px Arial"; ctx.textAlign = "center";
    clouds.forEach(c => { c.x += c.s; if(c.x > W+50) c.x = -60; ctx.fillText("☁️", c.x, c.y); });

    // Items
    if(items.length < 5 && Math.random() < 0.035) {
        let l = Math.floor(Math.random()*5);
        if(!spiders.some(s => s.lane === l)) {
            let type = mode==='rabbit'?'🥕':(mode==='cat'?'🍼':'🦴');
            items.push({lane: l, y: -60, type, val: 20*mult});
        }
    }
    if(Math.random() < 0.008) items.push({lane: Math.floor(Math.random()*5), y: -60, type: '😈', val: -999});

    // Seile
    spiders.forEach((s, i) => {
        s.y += (180 + level * 10) * dt * s.d;
        if(s.y > H-180) s.d = -1; if(s.y < 0) s.d = 1;
        let sx = lanes[s.lane];
        ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, s.y); ctx.stroke();
        ctx.fillText(mode==='rabbit'?"🦉":(mode==='cat'?"🐍":"🕷️"), sx, s.y + 25);
        if(s.lane === dogLane && s.y > H-180 && s.y < H-80) { 
            energy -= 30; shake = 15; floaters.push({x: sx, y: s.y, txt: "-30%", c: "red", vx: -0.8}); 
            spiders.splice(i,1); spiders.push({lane: Math.floor(Math.random()*5), y:0, d:1}); 
        }
    });

    items.forEach((it, i) => {
        it.y += (250 + level * 8) * dt; let ix = lanes[it.lane];
        ctx.fillText(it.type, ix, it.y);
        if(it.lane === dogLane && it.y > H-150 && it.y < H-60) {
            if(it.type === '😈') { hearts--; shake = 20; floaters.push({x: ix, y: it.y, txt: "-LIFE", c: "red", vx: -0.8}); }
            else { score += it.val; energy = Math.min(100, energy + 10); floaters.push({x: ix, y: it.y, txt: "+"+Math.floor(it.val), c: "var(--green)", vx: 0.8}); }
            items.splice(i, 1);
        }
        if(it.y > H) items.splice(i, 1);
    });

    dogX += (targetX - dogX) * 0.22;
    let visualX = dogX; if(shake > 0) { visualX += Math.sin(shake) * 8; shake--; }
    ctx.font = "75px Arial";
    ctx.fillText(mode==='rabbit'?"🐰":(mode==='cat'?"🐱":"🐶"), visualX, H - 90);

    // Green Floaters (Diagonal Rising)
    floaters.forEach((f, i) => { 
        f.y -= 2.5; f.x += f.vx; f.l = (f.l || 1) - dt;
        ctx.globalAlpha = f.l; ctx.fillStyle = f.c; ctx.font = "bold 24px Orbitron";
        ctx.fillText(f.txt, f.x, f.y);
        if(f.l <= 0) floaters.splice(i, 1);
    });
    ctx.globalAlpha = 1; requestAnimationFrame(loop);
}
init();
</script>
</body>
</html>
