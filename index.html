<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOGGYCO ULTIMATE - V310 SYMMETRY</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --neon: #00f2ff; --green: #00ff88; --red: #ff3131; --gold: #ffd700; 
            --blue-glow: #0070ff; --cat-purple: #bc13fe; --rabbit-orange: #ff8c00;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            background: #000; font-family: 'Orbitron', sans-serif; color: #fff; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-x: hidden; scroll-behavior: smooth;
        }

        #main-bg {
            position: fixed; inset: 0;
            background: url('hintergrund.png') center/cover no-repeat #000;
            filter: brightness(0.75); z-index: -10;
        }

        @keyframes neonPulse { 0%, 100% { border-color: var(--neon); box-shadow: 0 0 15px var(--neon); } 50% { border-color: #fff; box-shadow: 0 0 35px var(--neon); } }
        header h1 { font-size: clamp(22px, 7vw, 36px); color: var(--neon); text-shadow: 0 0 15px var(--neon); padding: 15px; text-align: center; text-transform: uppercase; }

        /* SPIELFELD - SYMMETRISCH ZENTRIERT */
        #game-view { width: 100%; display: flex; justify-content: center; padding: 10px; z-index: 5; }
        #game-wrap { 
            position:relative; width: 400px; height: 600px; 
            background: rgba(0,0,0,0.65); border: 4px solid var(--neon); border-radius: 50px; 
            overflow: hidden; transition: 0.5s;
        }

        /* EXKLUSIVER DOG MISSION RAHMEN */
        #game-wrap.dog-theme { border: 6px double #00f2ff; animation: neonPulse 3s infinite; }
        #game-wrap.dog-theme::before { content: "SYS_ACTIVE"; position: absolute; top: 15px; left: 25px; color: #00f2ff; font-size: 8px; z-index: 200; }
        #game-wrap.dog-theme::after { content: "POS_TRACKING"; position: absolute; top: 15px; right: 25px; color: #00f2ff; font-size: 8px; z-index: 200; }

        /* HUD */
        #ui-header { position: absolute; top: 15px; width: 100%; z-index: 200; pointer-events: none; }
        #energy-bar-wrap { width: 85%; height: 20px; margin: 0 auto 10px; background: rgba(0,0,0,0.8); border: 2.5px solid #fff; border-radius: 10px; overflow: hidden; }
        #energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--red), var(--gold), var(--green)); transition: width 0.3s; }
        #hud-main { 
            display: flex; justify-content: space-between; align-items: center; width: 90%; margin: 0 auto; 
            font-size: 11px; font-weight: 900; background: rgba(0,0,0,0.7); padding: 8px 12px; 
            border-radius: 15px; border: 1px solid var(--neon); backdrop-filter: blur(10px);
        }

        canvas { position: absolute; inset: 0; z-index: 50; display: block; }

        /* ALLE RAHMEN JETZT EINHEITLICH "FROSTED GLASS" */
        .glass-panel { 
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 3px solid var(--neon); border-radius: 35px; padding: 25px; 
            width: 95vw; max-width: 400px; margin: 12px 0; text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        /* STARTBILDSCHIRM JETZT AUCH FROSTED GLASS */
        #name-screen.overlay .glass-panel-wrapper {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 3px solid var(--neon); border-radius: 35px; padding: 25px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); animation: neonPulse 3s infinite;
        }

        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; background: rgba(0,0,0,0.85); border-radius: 46px; padding: 25px; }
        .neon-btn { padding: 16px; background: var(--green); color: #000; border-radius: 40px; font-weight: 900; cursor: pointer; border: none; font-family: 'Orbitron'; margin: 8px 0; width: 100%; box-shadow: 0 0 12px var(--green); transition: 0.3s; font-size: 14px; text-transform: uppercase; }
        .neon-btn:active { transform: scale(0.95); }

        /* CONTROLS */
        #controls { position: absolute; bottom: 25px; width: 100%; display: flex; justify-content: space-between; padding: 0 45px; z-index: 300; }
        .btn-arrow { width: 80px; height: 80px; background: rgba(255,255,255,0.05); border: 3.5px solid var(--neon); border-radius: 50%; color: #fff; font-size: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; }
        .btn-arrow:active { background: var(--blue-glow); border-color: #fff; box-shadow: 0 0 30px var(--blue-glow); }

        input#pName { width: 100%; padding: 18px; border-radius: 15px; border: 3px solid var(--neon); background: #000; color: #fff; text-align: center; font-family: 'Orbitron'; margin-bottom: 15px; font-size: 18px; }
        .rank-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid var(--neon); font-size: 14px; }
    </style>
</head>
<body>

<div id="main-bg"></div>
<header><h1>DOGGYCO MISSION</h1></header>

<div id="game-view">
    <div id="game-wrap">
        <div id="ui-header">
            <div id="energy-bar-wrap"><div id="energy-fill"></div></div>
            <div id="hud-main">
                <div id="hearts-display">❤️❤️❤️</div>
                <div style="color:var(--gold)">⏱️<span id="timer-display">30</span></div>
                <div style="color:var(--neon)">🏆<span id="score-display">0</span></div>
                <div style="background:#fff; color:#000; padding:1px 4px; border-radius:4px;">L<span id="lvl-num">1</span></div>
            </div>
        </div>
        <canvas id="game-canvas"></canvas>
        <div id="controls">
            <div class="btn-arrow" onmousedown="mLeft(event)" ontouchstart="mLeft(event)">◀</div>
            <div class="btn-arrow" onmousedown="mRight(event)" ontouchstart="mRight(event)">▶</div>
        </div>

        <div id="name-screen" class="overlay">
            <div class="glass-panel-wrapper">
                <div style="font-size: 60px; margin-bottom: 10px;">🐶</div>
                <input type="text" id="pName" placeholder="DEIN NAME">
                <button class="neon-btn" onclick="toMenu()">BESTÄTIGEN</button>
            </div>
        </div>

        <div id="start-screen" class="overlay" style="display:none;">
            <div class="glass-panel" style="border:none; background:none; box-shadow:none;">
                <button class="neon-btn" onclick="startGame('dog')">DOGGY MISSION</button>
                <button class="neon-btn cat-btn" style="background:var(--cat-purple); color:#fff;" onclick="startGame('cat')">CATS WORLD</button>
                <button class="neon-btn rabbit-btn" style="background:var(--rabbit-orange); color:#fff;" onclick="startGame('rabbit')">RABBIT FOREST</button>
            </div>
        </div>

        <div id="end-screen" class="overlay" style="display:none;">
            <h1 id="f-agent" style="color:#fff; font-size:24px; margin-bottom:10px;">AGENT ...</h1>
            <h1 id="f-score" style="font-size: 60px; color: var(--gold); margin-bottom:20px;">0</h1>
            <button class="neon-btn" onclick="location.reload()">NOCHMAL</button>
        </div>
    </div>
</div>

<div class="glass-panel">
    <h3 style="color:var(--gold); margin-bottom:12px;">🏆 HIGH-SCORES</h3>
    <div id="leaderboard">Lade...</div>
</div>

<div class="glass-panel">
    <h3 style="color:var(--green); margin-bottom:15px;">💎 SUPPORT</h3>
    <button class="neon-btn" style="background:#ff0050; color:#fff;" onclick="window.open('https://tiktok.com')">TikTok</button>
    <div style="background:#fff; padding:12px; border-radius:20px; display:inline-block; margin-top:10px; border:3px solid var(--gold);">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=BITCOIN_WALLET" width="140">
    </div>
</div>

<div class="glass-panel">
    <h3 style="color:var(--neon); margin-bottom:10px;">📖 ANLEITUNG</h3>
    <p style="font-size:12px; text-align:left;">Sammle Items für grüne Punkte. 😈 kostet 1 Herz. Seile kosten Energie. Alle 30s Level-Up (+10% Speed/Punkte).</p>
</div>

<div class="glass-panel" style="border-color:var(--red);">
    <p style="font-size:10px; opacity:0.7;">© 2026 DOGGYCO | Private Project.</p>
</div>

<script>
const SUPABASE_URL = 'https://ovmsstdroxkinisqwlhw.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92bXNzdGRyb3hraW5pc3F3bGh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMzM3OTEsImV4cCI6MjA4NzgwOTc5MX0.SOsi-Aeb_wSp40_TTymaiiU0Kn_3rhG_LnvLjJP66z8';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const canvas = document.getElementById("game-canvas");
const ctx = canvas.getContext("2d");
let W = 400, H = 600;
let dogLane = 2, lanes = [40, 120, 200, 280, 360]; // FIXIERTE BAHNEN FÜR SYMMETRIE
let dogX = lanes[2], targetX = lanes[2], active = false, mode = 'dog', pName = "AGENT";
let items = [], spiders = [], floaters = [], clouds = [], birds = [], lastTime = 0;
let score = 0, hearts = 3, energy = 100, level = 1, timeLeft = 30, shake = 0;
let audioCtx, music;

function init() {
    canvas.width = W; canvas.height = H;
    for(let i=0; i<3; i++) clouds.push({x: Math.random()*W, y: 80+Math.random()*100, s: 0.3+Math.random()*0.4});
}

function playSfx(f, t, d, v=0.3) {
    if(!audioCtx) return;
    let o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
    g.gain.setValueAtTime(v, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + d);
}

function toMenu() {
    let inp = document.getElementById("pName").value;
    if(inp) {
        pName = inp.toUpperCase();
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        document.getElementById("name-screen").style.display = "none";
        document.getElementById("start-screen").style.display = "flex";
    }
}

function startGame(m) {
    mode = m;
    const wrap = document.getElementById("game-wrap");
    document.getElementById("start-screen").style.display = "none";
    wrap.classList.remove('dog-theme');
    
    let color = (mode==='cat') ? 'var(--cat-purple)' : (mode==='rabbit' ? 'var(--rabbit-orange)' : 'var(--neon)');
    if(mode === 'dog') wrap.classList.add('dog-theme');
    
    document.documentElement.style.setProperty('--neon', color);
    document.getElementById("main-title").innerText = mode.toUpperCase() + " MISSION";
    document.getElementById("main-title").style.color = color;
    
    music = new Audio(mode + '.mp3'); music.loop = true; music.volume = 0.2; music.play().catch(()=>{});
    spiders = [{lane: 1, y: 0, d: 1}, {lane: 3, y: 150, d: 1}];
    active = true; lastTime = performance.now();
    requestAnimationFrame(loop);
}

function mLeft(e) { if(e) e.preventDefault(); if(active && dogLane > 0) { dogLane--; targetX = lanes[dogLane]; } }
function mRight(e) { if(e) e.preventDefault(); if(active && dogLane < 4) { dogLane++; targetX = lanes[dogLane]; } }

window.addEventListener('keydown', e => { if(e.key === "ArrowLeft") mLeft(); if(e.key === "ArrowRight") mRight(); });

function loop(t) {
    if(!active) return;
    let dt = (t - lastTime) / 1000; lastTime = t;
    ctx.clearRect(0,0,W,H);

    timeLeft -= dt; let mult = Math.pow(1.1, level - 1); energy -= (4.8 * mult) * dt;
    if(timeLeft <= 0) { level++; timeLeft = 30; energy = 100; playSfx(880, 'sine', 0.4); }

    document.getElementById("timer-display").innerText = Math.ceil(timeLeft);
    document.getElementById("score-display").innerText = Math.floor(score);
    document.getElementById("lvl-num").innerText = level;
    document.getElementById("hearts-display").innerText = "❤️".repeat(Math.max(0, hearts));
    document.getElementById("energy-fill").style.width = Math.max(0, energy) + "%";

    if(energy <= 0 || hearts <= 0) { active = false; document.getElementById("end-screen").style.display = "flex"; document.getElementById("f-agent").innerText = "AGENT " + pName; document.getElementById("f-score").innerText = Math.floor(score); return; }

    // Sky
    ctx.font = "40px Arial"; ctx.textAlign = "center";
    clouds.forEach(c => { c.x += c.s; if(c.x > W+50) c.x = -60; ctx.fillText("☁️", c.x, c.y); });
    if(Math.random() < 0.01) birds.push({x: W+50, y: 120+Math.random()*150, s: 2, type: mode==='dog'?'🐦':(mode==='cat'?'🦇':'🐦‍⬛')});
    birds.forEach((b, i) => { b.x -= b.s; ctx.fillText(b.type, b.x, b.y); if(b.x < -60) birds.splice(i,1); });

    // Spawn Items
    if(items.length < 5 && Math.random() < 0.035) {
        let l = Math.floor(Math.random()*5);
        if(!spiders.some(s => s.lane === l)) {
            let r = Math.random(), type, val;
            if(mode==='rabbit') { type=(r<0.3)?'🥕':(r<0.6?'🍎':'🌼'); val=(r<0.3?30:(r<0.6?20:10))*mult; }
            else if(mode==='cat') { type=(r<0.3)?'🍰':(r<0.6?'🐟':'🍼'); val=(r<0.3?35:(r<0.6?25:15))*mult; }
            else { type=(r<0.3)?'🥩':(r<0.6?'🍪':'🦴'); val=(r<0.3?35:(r<0.6?25:15))*mult; }
            items.push({lane: l, y: -60, type, val});
        }
    }
    if(Math.random() < 0.008) items.push({lane: Math.floor(Math.random()*5), y: -60, type: '😈', val: -999});

    // Ropes
    spiders.forEach((s, i) => {
        s.y += (180 + level * 10) * dt * s.d;
        if(s.y > H-180) s.d = -1; if(s.y < 0) { s.d = 1; s.lane = Math.floor(Math.random()*5); }
        let sx = lanes[s.lane];
        ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, s.y); ctx.stroke();
        ctx.fillText(mode==='rabbit'?"🦉":(mode==='cat'?"🐍":"🕷️"), sx, s.y + 25);
        if(s.lane === dogLane && s.y > H-180 && s.y < H-80) { energy -= 30; shake = 15; playSfx(100, 'sawtooth', 0.3); floaters.push({x: sx, y: s.y, txt: "-30%", c: "red", vx: -0.8}); spiders.splice(i,1); spiders.push({lane: Math.floor(Math.random()*5), y:0, d:1}); }
    });

    items.forEach((it, i) => {
        it.y += (250 + level * 8) * dt; let ix = lanes[it.lane];
        ctx.fillText(it.type, ix, it.y);
        if(it.lane === dogLane && it.y > H-150 && it.y < H-60) {
            if(it.type === '😈') { hearts--; shake = 20; playSfx(80, 'square', 0.4); floaters.push({x: ix, y: it.y, txt: "-LIFE", c: "red", vx: -0.8}); }
            else { score += it.val; energy = Math.min(100, energy + 12); playSfx(600, 'sine', 0.1); floaters.push({x: ix, y: it.y, txt: "+"+Math.floor(it.val), c: "var(--green)", vx: 0.8}); }
            items.splice(i, 1);
        }
        if(it.y > H) items.splice(i, 1);
    });

    dogX += (targetX - dogX) * 0.22;
    let visualX = dogX; if(shake > 0) { visualX += Math.sin(shake) * 8; shake--; }
    ctx.font = "75px Arial";
    ctx.fillText(mode==='rabbit'?"🐰":(mode==='cat'?"🐱":"🐶"), visualX, H - 90);

    // Green Rising diagonal
    floaters.forEach((f, i) => { f.y -= 2.5; f.x += f.vx; f.l = (f.l || 1) - dt; ctx.globalAlpha = f.l; ctx.fillStyle = f.c; ctx.font = "bold 24px Orbitron"; ctx.fillText(f.txt, f.x, f.y); if(f.l <= 0) floaters.splice(i, 1); });
    ctx.globalAlpha = 1; requestAnimationFrame(loop);
}

async function updateRanks() {
    try {
        let { data } = await supabaseClient.from('leaderboard').select('*').order('s', { ascending: false }).limit(5);
        if(data) document.getElementById("leaderboard").innerHTML = data.map((x, i) => `<div class="rank-row"><span>#${i+1} ${x.n}</span><span>${x.s}</span></div>`).join('');
    } catch(e) {}
}
window.onload = () => { init(); updateRanks(); };
</script>
</body>
</html>
