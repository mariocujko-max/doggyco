<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOGGYCO & CATS WORLD V93 - ENGINE FIX</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --neon: #00f2ff; --green: #00ff88; --red: #ff3131; --gold: #ffd700; 
            --blue-glow: #0070ff; --cat-purple: #bc13fe;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #000; font-family: 'Orbitron', sans-serif; color: #fff; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow: hidden;
        }

        #main-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: url('hintergrund.png') center/cover no-repeat black;
            filter: brightness(0.4); z-index: -2;
        }

        header h1 { font-size: 32px; color: var(--neon); text-shadow: 0 0 15px var(--neon); padding: 15px; text-align: center; z-index: 10; }

        #game-view { width: 100vw; height: 80vh; display: flex; justify-content: center; align-items: center; position: relative; z-index: 5; }
        
        #game-wrap { 
            position:relative; width: 360px; height: 100%; 
            background: rgba(0,0,0,0.85); border: 3px solid var(--neon); border-radius: 30px; 
            overflow: hidden; box-shadow: 0 0 40px var(--neon);
        }

        /* HUD */
        #ui-header { position: absolute; top: 10px; width: 100%; z-index: 100; pointer-events: none; }
        #energy-bar-wrap { width: 80%; height: 18px; margin: 0 auto; background: #222; border: 1.5px solid #fff; border-radius: 10px; overflow: hidden; }
        #energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--red), var(--gold), var(--green)); transition: width 0.2s; }
        #hud-row { display: flex; justify-content: space-between; width: 80%; margin: 5px auto; font-size: 12px; font-weight: 900; }

        /* CANVAS - WICHTIG: Erhöhter Z-INDEX */
        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 50; display: block; }

        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; background: rgba(0,0,0,0.9); border-radius: 26px; padding: 20px; text-align: center; }

        .glass-panel { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); border: 2px solid var(--neon); border-radius: 20px; padding: 20px; width: 100%; }

        .neon-btn { padding: 15px; background: var(--green); color: #000; border-radius: 25px; font-weight: 900; cursor: pointer; border: none; font-family: 'Orbitron'; margin: 10px 0; width: 100%; box-shadow: 0 0 10px var(--green); }
        .cat-btn { background: var(--cat-purple); color: #fff; box-shadow: 0 0 10px var(--cat-purple); }

        #controls { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; z-index: 200; }
        .btn-arrow { width: 70px; height: 70px; background: rgba(255,255,255,0.1); border: 2px solid var(--neon); border-radius: 50%; color: #fff; font-size: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-arrow:active { background: var(--blue-glow); box-shadow: 0 0 20px var(--blue-glow); }

        #pName { width: 100%; padding: 15px; border-radius: 10px; border: 2px solid var(--neon); background: #000; color: #fff; text-align: center; font-family: 'Orbitron'; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="main-bg"></div>
<header><h1 id="main-title">DOGGYCO</h1></header>

<div id="game-view">
    <div id="game-wrap">
        <div id="ui-header">
            <div id="energy-bar-wrap"><div id="energy-fill"></div></div>
            <div id="hud-row">
                <div id="hearts-display">❤️❤️❤️</div>
                <div id="timer-display" style="color:var(--gold)">30s</div>
                <div>LVL <span id="lvl-num">1</span></div>
            </div>
        </div>
        
        <canvas id="game-canvas"></canvas>

        <div id="controls">
            <div class="btn-arrow" onmousedown="mLeft()" ontouchstart="mLeft(event)">◀</div>
            <div class="btn-arrow" onmousedown="mRight()" ontouchstart="mRight(event)">▶</div>
        </div>

        <div id="start-screen" class="overlay">
            <div class="glass-panel">
                <input type="text" id="pName" placeholder="NAME EINGEBEN">
                <button class="neon-btn" onclick="startGame(false)">DOGGY START</button>
                <button class="neon-btn cat-btn" onclick="startGame(true)">CAT START</button>
            </div>
        </div>

        <div id="end-screen" class="overlay" style="display:none;">
            <h1 id="f-score" style="font-size: 48px; color: var(--gold);">0</h1>
            <button class="neon-btn" onclick="location.reload()">NEUSTART</button>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById("game-canvas");
const ctx = canvas.getContext("2d");
let W, H, dogX, targetX, dogLane = 2, active = false, isCat = false;
let items = [], lastTime = 0, score = 0, hearts = 3, energy = 100, level = 1, timeLeft = 30;

function initSize() {
    // Setzt die physische Pixel-Größe des Canvas fest
    W = canvas.width = canvas.offsetWidth;
    H = canvas.height = canvas.offsetHeight;
    targetX = (dogLane * (W/5)) + (W/10);
    dogX = targetX;
}

function startGame(catMode) {
    if(!document.getElementById("pName").value) return;
    initSize(); // Größe beim Start nochmal sicherstellen
    isCat = catMode;
    document.getElementById("start-screen").style.display = "none";
    if(isCat) {
        document.getElementById("main-title").innerText = "CATS WORLD";
        document.getElementById("main-title").style.color = "#bc13fe";
    }
    active = true;
    lastTime = performance.now();
    requestAnimationFrame(loop);
}

function mLeft(e) { if(e) e.preventDefault(); if(active && dogLane > 0) { dogLane--; targetX = (dogLane * (W/5)) + (W/10); } }
function mRight(e) { if(e) e.preventDefault(); if(active && dogLane < 4) { dogLane++; targetX = (dogLane * (W/5)) + (W/10); } }

function loop(t) {
    if(!active) return;
    let dt = (t - lastTime) / 1000;
    lastTime = t;
    if(dt > 0.1) dt = 0.016;

    ctx.clearRect(0, 0, W, H);

    // Spiellogik Zeit/Energie
    timeLeft -= dt;
    energy -= (5 + level) * dt;
    if(timeLeft <= 0) { level++; timeLeft = 30; energy = 100; }

    // UI Updates
    document.getElementById("energy-fill").style.width = Math.max(0, energy) + "%";
    document.getElementById("timer-display").innerText = Math.ceil(timeLeft) + "s";
    document.getElementById("lvl-num").innerText = level;
    document.getElementById("hearts-display").innerText = "❤️".repeat(Math.max(0, hearts));

    if(energy <= 0 || hearts <= 0) {
        active = false;
        document.getElementById("f-score").innerText = "SCORE: " + score;
        document.getElementById("end-screen").style.display = "flex";
        return;
    }

    // Spawning
    if(items.length < 5 && Math.random() < 0.03) {
        items.push({
            lane: Math.floor(Math.random() * 5),
            y: -50,
            type: Math.random() < 0.8 ? (isCat ? '🍼' : '🦴') : '🕷️'
        });
    }

    // Items bewegen & zeichnen
    items.forEach((it, i) => {
        it.y += (200 + level * 20) * dt;
        let ix = it.lane * (W/5) + (W/10);
        
        ctx.font = "40px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(it.type, ix, it.y);

        // Kollision
        if(it.lane === dogLane && it.y > H - 120 && it.y < H - 40) {
            if(it.type === '🕷️') { energy -= 25; } 
            else { score += 10; energy = Math.min(100, energy + 5); }
            items.splice(i, 1);
        }
        if(it.y > H) items.splice(i, 1);
    });

    // Spieler (Hund/Katze)
    dogX += (targetX - dogX) * 0.15;
    ctx.font = "60px Arial";
    ctx.fillText(isCat ? "🐱" : "🐶", dogX, H - 80);

    requestAnimationFrame(loop);
}

// Startet Initialisierung sobald das Fenster lädt
window.addEventListener('load', initSize);
window.addEventListener('resize', initSize);
</script>
</body>
</html>
