<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dein Vollständiges Spiel</title>
    <style>
        /* CSS: Das Aussehen des Spiels */
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
            flex-direction: column;
        }

        #game-container {
            position: relative;
            border: 4px solid #3498db;
            box-shadow: 0 0 20px rgba(52, 152, 219, 0.5);
            background-color: #000;
        }

        canvas {
            display: block;
        }

        .ui-layer {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 20px;
            pointer-events: none;
        }

        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            background: #3498db;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 10px;
        }

        button:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="ui-layer">Score: <span id="score">0</span></div>
        <canvas id="gameCanvas"></canvas>
        
        <div id="game-over">
            <h1>GAME OVER</h1>
            <p>Dein Score: <span id="final-score">0</span></p>
            <button onclick="resetGame()">Neu starten</button>
        </div>
    </div>

    <script>
        // JAVASCRIPT: Die komplette Spiellogik
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const finalScoreElement = document.getElementById('final-score');
        const gameOverScreen = document.getElementById('game-over');

        // Spielfeld-Größe
        canvas.width = 800;
        canvas.height = 400;

        // Spielvariablen
        let score = 0;
        let gameActive = true;
        let player = { x: 50, y: 200, w: 30, h: 30, color: '#3498db', speed: 5 };
        let obstacles = [];
        let keys = {};

        // Steuerung
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function spawnObstacle() {
            if (!gameActive) return;
            const size = Math.random() * 40 + 20;
            obstacles.push({
                x: canvas.width,
                y: Math.random() * (canvas.height - size),
                w: size,
                h: size,
                speed: 4 + (score / 5), // Wird schneller mit der Zeit
                color: '#e74c3c'
            });
            // Nächster Gegner in zufälligem Intervall
            setTimeout(spawnObstacle, Math.random() * 1000 + 500);
        }

        function update() {
            if (!gameActive) return;

            // Spieler bewegen
            if (keys['ArrowUp'] && player.y > 0) player.y -= player.speed;
            if (keys['ArrowDown'] && player.y < canvas.height - player.h) player.y += player.speed;

            // Hindernisse bewegen & Kollision prüfen
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= obstacles[i].speed;

                // Kollision
                if (player.x < obstacles[i].x + obstacles[i].w &&
                    player.x + player.w > obstacles[i].x &&
                    player.y < obstacles[i].y + obstacles[i].h &&
                    player.y + player.h > obstacles[i].y) {
                    endGame();
                }

                // Score & Entfernen
                if (obstacles[i].x + obstacles[i].w < 0) {
                    obstacles.splice(i, 1);
                    score++;
                    scoreElement.innerText = score;
                }
            }
        }

        function draw() {
            // Hintergrund löschen
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Spieler zeichnen
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.w, player.h);

            // Hindernisse zeichnen
            ctx.fillStyle = '#e74c3c';
            obstacles.forEach(obs => {
                ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
            });

            if (gameActive) {
                requestAnimationFrame(() => {
                    update();
                    draw();
                });
            }
        }

        function endGame() {
            gameActive = false;
            finalScoreElement.innerText = score;
            gameOverScreen.style.display = 'block';
        }

        function resetGame() {
            score = 0;
            scoreElement.innerText = score;
            obstacles = [];
            player.y = 200;
            gameActive = true;
            gameOverScreen.style.display = 'none';
            draw();
        }

        // Spielstart
        spawnObstacle();
        draw();
    </script>
</body>
</html>
