<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOGGYCO V800 - PRECISION</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --neon: #00f2ff; --green: #00ff88; --red: #ff3131; --gold: #ffd700; 
            --glass: rgba(255, 255, 255, 0.2);
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #000 url('forest_background.png') no-repeat center center fixed; 
            background-size: cover; font-family: 'Orbitron', sans-serif; color: #fff; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        header h1 { font-size: 38px; color: var(--neon); text-shadow: 0 0 15px var(--neon); padding: 20px; text-align: center; }

        /* GAME ALIGNMENT FIX */
        #game-view { width: 100vw; height: 80vh; display: flex; justify-content: center; align-items: center; }
        #game-wrap { 
            position:relative; width: 95vw; height: 100%; max-width: 450px; 
            background: rgba(0,0,0,0.85); border: 4px solid var(--neon); border-radius: 40px; 
            overflow: hidden; box-shadow: 0 0 40px var(--neon);
        }
        #bg-layer { position: absolute; inset: 0; background: url('hintergrund.png') center/cover; filter: brightness(0.3); z-index: 1; }
        canvas { position: absolute; inset: 0; z-index: 50; background: transparent; }

        /* HUD */
        #ui-header { position: absolute; top: 15px; width: 100%; z-index: 200; pointer-events: none; }
        #energy-bar-wrap { width: 88%; height: 32px; margin: 0 auto; background: rgba(0,0,0,0.6); border: 2px solid #fff; border-radius: 16px; overflow: hidden; }
        #energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--red), var(--gold), var(--green)); transition: width 0.2s; }
        #hud-row { display: flex; justify-content: space-between; align-items: center; width: 85%; margin: 10px auto 0; font-size: 14px; font-weight: 900; }

        /* MILCHIGES EINGABEFELD */
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(20px); z-index: 1000; background: rgba(0,0,0,0.7); border-radius: 36px; }
        #pName { 
            padding: 18px; border-radius: 20px; border: 2px solid var(--neon); 
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); 
            color: #fff; text-align: center; width: 80%; font-family: 'Orbitron'; 
            font-size: 18px; margin-bottom: 25px; outline: none;
        }

        /* SUPPORT BUTTONS WITH EFFECTS */
        .frosted-tile { 
            background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.3); 
            border-radius: 35px; padding: 25px; margin: 20px 0; width: 92vw; max-width: 450px; text-align: center;
        }
        .btn-don { 
            padding: 15px; border-radius: 15px; text-decoration: none; color: #fff; font-size: 11px; 
            font-weight: 800; border: 1px solid rgba(255,255,255,0.2); transition: 0.3s;
            display: inline-block; width: 100%;
        }
        .btn-don:hover { transform: translateY(-5px); border-color: #fff; box-shadow: 0 5px 15px rgba(255,255,255,0.2); }
        .btn-don:active { transform: scale(0.95); background: #fff; color: #000; }

        .qr-box { 
            background: #fff; padding: 10px; border-radius: 15px; width: 150px; 
            margin: 15px auto; transition: 0.3s; cursor: pointer; 
        }
        .qr-box:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--gold); }

        /* CONTROLS */
        #controls { position: absolute; bottom: 25px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; z-index: 300; pointer-events: none; }
        .btn-arrow { width: 70px; height: 70px; background: rgba(255,255,255,0.1); border: 2px solid var(--neon); border-radius: 50%; color: #fff; font-size: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; pointer-events: auto; }
    </style>
</head>
<body>

<header><h1>DOGGYCO</h1></header>

<div id="game-view">
    <div id="game-wrap">
        <div id="bg-layer"></div>
        <div id="ui-header">
            <div id="energy-bar-wrap"><div id="energy-fill"></div></div>
            <div id="hud-row">
                <span id="hearts-display">❤️❤️❤️</span>
                <span id="lvl-display" style="color:var(--gold)">LVL 1</span>
                <span id="timer-display">30S</span>
                <span id="score-display">0</span>
            </div>
        </div>
        
        <canvas id="game-canvas"></canvas>

        <div id="controls">
            <div class="btn-arrow" onmousedown="mLeft()" ontouchstart="mLeft()">◀</div>
            <div class="btn-arrow" onmousedown="mRight()" ontouchstart="mRight()">▶</div>
        </div>

        <div id="start-screen" class="overlay">
            <input type="text" id="pName" placeholder="AGENT NAME">
            <button class="btn-don" style="background:var(--green); color:#000; width:auto; padding:15px 50px; border-radius:30px;" onclick="startGame()">START MISSION</button>
        </div>

        <div id="end-screen" class="overlay" style="display:none;">
            <h3 id="end-agent" style="color:var(--neon)">AGENT</h3>
            <h2 style="color:var(--red); font-size:28px;">MISSION OVER</h2>
            <h1 id="f-score" style="font-size:60px; color:var(--gold); margin:15px 0;">0</h1>
            <button class="btn-don" style="background:var(--green); color:#000; width:auto; padding:15px 50px; border-radius:30px;" onclick="location.reload()">RETRY</button>
        </div>
    </div>
</div>

<div class="frosted-tile">
    <h3 style="color:var(--gold); margin-bottom:15px;">🏆 RANKING</h3>
    <div id="leaderboard">Syncing Ranking...</div>
</div>

<div class="frosted-tile">
    <h3 style="color:var(--neon); margin-bottom:15px;">🎁 SUPPORT MISSION</h3>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <a href="https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=give-me.org@gmx.net" target="_blank" class="btn-don" style="background:#0070ba;">PAYPAL</a>
        <a href="https://www.tiktok.com/@giveme.org" target="_blank" class="btn-don" style="background:#000;">TIKTOK</a>
    </div>
    <div class="qr-box" onclick="copyBTC()">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=bitcoin:bc1qkm22c6w896u9n9cxp8ld049maef4xs5xn060ed" alt="QR" style="width:100%">
    </div>
    <p style="font-size:9px; color:var(--gold); cursor:pointer;" onclick="copyBTC()">bc1qkm22c6w896u9n9cxp8ld049maef4xs5xn060ed (Copy)</p>
</div>

<script>
const SUPABASE_URL = 'https://ovmsstdroxkinisqwlhw.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92bXNzdGRyb3hraW5pc3F3bGh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMzM3OTEsImV4cCI6MjA4NzgwOTc5MX0.SOsi-Aeb_wSp40_TTymaiiU0Kn_3rhG_LnvLjJP66z8';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const canvas = document.getElementById("game-canvas");
const ctx = canvas.getContext("2d");
let W, H, laneW, dogX, targetX, dogLane = 2, active = false;
let items = [], spiders = [], clouds = [], birds = [], floaters = [];
let score = 0, hearts = 3, energy = 100, level = 1, timeLeft = 30;
let lastTime = 0, spawnTimer = 0, audioCtx, dogShake = 0;

function resize() {
    const wrap = document.getElementById("game-wrap");
    W = canvas.width = wrap.offsetWidth;
    H = canvas.height = wrap.offsetHeight;
    laneW = W / 5; 
    targetX = (dogLane * laneW) + (laneW / 2); 
    dogX = targetX;
}
window.onload = resize; window.onresize = resize;

function copyBTC() { navigator.clipboard.writeText('bc1qkm22c6w896u9n9cxp8ld049maef4xs5xn060ed'); alert('BTC Address Copied!'); }

// PC Key Fix
window.addEventListener('keydown', e => {
    if(!active) return;
    if(e.key === "ArrowLeft" && dogLane > 0) { dogLane--; updateX(); }
    if(e.key === "ArrowRight" && dogLane < 4) { dogLane++; updateX(); }
});

function mLeft() { if(dogLane > 0) { dogLane--; updateX(); } }
function mRight() { if(dogLane < 4) { dogLane++; updateX(); } }
function updateX() { targetX = (dogLane * laneW) + (laneW / 2); }

function playSfx(f, type, d, v=0.4) {
    if(!audioCtx) return;
    let o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = type; o.frequency.setValueAtTime(f, audioCtx.currentTime);
    g.gain.setValueAtTime(v, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + d);
}

function startGame() {
    if(!document.getElementById("pName").value) return alert("Enter Name!");
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    document.getElementById("start-screen").style.display = "none";
    active = true; lastTime = performance.now();
    requestAnimationFrame(loop);
}

function loop(t) {
    if(!active) return;
    let dt = (t - lastTime) / 1000; lastTime = t;
    ctx.clearRect(0,0,W,H);

    timeLeft -= dt; energy -= (4.4 + level * 0.6) * dt;
    document.getElementById("energy-fill").style.width = Math.max(0, energy) + "%";
    document.getElementById("timer-display").innerText = Math.ceil(timeLeft) + "S";
    document.getElementById("score-display").innerText = Math.floor(score);
    document.getElementById("lvl-display").innerText = "LVL " + level;
    document.getElementById("hearts-display").innerText = "❤️".repeat(Math.max(0, hearts));

    if(timeLeft <= 0) { level++; timeLeft = 30; energy = Math.min(100, energy + 25); playSfx(880, 'sine', 0.5); }

    // Atmosphere
    if(clouds.length < 2) clouds.push({ x: -60, y: 150+Math.random()*100, s: 0.2 });
    ctx.font = "40px Arial"; clouds.forEach(c => { c.x += c.s; if(c.x > W+60) c.x = -60; ctx.fillText("☁️", c.x, c.y); });

    // Floaters
    floaters.forEach((f, i) => { f.y -= 2.2; f.life -= dt; ctx.globalAlpha = f.life; ctx.fillStyle = f.col; ctx.font = "bold 22px Orbitron"; ctx.textAlign="center"; ctx.fillText(f.txt, f.x, f.y); if(f.life <= 0) floaters.splice(i,1); });
    ctx.globalAlpha = 1;

    // Spiders (MITTIG IN DER LANE)
    if(spiders.length < 2 && Math.random() < 0.012) spiders.push({lane: Math.floor(Math.random()*5), y: 0, dir: 1});
    spiders.forEach((s, i) => {
        s.y += (220 + level * 15) * dt * s.dir; if(s.y > H - 160) s.dir = -1; if(s.y < 0) spiders.splice(i, 1);
        let sx = (s.lane * laneW) + (laneW / 2);
        ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, s.y); ctx.stroke();
        ctx.font = "38px Arial"; ctx.fillText("🕷️", sx-18, s.y + 25);
        if(s.lane === dogLane && s.y > H-170 && s.y < H-90) { 
            let dmg = Math.floor(30 * Math.pow(1.1, level - 1)); energy -= dmg * dt * 5; dogShake = 15;
            if(Math.random() < 0.05) floaters.push({x:sx, y:H-180, txt:"-"+dmg+"%", col:"var(--red)", life:1});
            playSfx(150, 'sawtooth', 0.2);
        }
    });

    // Items
    let interval = (28 / (60 * Math.pow(1.1, level - 1)));
    spawnTimer -= dt;
    if(spawnTimer <= 0) {
        let r = Math.random(); let type = '🦴';
        if(r < 0.08) type = '👮'; else if(r < 0.22) type = '🍗'; else if(r < 0.38) type = '🍪';
        items.push({lane: Math.floor(Math.random()*5), y: -60, type: type}); spawnTimer = interval;
    }
    items.forEach((it, i) => {
        it.y += (310 + level * 22) * dt; let ix = (it.lane * laneW) + (laneW / 2);
        ctx.font = "42px Arial"; ctx.fillText(it.type, ix-20, it.y);
        if(it.lane === dogLane && it.y > H-160 && it.y < H-80) {
            if(it.type === '👮') { hearts--; dogShake = 25; playSfx(100, 'square', 0.4); floaters.push({x:ix, y:it.y, txt:"-1 ❤️", col:"var(--red)", life:1.5}); }
            else { 
                let b = it.type === '🍗' ? 30 : (it.type === '🍪' ? 20 : 10);
                score += b * Math.pow(1.1, level - 1); energy = Math.min(100, energy + 8); 
                floaters.push({x:ix, y:it.y, txt:"+"+Math.floor(b), col: "#00ff88", life:1});
                if(it.type === '🦴') playSfx(600, 'sine', 0.2); 
                if(it.type === '🍪') playSfx(440, 'sine', 0.3);
                if(it.type === '🍗') playSfx(300, 'sine', 0.4);
            }
            items.splice(i, 1);
        }
    });

    dogX += (targetX - dogX) * 0.25;
    ctx.font = "80px Arial"; ctx.fillText("🐶", dogX-40 + (Math.random()-0.5)*dogShake, H - 110);
    if(dogShake > 0) dogShake *= 0.85;
    if(energy <= 0 || hearts <= 0) end(); else requestAnimationFrame(loop);
}

async function end() {
    active = false; 
    document.getElementById("end-agent").innerText = "AGENT: " + document.getElementById("pName").value;
    document.getElementById("end-screen").style.display = "flex";
    document.getElementById("f-score").innerText = Math.floor(score);
    await supabaseClient.from('leaderboard').insert([{ n: document.getElementById("pName").value, s: Math.floor(score) }]);
    updateRanks();
}

async function updateRanks() {
    try {
        let { data } = await supabaseClient.from('leaderboard').select('*').order('s', { ascending: false }).limit(5);
        if(data) document.getElementById("leaderboard").innerHTML = data.map((x, i) => `<div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid rgba(255,255,255,0.1)"><span>${i+1}. ${x.n}</span><span>${x.s}</span></div>`).join('');
    } catch(e) {}
}
</script>
</body>
</html>
