<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOGGYCO PRO - BULLETPROOF V75</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon: #00f2ff; --green: #00ff88; --red: #ff3131; --gold: #ffd700; --glass: rgba(255, 255, 255, 0.08); }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-y: auto; overflow-x: hidden; }
        #main-bg { position: fixed; inset: 0; background-image: url('hintergrund.png'); background-size: cover; background-position: center; z-index: -2; filter: brightness(0.5); background-color: #111; }
        header h1 { font-family: 'Orbitron'; font-size: clamp(30px, 12vw, 60px); color: var(--neon); text-align: center; padding: 30px; letter-spacing: 8px; animation: blink 2s infinite alternate; text-shadow: 0 0 15px var(--neon); }
        @keyframes blink { from { opacity: 0.8; } to { opacity: 1; text-shadow: 0 0 30px var(--neon); } }
        #game-view { width: 100vw; height: 75vh; display: flex; justify-content: center; position: relative; }
        #game-wrap { position:relative; width: 400px; height: 100%; background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 2px solid rgba(0,242,255,0.3); border-radius: 40px; overflow: hidden; }
        #ui-header { position: absolute; top: 15px; width: 100%; z-index: 200; pointer-events: none; }
        #energy-bar-wrap { width: 85%; height: 12px; margin: 0 auto; background: rgba(0,0,0,0.5); border-radius: 10px; overflow: hidden; }
        #energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--red), var(--gold), var(--green)); transition: width 0.3s linear; }
        canvas { position: absolute; inset: 0; z-index: 50; }
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(30px); z-index: 1000; background: rgba(0,0,0,0.4); }
        .main-btn { padding: 16px 40px; background: var(--neon); color: #000; border: none; border-radius: 30px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; margin: 10px; width: 220px; box-shadow: 0 0 20px var(--neon); }
        #pName { padding: 12px; border-radius: 10px; border: 2px solid var(--neon); background: rgba(255,255,255,0.1); color: #fff; text-align: center; width: 220px; margin-bottom: 10px; }
        .content-area { width: 100%; max-width: 500px; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .tile { background: var(--glass); backdrop-filter: blur(15px); border-radius: 25px; padding: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .icon-btn { padding: 12px; border-radius: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--neon); color: #fff; text-decoration: none; font-size: 11px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        #controls { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; z-index: 300; }
        .arrow { width: 70px; height: 70px; background: rgba(255,255,255,0.1); border: 2px solid var(--neon); border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 25px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="main-bg"></div>
    <header><h1>DOGGYCO</h1></header>
    <div id="game-view">
        <div id="game-wrap">
            <div id="ui-header">
                <div id="energy-bar-wrap"><div id="energy-fill"></div></div>
                <div style="display:flex; justify-content:space-between; width:85%; margin:10px auto; font-family:'Orbitron'; font-size:12px;">
                    <div id="hearts">❤️❤️❤️</div>
                    <div id="score">🏆 0</div>
                </div>
            </div>
            <canvas id="game-canvas"></canvas>
            <div id="controls">
                <div class="arrow" onmousedown="move(-1)" ontouchstart="move(-1)"><i class="fas fa-arrow-left"></i></div>
                <div class="arrow" onmousedown="move(1)" ontouchstart="move(1)"><i class="fas fa-arrow-right"></i></div>
            </div>
            <div id="start-screen" class="overlay">
                <input type="text" id="pName" placeholder="ENTER NAME">
                <button class="main-btn" onclick="startGame(false)">PLAY DOGGY</button>
                <button class="main-btn" style="background:#bc13fe; box-shadow:0 0 20px #bc13fe;" onclick="startGame(true)">PLAY CAT</button>
            </div>
            <div id="end-screen" class="overlay" style="display:none;">
                <h1 id="f-score" style="color:var(--gold); font-size:40px;">0</h1>
                <button class="main-btn" onclick="location.reload()">RETRY</button>
            </div>
        </div>
    </div>
    <div class="content-area">
        <div class="tile">
            <h3 style="color:var(--neon)">RANKING</h3>
            <div id="leaderboard">Connecting...</div>
        </div>
        <div class="tile">
            <h3 style="color:var(--gold)">SUPPORT</h3>
            <div class="btn-grid">
                <a href="https://tiktok.com" class="icon-btn"><i class="fab fa-tiktok"></i> TikTok</a>
                <a href="https://paypal.me" class="icon-btn"><i class="fab fa-paypal"></i> PayPal</a>
                <a href="#" class="icon-btn" onclick="copyWallet()"><i class="fas fa-wallet"></i> Wallet</a>
                <a href="#" class="icon-btn" onclick="alert('Rules: Bones+10, Cookie+25, Steak+50. Avoid Spiders!')"><i class="fas fa-book"></i> Rules</a>
            </div>
        </div>
    </div>
    <script>
        const SUPABASE_URL = 'https://ovmsstdroxkinisqwlhw.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92bXNzdGRyb3hraW5pc3F3bGh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMzM3OTEsImV4cCI6MjA4NzgwOTc5MX0.SOsi-Aeb_wSp40_TTymaiiU0Kn_3rhG_LnvLjJP66z8';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const canvas = document.getElementById("game-canvas");
        const ctx = canvas.getContext("2d");
        const W = 400;
        let H, active = false, isCat = false, score = 0, energy = 100, hearts = 3, lane = 2, dogX = 200;
        let items = [], spiders = [], floaters = [], lastTime = 0;

        function init() {
            canvas.width = W;
            H = canvas.height = document.getElementById("game-wrap").offsetHeight;
            loadLeaderboard();
        }

        function startGame(cat) {
            const name = document.getElementById("pName").value;
            if(!name) return alert("Enter name!");
            isCat = cat;
            document.getElementById("start-screen").style.display = "none";
            active = true;
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        function move(dir) { if(active && lane+dir>=0 && lane+dir<=4) lane+=dir; }

        function gameLoop(t) {
            if(!active) return;
            let dt = (t - lastTime) / 1000;
            if(dt > 0.1) dt = 0.016;
            lastTime = t;
            ctx.clearRect(0,0,W,H);
            energy -= 7 * dt;
            document.getElementById("energy-fill").style.width = energy + "%";
            document.getElementById("score").innerText = "🏆 " + Math.floor(score);
            document.getElementById("hearts").innerText = "❤️".repeat(hearts);
            if(energy <= 0 || hearts <= 0) { active = false; document.getElementById("end-screen").style.display = "flex"; document.getElementById("f-score").innerText = Math.floor(score); saveScore(); }
            
            // Spiders
            if(spiders.length < 2 && Math.random() < 0.01) {
                let nL = Math.floor(Math.random()*5);
                if(!spiders.some(s => s.lane === nL)) spiders.push({lane: nL, y: -50, dir: 1, speed: 200});
            }
            spiders.forEach((s, i) => {
                s.y += s.speed * dt * s.dir;
                if(s.y > H * 0.75) s.dir = -1;
                if(s.y < -60) spiders.splice(i, 1);
                let sx = s.lane * 80 + 40;
                ctx.strokeStyle = "#fff"; ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, s.y); ctx.stroke();
                ctx.font = "30px Arial"; ctx.fillText("🕷️", sx-15, s.y+20);
                if(s.lane === lane && s.y > H-150 && s.y < H-80) { energy -= 20; spiders.splice(i, 1); }
            });

            // Items
            if(Math.random() < 0.04) {
                let r = Math.random();
                let itm = r < 0.6 ? {e:'🦴', p:10} : (r < 0.85 ? {e:'🍪', p:25} : {e:'🥩', p:50});
                items.push({lane: Math.floor(Math.random()*5), y: -50, ...itm});
            }
            items.forEach((it, i) => {
                it.y += (250 + score/5) * dt;
                let ix = it.lane * 80 + 40;
                ctx.font = "35px Arial"; ctx.fillText(it.e, ix-17, it.y);
                if(it.lane === lane && it.y > H-150 && it.y < H-80) {
                    score += it.p; energy = Math.min(100, energy + 10);
                    floaters.push({x: ix, y: it.y, txt: "+"+it.p, c: "#00ff88", vx: 1.5, vy: -2});
                    items.splice(i, 1);
                }
                if(it.y > H) items.splice(i, 1);
            });

            floaters.forEach((f, i) => { f.x += f.vx; f.y += f.vy; ctx.fillStyle = f.c; ctx.font = "bold 20px Orbitron"; ctx.fillText(f.txt, f.x, f.y); if(f.y < 0) floaters.splice(i, 1); });

            let targetX = lane * 80 + 40;
            dogX += (targetX - dogX) * 0.2;
            ctx.font = "75px Arial";
            ctx.fillText(isCat ? "🐱" : "🐶", dogX-35, H-100);
            requestAnimationFrame(gameLoop);
        }

        async function saveScore() {
            const n = document.getElementById("pName").value;
            await supabase.from('leaderboard').insert([{ n, s: Math.floor(score) }]);
            loadLeaderboard();
        }

        async function loadLeaderboard() {
            try {
                const { data } = await supabase.from('leaderboard').select('*').order('s', { ascending: false }).limit(5);
                if(data) document.getElementById("leaderboard").innerHTML = data.map((r,i) => `<div>${i+1}. ${r.n}: ${r.s}</div>`).join('');
            } catch(e) { document.getElementById("leaderboard").innerText = "Offline Mode"; }
        }

        function copyWallet() { navigator.clipboard.writeText('bc1qkm22c6w896u9n9cxp8ld049maef4xs5xn060ed'); alert("Copied!"); }
        window.onload = init;
    </script>
</body>
</html>
