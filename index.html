<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOGGYCO V5000 – COMPLETE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@500;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
--neon:#00f2ff;
--green:#00ff88;
--red:#ff3131;
--gold:#ffd700;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
background:radial-gradient(circle at 50% 20%,#111,#000 60%);
font-family:'Orbitron',sans-serif;
color:#fff;
display:flex;
flex-direction:column;
align-items:center;
overflow:hidden;
}

h1{
margin:20px 0;
font-size:36px;
letter-spacing:4px;
color:var(--neon);
}

#game-wrap{
position:relative;
width:400px;
height:80vh;
background:linear-gradient(180deg,#050505,#0d0d0d);
border-radius:30px;
overflow:hidden;
box-shadow:0 0 50px rgba(0,242,255,0.4);
}

canvas{position:absolute;inset:0;}

#ui{
position:absolute;
top:15px;
width:100%;
z-index:10;
}

#energyBar{
width:85%;
height:14px;
margin:0 auto;
background:rgba(255,255,255,0.08);
border-radius:20px;
overflow:hidden;
}

#energyFill{
height:100%;
width:100%;
background:linear-gradient(90deg,#ff3131,#ffd700,#00ff88);
transition:.2s;
}

#hud{
display:flex;
justify-content:space-between;
width:85%;
margin:8px auto 0;
font-family:'Plus Jakarta Sans';
font-size:13px;
}

.overlay{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(8px);
z-index:20;
}

input{
padding:12px;
border-radius:20px;
border:2px solid var(--neon);
background:rgba(255,255,255,0.1);
color:#fff;
margin-bottom:15px;
text-align:center;
}

button{
padding:12px 30px;
border:none;
border-radius:20px;
background:var(--green);
font-weight:900;
cursor:pointer;
}
</style>
</head>

<body>

<h1>DOGGYCO</h1>

<div id="game-wrap">

<div id="ui">
<div id="energyBar"><div id="energyFill"></div></div>
<div id="hud">
<span id="level">LVL 1</span>
<span id="combo">COMBO x1</span>
<span id="score">0</span>
</div>
</div>

<canvas id="bg"></canvas>
<canvas id="game"></canvas>

<div id="start" class="overlay">
<input id="playerName" placeholder="AGENT NAME">
<button onclick="startGame()">START</button>
</div>

<div id="gameover" class="overlay" style="display:none;">
<h2>GAME OVER</h2>
<h1 id="finalScore">0</h1>
<button onclick="location.reload()">RETRY</button>
</div>

</div>

<script>
const SUPABASE_URL='YOUR_SUPABASE_URL';
const SUPABASE_KEY='YOUR_SUPABASE_KEY';
const supabaseClient = SUPABASE_URL.includes("http")
? supabase.createClient(SUPABASE_URL,SUPABASE_KEY)
: null;

const W=400;
const LANES=5;
const LANE_WIDTH=W/LANES;

const bgCanvas=document.getElementById("bg");
const bgCtx=bgCanvas.getContext("2d");
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let H;
let dogLane=2;
let dogX,targetX;
let score=0,combo=1,level=1,energy=100,timeLeft=30;
let items=[],spiders=[],floaters=[],stars=[];
let active=false,lastTime=0,levelPopup=0;

function init(){
canvas.width=W;
bgCanvas.width=W;
H=canvas.height=bgCanvas.height=document.getElementById("game-wrap").offsetHeight;
targetX=(dogLane*LANE_WIDTH)+LANE_WIDTH/2;
dogX=targetX;
for(let i=0;i<60;i++)stars.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()*2});
}
window.onload=init;

function startGame(){
if(!playerName.value)return;
document.getElementById("start").style.display="none";
active=true;
lastTime=performance.now();
requestAnimationFrame(loop);
}

function loop(t){
if(!active)return;
let dt=(t-lastTime)/1000;
lastTime=t;

drawBackground(dt);
ctx.clearRect(0,0,W,H);

timeLeft-=dt;
energy-=3*dt;

if(timeLeft<=0){
level++;
timeLeft=30;
energy=Math.min(100,energy+15);
levelPopup=.8;
}

let speedMult=1+(level-1)*.08;
let pointMult=1+(level-1)*.1;
let dmgMult=1+(level-1)*.1;

updateHUD();

if(Math.random()<.02)items.push({lane:Math.floor(Math.random()*5),y:-40});
items.forEach((it,i)=>{
it.y+=280*speedMult*dt;
let x=(it.lane*LANE_WIDTH)+LANE_WIDTH/2;
ctx.textAlign="center";
ctx.font="36px Arial";
ctx.fillText("🍖",x,it.y);
if(it.lane===dogLane&&it.y>H-140&&it.y<H-80){
let p=Math.floor(10*pointMult*combo);
score+=p;
combo++;
floaters.push({x:x,y:it.y,text:"+"+p,color:"green",life:1});
items.splice(i,1);
}
});

if(Math.random()<.015)spiders.push({lane:Math.floor(Math.random()*5),y:0});
spiders.forEach((s,i)=>{
s.y+=200*speedMult*dt;
let x=(s.lane*LANE_WIDTH)+LANE_WIDTH/2;
ctx.strokeStyle="rgba(255,255,255,0.3)";
ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,s.y);ctx.stroke();
ctx.textAlign="center";
ctx.font="32px Arial";
ctx.fillText("🕷️",x,s.y+20);
if(s.lane===dogLane&&s.y>H-150&&s.y<H-90){
let dmg=Math.floor(20*dmgMult);
energy-=dmg*dt*3;
combo=1;
floaters.push({x:x,y:H-150,text:"-"+dmg+"%",color:"red",life:1});
}
});

floaters.forEach((f,i)=>{
f.y-=60*dt;f.life-=dt;
ctx.globalAlpha=f.life;
ctx.fillStyle=f.color==="green"?"#00ff88":"#ff3131";
ctx.font="bold 18px Orbitron";
ctx.fillText(f.text,f.x,f.y);
ctx.globalAlpha=1;
if(f.life<=0)floaters.splice(i,1);
});

dogX+=(targetX-dogX)*.25;
ctx.textAlign="center";
ctx.font="58px Arial";
ctx.fillText("🐶",dogX,H-80);

if(levelPopup>0){
levelPopup-=dt;
ctx.globalAlpha=levelPopup;
ctx.fillStyle="#fff";
ctx.font="bold 28px Orbitron";
ctx.fillText("⚠ WARNING - FASTER!",W/2,H/2);
ctx.globalAlpha=1;
}

if(energy<=0){
active=false;
document.getElementById("gameover").style.display="flex";
document.getElementById("finalScore").innerText=Math.floor(score);
saveScore();
}else requestAnimationFrame(loop);
}

function drawBackground(dt){
bgCtx.fillStyle="#000";
bgCtx.fillRect(0,0,W,H);
bgCtx.fillStyle="#00f2ff";
stars.forEach(st=>{
st.y+=st.s*20*dt;
if(st.y>H)st.y=0;
bgCtx.fillRect(st.x,st.y,2,2);
});
}

function updateHUD(){
document.getElementById("score").innerText=Math.floor(score);
document.getElementById("level").innerText="LVL "+level;
document.getElementById("combo").innerText="COMBO x"+combo;
document.getElementById("energyFill").style.width=Math.max(0,energy)+"%";
}

window.addEventListener("keydown",e=>{
if(!active)return;
if(e.key==="ArrowLeft"&&dogLane>0){dogLane--;targetX=(dogLane*LANE_WIDTH)+LANE_WIDTH/2;}
if(e.key==="ArrowRight"&&dogLane<4){dogLane++;targetX=(dogLane*LANE_WIDTH)+LANE_WIDTH/2;}
});

async function saveScore(){
if(!supabaseClient)return;
try{
await supabaseClient.from("leaderboard").insert([{name:playerName.value,score:Math.floor(score)}]);
}catch(e){}
}
</script>

</body>
</html>
