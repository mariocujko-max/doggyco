<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOGGYCO, CATS & RABBIT - V150 EMOTION</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --neon: #00f2ff; --green: #00ff88; --red: #ff3131; --gold: #ffd700; 
            --blue-glow: #0070ff; --cat-purple: #bc13fe; --rabbit-orange: #ff8c00;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #000; font-family: 'Orbitron', sans-serif; color: #fff; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-x: hidden;
        }

        #main-bg {
            position: fixed; inset: 0;
            background: url('hintergrund.png') center/cover no-repeat #000;
            filter: brightness(0.7); z-index: -10;
        }

        header { width: 100%; text-align: center; padding: 15px 0; z-index: 10; }
        header h1 { font-size: clamp(20px, 7vw, 38px); color: var(--neon); text-shadow: 0 0 15px var(--neon); transition: 0.5s; }

        #game-view { flex: 0 0 auto; display: flex; align-items: center; justify-content: center; width: 100%; padding: 10px; z-index: 5; }
        #game-wrap { 
            position:relative; width: 400px; height: 600px; 
            background: rgba(0,0,0,0.65); border: 4px solid var(--neon); border-radius: 45px; 
            overflow: hidden; box-shadow: 0 0 40px var(--neon); transition: border-color 0.5s;
        }

        #ui-header { position: absolute; top: 15px; width: 100%; z-index: 200; pointer-events: none; }
        #energy-bar-wrap { width: 85%; height: 22px; margin: 0 auto; background: rgba(0,0,0,0.8); border: 2px solid #fff; border-radius: 11px; overflow: hidden; }
        #energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--red), var(--gold), var(--green)); transition: width 0.3s; }
        #hud-row { display: flex; justify-content: space-between; width: 85%; margin: 6px auto; font-size: 14px; font-weight: 900; text-shadow: 2px 2px #000; }

        canvas { position: absolute; inset: 0; z-index: 50; background: transparent; pointer-events: none; }

        /* GLASS PANELS - UNIFORM WIDTH */
        .glass-panel { 
            background: rgba(255, 255, 255, 0.12); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 2px solid var(--neon); border-radius: 30px; padding: 25px; 
            width: 95vw; max-width: 400px; margin: 12px 0; text-align: center; 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7); transition: border-color 0.5s;
        }

        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; background: rgba(0,0,0,0.85); border-radius: 40px; padding: 25px; }

        .neon-btn { padding: 16px; background: var(--green); color: #000; border-radius: 30px; font-weight: 900; cursor: pointer; border: none; font-family: 'Orbitron'; margin: 8px 0; width: 100%; box-shadow: 0 0 12px var(--green); transition: 0.2s; }
        .cat-btn { background: var(--cat-purple); color: #fff; box-shadow: 0 0 15px var(--cat-purple); }
        .rabbit-btn { background: var(--rabbit-orange); color: #fff; box-shadow: 0 0 15px var(--rabbit-orange); }

        #controls { position: absolute; bottom: 25px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; z-index: 300; }
        .btn-arrow { width: 80px; height: 80px; background: rgba(255,255,255,0.05); border: 3px solid var(--neon); border-radius: 50%; color: #fff; font-size: 38px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .active-ring { background: rgba(0, 112, 255, 0.6) !important; box-shadow: 0 0 40px var(--blue-glow) !important; border-color: #fff !important; }

        #pName { width: 100%; padding: 18px; border-radius: 15px; border: 2px solid var(--neon); background: rgba(0,0,0,0.8); color: #fff; text-align: center; font-family: 'Orbitron'; outline: none; margin-bottom: 12px; font-size: 18px; }
    </style>
</head>
<body>

<div id="main-bg"></div>
<header><h1 id="main-title">DOGGY MISSION</h1></header>

<div id="game-view">
    <div id="game-wrap">
        <div id="ui-header">
            <div id="energy-bar-wrap"><div id="energy-fill"></div></div>
            <div id="hud-row">
                <div id="hearts-display">❤️❤️❤️</div>
                <div id="timer-display" style="color:var(--gold)">30s</div>
                <div style="background:#fff; color:#000; padding:2px 8px; border-radius:8px;">LVL <span id="lvl-num">1</span></div>
            </div>
        </div>
        <canvas id="game-canvas"></canvas>
        <div id="controls">
            <div id="l-btn" class="btn-arrow" onmousedown="mLeft()" ontouchstart="mLeft(event)">◀</div>
            <div id="r-btn" class="btn-arrow" onmousedown="mRight()" ontouchstart="mRight(event)">▶</div>
        </div>

        <div id="name-screen" class="overlay">
            <div class="glass-panel" style="border:none; background:none;">
                <input type="text" id="pName" placeholder="DEIN NAME">
                <button class="neon-btn" onclick="toMenu()">BESTÄTIGEN</button>
            </div>
        </div>

        <div id="start-screen" class="overlay" style="display:none;">
            <div class="glass-panel" style="border:none; background:none;">
                <button class="neon-btn" onclick="startGame('dog')">DOGGY WORLD</button>
                <button class="neon-btn cat-btn" onclick="startGame('cat')">CATS WORLD</button>
                <button class="neon-btn rabbit-btn" onclick="startGame('rabbit')">RABBIT FOREST</button>
            </div>
        </div>

        <div id="end-screen" class="overlay" style="display:none;">
            <h1 id="f-score" style="font-size: 60px; color: var(--gold);">0</h1>
            <button class="neon-btn" onclick="location.reload()">RETRY</button>
        </div>
    </div>
</div>

<div class="glass-panel">
    <h3 style="color:var(--gold); margin-bottom:12px;">🏆 BESTENLISTE</h3>
    <div id="leaderboard">Lade...</div>
</div>

<div class="glass-panel">
    <h3 style="color:var(--green); margin-bottom:15px;">💎 SUPPORT</h3>
    <button class="neon-btn" style="background:#ff0050; color:#fff;" onclick="window.open('https://tiktok.com')">TikTok</button>
    <div style="background:#fff; padding:10px; border-radius:15px; display:inline-block; margin-top:10px;">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=130x130&data=BTC" width="130">
    </div>
</div>

<script>
const SUPABASE_URL = 'https://ovmsstdroxkinisqwlhw.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92bXNzdGRyb3hraW5pc3F3bGh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMzM3OTEsImV4cCI6MjA4NzgwOTc5MX0.SOsi-Aeb_wSp40_TTymaiiU0Kn_3rhG_LnvLjJP66z8';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const canvas = document.getElementById("game-canvas");
const ctx = canvas.getContext("2d");
let W, H, dogX, targetX, dogLane = 2, active = false, mode = 'dog';
let items = [], spiders = [], floaters = [], lastTime = 0;
let score = 0, hearts = 3, energy = 100, level = 1, timeLeft = 30;
let shakeTime = 0, audioCtx;

function init() {
    W = canvas.width = 400; H = canvas.height = 600;
    targetX = (dogLane * 80) + 40; dogX = targetX;
}

function playSfx(f, t, d, v=0.3) {
    if(!audioCtx) return;
    let o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
    g.gain.setValueAtTime(v, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + d);
}

function toMenu() {
    if(document.getElementById("pName").value) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        document.getElementById("name-screen").style.display = "none";
        document.getElementById("start-screen").style.display = "flex";
    }
}

function startGame(m) {
    mode = m;
    document.getElementById("start-screen").style.display = "none";
    let color = 'var(--neon)';
    if(mode === 'cat') color = 'var(--cat-purple)';
    if(mode === 'rabbit') color = 'var(--rabbit-orange)';
    
    document.documentElement.style.setProperty('--neon', color);
    document.getElementById("main-title").innerText = mode === 'dog' ? "DOGGY MISSION" : (mode === 'cat' ? "CATS WORLD" : "RABBIT FOREST");
    document.getElementById("main-title").style.color = color;

    active = true; lastTime = performance.now();
    requestAnimationFrame(loop);
}

function mLeft() { if(active && dogLane > 0) { dogLane--; targetX = (dogLane * 80) + 40; playSfx(300, 'sine', 0.1); } }
function mRight() { if(active && dogLane < 4) { dogLane++; targetX = (dogLane * 80) + 40; playSfx(300, 'sine', 0.1); } }

function loop(t) {
    if(!active) return;
    let dt = (t - lastTime) / 1000; lastTime = t;
    ctx.clearRect(0,0,W,H);

    timeLeft -= dt; energy -= (4.8 + level * 0.4) * dt;
    if(timeLeft <= 0) { level++; timeLeft = 30; energy = 100; playSfx(880, 'sine', 0.4); }

    document.getElementById("energy-fill").style.width = Math.max(0, energy) + "%";
    document.getElementById("timer-display").innerText = Math.ceil(timeLeft) + "s";
    document.getElementById("lvl-num").innerText = level;
    document.getElementById("hearts-display").innerText = "❤️".repeat(Math.max(0, hearts));

    if(energy <= 0 || hearts <= 0) { active = false; document.getElementById("end-screen").style.display = "flex"; document.getElementById("f-score").innerText = score; return; }

    // Spawning
    if(items.length + spiders.length < 5 && Math.random() < 0.025) {
        let lane = Math.floor(Math.random()*5);
        if(Math.random() < 0.75) {
            let r = Math.random(), type, val;
            if(mode === 'rabbit') {
                if(r < 0.2) { type = '🥕'; val = 30; } else if(r < 0.5) { type = '🍎'; val = 20; } else { type = '🌼'; val = 10; }
            } else if(mode === 'cat') {
                if(r < 0.2) { type = '🍰'; val = 30; } else if(r < 0.5) { type = '🐟'; val = 20; } else { type = '🍼'; val = 15; }
            } else {
                if(r < 0.2) { type = '🥩'; val = 30; } else if(r < 0.5) { type = '🍪'; val = 20; } else { type = '🦴'; val = 10; }
            }
            items.push({lane, y: -60, type, val});
        } else if(spiders.length < 2) spiders.push({lane: Math.floor(Math.random()*5), y: 0, d: 1});
    }

    // Enemies
    spiders.forEach((s, i) => {
        s.y += (180 + level * 15) * dt * s.d;
        if(s.y > H - 180) s.d = -1; if(s.y < 0) spiders.splice(i, 1);
        let sx = s.lane * 80 + 40;
        ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, s.y); ctx.stroke();
        ctx.font = "35px Arial"; ctx.textAlign = "center"; 
        ctx.fillText(mode==='rabbit'?"🦉":(mode==='cat'?"🐍":"🕷️"), sx, s.y + 25);
        if(s.lane === dogLane && s.y > H-180 && s.y < H-80) { 
            energy -= 30; shakeTime = 15; playSfx(100, 'sawtooth', 0.3); floaters.push({x: sx, y: s.y, txt: "-30%", c: "red", l: 1}); spiders.splice(i,1); 
        }
    });

    // Special Hazard
    if(Math.random() < 0.008) items.push({lane: Math.floor(Math.random()*5), y: -60, type: mode==='rabbit'?'🦊':(mode==='cat'?'🐕':'👮'), val: -999});

    items.forEach((it, i) => {
        it.y += (250 + level * 12) * dt; let ix = it.lane * 80 + 40;
        ctx.font = "40px Arial"; ctx.textAlign = "center"; ctx.fillText(it.type, ix, it.y);
        if(it.lane === dogLane && it.y > H-160 && it.y < H-80) {
            if(it.val === -999) { hearts--; shakeTime = 20; playSfx(80, 'square', 0.4); }
            else { score += it.val; energy = Math.min(100, energy + 12); playSfx(600, 'sine', 0.1); floaters.push({x: ix, y: it.y, txt: "+"+it.val, c: "var(--green)", l: 1}); }
            items.splice(i, 1);
        }
        if(it.y > H) items.splice(i,1);
    });

    // Player with Shake-Animation
    dogX += (targetX - dogX) * 0.22;
    let visualX = dogX;
    if(shakeTime > 0) { visualX += Math.sin(shakeTime * 2) * 10; shakeTime--; }
    ctx.font = "75px Arial"; ctx.textAlign = "center";
    ctx.fillText(mode==='dog'?"🐶":(mode==='cat'?"🐱":"🐰"), visualX, H - 110);

    floaters.forEach((f, i) => { f.y -= 2; f.l -= dt; ctx.globalAlpha = f.l; ctx.fillStyle = f.c; ctx.font = "bold 24px Orbitron"; ctx.fillText(f.txt, f.x, f.y); if(f.l <= 0) floaters.splice(i,1); });
    ctx.globalAlpha = 1; requestAnimationFrame(loop);
}
init();
</script>
</body>
</html>
