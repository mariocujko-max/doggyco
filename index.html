<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOGGYCO & CATS WORLD V105 - ULTIMATE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --neon: #00f2ff; --green: #00ff88; --red: #ff3131; --gold: #ffd700; 
            --blue-glow: #0070ff; --cat-purple: #bc13fe;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #000; font-family: 'Orbitron', sans-serif; color: #fff; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-x: hidden;
        }

        /* HINTERGRUND-LAYER */
        #main-bg {
            position: fixed; inset: 0;
            background: url('hintergrund.png') center/cover no-repeat #000;
            filter: brightness(0.4); z-index: -10;
        }
        .fallback-bg { background: radial-gradient(circle, #001a1a 0%, #000 100%) !important; }

        @keyframes neonBlink { 0%, 100% { text-shadow: 0 0 20px var(--neon); } 50% { text-shadow: 0 0 5px var(--neon); opacity: 0.8; } }
        header h1 { font-size: 38px; color: var(--neon); animation: neonBlink 2s infinite; padding: 20px; text-align: center; }

        /* GAMEBOX */
        #game-view { flex: 0 0 auto; display: flex; align-items: center; justify-content: center; width: 100%; padding: 10px; z-index: 5; }
        #game-wrap { 
            position:relative; width: 380px; height: 620px; 
            background: rgba(0,0,0,0.8); border: 4px solid var(--neon); border-radius: 40px; 
            overflow: hidden; box-shadow: 0 0 50px var(--neon);
        }

        /* HUD */
        #ui-header { position: absolute; top: 15px; width: 100%; z-index: 200; pointer-events: none; }
        #energy-bar-wrap { width: 85%; height: 25px; margin: 0 auto; background: #111; border: 2px solid #fff; border-radius: 12px; overflow: hidden; }
        #energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--red), var(--gold), var(--green)); transition: width 0.2s; }
        #hud-row { display: flex; justify-content: space-between; width: 85%; margin: 8px auto; font-size: 14px; font-weight: 900; text-shadow: 2px 2px #000; }

        canvas { position: absolute; inset: 0; z-index: 50; background: transparent; pointer-events: none; }

        /* GLASS PANELS */
        .glass-panel { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(25px); border: 2px solid var(--neon); border-radius: 30px; padding: 25px; width: 92vw; max-width: 480px; margin: 15px 0; text-align: center; }
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; background: rgba(0,0,0,0.85); border-radius: 36px; padding: 25px; }

        .neon-btn { padding: 16px; background: var(--green); color: #000; border-radius: 30px; font-weight: 900; cursor: pointer; border: none; font-family: 'Orbitron'; margin: 10px 0; width: 100%; box-shadow: 0 0 15px var(--green); transition: 0.2s; }
        .cat-btn { background: var(--cat-purple); color: #fff; box-shadow: 0 0 15px var(--cat-purple); }

        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; z-index: 300; }
        .btn-arrow { width: 85px; height: 85px; background: rgba(255,255,255,0.05); border: 3px solid var(--neon); border-radius: 50%; color: #fff; font-size: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-arrow:active { background: rgba(0, 112, 255, 0.5); box-shadow: 0 0 35px var(--blue-glow); border-color: #fff; }

        #pName { width: 100%; padding: 18px; border-radius: 15px; border: 2px solid var(--neon); background: rgba(0,0,0,0.5); color: #fff; text-align: center; font-family: 'Orbitron'; outline: none; margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="main-bg"></div>
<header><h1 id="main-title">DOGGYCO</h1></header>

<div id="game-view">
    <div id="game-wrap">
        <div id="ui-header">
            <div id="energy-bar-wrap"><div id="energy-fill"></div></div>
            <div id="hud-row">
                <div id="hearts-display">❤️❤️❤️</div>
                <div id="timer-display" style="color:var(--gold)">30s</div>
                <div style="background:#fff; color:#000; padding:2px 8px; border-radius:10px;">LVL <span id="lvl-num">1</span></div>
            </div>
        </div>
        <canvas id="game-canvas"></canvas>
        <div id="controls">
            <div class="btn-arrow" onmousedown="mLeft()" ontouchstart="mLeft(event)">◀</div>
            <div class="btn-arrow" onmousedown="mRight()" ontouchstart="mRight(event)">▶</div>
        </div>

        <div id="start-screen" class="overlay">
            <div class="glass-panel" style="border:none; background:none;">
                <input type="text" id="pName" placeholder="AGENT NAME">
                <button class="neon-btn" onclick="startGame(false)">START DOGGY GO</button>
                <button class="neon-btn cat-btn" onclick="startGame(true)">START CATS WORLD</button>
            </div>
        </div>

        <div id="end-screen" class="overlay" style="display:none;">
            <h1 id="f-score" style="font-size: 65px; color: var(--gold);">0</h1>
            <button class="neon-btn" onclick="location.reload()">RETRY</button>
        </div>
    </div>
</div>

<div class="glass-panel">
    <h3 style="color:var(--gold); margin-bottom:15px;">🏆 GLOBAL RANKING</h3>
    <div id="leaderboard">Loading ranking...</div>
</div>

<div class="glass-panel">
    <h3 style="color:var(--green); margin-bottom:15px;">💎 SUPPORT</h3>
    <button class="neon-btn" style="background:#ff0050; color:#fff;" onclick="window.open('https://tiktok.com')">TikTok</button>
    <div style="background:#fff; padding:15px; border-radius:20px; display:inline-block; margin-top:15px;">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=BTC_WALLET" width="150">
    </div>
</div>

<script>
const canvas = document.getElementById("game-canvas");
const ctx = canvas.getContext("2d");
let W, H, dogX, targetX, dogLane = 2, active = false, isCat = false;
let items = [], spiders = [], floaters = [], lastTime = 0;
let score = 0, hearts = 3, energy = 100, level = 1, timeLeft = 30;
let audioCtx, music;

function init() {
    W = canvas.width = 400; H = canvas.height = 620;
    targetX = (dogLane * 80) + 40; dogX = targetX;
    const bg = document.getElementById("main-bg");
    const img = new Image();
    img.onload = () => { bg.style.backgroundImage = "url('hintergrund.png')"; };
    img.onerror = () => { bg.classList.add('fallback-bg'); };
    img.src = 'hintergrund.png';
}

function playSfx(f, t, d, v=0.3) {
    if(!audioCtx) return;
    try {
        let o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
        g.gain.setValueAtTime(v, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + d);
    } catch(e){}
}

function startGame(catMode) {
    if(!document.getElementById("pName").value) return;
    isCat = catMode;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    music = new Audio(isCat ? 'cats_world_theme.mp3' : 'musik.mp3');
    music.loop = true; music.volume = 0.15; music.play().catch(()=>{});

    document.getElementById("start-screen").style.display = "none";
    if(isCat) {
        document.getElementById("main-title").innerText = "CATS WORLD";
        document.getElementById("main-title").style.color = "#bc13fe";
        document.getElementById("main-bg").style.filter = "hue-rotate(280deg) brightness(0.5)";
    }
    active = true; lastTime = performance.now();
    requestAnimationFrame(loop);
}

function mLeft(e) { if(e) e.preventDefault(); if(active && dogLane > 0) { dogLane--; targetX = (dogLane * 80) + 40; playSfx(300, 'sine', 0.1); } }
function mRight(e) { if(e) e.preventDefault(); if(active && dogLane < 4) { dogLane++; targetX = (dogLane * 80) + 40; playSfx(300, 'sine', 0.1); } }

window.addEventListener('keydown', e => { if(e.key === "ArrowLeft") mLeft(); if(e.key === "ArrowRight") mRight(); });

function loop(t) {
    if(!active) return;
    let dt = (t - lastTime) / 1000; lastTime = t;
    if(dt > 0.1) dt = 0.016;
    ctx.clearRect(0,0,W,H);

    timeLeft -= dt; energy -= (4.8 + level * 0.4) * dt;
    if(timeLeft <= 0) { level++; timeLeft = 30; energy = 100; playSfx(880, 'sine', 0.5); }

    document.getElementById("energy-fill").style.width = Math.max(0, energy) + "%";
    document.getElementById("timer-display").innerText = Math.ceil(timeLeft) + "s";
    document.getElementById("lvl-num").innerText = level;
    document.getElementById("hearts-display").innerText = "❤️".repeat(Math.max(0, hearts));

    if(energy <= 0 || hearts <= 0) { active = false; document.getElementById("end-screen").style.display = "flex"; return; }

    if(items.length + spiders.length < 4 && Math.random() < 0.02) {
        let lane = Math.floor(Math.random()*5);
        if(Math.random() < 0.7) {
            let r = Math.random(), type = isCat?'🍼':'🦴';
            if(r < 0.1) type = '👮'; else if(r < 0.3) type = isCat?'🐟':'🥩'; else if(r < 0.4) type = '🍪';
            items.push({lane, y: -60, type});
        } else spiders.push({lane, y: 0, d: 1});
    }

    spiders.forEach((s, i) => {
        s.y += (185 + level * 15) * dt * s.d;
        if(s.y > H - 180) s.d = -1; if(s.y < 0) spiders.splice(i, 1);
        let sx = s.lane * 80 + 40;
        ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, s.y); ctx.stroke();
        ctx.font = "40px Arial"; ctx.textAlign = "center"; ctx.fillText(isCat?"🐍":"🕷️", sx, s.y + 25);
        if(s.lane === dogLane && s.y > H-180 && s.y < H-80) { energy -= 30; floaters.push({x: sx, y: s.y, txt: "-30%", c: "red", l: 1}); playSfx(150, 'sawtooth', 0.3); spiders.splice(i,1); }
    });

    items.forEach((it, i) => {
        it.y += (255 + level * 12) * dt; let ix = it.lane * 80 + 40;
        ctx.font = "42px Arial"; ctx.fillText(it.type, ix, it.y);
        if(it.lane === dogLane && it.y > H-160 && it.y < H-80) {
            if(it.type === '👮') { hearts--; playSfx(100, 'square', 0.4); floaters.push({x: ix, y: it.y, txt: "-❤️", c: "red", l: 1}); }
            else { score += 25; energy = Math.min(100, energy + 12); playSfx(isCat?1200:600, 'sine', 0.1); floaters.push({x: ix, y: it.y, txt: "+25", c: "var(--green)", l: 1}); }
            items.splice(i, 1);
        }
        if(it.y > H) items.splice(i,1);
    });

    dogX += (targetX - dogX) * 0.22;
    ctx.font = "80px Arial"; ctx.fillText(isCat ? "🐱" : "🐶", dogX, H - 110);
    floaters.forEach((f, i) => { f.y -= 2; f.l -= dt; ctx.globalAlpha = f.l; ctx.fillStyle = f.c; ctx.font = "bold 24px Orbitron"; ctx.fillText(f.txt, f.x, f.y); if(f.l <= 0) floaters.splice(i,1); });
    ctx.globalAlpha = 1; requestAnimationFrame(loop);
}
window.onload = init;
</script>
</body>
</html>
