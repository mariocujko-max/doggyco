<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOGGYCO V21000 - ZERO DEPENDENCY</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --neon: #00f2ff; --green: #00ff88; --red: #ff3131; --gold: #ffd700; 
            --glass: rgba(255, 255, 255, 0.1);
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #050505; font-family: 'Orbitron', sans-serif; color: #fff; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow: hidden;
        }

        header h1 { 
            font-size: 38px; color: var(--neon); text-shadow: 0 0 15px var(--neon);
            padding: 15px; text-align: center;
        }

        /* STARRER 400PX BLOCK */
        #game-view { width: 100vw; height: 75vh; display: flex; justify-content: center; align-items: center; position: relative; }
        #game-wrap { 
            position:relative; width: 400px; height: 100%; 
            background: #111; border: 4px solid var(--neon); border-radius: 40px; 
            overflow: hidden; box-shadow: 0 0 40px rgba(0, 242, 255, 0.3); margin: 0 auto;
        }

        canvas { position: absolute; inset: 0; z-index: 50; pointer-events: none; }

        /* HUD */
        #ui-header { position: absolute; top: 15px; width: 100%; z-index: 200; pointer-events: none; }
        #energy-bar-wrap { width: 85%; height: 20px; margin: 0 auto; background: rgba(255,255,255,0.1); border: 1px solid #fff; border-radius: 10px; overflow: hidden; }
        #energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--red), var(--gold), var(--green)); transition: width 0.3s; }
        #hud-row { display: flex; justify-content: space-between; width: 85%; margin: 8px auto; font-size: 13px; font-weight: 900; font-family: 'Plus Jakarta Sans'; }

        /* OVERLAYS */
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(10px); z-index: 1000; background: rgba(0,0,0,0.6); border-radius: 36px; }
        #pName { padding: 15px; border-radius: 15px; border: 2px solid var(--neon); background: rgba(255,255,255,0.1); color: #fff; text-align: center; width: 70%; margin-bottom: 20px; outline: none; font-family: 'Orbitron'; }
        .neon-btn { padding: 15px 40px; background: var(--green); color: #000; border-radius: 30px; font-weight: 900; border: none; cursor: pointer; box-shadow: 0 0 15px var(--green); font-family: 'Orbitron'; }

        /* UNTERE BUTTONS */
        .info-scroll { width: 100%; display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 90vw; max-width: 400px; }
        .btn-don { padding: 12px; border-radius: 12px; border: 2px solid var(--neon); background: #000; color: #fff; text-align: center; text-decoration: none; font-size: 11px; font-weight: 800; cursor: pointer; }
        .btn-don:hover { transform: translateY(-5px); box-shadow: 0 5px 15px var(--neon); }

        /* CONTROLS */
        #controls { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; z-index: 500; }
        .btn-arrow { width: 75px; height: 75px; background: rgba(255,255,255,0.1); border: 2px solid var(--neon); border-radius: 50%; color: #fff; font-size: 35px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>

<header><h1>DOGGYCO</h1></header>

<div id="game-view">
    <div id="game-wrap">
        <div id="ui-header">
            <div id="energy-bar-wrap"><div id="energy-fill"></div></div>
            <div id="hud-row">
                <span id="hearts-display">❤️❤️❤️</span>
                <span id="lvl-display" style="color:var(--gold)">LVL 1</span>
                <span id="score-display">🏆 0</span>
            </div>
        </div>
        
        <canvas id="game-canvas"></canvas>

        <div id="controls">
            <div class="btn-arrow" onclick="mLeft()">◀</div>
            <div class="btn-arrow" onclick="mRight()">▶</div>
        </div>

        <div id="start-screen" class="overlay">
            <input type="text" id="pName" placeholder="AGENT NAME" autofocus>
            <button class="neon-btn" onclick="startGame()">START</button>
        </div>

        <div id="end-screen" class="overlay" style="display:none;">
            <h2 style="color:var(--red);">MISSION OVER</h2>
            <h1 id="f-score" style="font-size: 50px; color: var(--gold); margin: 15px 0;">0</h1>
            <button class="neon-btn" onclick="location.reload()">RETRY</button>
        </div>
    </div>
</div>

<div class="info-scroll">
    <div class="btn-grid">
        <a href="#" class="btn-don">PAYPAL</a>
        <a href="#" class="btn-don">TIKTOK</a>
        <div class="btn-don" onclick="alert('Copied!')">WALLET</div>
        <div class="btn-don" onclick="location.reload()">RELOAD</div>
    </div>
</div>

<script>
const canvas = document.getElementById("game-canvas");
const ctx = canvas.getContext("2d");
const W = 400; 
let H, dogX, targetX, dogLane = 2, active = false;
let items = [], spiders = [], floaters = [], lastTime = 0;
let score = 0, hearts = 3, energy = 100, level = 1;

function init() {
    canvas.width = W; 
    H = canvas.height = document.getElementById("game-wrap").offsetHeight;
    targetX = (dogLane * 80) + 40; 
    dogX = targetX;
}
window.onload = init;

function startGame() {
    if(!document.getElementById("pName").value) return;
    document.getElementById("start-screen").style.display = "none";
    active = true;
    lastTime = performance.now();
    requestAnimationFrame(loop);
}

function mLeft() { if(active && dogLane > 0) { dogLane--; targetX = (dogLane * 80) + 40; } }
function mRight() { if(active && dogLane < 4) { dogLane++; targetX = (dogLane * 80) + 40; } }

function loop(t) {
    if(!active) return;
    let dt = (t - lastTime) / 1000;
    lastTime = t;
    if(dt > 0.1) dt = 0.016;
    ctx.clearRect(0,0,W,H);

    energy -= (5 + level) * dt;
    document.getElementById("energy-fill").style.width = Math.max(0, energy) + "%";
    document.getElementById("score-display").innerText = "🏆 " + Math.floor(score);
    document.getElementById("hearts-display").innerText = "❤️".repeat(Math.max(0, hearts));

    // Spinnen
    if(Math.random() < 0.01) spiders.push({lane: Math.floor(Math.random()*5), y: 0});
    spiders.forEach((s, i) => {
        s.y += (200 + level * 20) * dt;
        let sx = (s.lane * 80) + 40;
        ctx.strokeStyle = "rgba(255,255,255,0.3)";
        ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, s.y); ctx.stroke();
        ctx.font = "32px Arial"; ctx.fillText("🕷️", sx-16, s.y + 20);
        if(s.lane === dogLane && s.y > H-150 && s.y < H-90) {
            energy -= 1; // Schaden
            if(Math.random() < 0.05) floaters.push({x:sx, y:H-180, txt:"-30%", col:"#ff3131", life:1});
        }
        if(s.y > H) spiders.splice(i,1);
    });

    // Items
    if(Math.random() < 0.02) items.push({lane: Math.floor(Math.random()*5), y: -50, type: Math.random() < 0.1 ? '👮' : '🦴'});
    items.forEach((it, i) => {
        it.y += (250 + level * 20) * dt;
        let ix = (it.lane * 80) + 40;
        ctx.font = "36px Arial"; ctx.fillText(it.type, ix-18, it.y);
        if(it.lane === dogLane && it.y > H-150 && it.y < H-80) {
            if(it.type === '👮') { hearts--; floaters.push({x:ix, y:it.y, txt:"-1 ❤️", col:"#ff3131", life:1.5}); }
            else { score += 10; energy = Math.min(100, energy + 5); floaters.push({x:ix, y:it.y, txt:"+10", col:"#00ff88", life:1.2}); }
            items.splice(i,1);
        }
        if(it.y > H) items.splice(i,1);
    });

    // Floaters
    floaters.forEach((f, i) => { 
        f.y -= 1; f.life -= dt; ctx.globalAlpha = f.life; 
        ctx.fillStyle = f.col; ctx.font = "bold 24px Orbitron"; ctx.textAlign = "center";
        ctx.fillText(f.txt, f.x, f.y); 
        if(f.life <= 0) floaters.splice(i,1); 
    });
    ctx.globalAlpha = 1;

    // HUND (OFFSET -42px)
    dogX += (targetX - dogX) * 0.25;
    ctx.font = "70px Arial"; 
    ctx.fillText("🐶", dogX - 35, H - 90);

    if(energy <= 0 || hearts <= 0) { 
        active = false; 
        document.getElementById("end-screen").style.display = "flex"; 
        document.getElementById("f-score").innerText = Math.floor(score); 
    } else requestAnimationFrame(loop);
}
</script>
</body>
</html>
