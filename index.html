<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cats World - DoggyCo Ultimate</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
            --blur: blur(15px);
            --accent-blue: #00d4ff;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Segoe UI', sans-serif;
            background: #050505; color: white;
        }

        /* Dynamischer Hintergrund (Himmel) */
        #game-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            z-index: 1;
        }

        /* --- UI / STARTSEITE --- */
        #ui-wrapper {
            position: relative; z-index: 100;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh;
        }

        .container { width: 400px; display: flex; flex-direction: column; gap: 15px; }

        .glass-box {
            background: var(--glass-bg);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        h1 { margin: 0; font-size: 2.5rem; text-shadow: 0 0 20px var(--accent-blue); }
        
        input#player-input {
            width: 85%; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border);
            border-radius: 10px; padding: 12px; color: white; font-size: 1.1rem;
            text-align: center; outline: none; margin-top: 10px;
        }

        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .btn-main {
            background: rgba(0, 212, 255, 0.4); border: 2px solid var(--accent-blue);
            color: white; padding: 15px; border-radius: 15px; font-weight: bold;
            font-size: 1.4rem; cursor: pointer; transition: 0.3s;
        }
        .btn-main:hover { background: rgba(0, 212, 255, 0.6); transform: scale(1.05); }

        /* --- GAMEPLAY ELEMENTE --- */
        .item {
            position: absolute; width: 40px; height: 40px; border-radius: 50%;
            cursor: pointer; z-index: 50; transition: transform 0.1s;
        }

        /* Blaue Bewegungspfeile */
        .trail-arrow {
            position: absolute; width: 0; height: 0;
            border-left: 8px solid transparent; border-right: 8px solid transparent;
            border-bottom: 16px solid var(--accent-blue);
            pointer-events: none; z-index: 10; opacity: 0.8;
            animation: arrowFade 0.6s forwards;
        }

        @keyframes arrowFade {
            to { opacity: 0; transform: translateY(-30px) scale(0.2); }
        }

        /* Aufsteigende Punkte */
        .floating-point {
            position: absolute; font-weight: bold; font-size: 1.8rem;
            pointer-events: none; z-index: 200;
            animation: riseFade 1.2s ease-out forwards;
        }

        @keyframes riseFade {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        #score-board {
            position: absolute; top: 20px; left: 20px; font-size: 28px;
            font-weight: bold; z-index: 300; display: none;
        }
    </style>
</head>
<body>

    <div id="game-bg"></div>
    <div id="score-board">PUNKTE: 0</div>

    <div id="ui-wrapper">
        <div class="container">
            <div class="glass-box">
                <h1>Cats World</h1>
                <p>DoggyCo Edition</p>
                <input type="text" id="player-input" placeholder="Name hier eingeben...">
            </div>

            <button class="btn-main" onclick="launchGame()">SPIEL STARTEN</button>

            <div class="row">
                <div class="glass-box" style="padding: 10px;">🏆 Rank</div>
                <div class="glass-box" style="padding: 10px;">🛠️ Support</div>
            </div>

            <div class="glass-box">
                <h4 style="margin: 0;">Institution</h4>
                <p style="font-size: 0.8rem;">Offizieller Partner-Bereich</p>
                <hr style="border: 0.5px solid var(--glass-border); margin: 10px 0;">
                <p style="font-size: 0.7rem; opacity: 0.7; cursor: pointer;">Rechtliche Linien & Impressum</p>
            </div>
        </div>
    </div>

    <script>
        let currentScore = 0;
        let gameRunning = false;

        function launchGame() {
            document.getElementById('ui-wrapper').style.display = 'none';
            document.getElementById('score-board').style.display = 'block';
            gameRunning = true;
            startSpawning();
            // Hier könnte Musik starten: playMusic();
        }

        // Steuerung: Blaue Pfeile
        document.addEventListener('mousemove', (e) => {
            if(!gameRunning) return;
            const arrow = document.createElement('div');
            arrow.className = 'trail-arrow';
            arrow.style.left = e.pageX + 'px';
            arrow.style.top = e.pageY + 'px';
            arrow.style.transform = `rotate(${Math.random() * 360}deg)`;
            document.body.appendChild(arrow);
            setTimeout(() => arrow.remove(), 600);
        });

        // Spielregeln: Items fallen vom Himmel
        function startSpawning() {
            if(!gameRunning) return;
            spawnObject();
            setTimeout(startSpawning, 850);
        }

        function spawnObject() {
            const obj = document.createElement('div');
            const isGood = Math.random() > 0.3; // 70% Gut, 30% Schlecht
            obj.className = 'item';
            obj.style.left = Math.random() * (window.innerWidth - 50) + 'px';
            obj.style.top = '-50px';
            obj.style.background = isGood ? '#2ecc71' : '#e74c3c';
            obj.style.boxShadow = `0 0 20px ${isGood ? '#2ecc71' : '#e74c3c'}`;
            
            document.body.appendChild(obj);

            let yPos = -50;
            const fallSpeed = 3 + Math.random() * 4;
            const fallInterval = setInterval(() => {
                yPos += fallSpeed;
                obj.style.top = yPos + 'px';
                if(yPos > window.innerHeight) {
                    clearInterval(fallInterval);
                    obj.remove();
                }
            }, 20);

            obj.onclick = (e) => {
                clearInterval(fallInterval);
                const points = isGood ? 10 : -5;
                currentScore += points;
                document.getElementById('score-board').innerText = "PUNKTE: " + currentScore;
                
                // Aufsteigende Punkte Effekt
                createFloatingText(e.pageX, e.pageY, (points > 0 ? "+" : "") + points, isGood ? "#2ecc71" : "#ff4d4d");
                obj.remove();
            };
        }

        function createFloatingText(x, y, text, color) {
            const el = document.createElement('div');
            el.className = 'floating-point';
            el.innerText = text;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            el.style.color = color;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1200);
        }

        // Musik-Funktion vorbereitet
        function playMusic() {
            // Hier Audio-Objekt einfügen
            console.log("Musik läuft...");
        }
    </script>
</body>
</html>
