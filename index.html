<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doggyco - Catch World</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #game-container {
            position: relative;
            width: 450px;
            height: 700px;
            /* Nutzt deine Datei hintergrund.png */
            background: url('hintergrund.png') no-repeat center center;
            background-size: cover;
            border: 5px solid #222;
            overflow: hidden;
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
            z-index: 10;
        }
        .menu-screen {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            z-index: 100;
            padding: 20px;
        }
        button {
            padding: 15px 40px;
            font-size: 22px;
            cursor: pointer;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            margin-top: 20px;
            box-shadow: 0 4px #2e7d32;
        }
        button:active { transform: translateY(4px); box-shadow: 0 0 #2e7d32; }
        
        #player {
            position: absolute;
            bottom: 30px;
            width: 80px;
            height: 80px;
            /* Nutzt deine Datei logo.png */
            background: url('logo.png') no-repeat center center;
            background-size: contain;
        }
        .falling-item {
            position: absolute;
            width: 50px;
            height: 50px;
            /* Nutzt deine Datei image_2.png */
            background: url('image_2.png') no-repeat center center;
            background-size: contain;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
        }
        .btn {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            border: 2px solid white;
            color: white;
            user-select: none;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="start-menu" class="menu-screen">
            <h1 style="color: #ffcc00;">DOGGYCO CATCH</h1>
            <p>Catch the falling items!<br>Use Arrows or Buttons to move.</p>
            <div style="background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px;">
                <h3>Leaderboard</h3>
                <div id="best-score">Best: 0</div>
            </div>
            <button onclick="startGame()">START GAME</button>
            <p style="font-size: 11px; margin-top: 30px; opacity: 0.6;">
                © 2026 Doggyco. All rights reserved. <br>
                Unauthorized reproduction is prohibited.
            </p>
        </div>

        <div id="ui-layer">
            <div>Score: <span id="score">0</span></div>
            <div>Level: <span id="level">1</span></div>
        </div>

        <div id="player"></div>

        <div id="controls">
            <div class="btn" onmousedown="moveLeft()" ontouchstart="moveLeft()">LEFT</div>
            <div class="btn" onmousedown="moveRight()" ontouchstart="moveRight()">RIGHT</div>
        </div>
    </div>

    <audio id="game-audio" loop src="musik.mp3"></audio>

    <script>
        const container = document.getElementById('game-container');
        const player = document.getElementById('player');
        const scoreDisp = document.getElementById('score');
        const levelDisp = document.getElementById('level');
        const startMenu = document.getElementById('start-menu');
        const audio = document.getElementById('game-audio');

        let score = 0;
        let level = 1;
        let speed = 4;
        let spawnRate = 1200;
        let playerX = 185;
        let gameActive = false;

        function startGame() {
            startMenu.style.display = 'none';
            score = 0;
            level = 1;
            speed = 4;
            spawnRate = 1200;
            scoreDisp.innerText = score;
            levelDisp.innerText = level;
            gameActive = true;
            audio.play();
            updatePlayer();
            spawnLoop();
        }

        function updatePlayer() {
            player.style.left = playerX + 'px';
        }

        function moveLeft() { if(playerX > 10) playerX -= 35; updatePlayer(); }
        function moveRight() { if(playerX < 360) playerX += 35; updatePlayer(); }

        window.addEventListener('keydown', (e) => {
            if(e.key === "ArrowLeft") moveLeft();
            if(e.key === "ArrowRight") moveRight();
        });

        function createItem() {
            if(!gameActive) return;
            const item = document.createElement('div');
            item.className = 'falling-item';
            item.style.left = Math.random() * (400) + 'px';
            item.style.top = '-50px';
            container.appendChild(item);

            let y = -50;
            let fall = setInterval(() => {
                if(!gameActive) { clearInterval(fall); item.remove(); return; }
                
                y += speed;
                item.style.top = y + 'px';

                // Collision
                if(y > 590 && y < 650) {
                    let itemX = parseInt(item.style.left);
                    if(itemX > playerX - 40 && itemX < playerX + 70) {
                        score += 10;
                        scoreDisp.innerText = score;
                        checkLevel();
                        clearInterval(fall);
                        item.remove();
                    }
                }

                if(y > 700) {
                    clearInterval(fall);
                    item.remove();
                }
            }, 20);
        }

        function checkLevel() {
            // Level steigen alle 100 Punkte
            if(score % 100 === 0) {
                level++;
                levelDisp.innerText = level;
                speed *= 1.10; // Geschwindigkeit +10%
                spawnRate *= 0.90; // Erscheinen wird schneller
            }
        }

        function spawnLoop() {
            if(!gameActive) return;
            createItem();
            setTimeout(spawnLoop, spawnRate);
        }

        // Lokales Bestenliste-System
        if(localStorage.getItem('doggyBest')) {
            document.getElementById('best-score').innerText = "Best: " + localStorage.getItem('doggyBest');
        }
    </script>
</body>
</html>
