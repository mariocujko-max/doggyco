<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOGGYCO MISSION - V330 MAXIMA</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon: #00f2ff; --green: #00ff88; --red: #ff3131; --gold: #ffd700; 
            --cat-purple: #bc13fe; --rabbit-orange: #ff8c00; --panel: rgba(0, 0, 0, 0.85);
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            background: #000; font-family: 'Orbitron', sans-serif; color: #fff; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-x: hidden; touch-action: none;
        }

        #bg-fx { position: fixed; inset: 0; background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 100%); z-index: -1; }

        header { padding: 15px 0; text-align: center; }
        header h1 { 
            font-size: clamp(20px, 6vw, 35px); color: var(--neon); 
            text-shadow: 0 0 20px var(--neon); text-transform: uppercase; letter-spacing: 2px;
        }

        /* GAME CONTAINER */
        #game-view { width: 100%; display: flex; justify-content: center; padding: 10px; }
        #game-wrap { 
            position:relative; width: 100%; max-width: 420px; height: 640px; 
            background: #050505; border: 4px solid var(--neon); border-radius: 50px; 
            overflow: hidden; box-shadow: 0 0 35px rgba(0, 242, 255, 0.2); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* HUD */
        #hud { position: absolute; top: 15px; width: 100%; z-index: 200; pointer-events: none; }
        #energy-container { width: 80%; height: 10px; margin: 0 auto 12px; background: #111; border: 1px solid #444; border-radius: 10px; overflow: hidden; }
        #energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--red), var(--gold), var(--green)); transition: width 0.3s; }
        
        #stats-bar { 
            display: flex; justify-content: space-between; align-items: center; width: 90%; margin: 0 auto; 
            background: var(--panel); padding: 10px 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);
        }
        .stat-item { text-align: center; }
        .stat-val { display: block; font-weight: 900; font-size: 14px; color: #fff; }
        .stat-lab { font-size: 8px; color: #888; text-transform: uppercase; }

        canvas { position: absolute; inset: 0; z-index: 50; }

        /* OVERLAYS */
        .screen { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; background: rgba(0,0,0,0.95); padding: 40px; text-align: center; }
        .glass-box { background: rgba(255,255,255,0.03); border: 2px solid var(--neon); border-radius: 30px; padding: 25px; width: 100%; }
        
        .btn { 
            padding: 16px; background: var(--green); color: #000; border-radius: 40px; font-weight: 900; 
            cursor: pointer; font-family: 'Orbitron'; margin: 10px 0; width: 100%; 
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.3); transition: 0.2s; text-transform: uppercase; border: none;
        }
        .btn:active { transform: scale(0.95); filter: brightness(1.2); }

        input { 
            width: 100%; padding: 15px; border-radius: 15px; border: 2px solid var(--neon); 
            background: #000; color: #fff; text-align: center; font-family: 'Orbitron'; margin-bottom: 20px;
        }

        /* CONTROL BUTTONS */
        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-around; z-index: 300; }
        .ctrl-btn { 
            width: 85px; height: 85px; background: rgba(255,255,255,0.05); border: 3px solid var(--neon); 
            border-radius: 50%; color: #fff; font-size: 30px; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; user-select: none; backdrop-filter: blur(5px); transition: 0.1s;
        }
        .ctrl-btn:active { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); }

        /* BOTTOM PANELS */
        .info-panel { width: 95%; max-width: 420px; margin: 15px 0; padding: 20px; background: var(--panel); border: 1px solid #222; border-radius: 30px; }
    </style>
</head>
<body>

<div id="bg-fx"></div>
<header><h1 id="title">DOGGYCO MISSION</h1></header>

<div id="game-view">
    <div id="game-wrap">
        <div id="hud">
            <div id="energy-container"><div id="energy-fill"></div></div>
            <div id="stats-bar">
                <div class="stat-item"><span class="stat-lab">HP</span><span id="hp-ui">❤️❤️❤️</span></div>
                <div class="stat-item"><span class="stat-lab">Score</span><span id="score-ui" style="color:var(--gold)">0</span></div>
                <div class="stat-item"><span class="stat-lab">Time</span><span id="time-ui" style="color:var(--neon)">30</span></div>
                <div style="background:var(--neon); color:#000; padding:5px 10px; border-radius:8px; font-weight:900;">L<span id="lvl-ui">1</span></div>
            </div>
        </div>

        <canvas id="canvas"></canvas>

        <div id="controls">
            <button class="ctrl-btn" onmousedown="move(-1)" ontouchstart="move(-1)">◀</button>
            <button class="ctrl-btn" onmousedown="move(1)" ontouchstart="move(1)">▶</button>
        </div>

        <div id="scr-name" class="screen">
            <h2 style="margin-bottom:20px; color:var(--neon)">AGENT ACCESS</h2>
            <div class="glass-box">
                <input type="text" id="pName" placeholder="CODENAME" maxlength="12">
                <button class="btn" onclick="initUser()">START SEQUENCE</button>
            </div>
        </div>

        <div id="scr-start" class="screen" style="display:none">
            <h3 id="welcome" style="margin-bottom:20px">READY AGENT?</h3>
            <button class="btn" onclick="start('dog')">🐶 DOG MISSION</button>
            <button class="btn" style="background:var(--cat-purple); color:#fff" onclick="start('cat')">🐱 CAT UNIVERSE</button>
            <button class="btn" style="background:var(--rabbit-orange); color:#fff" onclick="start('rabbit')">🐰 RABBIT WORLD</button>
        </div>

        <div id="scr-end" class="screen" style="display:none">
            <h2 style="color:var(--red)">MISSION FAILED</h2>
            <h1 id="final-score" style="font-size:60px; color:var(--gold); margin:20px 0">0</h1>
            <button class="btn" onclick="location.reload()">RE-INITIALIZE</button>
        </div>
    </div>
</div>

<div class="info-panel">
    <h3 style="color:var(--gold); font-size:14px; margin-bottom:10px">🏆 GLOBAL RANKING</h3>
    <div id="leaderboard" style="font-size:12px; color:#666">Connecting to DoggyCo Servers...</div>
</div>

<div class="info-panel" style="display:flex; justify-content:space-between; align-items:center;">
    <div>
        <h3 style="color:var(--green); font-size:14px">💎 PROJECT SUPPORT</h3>
        <p style="font-size:10px; color:#888">Help us build the V4.0 future.</p>
    </div>
    <div style="background:#fff; padding:5px; border-radius:10px"><img src="https://api.qrserver.com/v1/create-qr-code/?size=80x80&data=BTC_ADDR" width="80"></div>
</div>

<script>
/** @type {HTMLCanvasElement} */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let W = 420, H = 640;
let lanes = [55, 127, 200, 273, 345], currentLane = 2;
let playerX = lanes[2], targetX = lanes[2];
let active = false, mode = 'dog', agent = "NONAME";
let entities = [], floaters = [], clouds = [], lastT = 0;
let score = 0, hp = 3, energy = 100, level = 1, time = 30, shake = 0;

function init() { 
    canvas.width = W; canvas.height = H; 
    for(let i=0; i<4; i++) clouds.push({x: Math.random()*W, y: Math.random()*150, s: 0.2+Math.random()*0.4});
}

function initUser() {
    let n = document.getElementById("pName").value;
    if(n) {
        agent = n.toUpperCase();
        document.getElementById("welcome").innerText = "WELCOME, " + agent;
        document.getElementById("scr-name").style.display = "none";
        document.getElementById("scr-start").style.display = "flex";
    }
}

function start(m) {
    mode = m;
    const theme = { 'dog':'#00f2ff', 'cat':'#bc13fe', 'rabbit':'#ff8c00' };
    document.documentElement.style.setProperty('--neon', theme[mode]);
    document.getElementById("title").style.color = theme[mode];
    document.getElementById("scr-start").style.display = "none";
    active = true; lastT = performance.now();
    requestAnimationFrame(loop);
}

function move(dir) {
    if(!active) return;
    currentLane = Math.max(0, Math.min(4, currentLane + dir));
    targetX = lanes[currentLane];
}

function loop(t) {
    if(!active) return;
    let dt = (t - lastT) / 1000; lastT = t;
    ctx.clearRect(0,0,W,H);

    // Symmetrie-Gitter
    ctx.strokeStyle = "rgba(255,255,255,0.03)";
    lanes.forEach(lx => { ctx.beginPath(); ctx.moveTo(lx, 0); ctx.lineTo(lx, H); ctx.stroke(); });

    // Logic
    time -= dt; energy -= (4 + level) * dt;
    if(time <= 0) { level++; time = 30; energy = Math.min(100, energy + 20); }

    // HUD Update
    document.getElementById("hp-ui").innerText = "❤️".repeat(Math.max(0, hp));
    document.getElementById("score-ui").innerText = Math.floor(score);
    document.getElementById("time-ui").innerText = Math.ceil(time);
    document.getElementById("lvl-ui").innerText = level;
    document.getElementById("energy-fill").style.width = Math.max(0, energy) + "%";

    if(hp <= 0 || energy <= 0) {
        active = false;
        document.getElementById("scr-end").style.display = "flex";
        document.getElementById("final-score").innerText = Math.floor(score);
        return;
    }

    // Clouds
    ctx.font = "40px Arial"; ctx.textAlign = "center";
    clouds.forEach(c => { c.x += c.s; if(c.x > W+50) c.x = -60; ctx.fillText("☁️", c.x, c.y); });

    // Spawning
    if(Math.random() < 0.05) {
        let good = mode==='rabbit'?'🥕':(mode==='cat'?'🐟':'🦴');
        entities.push({l: Math.floor(Math.random()*5), y: -50, t: good, v: 10*level, s: 180+(level*15)});
    }
    if(Math.random() < 0.012) entities.push({l: Math.floor(Math.random()*5), y: -50, t: '😈', v: -1, s: 220+(level*15)});
    if(Math.random() < 0.008) entities.push({l: Math.floor(Math.random()*5), y: -100, t: mode==='cat'?'🐍':'🕷️', v: -20, s: 150, rope: true});

    // Entities processing
    entities.forEach((en, i) => {
        en.y += en.s * dt;
        let ex = lanes[en.l];
        
        if(en.rope) {
            ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.beginPath(); ctx.moveTo(ex,0); ctx.lineTo(ex, en.y); ctx.stroke();
        }
        ctx.fillText(en.t, ex, en.y);

        // Hit Detection
        if(en.l === currentLane && en.y > H-130 && en.y < H-70) {
            if(en.t === '😈') { hp--; shake = 20; floaters.push({x:ex, y:en.y, txt:"-LIFE", c:"red"}); }
            else if(en.rope) { energy -= 25; shake = 15; floaters.push({x:ex, y:en.y, txt:"-25%", c:"red"}); }
            else { score += en.v; energy = Math.min(100, energy + 8); floaters.push({x:ex, y:en.y, txt:"+"+en.v, c:"var(--green)"}); }
            entities.splice(i, 1);
        }
        if(en.y > H + 50) entities.splice(i, 1);
    });

    // Player Rendering
    playerX += (targetX - playerX) * 0.22;
    let visualX = playerX; 
    if(shake > 0) { visualX += Math.sin(shake) * 6; shake--; }
    
    ctx.font = "70px Arial";
    let pChar = mode==='rabbit'?'🐰':(mode==='cat'?'🐱':'🐶');
    ctx.fillText(pChar, visualX, H-85);

    // Floating Text
    floaters.forEach((f, i) => {
        f.y -= 2.5; f.o = (f.o || 1) - 0.02;
        ctx.globalAlpha = f.o; ctx.fillStyle = f.c; ctx.font = "bold 20px Orbitron";
        ctx.fillText(f.txt, f.x + 45, f.y);
        if(f.o <= 0) floaters.splice(i, 1);
    });
    ctx.globalAlpha = 1;

    requestAnimationFrame(loop);
}
init();
</script>
</body>
</html>
