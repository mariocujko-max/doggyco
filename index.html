<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOGGYCO & CATS WORLD - REPAIRED FINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon: #00f2ff; --green: #00ff88; --red: #ff3131; --gold: #ffd700; 
            --glass: rgba(255, 255, 255, 0.15); --cat-purple: #bc13fe; --blur: blur(20px);
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            width: 100%; height: 100%; overflow: hidden; background: #000;
            font-family: 'Orbitron', sans-serif; color: #fff;
        }

        #bg-image {
            position: fixed; inset: 0; background-image: url('hintergrund.png'); 
            background-size: cover; background-position: center; z-index: 1;
        }

        /* --- UI STARTSEITE --- */
        #ui-layer {
            position: relative; z-index: 100; height: 100vh; display: flex; 
            flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.5); backdrop-filter: var(--blur);
        }

        .neon-title {
            font-size: 3rem; color: var(--neon); text-shadow: 0 0 20px var(--neon);
            margin-bottom: 20px; text-align: center;
        }

        .glass-box {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.3); 
            border-radius: 20px; padding: 20px; margin: 10px; width: 350px; text-align: center;
            pointer-events: auto; /* WICHTIG: Klickbar machen! */
        }

        input#pName {
            width: 100%; padding: 12px; border-radius: 10px; border: 2px solid var(--neon);
            background: rgba(0,0,0,0.6); color: white; text-align: center; font-family: 'Orbitron';
            margin-bottom: 15px; outline: none;
        }

        .btn-row { display: flex; gap: 10px; width: 100%; }
        .btn { flex: 1; padding: 15px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; font-family: 'Orbitron'; }
        .dog-btn { background: var(--green); color: #000; }
        .cat-btn { background: var(--cat-purple); color: #fff; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 350px; }
        .tile { padding: 12px; font-size: 0.8rem; cursor: pointer; }

        /* --- GAMEPLAY --- */
        #game-wrap { 
            position: relative; width: 400px; height: 85vh; margin: auto; top: 5vh;
            border: 4px solid var(--neon); border-radius: 40px; overflow: hidden; display: none;
            background: rgba(0,0,0,0.8); z-index: 200;
        }
        canvas { display: block; }

        #hud {
            position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-around;
            font-size: 14px; font-weight: bold; text-shadow: 2px 2px #000; pointer-events: none;
        }

        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; }
        .arrow { 
            width: 80px; height: 80px; background: rgba(255,255,255,0.1); border: 3px solid var(--neon); 
            border-radius: 50%; color: white; font-size: 35px; display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .arrow:active { background: var(--neon); }

        /* SHAKE EFFEKT */
        .shake { animation: shakeAnim 0.3s linear; }
        @keyframes shakeAnim { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
    </style>
</head>
<body>

<div id="bg-image"></div>

<div id="ui-layer">
    <h1 class="neon-title" id="t-logo">DOGGYCO</h1>
    
    <div class="glass-box">
        <input type="text" id="pName" placeholder="DEIN NAME...">
        <div class="btn-row">
            <button class="btn dog-btn" onclick="start(false)">DOGGY START</button>
            <button class="btn cat-btn" onclick="start(true)">CATS START</button>
        </div>
    </div>

    <div class="info-grid">
        <div class="glass-box tile" onclick="alert('Ranking folgt!')">🏆 RANK</div>
        <div class="glass-box tile" onclick="alert('Support: help@doggy.co')">🛠️ SUPPORT</div>
        <div class="glass-box tile" onclick="alert('Anleitung: Fange Items, meide Polizei!')">📖 INFO</div>
        <div class="glass-box tile" style="font-size: 0.6rem;">⚖️ LEGAL</div>
    </div>
</div>

<div id="game-wrap">
    <div id="hud">
        <span id="s-score">🏆 0</span>
        <span id="s-lvl" style="color:var(--gold)">LVL 1</span>
        <span id="s-heart">❤️❤️❤️</span>
    </div>
    <canvas id="canvas"></canvas>
    <div id="controls">
        <div class="arrow" onmousedown="mv('L')" ontouchstart="mv('L')">◀</div>
        <div class="arrow" onmousedown="mv('R')" ontouchstart="mv('R')">▶</div>
    </div>
</div>

<script>
    const cvs = document.getElementById("canvas");
    const ctx = cvs.getContext("2d");
    let score = 0, level = 1, hearts = 3, active = false, isCat = false;
    let items = [], floaters = [], dogX = 200, dogLane = 2, speed = 4, lastLvl = Date.now();

    function start(cat) {
        if(!document.getElementById("pName").value) { alert("Name?"); return; }
        isCat = cat;
        document.getElementById("ui-layer").style.display = "none";
        document.getElementById("game-wrap").style.display = "block";
        
        if(isCat) {
            document.getElementById("bg-image").style.backgroundImage = "url('forest_background.png')";
            document.getElementById("t-logo").style.color = "var(--cat-purple)";
            document.getElementById("game-wrap").style.borderColor = "var(--cat-purple)";
        }
        
        cvs.width = 400; cvs.height = 600;
        active = true;
        // Audio Versuch
        let m = new Audio('musik.mp3'); m.loop = true; m.play().catch(()=>{});
        
        setInterval(spawn, 1000);
        requestAnimationFrame(draw);
    }

    function mv(d) {
        if(d === 'L' && dogLane > 0) dogLane--;
        if(d === 'R' && dogLane < 4) dogLane++;
        dogX = (dogLane * 80) + 40;
        // Blauer Pfeil Effekt
        addF(dogX, 500, "▲", "var(--neon)");
    }

    function spawn() {
        if(!active) return;
        let l = Math.floor(Math.random() * 5);
        let r = Math.random();
        let t = r > 0.3 ? (isCat ? '🥣' : '🦴') : (r > 0.1 ? '👮' : (isCat ? '🐍' : '🕷️'));
        items.push({ x: l * 80 + 40, y: -50, t: t });
    }

    function draw() {
        if(!active) return;
        ctx.clearRect(0,0,400,600);

        // Level Up (alle 30 Sek)
        if(Date.now() - lastLvl > 30000) { level++; speed *= 1.1; lastLvl = Date.now(); }

        items.forEach((it, i) => {
            it.y += speed;
            ctx.font = "40px Arial"; ctx.textAlign = "center";
            ctx.fillText(it.t, it.x, it.y);

            if(it.y > 500 && it.y < 560 && Math.abs(it.x - dogX) < 40) {
                if(it.t === '👮' || it.t === '🐍' || it.t === '🕷️') {
                    hearts--;
                    document.getElementById("game-wrap").classList.add("shake");
                    setTimeout(()=>document.getElementById("game-wrap").classList.remove("shake"), 200);
                    addF(it.x, it.y, "-1 ❤️", "var(--red)");
                } else {
                    score += (10 * level);
                    addF(it.x, it.y, "+" + (10*level), "var(--green)");
                }
                items.splice(i, 1);
            }
            if(it.y > 600) items.splice(i,1);
        });

        ctx.font = "70px Arial"; ctx.fillText(isCat ? "🐱" : "🐶", dogX, 550);

        floaters.forEach((f, i) => {
            f.y -= 2; f.l -= 0.02;
            ctx.globalAlpha = f.l; ctx.fillStyle = f.c; ctx.font = "bold 20px Orbitron";
            ctx.fillText(f.t, f.x, f.y);
            if(f.l <= 0) floaters.splice(i, 1);
        });
        ctx.globalAlpha = 1;

        document.getElementById("s-score").innerText = "🏆 " + score;
        document.getElementById("s-heart").innerText = "❤️".repeat(Math.max(0, hearts));
        document.getElementById("s-lvl").innerText = "LVL " + level;

        if(hearts <= 0) { alert("Aus! Score: " + score); location.reload(); }
        requestAnimationFrame(draw);
    }

    function addF(x, y, t, c) { floaters.push({ x, y, t, c, l: 1.0 }); }
</script>
</body>
</html>
