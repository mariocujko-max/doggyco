<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOGGYCO V-MAX 10000</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --neon: #00f2ff; --green: #00ff88; --red: #ff3131; --gold: #ffd700; 
            --glass: rgba(255, 255, 255, 0.15); --cat-purple: #bc13fe; --blur: blur(25px);
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #000; font-family: 'Orbitron', sans-serif; color: #fff; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-y: auto; overflow-x: hidden;
        }

        #main-bg {
            position: fixed; inset: 0; background-image: url('hintergrund.png'); 
            background-size: cover; background-position: center; z-index: -1;
        }

        @keyframes neonBlink {
            0%, 100% { text-shadow: 0 0 30px var(--neon); color: var(--neon); }
            50% { text-shadow: 0 0 10px var(--neon); color: #fff; }
        }
        .main-header { font-size: 60px; font-weight: 900; animation: neonBlink 1.5s infinite; padding: 30px; text-align: center; }

        /* KACHELN DESIGN */
        .glass-panel {
            background: var(--glass); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            border: 3px solid var(--neon); border-radius: 25px;
            padding: 25px; margin: 15px 0; width: 400px; text-align: center;
            box-shadow: 0 0 15px var(--neon); transition: 0.3s;
            cursor: pointer; position: relative;
        }
        /* Einzelnes Erheben beim Drücken */
        .glass-panel:active, .neon-btn:active { transform: translateY(-10px); box-shadow: 0 15px 30px var(--neon); }

        /* NAME GESTRECKT */
        #pName {
            background: transparent; border: none; border-bottom: 3px solid var(--neon);
            color: white; font-family: 'Orbitron'; font-size: 1.8rem;
            text-align: center; width: 100%; outline: none; padding: 25px 0;
        }

        .neon-btn { 
            padding: 18px; border-radius: 15px; border: none; font-weight: 900; 
            width: 100%; font-family: 'Orbitron'; margin: 10px 0; cursor: pointer; transition: 0.3s;
        }
        .dog-btn { background: var(--green); color: #000; }
        .cat-btn { background: var(--cat-purple); color: #fff; opacity: 0.6; cursor: not-allowed; }
        .rabbit-btn { background: #444; color: #888; cursor: not-allowed; }

        /* SUPPORT BUTTONS */
        .sup-row { display: flex; gap: 10px; margin-top: 15px; }
        .small-btn { flex: 1; padding: 12px; border-radius: 10px; border: 2px solid var(--neon); background: var(--glass); color: white; font-size: 0.7rem; cursor: pointer; transition: 0.3s; }
        .small-btn:active { transform: translateY(-5px); background: var(--neon); color: black; }

        /* GAME AREA */
        #game-wrap { 
            position: relative; width: 400px; height: 85vh; border: 5px solid var(--neon); 
            border-radius: 40px; overflow: hidden; display: none; background: rgba(0,0,0,0.8);
        }
        canvas { position: absolute; inset: 0; }
        #hud { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-around; z-index: 200; font-weight: 900; }

        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; z-index: 300; }
        .arrow { width: 80px; height: 80px; background: rgba(255,255,255,0.1); border: 3px solid var(--neon); border-radius: 50%; color: #fff; font-size: 35px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>

<div id="main-bg"></div>
<header><h1 class="main-header">DOGGYCO</h1></header>

<div id="ui-layer" style="display: flex; flex-direction: column; align-items: center; padding-bottom: 50px;">
    
    <div class="glass-panel" style="cursor: default;">
        <input type="text" id="pName" placeholder="ENTER NAME" onkeydown="if(event.key==='Enter')launch(false)">
        <button class="neon-btn dog-btn" onclick="launch(false)">FREE DOGGYCO START</button>
        <button class="neon-btn cat-btn">LEVEL 10 CATS WORLD 🔒</button>
        <button class="neon-btn rabbit-btn">MASTER RABBIT LAND 🔒</button>
    </div>

    <div class="glass-panel" id="ranking-tile">
        <h3 style="color:var(--gold); border-bottom: 1px solid var(--neon); padding-bottom: 10px; margin-bottom: 10px;">🏆 GLOBAL RANKING</h3>
        <div id="leaderboard" style="text-align: left;">Loading...</div>
    </div>

    <div class="glass-panel" style="cursor: default;">
        <h3 style="color:var(--green); border-bottom: 1px solid var(--neon); padding-bottom: 10px;">💎 SUPPORT</h3>
        <div class="sup-row">
            <button class="small-btn" onclick="window.open('https://tiktok.com')">TIKTOK</button>
            <button class="small-btn" onclick="window.open('https://paypal.me')">PAYPAL</button>
        </div>
        <div style="background: white; padding: 10px; border-radius: 15px; margin: 15px auto; width: 120px;">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=BITCOIN_ADDRESS" width="100" alt="QR">
        </div>
        <p style="font-size: 10px; word-break: break-all;">Wallet: 1A2B3C4D5E6F7G8H9I0J</p>
        <div class="sup-row">
            <button class="small-btn" onclick="navigator.clipboard.writeText('1A2B3C4D5E6F7G8H9I0J');alert('Copied!')">COPY WALLET</button>
        </div>
    </div>

    <div class="glass-panel" style="cursor: default;">
        <h3 style="margin-bottom: 10px;">⚖️ LEGAL NOTICE</h3>
        <p style="font-size: 11px; color: white; line-height: 1.4;">
            This project is private. All donations are gifts to support development. No commercial liability. <br>
            © 2026 DOGGYCO GLOBAL ACADEMY.
        </p>
    </div>
</div>

<div id="game-wrap">
    <div id="hud">
        <span id="hScore">🏆 0</span>
        <span id="hHeart">❤️❤️❤️</span>
    </div>
    <canvas id="c"></canvas>
    <div id="controls">
        <div class="arrow" onmousedown="mv('L')" ontouchstart="mv('L')">◀</div>
        <div class="arrow" onmousedown="mv('R')" ontouchstart="mv('R')">▶</div>
    </div>
</div>

<script>
const SURL = 'https://ovmsstdroxkinisqwlhw.supabase.co';
const SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; 
const supabase = supabase.createClient(SURL, SKEY);

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
let score = 0, hearts = 3, active = false, dogLane = 2, dogX = 200, items = [], floaters = [], lastTime = 0;

function launch(cat) {
    if(!document.getElementById("pName").value) return;
    document.getElementById("ui-layer").style.display = "none";
    document.getElementById("game-wrap").style.display = "block";
    canvas.width = 400; canvas.height = 600;
    active = true; lastTime = performance.now();
    new Audio('musik.mp3').play().catch(()=>{});
    setInterval(spawn, 1000);
    requestAnimationFrame(loop);
}

function mv(dir) {
    if(dir === 'L' && dogLane > 0) dogLane--;
    if(dir === 'R' && dogLane < 4) dogLane++;
    dogX = (dogLane * 80) + 40;
    floaters.push({x: dogX, y: 500, t: "▲", c: "var(--neon)", l: 1});
}

function spawn() {
    if(!active) return;
    items.push({ x: Math.floor(Math.random()*5)*80+40, y: -50, type: Math.random()>0.3?'🦴':'👮' });
}

function loop(t) {
    if(!active) return;
    let dt = (t - lastTime) / 1000; lastTime = t;
    ctx.clearRect(0,0,400,600);
    items.forEach((it, i) => {
        it.y += 300 * dt;
        ctx.font = "40px Arial"; ctx.fillText(it.type, it.x, it.y);
        if(it.y > 500 && it.y < 560 && Math.abs(it.x - dogX) < 40) {
            if(it.type === '👮') hearts--; else score += 25;
            items.splice(i,1);
        }
    });
    ctx.font = "70px Arial"; ctx.textAlign="center"; ctx.fillText("🐶", dogX, 550);
    floaters.forEach((f, i) => {
        f.y -= 2; f.l -= 0.02; ctx.globalAlpha = f.l; ctx.fillStyle = f.c; ctx.fillText(f.t, f.x, f.y);
        if(f.l <= 0) floaters.splice(i,1);
    });
    ctx.globalAlpha = 1;
    document.getElementById("hScore").innerText = "🏆 " + score;
    document.getElementById("hHeart").innerText = "❤️".repeat(hearts);
    if(hearts <= 0) location.reload();
    requestAnimationFrame(loop);
}

async function updateRanks() {
    let { data } = await supabase.from('leaderboard').select('*').order('s', { ascending: false }).limit(5);
    if(data) document.getElementById("leaderboard").innerHTML = data.map(x => `<div style="display:flex; justify-content:space-between; border-bottom:1px solid rgba(0,242,255,0.2); padding:5px;"><span>${x.n}</span><span>${x.s}</span></div>`).join('');
}
window.onload = updateRanks;
</script>
</body>
</html>
