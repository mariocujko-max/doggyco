<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOGGYCO V13000 - ULTIMATE VISION</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --neon: #00f2ff; --green: #00ff88; --red: #ff3131; --gold: #ffd700; 
            --glass: rgba(255, 255, 255, 0.05);
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #000; 
            font-family: 'Orbitron', sans-serif; color: #fff; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-x: hidden;
        }

        header h1 { 
            font-size: 45px; color: var(--neon); letter-spacing: 5px; 
            text-shadow: 0 0 20px var(--neon); padding: 25px; text-align: center;
        }

        #game-view { width: 100vw; height: 75vh; display: flex; justify-content: center; align-items: center; position: relative; }
        #game-wrap { 
            position:relative; width: 400px; height: 100%; 
            background: rgba(0,0,0,0.85); border: 4px solid var(--neon); border-radius: 40px; 
            overflow: hidden; box-shadow: 0 0 50px var(--neon); margin: 0 auto;
        }

        canvas { position: absolute; inset: 0; z-index: 50; background: transparent; }

        /* HUD */
        #ui-header { position: absolute; top: 15px; width: 100%; z-index: 200; pointer-events: none; }
        #energy-bar-wrap { width: 88%; height: 32px; margin: 0 auto; background: rgba(0,0,0,0.7); border: 2px solid #fff; border-radius: 16px; overflow: hidden; }
        #energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--red), var(--gold), var(--green)); transition: width 0.2s; }
        #hud-row { display: flex; justify-content: space-between; align-items: center; width: 85%; margin: 12px auto 0; font-size: 15px; font-weight: 900; text-shadow: 2px 2px 4px #000; }

        /* OVERLAYS */
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(10px); z-index: 1000; background: rgba(0,0,0,0.6); border-radius: 36px; }
        #pName { padding: 18px; border-radius: 20px; border: 3px solid var(--neon); background: rgba(255,255,255,0.05); color: #fff; text-align: center; width: 80%; font-family: 'Orbitron'; font-size: 18px; margin-bottom: 25px; outline: none; }
        .neon-btn { padding: 18px 50px; background: var(--green); color: #000; border-radius: 35px; font-weight: 900; cursor: pointer; border: none; font-family: 'Orbitron'; box-shadow: 0 0 15px var(--green); }

        /* FOOTER TILES */
        .info-scroll { width: 100%; display: flex; flex-direction: column; align-items: center; padding-bottom: 60px; }
        .frosted-tile { background: var(--glass); backdrop-filter: blur(20px); border: 2px solid var(--neon); border-radius: 35px; padding: 30px; margin: 20px 0; width: 92vw; max-width: 450px; text-align: center; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .btn-don { padding: 15px; border-radius: 15px; text-decoration: none; color: #fff; font-size: 11px; font-weight: 800; border: 2px solid var(--neon); background: rgba(0,0,0,0.5); cursor: pointer; text-align: center; }
        
        .copy-toast { position: absolute; top: -35px; left: 50%; transform: translateX(-50%); background: var(--green); color: #000; padding: 5px 12px; border-radius: 8px; font-size: 10px; display: none; }

        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 45px; z-index: 300; }
        .btn-arrow { width: 80px; height: 80px; background: rgba(255,255,255,0.1); border: 3px solid var(--neon); border-radius: 50%; color: #fff; font-size: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>

<header><h1>DOGGYCO</h1></header>

<div id="game-view">
    <div id="game-wrap">
        <div id="ui-header">
            <div id="energy-bar-wrap"><div id="energy-fill"></div></div>
            <div id="hud-row">
                <span id="hearts-display">❤️❤️❤️</span>
                <span id="score-display">🏆 0</span>
            </div>
        </div>
        
        <canvas id="game-canvas"></canvas>

        <div id="controls">
            <div class="btn-arrow" onclick="mLeft()">◀</div>
            <div class="btn-arrow" onclick="mRight()">▶</div>
        </div>

        <div id="start-screen" class="overlay">
            <input type="text" id="pName" placeholder="DEIN NAME">
            <button class="neon-btn" onclick="startGame()">START</button>
        </div>

        <div id="end-screen" class="overlay" style="display:none;">
            <h2 style="color:var(--red);">GAME OVER</h2>
            <h1 id="f-score" style="font-size: 60px; color: var(--gold);">0</h1>
            <button class="neon-btn" onclick="location.reload()">RETRY</button>
        </div>
    </div>
</div>

<div class="info-scroll">
    <div class="frosted-tile">
        <h3 style="color:var(--neon);">🎁 SUPPORT & WALLET</h3>
        <div class="btn-grid">
            <div class="btn-don" onclick="copyWallet()">BITCOIN</div>
            <div class="btn-don" onclick="copyWallet()">WALLET</div>
            <a href="#" class="btn-don">PAYPAL</a>
            <a href="#" class="btn-don">TIKTOK</a>
        </div>
        <p id="wallet-addr" style="font-size:10px; margin-top:15px; color:var(--gold);">bc1qkm22c6w896u9n9cxp8ld049maef4xs5xn060ed</p>
        <div id="copy-toast" class="copy-toast">KOPIERT!</div>
    </div>
</div>

<script>
const canvas = document.getElementById("game-canvas");
const ctx = canvas.getContext("2d");
const W = 400; 
let H, dogX, dogLane = 2, active = false;
let items = [], spiders = [], floaters = [];
let score = 0, hearts = 3, energy = 100, level = 1;

function init() {
    canvas.width = W; 
    H = canvas.height = document.getElementById("game-wrap").offsetHeight;
    dogX = (dogLane * 80) + 40;
}
window.onload = init;

function copyWallet() {
    navigator.clipboard.writeText('bc1qkm22c6w896u9n9cxp8ld049maef4xs5xn060ed');
    const t = document.getElementById("copy-toast");
    t.style.display = "block"; setTimeout(() => t.style.display = "none", 2000);
}

function startGame() {
    if(!document.getElementById("pName").value) return alert("Name?");
    document.getElementById("start-screen").style.display = "none";
    active = true;
    requestAnimationFrame(loop);
}

function mLeft() { if(dogLane > 0) dogLane--; }
function mRight() { if(dogLane < 4) dogLane++; }

function loop() {
    if(!active) return;
    ctx.clearRect(0,0,W,H);

    energy -= 0.15;
    document.getElementById("energy-fill").style.width = energy + "%";
    document.getElementById("score-display").innerText = "🏆 " + Math.floor(score);
    document.getElementById("hearts-display").innerText = "❤️".repeat(hearts);

    // Spinnen (Max 2, mittig)
    if(spiders.length < 2 && Math.random() < 0.01) {
        spiders.push({lane: Math.floor(Math.random()*5), y: 0});
    }
    spiders.forEach((s, i) => {
        s.y += 4;
        let sx = (s.lane * 80) + 40;
        ctx.strokeStyle = "#fff"; ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, s.y); ctx.stroke();
        ctx.font = "30px Arial"; ctx.fillText("🕷️", sx-15, s.y);
        if(s.lane === dogLane && s.y > H-150 && s.y < H-100) { energy -= 2; spiders.splice(i,1); }
        if(s.y > H) spiders.splice(i,1);
    });

    // Items (Grün/Rot Logik)
    if(Math.random() < 0.03) {
        items.push({lane: Math.floor(Math.random()*5), y: 0, type: Math.random() > 0.2 ? '🦴' : '👮'});
    }
    items.forEach((it, i) => {
        it.y += 5;
        let ix = (it.lane * 80) + 40;
        ctx.font = "40px Arial"; ctx.fillText(it.type, ix-20, it.y);
        if(it.lane === dogLane && it.y > H-150 && it.y < H-100) {
            if(it.type === '👮') { hearts--; } 
            else { score += 10; energy = Math.min(100, energy + 5); }
            items.splice(i, 1);
        }
    });

    // Hund (Positionierung fixiert auf -45px Offset für Symmetrie)
    let targetX = (dogLane * 80) + 40;
    dogX += (targetX - dogX) * 0.2;
    ctx.font = "80px Arial"; 
    ctx.fillText("🐶", dogX - 45, H - 110);

    if(energy <= 0 || hearts <= 0) {
        active = false;
        document.getElementById("end-screen").style.display = "flex";
        document.getElementById("f-score").innerText = Math.floor(score);
    } else {
        requestAnimationFrame(loop);
    }
}
</script>
</body>
</html>
