<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOGGYCO V3100 - CENTER LOCK</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --neon: #00f2ff; --green: #00ff88; --red: #ff3131; --gold: #ffd700; 
            --glass: rgba(255, 255, 255, 0.05);
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #000 url('forest_background.png') no-repeat center center fixed; 
            background-size: cover; font-family: 'Orbitron', sans-serif; color: #fff; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow: hidden;
        }

        header h1 { 
            font-size: 40px; color: var(--neon); letter-spacing: 4px; 
            text-shadow: 0 0 15px var(--neon); padding: 20px; text-align: center;
        }

        #game-view { width: 100vw; height: 80vh; display: flex; justify-content: center; align-items: center; position: relative; }
        #game-wrap { 
            position:relative; width: 400px; height: 100%; 
            background: rgba(0,0,0,0.85); border: 4px solid var(--neon); border-radius: 40px; 
            overflow: hidden; box-shadow: 0 0 50px var(--neon);
        }
        #bg-layer { position: absolute; inset: 0; background: url('hintergrund.png') center/cover; filter: brightness(0.3); z-index: 1; }
        canvas { position: absolute; inset: 0; z-index: 50; background: transparent; }

        /* HUD */
        #ui-header { position: absolute; top: 15px; width: 100%; z-index: 200; pointer-events: none; }
        #energy-bar-wrap { width: 88%; height: 30px; margin: 0 auto; background: rgba(0,0,0,0.7); border: 2px solid #fff; border-radius: 15px; overflow: hidden; }
        #energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--red), var(--gold), var(--green)); transition: width 0.2s; }
        #hud-row { display: flex; justify-content: space-between; width: 85%; margin: 10px auto 0; font-size: 14px; font-weight: 900; }

        /* LEVEL BANNER */
        #lvl-banner { 
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0);
            width: 80%; padding: 25px; background: rgba(0, 242, 255, 0.95); color: #000;
            border-radius: 30px; z-index: 1500; font-weight: 900; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-align: center;
        }

        /* OVERLAYS */
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(10px); z-index: 1000; background: rgba(0,0,0,0.3); border-radius: 36px; }
        #pName { padding: 18px; border-radius: 20px; border: 2px solid var(--neon); background: rgba(255,255,255,0.05); color: #fff; text-align: center; width: 80%; font-family: 'Orbitron'; margin-bottom: 20px; outline: none; }
        .neon-btn { padding: 15px 40px; background: var(--green); color: #000; border-radius: 30px; font-weight: 900; cursor: pointer; border: none; font-family: 'Orbitron'; box-shadow: 0 0 15px var(--green); }

        /* CONTROLS */
        #controls { position: absolute; bottom: 25px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; z-index: 300; pointer-events: none; }
        .btn-arrow { width: 75px; height: 75px; background: rgba(255,255,255,0.15); border: 2px solid var(--neon); border-radius: 50%; color: #fff; font-size: 35px; display: flex; align-items: center; justify-content: center; cursor: pointer; pointer-events: auto; }
    </style>
</head>
<body>

<header><h1>DOGGYCO</h1></header>

<div id="game-view">
    <div id="game-wrap">
        <div id="bg-layer"></div>
        <div id="ui-header">
            <div id="energy-bar-wrap"><div id="energy-fill"></div></div>
            <div id="hud-row">
                <span id="hearts-display">❤️❤️❤️</span>
                <span id="lvl-display" style="color:var(--gold)">LVL 1</span>
                <span id="timer-display">30s</span>
                <span id="score-display">🏆 0</span>
            </div>
        </div>
        
        <div id="lvl-banner">LEVEL UP! ⚡</div>
        <canvas id="game-canvas"></canvas>

        <div id="controls">
            <div class="btn-arrow" onmousedown="mLeft()" ontouchstart="mLeft()">◀</div>
            <div class="btn-arrow" onmousedown="mRight()" ontouchstart="mRight()">▶</div>
        </div>

        <div id="start-screen" class="overlay">
            <input type="text" id="pName" placeholder="NAME EINGEBEN" autofocus>
            <button class="neon-btn" onclick="startGame()">START</button>
        </div>

        <div id="end-screen" class="overlay" style="display:none;">
            <h2 style="color:var(--red); font-size: 28px;">MISSION BEENDET</h2>
            <h1 id="f-score" style="font-size: 60px; color: var(--gold); margin: 20px 0;">0</h1>
            <button class="neon-btn" onclick="location.reload()">NEUSTART</button>
        </div>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://ovmsstdroxkinisqwlhw.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92bXNzdGRyb3hraW5pc3F3bGh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMzM3OTEsImV4cCI6MjA4NzgwOTc5MX0.SOsi-Aeb_wSp40_TTymaiiU0Kn_3rhG_LnvLjJP66z8';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const canvas = document.getElementById("game-canvas");
const ctx = canvas.getContext("2d");
const W = 400; 
let H, dogX, targetX, dogLane = 2, active = false;
let items = [], spiders = [], floaters = [], clouds = [];
let score = 0, hearts = 3, energy = 100, level = 1, timeLeft = 30;
let lastTime = 0, spawnTimer = 0, audioCtx, dogShake = 0;

function init() {
    canvas.width = W; 
    H = canvas.height = document.getElementById("game-wrap").offsetHeight;
    targetX = (dogLane * 80) + 40; 
    dogX = targetX;
}
window.onload = init;

window.addEventListener('keydown', e => {
    if(!active) return;
    if(e.key === "ArrowLeft" && dogLane > 0) { dogLane--; targetX = (dogLane * 80) + 40; }
    if(e.key === "ArrowRight" && dogLane < 4) { dogLane++; targetX = (dogLane * 80) + 40; }
});

function mLeft() { if(active && dogLane > 0) { dogLane--; targetX = (dogLane * 80) + 40; } }
function mRight() { if(active && dogLane < 4) { dogLane++; targetX = (dogLane * 80) + 40; } }

function playSfx(f, type, d, v=0.3) {
    if(!audioCtx) return;
    let o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = type; o.frequency.setValueAtTime(f, audioCtx.currentTime);
    g.gain.setValueAtTime(v, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + d);
}

function startGame() {
    if(!document.getElementById("pName").value) return alert("Name?");
    document.getElementById("start-screen").style.display = "none";
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    active = true; lastTime = performance.now();
    requestAnimationFrame(loop);
}

function loop(t) {
    if(!active) return;
    let dt = (t - lastTime) / 1000; lastTime = t;
    ctx.clearRect(0,0,W,H);

    timeLeft -= dt; energy -= (4.5 + level * 0.7) * dt;
    document.getElementById("energy-fill").style.width = Math.max(0, energy) + "%";
    document.getElementById("timer-display").innerText = Math.ceil(timeLeft) + "s";
    document.getElementById("score-display").innerText = "🏆 " + Math.floor(score);
    document.getElementById("lvl-display").innerText = "LVL " + level;

    if(timeLeft <= 0) { 
        level++; timeLeft = 30; energy = Math.min(100, energy + 20);
        let b = document.getElementById("lvl-banner");
        b.style.transform = "translate(-50%, -50%) scale(1)";
        setTimeout(() => b.style.transform = "translate(-50%, -50%) scale(0)", 1500);
    }

    // Spinnen (Rot & Seil mittig)
    if(spiders.length < 2 && Math.random() < 0.01) spiders.push({lane: Math.floor(Math.random()*5), y: 0, dir: 1});
    spiders.forEach((s, i) => {
        s.y += (200 + level * 20) * dt * s.dir; if(s.y > H - 150) s.dir = -1; if(s.y < 0) spiders.splice(i, 1);
        let sx = (s.lane * 80) + 40; 
        ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, s.y); ctx.stroke();
        ctx.font = "35px Arial"; ctx.fillText("🕷️", sx-17, s.y + 20);
        if(s.lane === dogLane && s.y > H-160 && s.y < H-80) { 
            energy -= 40 * dt; dogShake = 10;
            if(Math.random() < 0.03) { floaters.push({x:sx, y:H-180, txt:"-30%", col:"var(--red)", life:1}); playSfx(120, 'sawtooth', 0.2); }
        }
    });

    // Items (Grün für Plus)
    spawnTimer -= dt;
    if(spawnTimer <= 0) {
        let r = Math.random(), type = '🦴';
        if(r < 0.1) type = '👮'; else if(r < 0.25) type = '🍗'; else if(r < 0.45) type = '🍪';
        items.push({lane: Math.floor(Math.random()*5), y: -50, type: type}); spawnTimer = 0.5;
    }
    items.forEach((it, i) => {
        it.y += (300 + level * 20) * dt; let ix = (it.lane * 80) + 40;
        ctx.font = "40px Arial"; ctx.fillText(it.type, ix-20, it.y);
        if(it.lane === dogLane && it.y > H-150 && it.y < H-80) {
            if(it.type === '👮') { hearts--; dogShake = 20; floaters.push({x:ix, y:it.y, txt:"-1 ❤️", col:"var(--red)", life:1.5}); }
            else { 
                let p = it.type === '🍗' ? 30 : 10; score += p; energy = Math.min(100, energy + 5);
                floaters.push({x:ix, y:it.y, txt:"+"+p, col:"var(--green)", life:1}); playSfx(500, 'sine', 0.2);
            }
            items.splice(i,1);
        }
    });

    // Floaters Zeichnen
    floaters.forEach((f, i) => { f.y -= 2; f.life -= dt; ctx.globalAlpha = f.life; ctx.fillStyle = f.col; ctx.font = "bold 22px Orbitron"; ctx.fillText(f.txt, f.x-20, f.y); if(f.life <= 0) floaters.splice(i,1); });
    ctx.globalAlpha = 1;

    // HUND (ZENTRIERT GEZEICHNET!)
    dogX += (targetX - dogX) * 0.2;
    ctx.font = "75px Arial"; 
    // Wir ziehen 37px ab (halbe Breite von ~75px), damit dogX die MITTE ist
    ctx.fillText("🐶", dogX - 37 + (Math.random()-0.5)*dogShake, H - 100);
    if(dogShake > 0) dogShake *= 0.9;

    if(energy <= 0 || hearts <= 0) { active = false; document.getElementById("end-screen").style.display = "flex"; document.getElementById("f-score").innerText = Math.floor(score); }
    else requestAnimationFrame(loop);
}
</script>
</body>
</html>
