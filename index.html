<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOGGYCO MISSION - V330 ULTIMATE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon: #00f2ff; --green: #00ff88; --red: #ff3131; --gold: #ffd700; 
            --blue-glow: #0070ff; --cat-purple: #bc13fe; --rabbit-orange: #ff8c00;
            --panel-bg: rgba(0, 0, 0, 0.75);
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; outline: none; border: none; }
        
        body { 
            background: #000; font-family: 'Orbitron', sans-serif; color: #fff; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-x: hidden; scroll-behavior: smooth;
        }

        #main-bg {
            position: fixed; inset: 0;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            z-index: -10;
        }

        @keyframes neonPulse { 
            0%, 100% { border-color: var(--neon); box-shadow: 0 0 15px var(--neon); } 
            50% { border-color: #fff; box-shadow: 0 0 30px var(--neon); } 
        }

        header { padding: 20px 0; text-align: center; width: 100%; z-index: 10; }
        header h1 { 
            font-size: clamp(20px, 6vw, 40px); color: var(--neon); 
            text-shadow: 0 0 15px var(--neon); text-transform: uppercase;
            transition: 0.5s;
        }

        /* ZENTRIERTES SPIELFELD */
        #game-view { width: 100%; display: flex; justify-content: center; align-items: center; padding: 10px; z-index: 5; }
        #game-wrap { 
            position:relative; width: 100%; max-width: 400px; height: 620px; 
            background: rgba(0,0,0,0.8); border: 4px solid var(--neon); border-radius: 50px; 
            overflow: hidden; animation: neonPulse 4s infinite; transition: 0.5s;
            touch-action: none;
        }

        /* HUD & UI */
        #ui-header { position: absolute; top: 15px; width: 100%; z-index: 200; }
        #energy-bar-wrap { width: 80%; height: 12px; margin: 0 auto 10px; background: #222; border: 1px solid #fff; border-radius: 10px; overflow: hidden; }
        #energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--red), var(--gold), var(--green)); transition: width 0.3s; }
        
        #hud-main { 
            display: flex; justify-content: space-between; align-items: center; width: 90%; margin: 0 auto; 
            font-size: 12px; font-weight: 900; background: var(--panel-bg); padding: 10px 15px; 
            border-radius: 20px; border: 1px solid var(--neon); backdrop-filter: blur(10px);
        }

        canvas { position: absolute; inset: 0; z-index: 50; }

        /* SCREENS (OVERLAYS) */
        .overlay { 
            position: absolute; inset: 0; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 1000; 
            background: rgba(0,0,0,0.9); border-radius: 46px; padding: 20px; text-align: center;
        }

        .glass-panel { 
            background: var(--panel-bg); border: 2px solid var(--neon); border-radius: 30px; 
            padding: 20px; width: 90%; max-width: 450px; margin: 15px auto;
        }

        .neon-btn { 
            padding: 18px; background: var(--green); color: #000; border-radius: 40px; 
            font-weight: 900; cursor: pointer; font-family: 'Orbitron'; margin: 8px 0; 
            width: 100%; box-shadow: 0 0 10px var(--green); transition: 0.2s; 
            font-size: 14px; text-transform: uppercase;
        }
        .neon-btn:active { transform: scale(0.95); opacity: 0.8; }

        /* STEUERUNG */
        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-around; z-index: 300; }
        .btn-arrow { 
            width: 80px; height: 80px; background: rgba(255,255,255,0.1); 
            border: 3px solid var(--neon); border-radius: 50%; color: #fff; 
            font-size: 35px; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; user-select: none; backdrop-filter: blur(5px);
        }

        input#pName { 
            width: 100%; padding: 15px; border-radius: 15px; border: 2px solid var(--neon); 
            background: #111; color: #fff; text-align: center; font-family: 'Orbitron'; 
            margin-bottom: 15px; font-size: 16px;
        }

        .stat-label { font-size: 10px; color: #aaa; margin-bottom: 2px; }
    </style>
</head>
<body>

<div id="main-bg"></div>
<header><h1 id="main-title">DOGGYCO MISSION</h1></header>

<div id="game-view">
    <div id="game-wrap">
        <div id="ui-header">
            <div id="energy-bar-wrap"><div id="energy-fill"></div></div>
            <div id="hud-main">
                <div><div class="stat-label">HEARTS</div><span id="hearts-display">❤️❤️❤️</span></div>
                <div><div class="stat-label">TIME</div><span id="timer-display" style="color:var(--gold)">30</span></div>
                <div><div class="stat-label">SCORE</div><span id="score-display" style="color:var(--neon)">0</span></div>
                <div style="background:#fff; color:#000; padding:4px 8px; border-radius:8px;">L<span id="lvl-num">1</span></div>
            </div>
        </div>

        <canvas id="game-canvas"></canvas>

        <div id="controls">
            <div class="btn-arrow" onmousedown="mLeft(event)" ontouchstart="mLeft(event)">◀</div>
            <div class="btn-arrow" onmousedown="mRight(event)" ontouchstart="mRight(event)">▶</div>
        </div>

        <div id="name-screen" class="overlay">
            <h2 style="color:var(--neon); margin-bottom:20px;">SYSTEM INITIALISIERUNG</h2>
            <div class="glass-panel">
                <p style="font-size:12px; margin-bottom:15px; color:var(--gold);">IDENTIFIZIERE DICH, AGENT:</p>
                <input type="text" id="pName" placeholder="DEIN CODENAME" maxlength="12">
                <button class="neon-btn" onclick="toMenu()">IDENTITÄT BESTÄTIGEN</button>
            </div>
        </div>

        <div id="start-screen" class="overlay" style="display:none;">
            <h2 id="welcome-msg" style="font-size:18px; margin-bottom:20px;">BEREIT, AGENT?</h2>
            <div style="width:100%;">
                <button class="neon-btn" onclick="startGame('dog')">🐶 DOGGY MISSION</button>
                <button class="neon-btn" style="background:var(--cat-purple); color:#fff; box-shadow:0 0 15px var(--cat-purple);" onclick="startGame('cat')">🐱 CATS WORLD</button>
                <button class="neon-btn" style="background:var(--rabbit-orange); color:#fff; box-shadow:0 0 15px var(--rabbit-orange);" onclick="startGame('rabbit')">🐰 RABBIT FOREST</button>
            </div>
            <p style="font-size:10px; margin-top:20px; color:#666;">V330 ULTIMATE EDITION</p>
        </div>

        <div id="end-screen" class="overlay" style="display:none;">
            <h3 style="color:var(--red);">MISSION FEHLGESCHLAGEN</h3>
            <h1 id="f-agent" style="font-size:20px; margin:10px 0;">AGENT</h1>
            <div style="font-size:12px; color:#aaa;">SCORE:</div>
            <h1 id="f-score" style="font-size: 60px; color: var(--gold); margin-bottom:20px;">0</h1>
            <button class="neon-btn" onclick="location.reload()">ERNEUT VERSUCHEN</button>
        </div>
    </div>
</div>

<div class="glass-panel" style="max-width:400px;">
    <h3 style="color:var(--gold); font-size:14px; margin-bottom:10px;">🏆 GLOBAL TOP AGENTS</h3>
    <div id="leaderboard" style="font-size:12px; color:#ccc;">Synchronisiere Datenbank...</div>
</div>

<div class="glass-panel" style="max-width:400px; display:flex; align-items:center; justify-content:space-between;">
    <div style="text-align:left;">
        <h3 style="color:var(--green); font-size:14px;">💎 SUPPORT</h3>
        <p style="font-size:9px;">Hilf uns, das Projekt zu erweitern.</p>
    </div>
    <div style="background:#fff; padding:8px; border-radius:12px; border:2px solid var(--gold);">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=80x80&data=BTC_WALLET" width="80" height="80">
    </div>
</div>

<script>
const canvas = document.getElementById("game-canvas");
const ctx = canvas.getContext("2d");
let W = 400, H = 600;
let lanes = [50, 125, 200, 275, 350]; // Symmetrische Bahnen
let dogLane = 2, dogX = lanes[2], targetX = lanes[2];
let active = false, mode = 'dog', pName = "AGENT";
let items = [], obstacles = [], floaters = [], clouds = [], lastTime = 0;
let score = 0, hearts = 3, energy = 100, level = 1, timeLeft = 30, shake = 0;

function init() { 
    canvas.width = W; canvas.height = H; 
    for(let i=0; i<3; i++) clouds.push({x: Math.random()*W, y: 50+Math.random()*100, s: 0.2+Math.random()*0.5});
}

function toMenu() {
    let inp = document.getElementById("pName").value;
    if(inp) {
        pName = inp.toUpperCase();
        document.getElementById("welcome-msg").innerText = "BEREIT, AGENT " + pName + "?";
        document.getElementById("name-screen").style.display = "none";
        document.getElementById("start-screen").style.display = "flex";
    }
}

function startGame(m) {
    mode = m;
    const colors = {
        'dog': '#00f2ff',
        'cat': '#bc13fe',
        'rabbit': '#ff8c00'
    };
    document.documentElement.style.setProperty('--neon', colors[mode]);
    document.getElementById("main-title").style.color = colors[mode];
    document.getElementById("start-screen").style.display = "none";
    
    // Spiel zurücksetzen
    score = 0; hearts = 3; energy = 100; level = 1; timeLeft = 30;
    items = []; obstacles = [];
    
    active = true; lastTime = performance.now();
    requestAnimationFrame(loop);
}

function mLeft(e) { if(e) e.preventDefault(); if(active && dogLane > 0) { dogLane--; targetX = lanes[dogLane]; } }
function mRight(e) { if(e) e.preventDefault(); if(active && dogLane < 4) { dogLane++; targetX = lanes[dogLane]; } }

function loop(t) {
    if(!active) return;
    let dt = (t - lastTime) / 1000; lastTime = t;
    ctx.clearRect(0,0,W,H);

    // Bahnen zeichnen (Symmetrie-Guide)
    ctx.strokeStyle = "rgba(255,255,255,0.03)";
    lanes.forEach(lx => { ctx.beginPath(); ctx.moveTo(lx,0); ctx.lineTo(lx,H); ctx.stroke(); });

    timeLeft -= dt; let speedMult = 1 + (level * 0.15); energy -= (5 * speedMult) * dt;
    if(timeLeft <= 0) { level++; timeLeft = 30; energy = Math.min(100, energy + 20); }

    // UI Update
    document.getElementById("timer-display").innerText = Math.ceil(timeLeft);
    document.getElementById("score-display").innerText = Math.floor(score);
    document.getElementById("lvl-num").innerText = level;
    document.getElementById("hearts-display").innerText = "❤️".repeat(Math.max(0, hearts));
    document.getElementById("energy-fill").style.width = Math.max(0, energy) + "%";

    if(energy <= 0 || hearts <= 0) {
        active = false;
        document.getElementById("end-screen").style.display = "flex";
        document.getElementById("f-agent").innerText = pName;
        document.getElementById("f-score").innerText = Math.floor(score);
        return;
    }

    // Clouds
    ctx.font = "40px Arial"; ctx.textAlign = "center";
    clouds.forEach(c => { c.x += c.s; if(c.x > W+50) c.x = -60; ctx.fillText("☁️", c.x, c.y); });

    // Spawning
    if(Math.random() < 0.04) {
        let type = mode==='rabbit'?'🥕':(mode==='cat'?'🐟':'🦴');
        items.push({lane: Math.floor(Math.random()*5), y: -50, type, val: 15 * level});
    }
    if(Math.random() < 0.01) items.push({lane: Math.floor(Math.random()*5), y: -50, type: '😈', val: -1});

    // Hindernisse (Ropes/Spiders)
    if(obstacles.length < 2 && Math.random() < 0.01) {
        obstacles.push({lane: Math.floor(Math.random()*5), y: -100, d: 1, s: 150 * speedMult});
    }

    // Logic: Items
    items.forEach((it, i) => {
        it.y += (200 * speedMult) * dt;
        ctx.fillText(it.type, lanes[it.lane], it.y);
        if(it.lane === dogLane && it.y > H-130 && it.y < H-70) {
            if(it.type === '😈') { hearts--; shake = 15; floaters.push({x: lanes[it.lane], y: it.y, txt: "-LIFE", c: "red"}); }
            else { score += it.val; energy = Math.min(100, energy + 8); floaters.push({x: lanes[it.lane], y: it.y, txt: "+"+Math.floor(it.val), c: "var(--green)"}); }
            items.splice(i, 1);
        }
        if(it.y > H) items.splice(i,1);
    });

    // Logic: Obstacles
    obstacles.forEach((ob, i) => {
        ob.y += ob.s * dt;
        let ox = lanes[ob.lane];
        ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.beginPath(); ctx.moveTo(ox, 0); ctx.lineTo(ox, ob.y); ctx.stroke();
        ctx.fillText(mode==='cat'?'🐍':'🕷️', ox, ob.y + 20);
        if(ob.lane === dogLane && ob.y > H-140 && ob.y < H-80) {
            energy -= 25; shake = 20; floaters.push({x: ox, y: ob.y, txt: "-25%", c: "red"});
            obstacles.splice(i, 1);
        }
        if(ob.y > H) obstacles.splice(i, 1);
    });

    // Player
    dogX += (targetX - dogX) * 0.2;
    let drawX = dogX; if(shake > 0) { drawX += Math.sin(shake) * 5; shake--; }
    ctx.font = "70px Arial";
    ctx.fillText(mode==='rabbit'?'🐰':(mode==='cat'?'🐱':'🐶'), drawX, H-80);

    // Floaters
    floaters.forEach((f, i) => {
        f.y -= 2; f.opacity = (f.opacity || 1) - 0.02;
        ctx.globalAlpha = f.opacity; ctx.fillStyle = f.c; ctx.font = "bold 20px Orbitron";
        ctx.fillText(f.txt, f.x + 40, f.y);
        if(f.opacity <= 0) floaters.splice(i, 1);
    });
    ctx.globalAlpha = 1;

    requestAnimationFrame(loop);
}
init();
</script>
</body>
</html>
