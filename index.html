<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOGGYCO & CATS WORLD - ULTIMATE PRO</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { 
            --neon: #00f2ff; --green: #00ff88; --red: #ff3131; --gold: #ffd700; 
            --glass: rgba(255, 255, 255, 0.08); --cat-purple: #bc13fe;
        }
        
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #000; font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-y: auto; overflow-x: hidden;
        }

        /* 1. BACKGROUND ENGINE */
        #main-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url('hintergrund.png'); background-size: cover; background-position: center;
            z-index: -2; background-color: #050505; opacity: 0.6;
        }

        /* 2. NEON BLINKING TITLE */
        header h1 { 
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(35px, 10vw, 65px); 
            color: var(--neon); text-align: center; padding: 40px 10px; letter-spacing: 10px;
            animation: neonBlink 2s infinite alternate;
        }
        @keyframes neonBlink {
            0%, 100% { text-shadow: 0 0 20px var(--neon), 0 0 40px var(--neon); opacity: 1; }
            50% { text-shadow: 0 0 10px var(--neon); opacity: 0.7; }
        }

        /* 3. TRANSPARENT GAME VIEW */
        #game-view { width: 100vw; height: 80vh; display: flex; justify-content: center; position: relative; }
        
        #game-wrap { 
            position:relative; width: 400px; height: 100%; 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 2px solid rgba(0, 242, 255, 0.4); border-radius: 40px; 
            overflow: hidden; box-shadow: 0 0 50px rgba(0, 0, 0, 1);
        }

        /* HUD */
        #ui-header { position: absolute; top: 20px; width: 100%; z-index: 200; pointer-events: none; }
        #energy-bar-wrap { width: 85%; height: 14px; margin: 0 auto; background: rgba(0,0,0,0.6); border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); overflow: hidden; }
        #energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--red), var(--gold), var(--green)); transition: width 0.3s linear; }
        #hud-row { display: flex; justify-content: space-between; width: 85%; margin: 12px auto; font-family: 'Orbitron'; font-size: 14px; font-weight: 900; }

        canvas { position: absolute; inset: 0; z-index: 50; background: transparent; }

        /* OVERLAYS */
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(35px); z-index: 1000; background: rgba(0,0,0,0.5); border-radius: 36px; padding: 20px; }
        
        .main-btn { 
            padding: 16px 40px; background: var(--neon); color: #000; border: none;
            border-radius: 35px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; margin: 10px;
            box-shadow: 0 0 25px var(--neon); transition: 0.3s; width: 240px; text-transform: uppercase;
        }
        #pName { padding: 15px; border-radius: 15px; border: 2px solid var(--neon); background: rgba(255,255,255,0.1); color: #fff; text-align: center; font-family: 'Orbitron'; margin-bottom: 20px; width: 240px; font-size: 18px; outline: none; }

        /* TILES & SOCIAL BUTTONS */
        .content-area { width: 100%; max-width: 500px; padding: 40px 20px; display: flex; flex-direction: column; gap: 30px; }
        .tile { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 35px; padding: 30px; text-align: center; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .icon-btn { 
            display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 16px; border-radius: 18px; background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(0, 242, 255, 0.3); color: #fff; text-decoration: none; 
            font-size: 13px; font-weight: bold; transition: 0.3s;
        }
        .icon-btn i { font-size: 18px; color: var(--neon); }
        .icon-btn:hover { background: var(--neon); color: #000; }

        /* CONTROLS */
        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 45px; z-index: 300; }
        .arrow { width: 80px; height: 80px; background: rgba(255,255,255,0.1); border: 2px solid var(--neon); border-radius: 50%; color: #fff; font-size: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(10px); }

        .rank-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 14px; }
    </style>
</head>
<body>

<div id="main-bg"></div>
<header><h1>DOGGYCO</h1></header>

<div id="game-view">
    <div id="game-wrap">
        <div id="ui-header">
            <div id="energy-bar-wrap"><div id="energy-fill"></div></div>
            <div id="hud-row">
                <div id="hearts-disp">❤️❤️❤️</div>
                <div id="score-disp">🏆 0</div>
            </div>
        </div>
        
        <canvas id="game-canvas"></canvas>

        <div id="controls">
            <div class="arrow" onmousedown="mLeft()" ontouchstart="mLeft()"><i class="fas fa-chevron-left"></i></div>
            <div class="arrow" onmousedown="mRight()" ontouchstart="mRight()"><i class="fas fa-chevron-right"></i></div>
        </div>

        <div id="start-screen" class="overlay">
            <h2 style="color:var(--gold); font-family:'Orbitron'; margin-bottom:20px;">MISSION START</h2>
            <input type="text" id="pName" placeholder="ENTER NAME" maxlength="12">
            <button class="main-btn" onclick="startGame(false)">Play Doggy</button>
            <button class="main-btn" style="background:var(--cat-purple); box-shadow: 0 0 25px var(--cat-purple);" onclick="startGame(true)">Play Cat</button>
        </div>

        <div id="end-screen" class="overlay" style="display:none;">
            <h3 style="color:var(--red); font-family:'Orbitron';">MISSION FAILED</h3>
            <h1 id="f-score" style="color:var(--gold); font-size:55px; margin:20px 0;">0</h1>
            <button class="main-btn" onclick="location.reload()">Retry</button>
        </div>
    </div>
</div>

<div class="content-area">
    <div class="tile">
        <h3 style="color:var(--neon); font-family:'Orbitron';"><i class="fas fa-trophy"></i> LEADERBOARD</h3>
        <div id="leaderboard" style="margin-top:20px;">Loading ranking...</div>
    </div>
    
    <div class="tile">
        <h3 style="color:var(--gold); font-family:'Orbitron';"><i class="fas fa-heart"></i> SUPPORT</h3>
        <div class="btn-grid">
            <a href="https://www.tiktok.com" class="icon-btn"><i class="fab fa-tiktok"></i> TikTok</a>
            <a href="https://www.paypal.me" class="icon-btn"><i class="fab fa-paypal"></i> PayPal</a>
            <a href="#" class="icon-btn" onclick="copyWallet()"><i class="fas fa-wallet"></i> Copy BTC</a>
            <a href="#" class="icon-btn" onclick="alert('Avoid Police & Spiders! Collect Food!')"><i class="fas fa-info-circle"></i> Info</a>
        </div>
        <div style="background:#fff; padding:10px; border-radius:20px; display:inline-block; margin-top:20px; border: 2px solid var(--gold);">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=bc1qkm22c6w896u9n9cxp8ld049maef4xs5xn060ed" width="140">
        </div>
    </div>
</div>

<audio id="bgMusic" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<script>
/**
 * DOGGYCO MASTER ENGINE V85000
 * Final Fix: Async Database, Independent Startup, Symmetrical Lane Logic.
 */

const SUPABASE_URL = 'https://ovmsstdroxkinisqwlhw.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92bXNzdGRyb3hraW5pc3F3bGh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMzM3OTEsImV4cCI6MjA4NzgwOTc5MX0.SOsi-Aeb_wSp40_TTymaiiU0Kn_3rhG_LnvLjJP66z8';
let supabase;

// 1. FAIL-SAFE INITIALIZATION
try {
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
} catch(e) { console.warn("Supabase not loaded yet."); }

const canvas = document.getElementById("game-canvas");
const ctx = canvas.getContext("2d");
const music = document.getElementById("bgMusic");
const W = 400; 
let H, active = false, isCat = false, score = 0, energy = 100, hearts = 3, lane = 2, dogX = 200, targetX = 200;
let items = [], spiders = [], floaters = [], lastTime = 0, dogShake = 0;

function init() {
    canvas.width = W;
    H = canvas.height = document.getElementById("game-wrap").offsetHeight;
    loadRanks();
}

const audio = new (window.AudioContext || window.webkitAudioContext)();
function playBeep(f, d, t='sine') {
    if(audio.state === 'suspended') audio.resume();
    let o = audio.createOscillator(), g = audio.createGain();
    o.type = t; o.frequency.value = f; g.gain.value = 0.05;
    o.connect(g); g.connect(audio.destination);
    o.start(); g.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime + d);
    o.stop(audio.currentTime + d);
}

// 2. START WITHOUT BLOCKING
function startGame(catMode) {
    if(!document.getElementById("pName").value) return alert("Enter Name!");
    isCat = catMode;
    document.getElementById("start-screen").style.display = "none";
    music.play().catch(() => {});
    active = true; lastTime = performance.now();
    requestAnimationFrame(loop);
}

function mLeft() { if(active && lane > 0) { lane--; targetX = lane * 80 + 40; } }
function mRight() { if(active && lane < 4) { lane++; targetX = lane * 80 + 40; } }

function loop(t) {
    if(!active) return;
    let dt = (t - lastTime) / 1000; lastTime = t;
    if(dt > 0.1) dt = 0.016;
    ctx.clearRect(0,0,W,H);

    energy -= 6.5 * dt;
    document.getElementById("energy-fill").style.width = energy + "%";
    document.getElementById("score-disp").innerText = "🏆 " + Math.floor(score);
    document.getElementById("hearts-disp").innerText = "❤️".repeat(Math.max(0, hearts));

    if(energy <= 0 || hearts <= 0) {
        active = false; music.pause();
        document.getElementById("end-screen").style.display = "flex";
        document.getElementById("f-score").innerText = Math.floor(score);
        saveScore(); return;
    }

    // 3. SPIDERS (UP/DOWN)
    if(Math.random() < 0.035) {
        let ln = Math.floor(Math.random()*5);
        if(Math.random() < 0.75) {
            let r = Math.random();
            let type = r < 0.1 ? '👮' : (r < 0.7 ? (isCat?'🍼':'🦴') : (r < 0.9 ? '🍪' : '🥩'));
            items.push({lane: ln, y: -50, type, p: (type==='🦴'||type==='🍼'?10:(type==='🍪'?25:50))});
        } else if(spiders.length < 2) {
            spiders.push({lane: ln, y: 0, d: 1, speed: 190});
        }
    }

    spiders.forEach((s, i) => {
        s.y += s.speed * dt * s.d;
        if(s.y > H * 0.7) s.d = -1;
        if(s.y < -50) spiders.splice(i, 1);
        let sx = s.lane * 80 + 40;
        ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, s.y); ctx.stroke();
        ctx.font = "35px Arial"; ctx.textAlign = "center";
        ctx.fillText(isCat?"🐍":"🕷️", sx, s.y+20);
        if(s.lane === lane && s.y > H-150 && s.y < H-80) { energy -= 25; playBeep(140, 0.3, 'sawtooth'); spiders.splice(i,1); }
    });

    // 4. ITEMS & DIAGONAL FLOATERS
    items.forEach((it, i) => {
        it.y += (240 + score/10) * dt;
        let ix = it.lane * 80 + 40;
        ctx.font = "40px Arial"; ctx.textAlign = "center";
        ctx.fillText(it.type, ix, it.y);
        if(it.lane === lane && it.y > H-150 && it.y < H-80) {
            if(it.type === '👮') { hearts--; playBeep(100, 0.4, 'sawtooth'); floaters.push({x:ix, y:it.y, txt:"-❤️", c:"red"}); }
            else { score += it.p; energy = Math.min(100, energy + 12); playBeep(500 + it.p*6, 0.1); floaters.push({x:ix, y:it.y, txt:"+"+it.p, c:"#00ff88"}); }
            items.splice(i, 1);
        }
        if(it.y > H) items.splice(i, 1);
    });

    // 5. PLAYER (SMOOTH SYMMETRY)
    dogX += (targetX - dogX) * 0.22;
    ctx.font = "75px Arial"; ctx.textAlign = "center";
    ctx.fillText(isCat ? "🐱" : "🐶", dogX, H-100);

    floaters.forEach((f, i) => {
        f.y -= 3; f.x += 1.5; 
        ctx.fillStyle = f.c; ctx.font = "bold 22px Orbitron"; ctx.fillText(f.txt, f.x, f.y);
        if(f.y < 0) floaters.splice(i, 1);
    });

    requestAnimationFrame(loop);
}

// 6. DB ASYNC LOGIC
async function saveScore() {
    if(!supabase) return;
    const n = document.getElementById("pName").value;
    try {
        await supabase.from('leaderboard').insert([{ n, s: Math.floor(score) }]);
        loadRanks();
    } catch(e) {}
}

async function loadRanks() {
    if(!supabase) return;
    try {
        let { data } = await supabase.from('leaderboard').select('*').order('s', { ascending: false }).limit(5);
        if(data) document.getElementById("leaderboard").innerHTML = data.map((x, i) => {
            let m = i===0?'🥇':(i===1?'🥈':(i===2?'🥉':'🔹'));
            return `<div class="rank-row"><span>${m} ${x.n}</span><span>${x.s}</span></div>`;
        }).join('');
    } catch(e) { document.getElementById("leaderboard").innerText = "Offline Mode Active"; }
}

function copyWallet() { navigator.clipboard.writeText('bc1qkm22c6w896u9n9cxp8ld049maef4xs5xn060ed'); alert("Wallet copied!"); }
window.onload = init;
</script>
</body>
</html>
