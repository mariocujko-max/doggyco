<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOGGYCO - V240 DEVIL'S EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --neon: #00f2ff; --green: #00ff88; --red: #ff3131; --gold: #ffd700; 
            --blue-glow: #0070ff; --cat-purple: #bc13fe; --rabbit-orange: #ff8c00;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            background: #000; font-family: 'Orbitron', sans-serif; color: #fff; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-x: hidden;
        }

        #main-bg {
            position: fixed; inset: 0;
            background: url('hintergrund.png') center/cover no-repeat #000;
            filter: brightness(0.8); z-index: -10;
        }

        @keyframes neonPulse { 0%, 100% { border-color: var(--neon); box-shadow: 0 0 15px var(--neon); } 50% { border-color: #fff; box-shadow: 0 0 35px var(--neon); } }
        header h1 { font-size: clamp(24px, 8vw, 42px); color: var(--neon); text-shadow: 0 0 20px var(--neon); padding: 15px; text-align: center; }

        /* UNIFORM GAME BOX */
        #game-view { width: 100%; display: flex; justify-content: center; padding: 10px; z-index: 5; }
        #game-wrap { 
            position:relative; width: 400px; height: 620px; 
            background: rgba(0,0,0,0.6); border: 4px solid var(--neon); border-radius: 50px; 
            overflow: hidden; animation: neonPulse 3s infinite;
        }

        /* HUD - NAME ENTFERNT */
        #ui-header { position: absolute; top: 15px; width: 100%; z-index: 200; pointer-events: none; }
        #energy-bar-wrap { width: 85%; height: 20px; margin: 0 auto 10px; background: rgba(0,0,0,0.8); border: 2px solid #fff; border-radius: 10px; overflow: hidden; }
        #energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--red), var(--gold), var(--green)); transition: width 0.3s; }
        #hud-main { 
            display: flex; justify-content: space-between; align-items: center; width: 90%; margin: 0 auto; 
            font-size: 13px; font-weight: 900; background: rgba(0,0,0,0.7); padding: 8px 12px; 
            border-radius: 15px; border: 1px solid var(--neon); backdrop-filter: blur(10px);
        }

        canvas { position: absolute; inset: 0; z-index: 50; display: block; }

        /* PANELS */
        .glass-panel { 
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 3px solid var(--neon); border-radius: 35px; padding: 25px; 
            width: 95vw; max-width: 400px; margin: 15px 0; text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); animation: neonPulse 5s infinite;
        }

        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; background: rgba(0,0,0,0.9); border-radius: 46px; padding: 30px; }
        .neon-btn { padding: 16px; background: var(--green); color: #000; border-radius: 40px; font-weight: 900; cursor: pointer; font-family: 'Orbitron'; margin: 10px 0; width: 100%; box-shadow: 0 0 15px var(--green); transition: 0.3s; }

        /* STEERING */
        #controls { position: absolute; bottom: 25px; width: 100%; display: flex; justify-content: space-between; padding: 0 45px; z-index: 300; }
        .btn-arrow { width: 85px; height: 85px; background: rgba(255,255,255,0.05); border: 3px solid var(--neon); border-radius: 50%; color: #fff; font-size: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-arrow:active { background: var(--blue-glow); border-color: #fff; }

        #pName { width: 100%; padding: 18px; border-radius: 15px; border: 3px solid var(--neon); background: #000; color: #fff; text-align: center; font-family: 'Orbitron'; margin-bottom: 15px; font-size: 18px; }
    </style>
</head>
<body>

<div id="main-bg"></div>
<header><h1 id="main-title">MISSION HUB</h1></header>

<div id="game-view">
    <div id="game-wrap">
        <div id="ui-header">
            <div id="energy-bar-wrap"><div id="energy-fill"></div></div>
            <div id="hud-main">
                <div id="hearts-display">❤️❤️❤️</div>
                <div style="color:var(--gold)">⏱️<span id="timer-display">30</span></div>
                <div style="color:var(--neon)">🏆<span id="score-display">0</span></div>
                <div style="background:#fff; color:#000; padding:1px 5px; border-radius:4px;">L<span id="lvl-num">1</span></div>
            </div>
        </div>
        <canvas id="game-canvas"></canvas>
        <div id="controls">
            <div class="btn-arrow" onmousedown="mLeft()" ontouchstart="mLeft(event)">◀</div>
            <div class="btn-arrow" onmousedown="mRight()" ontouchstart="mRight(event)">▶</div>
        </div>

        <div id="name-screen" class="overlay">
            <div class="glass-panel" style="border:none; background:none; box-shadow:none;">
                <input type="text" id="pName" placeholder="DEIN NAME">
                <button class="neon-btn" onclick="toMenu()">BESTÄTIGEN</button>
            </div>
        </div>

        <div id="start-screen" class="overlay" style="display:none;">
            <div class="glass-panel" style="border:none; background:none; box-shadow:none;">
                <button class="neon-btn" onclick="startGame('dog')">DOGGY MISSION</button>
                <button class="neon-btn" style="background:var(--cat-purple); color:#fff;" onclick="startGame('cat')">CATS WORLD</button>
                <button class="neon-btn" style="background:var(--rabbit-orange); color:#fff;" onclick="startGame('rabbit')">RABBIT FOREST</button>
            </div>
        </div>

        <div id="end-screen" class="overlay" style="display:none;">
            <h1 id="f-agent" style="color:#fff; font-size:28px; margin-bottom:10px;">AGENT ...</h1>
            <h1 id="f-score" style="font-size: 65px; color: var(--gold); margin-bottom:20px;">0</h1>
            <button class="neon-btn" onclick="location.reload()">NEUSTART</button>
        </div>
    </div>
</div>

<div class="glass-panel">
    <h3 style="color:var(--gold); margin-bottom:15px;">🏆 BESTENLISTE</h3>
    <div id="leaderboard">Lade...</div>
</div>

<div class="glass-panel">
    <h3 style="color:var(--green); margin-bottom:15px;">💎 SUPPORT</h3>
    <button class="neon-btn" style="background:#ff0050; color:#fff;" onclick="window.open('https://tiktok.com')">TikTok</button>
    <div style="background:#fff; padding:12px; border-radius:20px; display:inline-block; margin-top:10px; border:3px solid var(--gold);">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=BTC_WALLET" width="140">
    </div>
</div>

<div class="glass-panel">
    <h3 style="color:var(--neon); margin-bottom:10px;">📖 ANLEITUNG</h3>
    <p style="font-size:12px; text-align:left; line-height:1.6;">
        Sammle Items für grüne Punkte. <br>
        Weiche dem Teufel 😈 aus (-1 Herz). <br>
        Seil-Gegner ziehen Energie ab (-30%).
    </p>
</div>

<script>
const canvas = document.getElementById("game-canvas");
const ctx = canvas.getContext("2d");
let W = 400, H = 620;
let dogLane = 2, lanes = [40, 120, 200, 280, 360];
let dogX = lanes[2], targetX = lanes[2], active = false, mode = 'dog', pName = "AGENT";
let items = [], spiders = [], floaters = [], clouds = [], lastTime = 0;
let score = 0, hearts = 3, energy = 100, level = 1, timeLeft = 30, shake = 0;
let audioCtx, music;

function init() {
    canvas.width = W; canvas.height = H;
    for(let i=0; i<3; i++) clouds.push({x: Math.random()*W, y: 100+Math.random()*80, s: 0.3+Math.random()*0.4});
}

function playSfx(f, t, d, v=0.3) {
    if(!audioCtx) return;
    let o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
    g.gain.setValueAtTime(v, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + d);
}

function toMenu() {
    let inp = document.getElementById("pName").value;
    if(inp) {
        pName = inp.toUpperCase();
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        document.getElementById("name-screen").style.display = "none";
        document.getElementById("start-screen").style.display = "flex";
    }
}

function startGame(m) {
    mode = m;
    document.getElementById("start-screen").style.display = "none";
    let color = (mode==='cat') ? 'var(--cat-purple)' : (mode==='rabbit' ? 'var(--rabbit-orange)' : 'var(--neon)');
    document.documentElement.style.setProperty('--neon', color);
    document.getElementById("main-title").innerText = mode.toUpperCase() + " MISSION";
    document.getElementById("main-title").style.color = color;
    
    music = new Audio(mode + '.mp3'); music.loop = true; music.volume = 0.2; music.play().catch(()=>{});
    spiders.push({lane: 1, y: 0, d: 1}, {lane: 3, y: 150, d: 1});
    active = true; lastTime = performance.now();
    requestAnimationFrame(loop);
}

function mLeft() { if(active && dogLane > 0) { dogLane--; targetX = lanes[dogLane]; playSfx(300, 'sine', 0.1); } }
function mRight() { if(active && dogLane < 4) { dogLane++; targetX = lanes[dogLane]; playSfx(300, 'sine', 0.1); } }

function loop(t) {
    if(!active) return;
    let dt = (t - lastTime) / 1000; lastTime = t;
    ctx.clearRect(0,0,W,H);

    // Stats
    timeLeft -= dt; 
    let mult = Math.pow(1.1, level - 1);
    energy -= (4.8 * mult) * dt;
    if(timeLeft <= 0) { level++; timeLeft = 30; energy = 100; playSfx(880, 'sine', 0.4); }

    document.getElementById("timer-display").innerText = Math.ceil(timeLeft);
    document.getElementById("score-display").innerText = Math.floor(score);
    document.getElementById("lvl-num").innerText = level;
    document.getElementById("hearts-display").innerText = "❤️".repeat(Math.max(0, hearts));
    document.getElementById("energy-fill").style.width = Math.max(0, energy) + "%";

    if(energy <= 0 || hearts <= 0) {
        active = false;
        document.getElementById("end-screen").style.display = "flex";
        document.getElementById("f-agent").innerText = "AGENT " + pName;
        document.getElementById("f-score").innerText = Math.floor(score);
        return;
    }

    // Clouds
    ctx.font = "40px Arial"; ctx.textAlign = "center";
    clouds.forEach(c => { c.x += c.s; if(c.x > W+50) c.x = -60; ctx.fillText("☁️", c.x, c.y); });

    // Spawn Logic
    if(items.length < 5 && Math.random() < 0.03) {
        let l = Math.floor(Math.random()*5);
        if(!spiders.some(s => s.lane === l)) {
            let r = Math.random(), type, val;
            if(mode==='rabbit') { type = (r<0.3)?'🥕':(r<0.6?'🍎':'🌼'); val=(r<0.3?30:(r<0.6?20:10))*mult; }
            else if(mode==='cat') { type = (r<0.3)?'🍰':(r<0.6?'🐟':'🍼'); val=(r<0.3?30:(r<0.6?20:10))*mult; }
            else { type = (r<0.3)?'🥩':(r<0.6?'🍪':'🦴'); val=(r<0.3?30:(r<0.6?20:10))*mult; }
            items.push({lane: l, y: -60, type, val});
        }
    }
    // DER TEUFEL (Lebensabzug)
    if(Math.random() < 0.008) items.push({lane: Math.floor(Math.random()*5), y: -60, type: '😈', val: -999});

    // Seil-Gegner
    spiders.forEach((s, i) => {
        s.y += (180 + level * 12) * dt * s.d;
        if(s.y > H-180) s.d = -1; if(s.y < 0) { s.d = 1; s.lane = Math.floor(Math.random()*5); }
        let sx = lanes[s.lane];
        ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, s.y); ctx.stroke();
        ctx.fillText(mode==='rabbit'?"🦉":(mode==='cat'?"🐍":"🕷️"), sx, s.y + 25);
        if(s.lane === dogLane && s.y > H-180 && s.y < H-80) { 
            energy -= 30; shake = 15; playSfx(100, 'sawtooth', 0.3);
            floaters.push({x: sx, y: s.y, txt: "-30%", c: "red", vx: -0.8}); spiders.splice(i,1); spiders.push({lane: Math.floor(Math.random()*5), y:0, d:1});
        }
    });

    // Items
    items.forEach((it, i) => {
        it.y += (250 + level * 10) * dt;
        let ix = lanes[it.lane];
        ctx.fillText(it.type, ix, it.y);

        if(it.lane === dogLane && it.y > H-150 && it.y < H-60) {
            if(it.type === '😈') { hearts--; shake = 20; playSfx(80, 'square', 0.4); floaters.push({x: ix, y: it.y, txt: "-LIFE", c: "red", vx: -0.8}); }
            else { 
                score += it.val; energy = Math.min(100, energy + 12); playSfx(600, 'sine', 0.1);
                floaters.push({x: ix, y: it.y, txt: "+"+Math.floor(it.val), c: "var(--green)", vx: 0.8});
            }
            items.splice(i, 1);
        }
        if(it.y > H) items.splice(i, 1);
    });

    dogX += (targetX - dogX) * 0.22;
    let visualX = dogX;
    if(shake > 0) { visualX += Math.sin(shake) * 8; shake--; }
    ctx.font = "75px Arial";
    ctx.fillText(mode==='rabbit' ? "🐰" : (mode==='cat' ? "🐱" : "🐶"), visualX, H - 90);

    floaters.forEach((f, i) => {
        f.y -= 2.5; f.x += f.vx; f.l = (f.l || 1) - dt;
        ctx.globalAlpha = f.l; ctx.fillStyle = f.c; ctx.font = "bold 24px Orbitron";
        ctx.fillText(f.txt, f.x, f.y);
        if(f.l <= 0) floaters.splice(i, 1);
    });
    ctx.globalAlpha = 1; requestAnimationFrame(loop);
}
init();
</script>
</body>
</html>
