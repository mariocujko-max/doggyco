<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DOGGYCO MISSION</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon:#00f2ff; --green:#00ff88; --red:#ff3131; --gold:#FFD700; --glass:rgba(255,255,255,0.08); }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; outline:none; }
        input[type="text"] { user-select:auto; -webkit-user-select:auto; }
        
        html, body { overscroll-behavior:none; width:100vw; height:100dvh; overflow:hidden; background:#000; font-family:'Orbitron', sans-serif; color:#fff; display:flex; justify-content:center; align-items:center; }
        #bg-fx { position:absolute; inset:0; background-image:url('hintergrund.png'); background-size:cover; background-position:center; z-index:1; }
        #bg-overlay { position:absolute; inset:0; background:radial-gradient(circle, rgba(0,0,0,0) 0%, rgba(0,0,0,0.6) 100%); z-index:2; }
        #phone-container { position:relative; width:100%; max-width:420px; height:100%; z-index:10; overflow:hidden; margin:0 auto; }
        @media (min-width: 450px) { #phone-container { height:90vh; max-height:850px; border-radius:35px; border:1px solid rgba(255,255,255,0.1); box-shadow:0 15px 40px rgba(0,0,0,0.8); } #bg-overlay { background:radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%); } }

        /* GAMEPLAY */
        #game-wrap { position:absolute; inset:0; width:100%; height:100%; visibility:hidden; pointer-events:none; z-index:20; }
        #canvas { position:absolute; inset:0; width:100%; height:100%; object-fit:contain; z-index:50; }
        #hud { position:absolute; top:env(safe-area-inset-top, 10px); width:100%; z-index:200; pointer-events:none; padding:10px; }
        #mission-title { text-align:center; font-size:24px; font-weight:900; color:var(--neon); text-shadow:0 0 10px var(--neon); margin-bottom:10px; }
        #energy-box { width:85%; height:18px; margin:0 auto 10px; background:rgba(0,0,0,0.8); border-radius:10px; border:2px solid #fff; overflow:hidden; }
        #energy-fill { height:100%; width:100%; background:linear-gradient(90deg, var(--red), var(--gold), var(--green)); transition:width 0.2s linear; }
        #stats-bar { display:flex; justify-content:space-between; width:90%; margin:0 auto; background:rgba(255,255,255,0.15); padding:8px 15px; border-radius:12px; backdrop-filter:blur(10px); font-size:14px; font-weight:900; }
        #controls { position:absolute; bottom:30px; width:100%; display:flex; justify-content:space-between; padding:0 30px; z-index:300; pointer-events:none; }
        .arrow { width:80px; height:80px; background:rgba(255,255,255,0.1); border:2px solid var(--neon); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:40px; color:var(--neon); pointer-events:auto; }

        /* SCREENS */
        .screen { position:fixed; inset:0; z-index:100; display:flex; justify-content:center; align-items:center; padding:20px; overscroll-behavior:none; }
        .screen-inner { width:100%; max-width:400px; display:flex; flex-direction:column; align-items:center; }
        
        .start-glass-panel { width:100%; background:var(--glass); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-radius:30px; border:1px solid rgba(255,255,255,0.2); padding:40px 20px; display:flex; flex-direction:column; align-items:center; box-shadow:0 25px 50px rgba(0,0,0,0.6); }
        .app-title { font-size:clamp(30px, 10vw, 45px); color:var(--gold); text-align:center; text-shadow:0 0 20px var(--gold); margin-bottom:25px; font-weight:900; line-height:1; }
        .dog-video-wrapper { width:100%; display:flex; justify-content:center; margin-bottom:25px; }
        .dog-video-canvas { width:230px; height:230px; object-fit:contain; filter:drop-shadow(0 15px 25px #000); }
        
        .name-input, .final-info-box { width:100%; padding:16px; border-radius:15px; border:2px solid var(--neon); background:rgba(0,0,0,0.7); color:#fff; text-align:center; font-family:'Orbitron'; font-size:18px; margin-bottom:20px; font-weight:700; }
        .btn-main { width:100%; padding:20px; border-radius:15px; border:none; background:var(--green); color:#000; font-weight:900; font-size:20px; box-shadow:0 6px 0 #00b362; transition:0.1s; cursor:pointer; }
        .btn-main:active { transform:translateY(4px); box-shadow:0 2px 0 #00b362; }

        /* LEVEL SELECT */
        #scr-start { overflow-y:auto; background:rgba(0,0,0,0.6); backdrop-filter:blur(15px); align-items:flex-start; }
        .info-panel { background:var(--glass); border-radius:20px; padding:20px; margin-bottom:15px; border:1px solid rgba(255,255,255,0.1); width:100%; }
        .grid-levels { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; width:100%; }
        .btn-char { background:rgba(0,0,0,0.5); border:2px solid var(--neon); padding:15px 5px; border-radius:15px; color:#fff; display:flex; flex-direction:column; align-items:center; cursor:pointer; font-size:12px; font-weight:bold; }
        .btn-char span { font-size:35px; margin-bottom:5px; }

        #lvl-up-popup { position:fixed; top:50%; left:50%; transform:translate(-50%, -50%) scale(0); background:rgba(0,0,0,0.9); padding:30px; border-radius:25px; border:3px solid var(--gold); z-index:1000; transition:0.4s; text-align:center; pointer-events:none; }
        #lvl-up-popup.show { transform:translate(-50%, -50%) scale(1); }

        .status-text { font-size:clamp(24px, 7vw, 36px); font-weight:900; text-transform:uppercase; text-align:center; margin-bottom:10px; line-height:1.2;}
        .green-glow { color:var(--green); text-shadow:0 0 15px var(--green); }
        .red-glow { color:var(--red); text-shadow:0 0 15px var(--red); }
        
        .rank-row { display:flex; justify-content:space-between; padding:8px 5px; border-bottom:1px solid rgba(255,255,255,0.1); font-family:'Plus Jakarta Sans', sans-serif; font-size:16px; font-weight:700; }
        .rank-gold { color:var(--gold); text-shadow:0 0 10px var(--gold); font-weight:900; }
    </style>
</head>
<body>

<div id="bg-fx"></div>
<div id="bg-overlay"></div>

<div id="phone-container">
    
    <div id="game-wrap">
        <div id="hud">
            <div id="mission-title">DOG MISSION</div>
            <div id="energy-box"><div id="energy-fill"></div></div>
            <div id="stats-bar">
                <div>LVL <span id="lvl-txt">1</span></div>
                <div id="hp-txt">❤️❤️❤️</div>
                <div id="score-txt" style="color:var(--gold)">0 PTS</div>
                <div id="time-txt">30s</div>
            </div>
        </div>
        <canvas id="canvas"></canvas>
        <div id="controls">
            <div class="arrow" ontouchstart="triggerMove(-1)" onmousedown="triggerMove(-1)">◀</div>
            <div class="arrow" ontouchstart="triggerMove(1)" onmousedown="triggerMove(1)">▶</div>
        </div>
    </div>

    <div id="scr-name" class="screen">
        <div class="screen-inner">
            <div class="start-glass-panel">
                <h1 class="app-title">DOGGYCO</h1>
                <div class="dog-video-wrapper">
                    <canvas id="dog-canvas1" width="250" height="250" class="dog-video-canvas"></canvas>
                    <video id="dog-v1" src="dog.video.mp4" playsinline muted autoplay loop crossorigin="anonymous" style="display:none;"></video>
                </div>
                <input type="text" id="pName" class="name-input" placeholder="ENTER CODENAME" maxlength="12">
                <button class="btn-main" onclick="authAgent()">AUTHENTICATE</button>
            </div>
        </div>
    </div>

    <div id="scr-start" class="screen" style="display:none;">
        <div class="screen-inner" style="padding-top:50px;">
            <div class="info-panel">
                <h3 style="text-align:center; color:var(--gold); margin-bottom:20px; border-bottom:2px solid var(--gold); padding-bottom:10px;">SELECT MISSION</h3>
                <div class="grid-levels">
                    <button class="btn-char" onclick="startGame('dog', 1)"><span>🐶</span>DOG</button>
                    <button class="btn-char" onclick="startGame('cat', 3)" style="border-color:#bc13fe"><span>🐱</span>CAT</button>
                    <button class="btn-char" onclick="startGame('rabbit', 5)" style="border-color:#ff8c00"><span>🐰</span>RABBIT</button>
                    <button class="btn-char" onclick="startGame('fox', 7)" style="border-color:#ff4500"><span>🦊</span>FOX</button>
                    <button class="btn-char" onclick="startGame('panda', 9)" style="border-color:#ffffff"><span>🐼</span>PANDA</button>
                    <button class="btn-char" onclick="startGame('unicorn', 11)" style="border-color:#ff00ff"><span>🦄</span>UNICORN</button>
                </div>
            </div>
            <div class="info-panel" style="text-align:center;">
                <h3 style="color:var(--gold); margin-bottom:10px; border-bottom:2px solid var(--gold); padding-bottom:10px;">TOP AGENTS</h3>
                <div id="leaderboard" style="font-size:14px; font-family:'Plus Jakarta Sans';">Checking Mainframe...</div>
            </div>
        </div>
    </div>

    <div id="scr-end" class="screen" style="display:none;">
        <div class="screen-inner">
            <div class="start-glass-panel">
                <h1 class="app-title">DOGGYCO</h1>
                <div id="end-status-msg" class="status-text green-glow">MISSION<br>ACCOMPLISHED</div>
                <div class="dog-video-wrapper">
                    <canvas id="dog-canvas2" width="250" height="250" class="dog-video-canvas"></canvas>
                    <video id="dog-v2" src="dog.video2.mp4" playsinline muted loop crossorigin="anonymous" style="display:none;"></video>
                </div>
                <div id="final-res" class="final-info-box">AGENT - 0 PTS</div>
                <button class="btn-main" onclick="restartToSelection()">RESTART</button>
            </div>
        </div>
    </div>

</div>

<div id="lvl-up-popup"><h2>LEVEL UP</h2></div>
<audio id="snd-action" src="music.mp3" loop preload="auto"></audio>

<script>
// --- KONFIGURATION & CANVAS ---
let canvas = document.getElementById("canvas"), ctx = canvas.getContext("2d");
let W = 400, H = 700; canvas.width = W; canvas.height = H;
const lanes = [40, 120, 200, 280, 360];
let currLane = 2, playerX = lanes[2], targetX = lanes[2];
let active = false, missionComplete = false, score = 0, hp = 3, energy = 100, level = 1, timeLeft = 30, agent = "PLAYER", mode = "dog";
let entities = [], floaters = [], permSpiders = [], fireworks = [], clouds = [], opponents = [], ufos = [], fallingHearts = [];
let lastT = 0, invincibleTimer = 0, alarmTimer = 0, rocketSpawned = false, ufoSpawned = false, rocket = null, fallingCore = null;

// --- GREEN SCREEN & CROP ---
function setupDogFilter(videoID, canvasID) {
    let v = document.getElementById(videoID), c = document.getElementById(canvasID), cx = c.getContext('2d', {willReadFrequently:true});
    function render() {
        if (!v.paused && !v.ended) {
            let vw = v.videoWidth, vh = v.videoHeight, sz = Math.min(vw, vh);
            cx.drawImage(v, (vw-sz)/2, (vh-sz)/2, sz, sz, 0, 0, c.width, c.height);
            try {
                let img = cx.getImageData(0,0,c.width,c.height), d = img.data;
                for(let i=0; i<d.length; i+=4) {
                    if(d[i+1] > 90 && d[i+1] > d[i]*1.1 && d[i+1] > d[i+2]*1.1) d[i+3] = 0;
                }
                cx.putImageData(img,0,0);
            } catch(e){}
        }
        requestAnimationFrame(render);
    }
    v.addEventListener('play', render);
    return v;
}
let dv1 = setupDogFilter('dog-v1', 'dog-canvas1');
let dv2 = setupDogFilter('dog-v2', 'dog-canvas2');

// --- AUDIO REGIE ---
let systemActive = false, dogHasSpoken = false, audioCtx = null;
function initAudioContext() {
    if(!systemActive) {
        systemActive = true;
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        } catch(e) {}
    }
}

function forceAudioStart() {
    initAudioContext();
    if (!dogHasSpoken && dv1) {
        if(document.getElementById("scr-end").style.display === "none" && !active) {
            try {
                dv1.muted = false; dv1.volume = 1.0; 
                dv1.play().catch(e => { dogHasSpoken = false; });
                dogHasSpoken = true;
            } catch(e) {}
        }
    }
}
document.addEventListener('touchstart', forceAudioStart, { once: false });
document.addEventListener('click', forceAudioStart, { once: false });

// --- NAVIGATION ---
function authAgent() {
    initAudioContext(); 
    let n = document.getElementById("pName").value.trim().toUpperCase();
    if(n) {
        agent = n;
        try { localStorage.setItem("doggycoAgent", agent); } catch(e) {}
        document.getElementById("scr-name").style.display = "none";
        document.getElementById("scr-start").style.display = "flex";
        dv1.muted = false; dv1.play().catch(()=>{});
    }
}

function startGame(m, l) {
    dv1.pause(); dv2.pause(); // Alle Hunde-Videos stoppen
    
    let bg = document.getElementById("snd-action"); // Spielmusik an
    if(bg) { bg.currentTime = 0; bg.volume = 0.2; bg.play().catch(()=>{}); }
    
    mode = m; level = l; hp = 3; energy = 100; score = 0; timeLeft = 30;
    entities = []; floaters = []; fireworks = []; missionComplete = false;
    invincibleTimer = 0; alarmTimer = 0; rocketSpawned = false; ufoSpawned = false; rocket = null; fallingCore = null; fallingHearts = [];
    
    clouds = []; for(let i=0; i<8; i++) clouds.push({ x: Math.random()*W, y: Math.random()*H/2, s: 30+Math.random()*30 });
    opponents = []; ufos = [];
    
    const colors = { 'dog':'#00f2ff', 'cat':'#bc13fe', 'rabbit':'#ff8c00', 'fox':'#ff4500', 'panda':'#ffffff', 'unicorn':'#ff00ff' };
    document.documentElement.style.setProperty('--neon', colors[mode]);
    
    document.getElementById("scr-start").style.display = "none";
    document.getElementById("game-wrap").style.visibility = "visible";
    document.getElementById("game-wrap").style.pointerEvents = "auto";
    
    permSpiders = [ { lane: 0, y: 60, dy: 1, hit: false }, { lane: 4, y: H-120, dy: -1, hit: false } ];
    active = true; lastT = 0; 
    requestAnimationFrame(loop);
}

function showGameOverScreen(win) {
    active = false;
    let bg = document.getElementById("snd-action"); // Musik SOFORT aus
    if(bg) bg.pause(); 

    document.getElementById("game-wrap").style.pointerEvents = "none";
    document.getElementById("game-wrap").style.visibility = "hidden";
    document.getElementById("scr-end").style.display = "flex";
    
    let endT = document.getElementById("end-status-msg");
    if(win) { endT.innerHTML = "MISSION<br>ACCOMPLISHED"; endT.className = "status-text green-glow"; } 
    else { endT.innerHTML = "MISSION<br>FAILED"; endT.className = "status-text red-glow"; }
    
    document.getElementById("final-res").innerText = agent + " - " + Math.floor(score) + " PTS";

    dv2.muted = false; dv2.currentTime = 0; dv2.play().catch(()=>{}); // End-Hund spricht
    try { saveScoreAndRefresh(Math.floor(score)); } catch(e) {}
}

function restartToSelection() {
    dv2.pause();
    document.getElementById("scr-end").style.display = "none";
    document.getElementById("scr-start").style.display = "flex";
    dv1.currentTime = 0; dv1.play().catch(()=>{}); 
}

// --- GAMEPLAY ENGINE ---
function triggerMove(dir) {
    if(!active || missionComplete) return;
    currLane = Math.max(0, Math.min(4, currLane + dir));
    targetX = lanes[currLane];
    if("vibrate" in navigator) { try { navigator.vibrate(30); } catch(e){} }
}
window.addEventListener("keydown", function(e) {
    if(!active || missionComplete) return;
    if(e.key === "ArrowLeft") triggerMove(-1);
    if(e.key === "ArrowRight") triggerMove(1);
});

function getSafeLaneForItems() {
    let bLanes = permSpiders.map(s => s.lane);
    let sLanes = [0,1,2,3,4].filter(l => !bLanes.includes(l));
    return sLanes.length === 0 ? 2 : sLanes[Math.floor(Math.random() * sLanes.length)];
}

function loop(t) {
    if(!active) return;
    requestAnimationFrame(loop); 
    
    try {
        if(lastT === 0) lastT = t; 
        let dt = (t - lastT) / 1000; lastT = t;
        if(dt > 0.1) dt = 0.016;
        ctx.clearRect(0,0,W,H);

        const hitTop = H - 150, hitBottom = H - 50;
        let capLvl = Math.min(level, 12);
        let speedMult = 1.35 + ((capLvl - 1) * (1.15 / 11)); 

        if(invincibleTimer > 0) {
            invincibleTimer -= dt; alarmTimer -= dt;
            if (alarmTimer <= 0) { sfxAlarm(); alarmTimer = 0.8; }
            if(invincibleTimer < 0) invincibleTimer = 0;
        }

        if (!missionComplete) {
            timeLeft -= dt; energy -= (4 * speedMult) * dt;

            if(timeLeft <= 24 && !rocketSpawned) { rocketSpawned = true; rocket = { x: W+50, y: 150, s: 250, laid: false, targetLane: getSafeLaneForItems() }; sfxRocket(); }
            if(timeLeft <= 12 && !ufoSpawned) { ufoSpawned = true; ufos.push({ x: W+50, y: H/4 + Math.random()*H/4, s: 75+(25*speedMult), targetLane: getSafeLaneForItems(), dropped: false }); sfxUfo(); }

            if(timeLeft <= 0) {
                if(level >= 12) {
                    missionComplete = true; 
                    for(let j=0; j<20; j++) { setTimeout(() => { let cList = ['#FFD700', '#00f2ff', '#00ff88', '#bc13fe', '#ff3131', '#ff00ff']; let col = cList[Math.floor(Math.random()*cList.length)]; for(let i=0; i<60; i++) fireworks.push({ x: Math.random()*W, y: Math.random()*H, vx: (Math.random()-0.5)*20, vy: (Math.random()-0.5)*20, life: 1.5 + Math.random(), c: col }); sfxStarCollect(); }, j * 250); }
                    let burstDelay = 2500;
                    for(let i=0; i < hp; i++) {
                        setTimeout(() => { hp--; score += 1000; sfxStarCollect(); if("vibrate" in navigator) navigator.vibrate([50,50,100]); addFloat(W/2 + (Math.random()*40-20), H/2 + 140, "❤️ +1000", "#00ff88", 40); }, 2500 + (i * 800));
                        burstDelay = 2500 + (i * 800);
                    }
                    setTimeout(() => { showGameOverScreen(true); }, burstDelay + 3000); 
                } else {
                    level++; timeLeft = 30; energy = Math.min(100, energy + (25 * speedMult));
                    rocketSpawned = false; ufoSpawned = false; rocket = null; fallingCore = null; fallingHearts = [];
                    const modeOrder = ['dog', 'cat', 'rabbit', 'fox', 'panda', 'unicorn'];
                    mode = modeOrder[Math.floor((level - 1) / 2) % 6]; updateTheme(mode);
                    let p = document.getElementById("lvl-up-popup"); p.innerHTML = "<h2>LEVEL " + level + "</h2>"; p.classList.add("show"); sfxLevelUp(); setTimeout(() => p.classList.remove("show"), 2000);
                }
            }

            if(energy <= 0) { hp--; energy = 100; sfxHit(); addFloat(playerX, H/2, "-1 ❤️", "#ff3131", 35); if(hp <= 0) return showGameOverScreen(false); }
        } 

        document.getElementById("hp-txt").innerText = "❤️".repeat(Math.max(0, hp));
        document.getElementById("score-txt").innerText = Math.floor(score) + " PTS";
        document.getElementById("time-txt").innerText = missionComplete ? "WIN" : Math.ceil(timeLeft) + "s";
        document.getElementById("lvl-txt").innerText = level;
        document.getElementById("energy-fill").style.width = Math.max(0, energy) + "%";

        ctx.globalAlpha = 0.3; 
        clouds.forEach(c => { if(!missionComplete) c.x += (10 + speedMult*5) * dt; if(c.x > W + 50) c.x = -50; ctx.font = c.s + "px Arial"; ctx.fillText('☁️', c.x, c.y); });
        ctx.globalAlpha = 1.0; 

        if (rocket && !missionComplete) {
            rocket.x -= rocket.s * dt; ctx.save(); ctx.translate(rocket.x, rocket.y + Math.sin(t/100)*5); ctx.rotate(-Math.PI / 1.5); ctx.font = "50px Arial"; ctx.fillText('🚀', 0, 0); ctx.restore();
            if(rocket.x <= lanes[rocket.targetLane] && !rocket.laid) { rocket.laid = true; fallingCore = { x: lanes[rocket.targetLane], y: rocket.y, s: 200 * speedMult }; }
        }

        if (fallingCore && !missionComplete) {
            fallingCore.y += fallingCore.s * dt; ctx.save(); ctx.shadowColor = "#adff2f"; ctx.shadowBlur = 15; ctx.font = "40px Arial"; ctx.fillStyle = "#adff2f"; ctx.fillText('☢️', fallingCore.x, fallingCore.y); ctx.restore();
            if (Math.abs(fallingCore.x - playerX) < 40 && fallingCore.y > hitTop && fallingCore.y < hitBottom) { invincibleTimer = 8.0; score += 100 + (level * 10); sfxShield(); sfxStarCollect(); addFloat(fallingCore.x + 40, fallingCore.y, "SHIELD", "#00ff88", 25); fallingCore = null; } 
            else if (fallingCore.y > H + 50) { fallingCore = null; }
        }

        if(!missionComplete && Math.random() < 0.015 && opponents.length < 3) { opponents.push({ x: W + 50, y: Math.random()*H/2 + 50, s: (100 + Math.random()*50) * speedMult }); }
        opponents.forEach((o, i) => { if(!missionComplete) o.x -= o.s * dt; ctx.font = "25px Arial"; ctx.fillText('🐦', o.x, o.y); if(o.x < -50) opponents.splice(i, 1); });

        for(let i = ufos.length - 1; i >= 0; i--) {
            let u = ufos[i]; if(!missionComplete) u.x -= u.s * dt; let ufoY = u.y + Math.sin(t / 150) * 10;
            ctx.save(); ctx.fillStyle = "rgba(0, 255, 136, 0.4)"; ctx.beginPath(); ctx.moveTo(u.x - 15, ufoY + 10); ctx.lineTo(u.x + 15, ufoY + 10); ctx.lineTo(u.x + 45, u.y + H); ctx.lineTo(u.x - 45, u.y + H); ctx.fill(); ctx.restore(); 
            ctx.font = "45px Arial"; ctx.fillText('🛸', u.x, ufoY);
            if(u.x <= lanes[u.targetLane] && !u.dropped && !missionComplete) { fallingHearts.push({ x: lanes[u.targetLane], y: u.y, s: 280 * speedMult }); u.dropped = true; }
            if(u.x < -50) ufos.splice(i, 1);
        }

        for(let i = fallingHearts.length - 1; i >= 0; i--) {
            let s = fallingHearts[i]; if(!missionComplete) s.y += s.s * dt; ctx.font = "40px Arial"; ctx.fillText('❤️', s.x, s.y);
            if(!missionComplete && Math.abs(s.x - playerX) < 40 && s.y > hitTop && s.y < hitBottom) {
                if (hp < 3) { hp++; sfxStarCollect(); } else { score += 100 + (level * 10); sfxStarCollect(); }
                fallingHearts.splice(i, 1);
            } else if (s.y > H + 50) { fallingHearts.splice(i, 1); }
        }

        const items = { 'dog':['🦴','🍪','🥩'], 'cat':['🐟','🥛','🐁'], 'rabbit':['🥕','🥬','🍎'], 'fox':['🥚','🍗','🍖'], 'panda':['🎋','🍃','🍉'], 'unicorn':['🍬','🧁','🍦'] };
        const charIcon = { 'dog':'🐶', 'cat':'🐱', 'rabbit':'🐰', 'fox':'🦊', 'panda':'🐼', 'unicorn':'🦄' }[mode];

        if(entities.length < 2 && !missionComplete) {
            spawnDelay -= dt;
            if(spawnDelay <= 0) {
                let safeL = getSafeLaneForItems();
                if(Math.random() < 0.85) entities.push({ l: safeL, x: lanes[safeL], y: -50, t: items[mode][Math.floor(Math.random()*3)], bad: false, s: 230 * speedMult });
                else entities.push({ l: safeL, x: lanes[safeL], y: -50, t: '🥷', bad: true, s: 260 * speedMult }); 
                spawnDelay = 0.35; 
            }
        }

        ctx.fillStyle = "#ffffff"; ctx.lineWidth = 2; 
        permSpiders.forEach(s => {
            if(!missionComplete) s.y += (180 * speedMult * s.dy) * dt;
            let sx = lanes[s.lane];
            ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, s.y); ctx.stroke();
            ctx.font = "40px Arial"; ctx.fillText('🕷️', sx, s.y);

            if(!missionComplete) {
                if(s.y >= H - 120) { s.dy = -1; s.y = H - 120; s.hit = false; }
                if(s.y <= 60) { s.dy = 1; let otherL = permSpiders.find(sp => sp !== s).lane; let avail = [0,1,2,3,4].filter(l => l !== otherL); s.lane = avail[Math.floor(Math.random() * avail.length)]; s.y = 60; s.hit = false; }

                if(!s.hit && Math.abs(sx - playerX) < 40 && s.y > hitTop && s.y < hitBottom) {
                    if (invincibleTimer > 0) { addFloat(sx + 40, s.y, "BLOCKED!", "#00ff88", 20); } 
                    else { score = Math.max(0, score - Math.floor(30 * speedMult)); energy -= 30; sfxHit(); addFloat(sx + 40, s.y, "-⚡", "#ff3131", 35); }
                    s.hit = true; 
                }
            }
        });

        for(let i = entities.length - 1; i >= 0; i--) {
            let e = entities[i]; if(!missionComplete) e.y += e.s * dt; ctx.font = "45px Arial"; ctx.fillText(e.t, e.x, e.y);
            if(!missionComplete && Math.abs(e.x - playerX) < 40 && e.y > hitTop && e.y < hitBottom) {
                if(e.bad) {
                    if (invincibleTimer > 0) { addFloat(e.x + 40, e.y, "BLOCKED!", "#00ff88", 20); } 
                    else { hp--; sfxHit(); addFloat(e.x + 40, e.y, "-1 ❤️", "#ff3131", 35); if(hp <= 0) return showGameOverScreen(false); }
                } else { score += Math.floor(20 * speedMult); energy = Math.min(100, energy + 5); sfxCollect(); addFloat(e.x + 40, e.y, "+", "#00ff88", 28); }
                entities.splice(i, 1);
            } else if (e.y > H + 60) { entities.splice(i, 1); }
        }

        if(!missionComplete) playerX += (targetX - playerX) * 0.15;
        if (invincibleTimer > 0) { ctx.save(); ctx.font = "50px Arial"; let shieldAlpha = 0.4 + 0.6 * Math.abs(Math.sin(t / 150)); ctx.fillStyle = `rgba(173, 255, 47, ${shieldAlpha})`; ctx.shadowColor = "#adff2f"; ctx.shadowBlur = 20; ctx.fillText('☢️', playerX, H - 160); ctx.restore(); }
        ctx.font = "70px Arial"; ctx.fillText(charIcon, playerX, H - 80);

        for(let i = floaters.length - 1; i >= 0; i--) { let f = floaters[i]; f.y -= 2.0; f.o -= 0.8 * dt; ctx.globalAlpha = Math.max(0, f.o); ctx.font = `900 ${f.s}px 'Orbitron'`; ctx.fillStyle = f.c; ctx.fillText(f.txt, f.x, f.y); if(f.o <= 0) floaters.splice(i, 1); }
        for(let i = fireworks.length - 1; i >= 0; i--) { let p = fireworks[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.3; p.life -= dt; ctx.globalAlpha = Math.max(0, p.life); ctx.fillStyle = p.c; ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill(); if(p.life <= 0) fireworks.splice(i, 1); }
        ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    } catch(e) {}
}

function addFloat(x, y, txt, c, s) { floaters.push({ x, y, txt, c, s, o: 1 }); }

// --- HELPERS / AUDIO EFFECTS ---
function playTone(freq, type, duration, vol=0.6) {
    if(!systemActive || !audioCtx || audioCtx.state !== 'running') return;
    try { const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime); gain.gain.setValueAtTime(vol, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + duration); } catch(e) {}
}
function sfxUfo() { playTone(400, 'sine', 2.0, 0.4); }
function sfxShield() { playTone(200, 'sine', 0.3, 0.6); }
function sfxAlarm() { playTone(600, 'sawtooth', 0.4, 0.4); }
function sfxRocket() { playTone(60, 'sawtooth', 1.5, 0.8); }
function sfxCollect() { playTone(600, 'sine', 0.1, 0.4); setTimeout(() => playTone(1200, 'sine', 0.15, 0.4), 80); }
function sfxStarCollect() { [800, 1000, 1200].forEach((f, i) => setTimeout(() => playTone(f, 'sine', 0.1, 0.4), i*50)); } 
function sfxHit() { playTone(150, 'sawtooth', 0.3, 0.6); setTimeout(() => playTone(100, 'square', 0.4, 0.6), 100); }
function sfxLevelUp() { [400, 500, 600, 800].forEach((f, i) => setTimeout(() => playTone(f, 'square', 0.2, 0.4), i*100)); }
