<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOGGYCO MASTER ELITE - V122</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { 
            --neon: #00f2ff; --green: #00ff88; --red: #ff3131; --gold: #ffd700; 
            --silver: #e0e0e0; --rose: #ff66cc; --glass: rgba(0, 0, 0, 0.85);
            --milky: rgba(255, 255, 255, 0.15);
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            background: #000; font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; 
        }
        
        /* HINTERGRUND: 100% GESTRECKT */
        #main-bg { 
            position: fixed; inset: 0; background-image: url('hintergrund.png'); 
            background-size: 100% 100%; z-index: -2; opacity: 1; 
        }

        header h1 { 
            font-family: 'Orbitron'; font-size: clamp(30px, 12vw, 60px); color: var(--neon); 
            text-align: center; padding: 30px; letter-spacing: 10px; 
            animation: neonBlink 1.5s infinite alternate; 
            z-index: 10;
        }
        @keyframes neonBlink { 0% { text-shadow: 0 0 20px var(--neon); } 100% { text-shadow: 0 0 5px var(--neon); opacity: 0.8; } }

        .wrapper { width: 100%; max-width: 500px; padding: 15px; display: flex; flex-direction: column; gap: 20px; z-index: 50; }

        /* DIE 5 MILCHIGEN RAHMEN */
        .frame { 
            background: var(--glass); backdrop-filter: blur(25px); 
            border: 3px solid var(--neon); border-radius: 40px; 
            text-align: center; transition: 0.3s; position: relative;
        }
        
        /* Rahmen 1 massiv gestreckt */
        .f1 { padding: 80px 30px; min-height: 550px; box-shadow: 0 0 50px var(--neon); background: var(--milky); }
        .f2, .f3, .f4, .f5 { padding: 30px; box-shadow: 0 0 20px var(--neon); }

        #pName { 
            width: 100%; padding: 22px; background: rgba(0,0,0,0.8); 
            border: 3px solid var(--neon); border-radius: 20px; color: #fff; 
            text-align: center; font-family: 'Orbitron'; font-size: 24px; margin-bottom: 25px; 
            box-shadow: inset 0 0 15px var(--neon);
        }

        .btn { 
            display: flex; align-items: center; justify-content: center; gap: 15px; 
            width: 100%; padding: 20px; margin: 10px 0; border: none; border-radius: 22px; 
            font-family: 'Orbitron'; font-weight: 900; cursor: pointer; transition: 0.3s; 
            font-size: 16px; z-index: 100;
        }
        .btn:hover { transform: translateY(-5px); filter: brightness(1.2); }
        
        .b-dog { background: var(--neon); color: #000; }
        .b-cat { background: #bc13fe; color: #fff; }
        .b-rab { background: #ff8e00; color: #fff; }

        .rank-row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); font-family: 'Orbitron'; font-size: 16px; }
        .r1 { color: var(--gold); }

        /* GAME OVERLAY */
        #game-view { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; align-items: center; }
        #hud { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-around; font-family: 'Orbitron'; font-size: 18px; z-index: 100; text-shadow: 2px 2px #000; pointer-events: none; }
        #energy-container { position: absolute; top: 50px; width: 80%; height: 14px; background: #222; border: 2px solid var(--neon); border-radius: 7px; overflow: hidden; }
        #energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--red), var(--gold), var(--green)); transition: 0.2s; }
        
        canvas { background: transparent; }
        .controls { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: space-evenly; z-index: 10000; }
        .arrow { width: 90px; height: 90px; border: 4px solid var(--neon); border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 40px; background: rgba(0,0,0,0.7); cursor: pointer; }
    </style>
</head>
<body onclick="tryMusic()">

<div id="main-bg"></div>
<header id="top-h"><h1>DOGGYCO 🐶</h1></header>

<div class="wrapper" id="menu-ui">
    <div class="frame f1">
        <input type="text" id="pName" placeholder="PLAYER NAME" maxlength="12" autocomplete="off">
        <button class="btn b-dog" onclick="startNow('dog')">DOGGY ADVENTURE</button>
        <button class="btn b-cat" onclick="startNow('cat')">CATS WORLD 🔒</button>
        <button class="btn b-rab" onclick="startNow('rab')">RABBIT LAND 🔒</button>
    </div>

    <div class="frame f2">
        <h3 style="font-family:'Orbitron'; color:var(--neon); margin-bottom:10px;">GLOBAL RANKING</h3>
        <div id="ranking-box">Loading...</div>
    </div>

    <div class="frame f3" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
        <button class="btn" style="background:#000; color:#fff; border:1px solid var(--neon); font-size:12px;" onclick="window.open('https://tiktok.com')">TIKTOK</button>
        <button class="btn" style="background:#003087; color:#fff; font-size:12px;" onclick="window.open('https://paypal.me')">PAYPAL</button>
    </div>

    <div class="frame f4">
        <h3 style="font-family:'Orbitron'; color:var(--green); font-size:14px;">MANUAL</h3>
        <p style="font-size:13px;">Arrows to switch lanes • Collect Food • Avoid Spiders & Police 👮</p>
    </div>

    <div class="frame f5" style="font-size:10px; opacity:0.5;">© 2026 DOGGYCO PRO V122 MASTER</div>
</div>

<div id="game-view">
    <div id="hud">
        <div id="h-n">-</div><div id="h-l">❤️❤️❤️</div><div id="h-s">🏆 0</div>
    </div>
    <div id="energy-container"><div id="energy-fill"></div></div>
    <canvas id="game-canvas"></canvas>
    <div class="controls">
        <div class="arrow" onmousedown="moveLane(-1)" ontouchstart="moveLane(-1)"><i class="fas fa-chevron-left"></i></div>
        <div class="arrow" onmousedown="moveLane(1)" ontouchstart="moveLane(1)"><i class="fas fa-chevron-right"></i></div>
    </div>
</div>

<audio id="bgMusic" src="musik.mp3" loop preload="auto"></audio>

<script>
// --- DATABASE ---
const S_URL = 'https://ovmsstdroxkinisqwlhw.supabase.co';
const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92mXNzdGRyb3hraW5pc3F3bGh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMzM3OTEsImV4cCI6MjA4NzgwOTc5MX0.SOsi-Aeb_wSp40_TTymaiiU0Kn_3rhG_LnvLjJP66z8';
let supabase = null;

let isPlaying = false, score = 0, hearts = 3, energy = 100, lane = 2, lastT = 0;
let charX = 200, targetX = 200, items = [], enemies = [], floaters = [], currentMode = 'dog';

function tryMusic() {
    const a = document.getElementById("bgMusic");
    if(a.paused) a.play().catch(()=>{});
}

window.onload = () => {
    if(window.supabase) {
        supabase = window.supabase.createClient(S_URL, S_KEY);
        loadRank();
    }
};

async function loadRank() {
    if(!supabase) return;
    try {
        const { data } = await supabase.from('leaderboard').select('n, s').order('s', { ascending: false }).limit(5);
        if(data) {
            document.getElementById("ranking-box").innerHTML = data.map((r, i) => `
                <div class="rank-row ${i===0?'r1':''}"><span>${i+1}. ${r.n}</span><span>${r.s} pts</span></div>
            `).join('');
        }
    } catch(e) { document.getElementById("ranking-box").innerText = "Scores Ready"; }
}

// DER ABSOLUTE START-FIX
function startNow(m) {
    const nameInput = document.getElementById("pName").value.trim();
    if(!nameInput) {
        alert("PLEASE ENTER YOUR NAME!");
        return;
    }
    
    // UI-WUMSCHALTUNG ERZWINGEN
    currentMode = m;
    document.getElementById("menu-ui").style.display = "none";
    document.getElementById("top-h").style.display = "none";
    document.getElementById("game-view").style.display = "flex";
    document.getElementById("h-n").innerText = nameInput.toUpperCase();
    
    // Musik-Start (isoliert)
    const audio = document.getElementById("bgMusic");
    if(m === 'cat') {
        document.getElementById("main-bg").style.filter = "hue-rotate(280deg)";
        audio.src = "cats_world_theme.mp3";
    }
    audio.play().catch(()=>{});
    
    // Engine anwerfen
    isPlaying = true;
    lastT = performance.now();
    const cvs = document.getElementById("game-canvas");
    cvs.width = 400; 
    cvs.height = window.innerHeight;
    
    requestAnimationFrame(gameEngine);
}

function moveLane(d) { 
    lane = Math.max(0, Math.min(4, lane + d)); 
    targetX = lane * 80 + 40; 
}

function gameEngine(t) {
    if(!isPlaying) return;
    const ctx = document.getElementById("game-canvas").getContext("2d");
    const cvs = document.getElementById("game-canvas");
    let dt = (t - lastT) / 1000; lastT = t;
    if(dt > 0.1) dt = 0.016;

    ctx.clearRect(0,0,400,cvs.height);
    energy -= 5.5 * dt;
    document.getElementById("energy-fill").style.width = Math.max(0, energy) + "%";

    // SPAWNING
    if(Math.random() < 0.04) items.push({ x: Math.floor(Math.random()*5)*80+40, y: -60, lane: Math.floor(Math.random()*5), type: Math.random() < 0.8 ? '🦴' : '🥩' });
    if(Math.random() < 0.018) enemies.push({ x: Math.floor(Math.random()*5)*80+40, y: -60, lane: Math.floor(Math.random()*5), type: Math.random() < 0.6 ? '🕷️' : '👮' });

    // ITEMS
    items.forEach((it, i) => {
        it.y += (260 + score/15) * dt;
        ctx.font = "50px Arial"; ctx.textAlign = "center";
        ctx.fillText(it.type, it.x, it.y);
        if(it.lane === lane && it.y > cvs.height - 180 && it.y < cvs.height - 80) {
            score += it.type === '🦴' ? 15 : 50;
            energy = Math.min(100, energy + 20);
            items.splice(i,1);
        }
        if(it.y > cvs.height) items.splice(i,1);
    });

    // ENEMIES
    enemies.forEach((en, i) => {
        en.y += (350 + score/15) * dt;
        ctx.fillText(en.type, en.x, en.y);
        if(en.lane === lane && en.y > cvs.height - 180 && en.y < cvs.height - 80) {
            hearts--; energy -= 25;
            enemies.splice(i,1);
        }
        if(en.y > cvs.height) enemies.splice(i,1);
    });

    // PLAYER
    charX += (targetX - charX) * 0.22;
    ctx.font = "95px Arial";
    let icon = currentMode === 'dog' ? "🐶" : (currentMode === 'cat' ? "🐱" : "🐰");
    ctx.fillText(icon, charX, cvs.height - 130);

    document.getElementById("h-s").innerText = "🏆 " + Math.floor(score);
    document.getElementById("h-l").innerText = "❤️".repeat(Math.max(0, hearts));

    if(hearts <= 0 || energy <= 0) {
        if(supabase) supabase.from('leaderboard').insert([{ n: document.getElementById("pName").value, s: Math.floor(score) }]);
        isPlaying = false; alert("GAME OVER! SCORE: " + Math.floor(score)); location.reload();
    }
    requestAnimationFrame(gameEngine);
}
</script>
</body>
</html>
