<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOGGYCO & CATS WORLD - ULTIMATE MASTER V4600</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --neon: #00f2ff; --green: #00ff88; --red: #ff3131; --gold: #ffd700; 
            --glass: rgba(255, 255, 255, 0.15); --cat-purple: #bc13fe; --blur: blur(25px);
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            width: 100%; height: 100%; overflow: hidden; background: #000;
            font-family: 'Orbitron', sans-serif; color: #fff;
        }

        /* Hintergrund füllt die ganze Seite */
        #bg-container {
            position: fixed; inset: 0; background-image: url('hintergrund.png'); 
            background-size: cover; background-position: center; z-index: 1; transition: background 1.5s ease;
        }

        /* --- UI LAYER (MILCHGLAS OPTIK) --- */
        #ui-layer {
            position: relative; z-index: 100; height: 100vh; display: flex; 
            flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(5px);
        }

        .neon-text {
            font-size: 3.5rem; color: var(--neon); text-shadow: 0 0 25px var(--neon);
            animation: glow 1.5s infinite alternate; margin-bottom: 30px;
        }
        @keyframes glow { from { opacity: 0.7; } to { opacity: 1; text-shadow: 0 0 40px var(--neon); } }

        .glass-box {
            background: var(--glass); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            border: 1px solid rgba(255,255,255,0.3); border-radius: 25px;
            padding: 20px; margin: 12px; width: 90%; max-width: 450px; text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        input#pName {
            width: 85%; padding: 15px; border-radius: 12px; border: 2px solid var(--neon);
            background: rgba(0,0,0,0.5); color: white; text-align: center; font-family: 'Orbitron';
            font-size: 1.2rem; outline: none; margin-bottom: 20px;
        }

        .btn-main-row { display: flex; gap: 15px; width: 100%; justify-content: center; }
        .start-btn { flex: 1; padding: 18px; border-radius: 15px; border: none; font-weight: 900; cursor: pointer; font-family: 'Orbitron'; font-size: 1rem; }
        .dog-btn { background: var(--green); color: #000; box-shadow: 0 0 15px var(--green); }
        .cat-btn { background: var(--cat-purple); color: #fff; box-shadow: 0 0 15px var(--cat-purple); }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 90%; max-width: 450px; margin-top: 10px; }
        .tile { padding: 15px; font-size: 0.8rem; cursor: pointer; transition: 0.3s; }
        .tile:hover { background: rgba(255,255,255,0.2); }

        /* --- GAME-AREA --- */
        #game-wrap { 
            position: relative; width: 400px; height: 85vh; margin: auto; top: 5vh;
            border: 5px solid var(--neon); border-radius: 40px; overflow: hidden; display: none;
            background: rgba(0,0,0,0.7); box-shadow: 0 0 60px var(--neon); z-index: 50;
        }

        #hud {
            position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-around;
            font-size: 14px; font-weight: bold; text-shadow: 2px 2px #000; z-index: 200;
        }

        /* Steuerungstasten */
        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; z-index: 300; }
        .arrow-btn { 
            width: 85px; height: 85px; background: rgba(255,255,255,0.1); border: 4px solid var(--neon); 
            border-radius: 50%; color: white; font-size: 40px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.1s;
        }
        .arrow-btn.blink { background: var(--neon); box-shadow: 0 0 30px var(--neon); transform: scale(1.1); }

        /* Effekte */
        .shake-screen { animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-4px, 0, 0); } 20%, 80% { transform: translate3d(6px, 0, 0); } }

        #leader-box { position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 500; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
    </style>
</head>
<body>

<div id="bg-container"></div>

<div id="ui-layer">
    <h1 class="neon-text" id="main-title">DOGGYCO</h1>
    
    <div class="glass-box">
        <input type="text" id="pName" placeholder="SPIELERNAME">
        <div class="btn-main-row">
            <button class="start-btn dog-btn" onclick="launch(false)">DOGGY START</button>
            <button class="start-btn cat-btn" onclick="launch(true)">CATS START</button>
        </div>
    </div>

    <div class="info-grid">
        <div class="glass-box tile" onclick="toggleRank(true)">🏆 GLOBAL RANK</div>
        <div class="glass-box tile">🛠️ SUPPORT</div>
    </div>

    <div class="info-grid">
        <div class="glass-box tile">📖 ANLEITUNG</div>
        <div class="glass-box tile" style="font-size: 0.65rem;">⚖️ RECHTLICHE LINIEN & IMPRESSUM</div>
    </div>
</div>

<div id="game-wrap">
    <div id="hud">
        <span id="h-score">🏆 0</span>
        <span id="h-lvl" style="color:var(--gold)">LVL 1</span>
        <span id="h-heart">❤️❤️❤️</span>
    </div>
    <canvas id="gameCanvas"></canvas>
    
    <div id="controls">
        <div id="ctrl-L" class="arrow-btn" onmousedown="m('L')" ontouchstart="m('L')">◀</div>
        <div id="ctrl-R" class="arrow-btn" onmousedown="m('R')" ontouchstart="m('R')">▶</div>
    </div>
</div>

<div id="leader-box">
    <h2 style="color:var(--gold); margin-bottom: 20px;">🏆 GLOBAL RANKING</h2>
    <div id="rank-list" style="width: 100%; margin-bottom: 20px;">Lade Daten...</div>
    <button class="start-btn dog-btn" onclick="toggleRank(false)">SCHLIESSEN</button>
</div>

<script>
    // Supabase Setup
    const SURL = 'https://ovmsstdroxkinisqwlhw.supabase.co';
    const SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // Dein Key hier
    const supabase = supabase.createClient(SURL, SKEY);

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    let score = 0, level = 1, hearts = 3, active = false, isCat = false;
    let items = [], floaters = [], dogX = 200, dogLane = 2, lastLvl = Date.now();
    let speed = 4;

    function launch(catMode) {
        if(!document.getElementById("pName").value) { alert("Bitte Namen eingeben!"); return; }
        isCat = catMode;
        document.getElementById("ui-layer").style.display = "none";
        document.getElementById("game-wrap").style.display = "block";
        
        if(isCat) {
            document.getElementById("bg-container").style.backgroundImage = "url('forest_background.png')";
            document.getElementById("main-title").style.color = "var(--cat-purple)";
            document.getElementById("game-wrap").style.borderColor = "var(--cat-purple)";
        }
        
        canvas.width = 400; canvas.height = 600;
        active = true;
        new Audio('musik.mp3').play().catch(()=>{});
        setInterval(spawner, 1000); 
        requestAnimationFrame(run);
    }

    function m(dir) {
        const btn = document.getElementById("ctrl-" + dir);
        btn.classList.add("blink");
        setTimeout(() => btn.classList.remove("blink"), 150);
        
        if(dir === 'L' && dogLane > 0) dogLane--;
        if(dir === 'R' && dogLane < 4) dogLane++;
        dogX = (dogLane * 80) + 40;
        
        // Bewegungs-Pfeil blau
        addF(dogX, 520, "▲", "var(--neon)");
    }

    function spawner() {
        if(!active) return;
        let lane = Math.floor(Math.random() * 5);
        let r = Math.random();
        // Regelmäßige Verteilung: 70% Schätze, 20% Polizei, 10% Tiere
        let type = r > 0.3 ? (isCat ? '🥣' : '🦴') : (r > 0.1 ? '👮' : (isCat ? '🐍' : '🕷️'));
        items.push({ x: lane * 80 + 40, y: -50, type: type });
    }

    function run() {
        if(!active) return;
        ctx.clearRect(0, 0, 400, 600);

        // Level Up +10% Speed alle 30s
        if(Date.now() - lastLvl > 30000) {
            level++; speed *= 1.1; lastLvl = Date.now();
        }

        items.forEach((it, i) => {
            it.y += speed;
            ctx.font = "42px Arial"; ctx.textAlign = "center";
            ctx.fillText(it.type, it.x, it.y);

            // Collision Detection
            if(it.y > 500 && it.y < 560 && Math.abs(it.x - dogX) < 40) {
                if(it.type === '👮' || it.type === '🐍' || it.type === '🕷️') {
                    hearts--;
                    document.getElementById("game-wrap").classList.add("shake-screen");
                    setTimeout(()=>document.getElementById("game-wrap").classList.remove("shake-screen"), 300);
                    addF(it.x, it.y, "-1 ❤️", "var(--red)");
                } else {
                    let p = 10 * level; score += p;
                    addF(it.x, it.y, "+" + p, "var(--green)");
                }
                items.splice(i, 1);
            }
            if(it.y > 600) items.splice(i, 1);
        });

        // Player Rendering
        ctx.font = "75px Arial";
        ctx.fillText(isCat ? "🐱" : "🐶", dogX, 550);

        // Animationen (Punkte/Pfeile)
        floaters.forEach((f, i) => {
            f.y -= 2.5; f.life -= 0.02;
            ctx.globalAlpha = f.life; ctx.fillStyle = f.col; ctx.font = "bold 24px Orbitron";
            ctx.fillText(f.txt, f.x, f.y);
            if(f.life <= 0) floaters.splice(i, 1);
        });
        ctx.globalAlpha = 1;

        // HUD Update
        document.getElementById("h-score").innerText = "🏆 " + score;
        document.getElementById("h-heart").innerText = "❤️".repeat(Math.max(0, hearts));
        document.getElementById("h-lvl").innerText = "LVL " + level;

        if(hearts <= 0) {
            active = false;
            saveScore();
            alert("ENDE! Dein Score: " + score);
            location.reload();
        }
        requestAnimationFrame(run);
    }

    function addF(x, y, txt, col) { floaters.push({ x, y, txt, col, life: 1.0 }); }

    function toggleRank(show) {
        document.getElementById("leader-box").style.display = show ? "flex" : "none";
        if(show) updateRankList();
    }

    async function saveScore() {
        const name = document.getElementById("pName").value;
        await supabase.from('leaderboard').insert([{ n: name, s: score }]);
    }

    async function updateRankList() {
        let { data } = await supabase.from('leaderboard').select('*').order('s', { ascending: false }).limit(5);
        if(data) {
            document.getElementById("rank-list").innerHTML = data.map(x => `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #333;"><span>${x.n}</span><span>${x.s}</span></div>`).join('');
        }
    }
</script>
</body>
</html>
