<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOGGYCO ULTIMATE PRO - V70000</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --neon: #00f2ff; --green: #00ff88; --red: #ff3131; --gold: #ffd700; 
            --glass: rgba(255, 255, 255, 0.1); --cat-purple: #bc13fe;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #000; font-family: 'Orbitron', sans-serif; color: #fff; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-y: auto; overflow-x: hidden;
            background-image: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        /* Hintergrund-Bild Support */
        #main-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url('hintergrund.png'); background-size: cover; background-position: center;
            z-index: -2; opacity: 0.5;
        }

        /* Leuchtende Überschrift */
        header h1 { 
            font-size: clamp(30px, 8vw, 50px); 
            color: var(--neon); 
            text-shadow: 0 0 10px var(--neon), 0 0 20px var(--neon), 0 0 40px var(--blue-active);
            padding: 30px; text-align: center; letter-spacing: 5px;
        }

        #game-view { width: 100vw; height: 80vh; display: flex; justify-content: center; align-items: center; position: relative; }
        
        #game-wrap { 
            position:relative; width: 400px; height: 100%; 
            background: rgba(0,0,0,0.85); border: 4px solid var(--neon); border-radius: 40px; 
            overflow: hidden; box-shadow: 0 0 50px var(--neon);
        }

        /* HUD */
        #ui-header { position: absolute; top: 15px; width: 100%; z-index: 200; pointer-events: none; }
        #energy-bar-wrap { width: 85%; height: 20px; margin: 0 auto; background: rgba(0,0,0,0.8); border: 1px solid #fff; border-radius: 10px; overflow: hidden; }
        #energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--red), var(--gold), var(--green)); transition: width 0.2s; }
        #hud-row { display: flex; justify-content: space-between; width: 85%; margin: 8px auto; font-size: 14px; font-weight: 900; text-shadow: 2px 2px 2px #000; }

        canvas { position: absolute; inset: 0; z-index: 50; background: transparent; }

        /* Overlays & Buttons */
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(15px); z-index: 1000; background: rgba(0,0,0,0.8); border-radius: 36px; }
        
        .neon-btn { 
            padding: 15px 40px; background: var(--glass); color: #fff; border: 2px solid var(--neon); 
            border-radius: 30px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; margin: 10px;
            box-shadow: 0 0 15px var(--neon); transition: 0.3s;
        }
        .neon-btn:hover { background: var(--neon); color: #000; }

        #controls { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; z-index: 300; }
        .btn-arrow { width: 75px; height: 75px; background: var(--glass); border: 2px solid var(--neon); border-radius: 50%; color: #fff; font-size: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* Rechtliche Sektion & Footer */
        .content-area { width: 100%; max-width: 500px; padding: 40px 20px; }
        .tile { 
            background: var(--glass); border: 1px solid var(--neon); border-radius: 25px; 
            padding: 25px; margin-bottom: 25px; text-align: center; backdrop-filter: blur(10px);
        }
        .legal-line { border-top: 1px solid rgba(255,255,255,0.1); margin: 20px 0; padding-top: 10px; font-size: 10px; color: #666; }
    </style>
</head>
<body>

<div id="main-bg"></div>
<header><h1>DOGGYCO</h1></header>

<div id="game-view">
    <div id="game-wrap" id="wrap">
        <div id="ui-header">
            <div id="energy-bar-wrap"><div id="energy-fill"></div></div>
            <div id="hud-row">
                <div id="hearts">❤️❤️❤️</div>
                <div id="score">🏆 0</div>
            </div>
        </div>
        
        <canvas id="game-canvas"></canvas>

        <div id="controls">
            <div class="btn-arrow" onmousedown="move(-1)" ontouchstart="move(-1)">◀</div>
            <div class="btn-arrow" onmousedown="move(1)" ontouchstart="move(1)">▶</div>
        </div>

        <div id="start-screen" class="overlay">
            <input type="text" id="pName" placeholder="NAME" style="padding:10px; border-radius:10px; margin-bottom:15px; text-align:center;">
            <button class="neon-btn" onclick="start(false)">START DOGGY</button>
            <button class="neon-btn" style="border-color:var(--cat-purple)" onclick="start(true)">START CAT</button>
        </div>

        <div id="end-screen" class="overlay" style="display:none;">
            <h1 id="final-score" style="color:var(--gold); font-size:40px;">0</h1>
            <button class="neon-btn" onclick="location.reload()">NOCHMAL</button>
        </div>
    </div>
</div>

<div class="content-area">
    <div class="tile">
        <h3 style="color:var(--gold)">LEADERBOARD</h3>
        <div id="board" style="margin-top:15px; font-size:12px;">Lädt...</div>
    </div>
    
    <div class="tile">
        <h3 style="color:var(--neon)">SUPPORT US</h3>
        <p style="font-size:10px; margin:10px 0;">bc1qkm22c6w896u9n9cxp8ld049maef4xs5xn060ed</p>
        <button class="neon-btn" style="font-size:10px; padding:5px 15px;" onclick="navigator.clipboard.writeText('bc1qkm22c6w896u9n9cxp8ld049maef4xs5xn060ed')">ADRESSE KOPIEREN</button>
    </div>

    <div class="legal-line">
        © 2026 DOGGYCO PROJECT | ALLE RECHTE VORBEHALTEN | RECHTLICHE HINWEISE
    </div>
</div>

<script>
// Supabase Initialisierung
const SUPABASE_URL = 'https://ovmsstdroxkinisqwlhw.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92bXNzdGRyb3hraW5pc3F3bGh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMzM3OTEsImV4cCI6MjA4NzgwOTc5MX0.SOsi-Aeb_wSp40_TTymaiiU0Kn_3rhG_LnvLjJP66z8';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const canvas = document.getElementById("game-canvas");
const ctx = canvas.getContext("2d");
const W = 400;
let H, active = false, isCat = false, score = 0, energy = 100, hearts = 3, lane = 2, dogX = 200;
let items = [], spiders = [], floaters = [], lastTime = 0;

function init() {
    canvas.width = W;
    H = canvas.height = document.getElementById("game-wrap").offsetHeight;
}

// Sound System
const audio = new (window.AudioContext || window.webkitAudioContext)();
function beep(f, d, t='sine') {
    let o = audio.createOscillator(), g = audio.createGain();
    o.type = t; o.frequency.value = f; g.gain.value = 0.1;
    o.connect(g); g.connect(audio.destination);
    o.start(); g.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime + d);
    o.stop(audio.currentTime + d);
}

function start(cat) {
    if(!document.getElementById("pName").value) return alert("Name fehlt!");
    isCat = cat;
    document.getElementById("start-screen").style.display = "none";
    active = true; lastTime = performance.now();
    requestAnimationFrame(loop);
}

function move(dir) {
    if(active && lane + dir >= 0 && lane + dir <= 4) lane += dir;
}

function loop(t) {
    if(!active) return;
    let dt = (t - lastTime) / 1000; lastTime = t;
    ctx.clearRect(0,0,W,H);

    // Bahnen (Rechtliche Linien/Symmetrie)
    ctx.strokeStyle = "rgba(0, 242, 255, 0.15)";
    for(let i=1; i<5; i++) {
        ctx.beginPath(); ctx.moveTo(i*80, 0); ctx.lineTo(i*80, H); ctx.stroke();
    }

    // Energie & HUD
    energy -= 5 * dt;
    document.getElementById("energy-fill").style.width = energy + "%";
    document.getElementById("score").innerText = "🏆 " + Math.floor(score);
    document.getElementById("hearts").innerText = "❤️".repeat(hearts);
    if(energy <= 0 || hearts <= 0) endGame();

    // Spinnen-Logik (Immer 2, keine Überschneidung)
    if(spiders.length < 2 && Math.random() < 0.01) {
        let newLane = Math.floor(Math.random()*5);
        if(!spiders.some(s => s.lane === newLane)) {
            spiders.push({lane: newLane, y: -50, dir: 1, speed: 150 + Math.random()*100});
        }
    }
    spiders.forEach((s, i) => {
        s.y += s.speed * dt * s.dir;
        // Rauf-Runter Bewegung
        if(s.y > H * 0.6) s.dir = -1; 
        if(s.y < -60) spiders.splice(i, 1);

        let sx = s.lane * 80 + 40;
        ctx.strokeStyle = "#fff"; ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, s.y); ctx.stroke();
        ctx.font = "30px Arial"; ctx.fillText("🕷️", sx-15, s.y+20);

        if(s.lane === lane && s.y > H-150 && s.y < H-80) {
            energy -= 20; spiders.splice(i, 1); beep(150, 0.3, 'sawtooth');
            floaters.push({x: sx, y: s.y, txt: "-20", c: "#ff3131", vx: -1, vy: -2});
        }
    });

    // Items: Knochen, Keks, Kotelett
    if(Math.random() < 0.03) {
        let r = Math.random();
        let type = r < 0.6 ? {e: '🦴', p: 10} : (r < 0.9 ? {e: '🍪', p: 25} : {e: '🥩', p: 50});
        items.push({lane: Math.floor(Math.random()*5), y: -50, ...type});
    }
    items.forEach((it, i) => {
        it.y += 200 * dt;
        let ix = it.lane * 80 + 40;
        ctx.font = "35px Arial"; ctx.fillText(it.e, ix-17, it.y);

        if(it.lane === lane && it.y > H-150 && it.y < H-80) {
            score += it.p; energy = Math.min(100, energy + 10);
            beep(600 + it.p*10, 0.1);
            // Schräge Punkte Animation
            floaters.push({x: ix, y: it.y, txt: "+"+it.p, c: "#00ff88", vx: 1, vy: -2});
            items.splice(i, 1);
        }
        if(it.y > H) items.splice(i, 1);
    });

    // Floating Points (Schräg aufwärts)
    floaters.forEach((f, i) => {
        f.x += f.vx; f.y += f.vy;
        ctx.fillStyle = f.c; ctx.font = "bold 20px Orbitron"; ctx.fillText(f.txt, f.x, f.y);
        f.y -= 1; if(f.y < 0) floaters.splice(i, 1);
    });

    // Spieler
    let targetX = lane * 80 + 40;
    dogX += (targetX - dogX) * 0.15;
    ctx.font = "70px Arial";
    ctx.fillText(isCat ? "🐱" : "🐶", dogX-35, H-100);

    requestAnimationFrame(loop);
}

function endGame() {
    active = false;
    document.getElementById("end-screen").style.display = "flex";
    document.getElementById("final-score").innerText = "SCORE: " + Math.floor(score);
    save();
}

async function save() {
    const name = document.getElementById("pName").value;
    await supabase.from('leaderboard').insert([{ n: name, s: Math.floor(score) }]);
    loadRanks();
}

async function loadRanks() {
    const { data } = await supabase.from('leaderboard').select('*').order('s', { ascending: false }).limit(5);
    if(data) document.getElementById("board").innerHTML = data.map(r => `<div>${r.n}: ${r.s}</div>`).join('');
}

window.onload = () => { init(); loadRanks(); };
</script>
</body>
</html>
