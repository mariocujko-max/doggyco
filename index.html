<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOGGYCO & CATS WORLD V64000</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --neon: #00f2ff; --green: #00ff88; --red: #ff3131; --gold: #ffd700; 
            --glass: rgba(255, 255, 255, 0.15); --cat-purple: #bc13fe;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #000; font-family: 'Orbitron', sans-serif; color: #fff; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-y: auto;
        }

        #main-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url('hintergrund.png'); background-size: cover; background-position: center;
            z-index: -1; transition: 1.5s;
        }

        /* NEON BLINKEN */
        @keyframes neonBlink {
            0%, 100% { text-shadow: 0 0 20px var(--neon), 0 0 40px var(--neon); opacity: 1; }
            50% { text-shadow: 0 0 5px var(--neon); opacity: 0.8; }
        }
        header h1 { font-size: 38px; color: var(--neon); animation: neonBlink 1.5s infinite; padding: 25px; text-align: center; }

        #game-view { width: 100vw; height: 85vh; display: flex; justify-content: center; align-items: center; position: relative; }
        #game-wrap { 
            position:relative; width: 400px; height: 98%; 
            background: rgba(0,0,0,0.8); border: 4px solid var(--neon); border-radius: 40px; 
            overflow: hidden; box-shadow: 0 0 50px var(--neon);
        }

        /* HUD */
        #ui-header { position: absolute; top: 15px; width: 100%; z-index: 200; pointer-events: none; }
        #energy-bar-wrap { width: 85%; height: 25px; margin: 0 auto; background: rgba(0,0,0,0.9); border: 2px solid #fff; border-radius: 12px; overflow: hidden; }
        #energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--red), var(--gold), var(--green)); transition: width 0.2s; }
        #hud-row { display: flex; justify-content: space-between; width: 85%; margin: 10px auto; font-size: 14px; font-weight: 900; }

        canvas { position: absolute; inset: 0; z-index: 50; background: transparent; pointer-events: none; }

        /* GLASSMORPHISM POPUP */
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(20px); z-index: 1000; background: rgba(0,0,0,0.85); border-radius: 36px; padding: 20px; text-align: center; }
        
        .milchschicht {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            padding: 20px; border-radius: 20px; width: 90%; margin-bottom: 20px;
        }

        #pName { 
            padding: 15px; border-radius: 15px; border: 2px solid var(--neon); 
            background: rgba(255,255,255,0.05); color: #fff; text-align: center; 
            width: 100%; font-family: 'Orbitron'; outline: none;
        }

        .neon-btn { padding: 15px 30px; background: var(--green); color: #000; border-radius: 30px; font-weight: 900; cursor: pointer; border: none; font-family: 'Orbitron'; margin: 10px; box-shadow: 0 0 15px var(--green); transition: 0.3s; width: 100%; }
        .neon-btn:hover { transform: translateY(-5px); box-shadow: 0 10px 25px var(--green); }
        .cat-btn { background: var(--cat-purple); color: #fff; box-shadow: 0 0 15px var(--cat-purple); }

        /* SUPPORT BUTTONS */
        .support-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .s-btn { padding: 12px; border-radius: 15px; border: none; color: #fff; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .s-btn:active { transform: translateY(-8px); }

        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; z-index: 300; }
        .btn-arrow { width: 85px; height: 85px; background: rgba(255,255,255,0.1); border: 3px solid var(--neon); border-radius: 50%; color: #fff; font-size: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.1s; }
        .btn-arrow:active { transform: scale(0.9); background: var(--blue-active); }

        .content-area { width: 100%; display: flex; flex-direction: column; align-items: center; padding: 40px 0 150px; gap: 30px; }
        .tile { background: var(--glass); backdrop-filter: blur(30px); border: 2px solid var(--neon); border-radius: 35px; padding: 30px; width: 92vw; max-width: 500px; text-align: center; }
    </style>
</head>
<body>

<div id="main-bg"></div>

<header><h1 id="main-title">DOGGYCO</h1></header>

<div id="game-view">
    <div id="game-wrap">
        <div id="ui-header">
            <div id="energy-bar-wrap"><div id="energy-fill"></div></div>
            <div id="hud-row">
                <div id="hearts-display">❤️❤️❤️</div>
                <div id="lvl-display" style="color:var(--gold)">LVL: 1</div>
                <div id="timer-display" style="color:var(--neon)">⏳ 30s</div>
                <div id="score-display">🏆 0</div>
            </div>
        </div>
        
        <canvas id="game-canvas"></canvas>

        <div id="controls">
            <div class="btn-arrow" onmousedown="mLeft()">◀</div>
            <div class="btn-arrow" onmousedown="mRight()">▶</div>
        </div>

        <div id="start-screen" class="overlay">
            <div class="milchschicht">
                <h3 style="color:var(--gold);">MISSION START</h3>
                <input type="text" id="pName" placeholder="DEIN NAME">
            </div>
            <button class="neon-btn" onclick="showInstr()">SPIELANLEITUNG</button>
            <button class="neon-btn" onclick="startGame(false)">DOGGYCO START</button>
            <button class="neon-btn cat-btn" onclick="startGame(true)">CATS WORLD START</button>
        </div>

        <div id="instr-screen" class="overlay" style="display:none;">
            <div class="milchschicht">
                <h2 style="color:var(--gold); margin-bottom:10px;">ANLEITUNG</h2>
                <p style="font-size:12px; line-height:1.6;">
                    🟢 GRÜN: Knochen/Flaschen sammeln (+25 PKT)<br>
                    🔴 ROT: Weiche Gefahren aus (-1 Herz)<br>
                    ⚡ ENERGIE: Fleisch/Fisch füllen Energie auf.<br>
                    Keine Sprünge! Nur Gleiten.
                </p>
            </div>
            <button class="neon-btn" onclick="hideInstr()">VERSTANDEN</button>
        </div>

        <div id="end-screen" class="overlay" style="display:none;">
            <h1 id="f-score" style="font-size: 60px; color: var(--gold);">0</h1>
            <button class="neon-btn" onclick="location.reload()">NEUSTART</button>
        </div>
    </div>
</div>

<div class="content-area">
    <div class="tile">
        <h3 style="color:var(--gold); margin-bottom:20px;">🏆 RANGLISTE</h3>
        <div id="leaderboard">Lädt...</div>
    </div>

    <div class="tile">
        <h3 style="color:var(--gold); margin-bottom:20px;">💖 SUPPORT</h3>
        <div class="support-grid">
            <button class="s-btn" style="background:#ff0050;" onclick="window.open('https://tiktok.com/@TIKTOK')">TIKTOK 📱</button>
            <button class="s-btn" style="background:#0070ba;" onclick="window.open('https://paypal.me/PAYPAL')">PAYPAL 💳</button>
            <button class="s-btn" style="background:#f7931a;" onclick="window.location.href='bitcoin:BTC_ADRESSE'">BITCOIN ₿</button>
            <button class="s-btn" style="background:#333;" onclick="window.location.href='ethereum:WALLET_ADRESSE'">WALLET 👛</button>
        </div>
        <div style="background:#fff; padding:15px; border-radius:20px; display:inline-block; margin-top:20px; border:3px solid var(--gold);">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=BITCOIN_ADRESSE" width="150">
            <p style="color:#000; font-size:10px; font-weight:bold; margin-top:5px;">BTC SCAN</p>
        </div>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://ovmsstdroxkinisqwlhw.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92bXNzdGRyb3hraW5pc3F3bGh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMzM3OTEsImV4cCI6MjA4NzgwOTc5MX0.SOsi-Aeb_wSp40_TTymaiiU0Kn_3rhG_LnvLjJP66z8';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const canvas = document.getElementById("game-canvas");
const ctx = canvas.getContext("2d");
const W = 400; 
let H, dogX, targetX, dogLane = 2, active = false, isCat = false;
let items = [], spiders = [], floaters = [], lastTime = 0, score = 0, hearts = 3, energy = 100, level = 1, timeLeft = 30;
let dogShake = 0, jumpY = 0;

let dogMusic = new Audio('musik.mp3'); 
let catMusic = new Audio('cats_world_theme.mp3'); 
dogMusic.loop = catMusic.loop = true;
dogMusic.volume = catMusic.volume = 0.2;

function showInstr() { document.getElementById("instr-screen").style.display = "flex"; }
function hideInstr() { document.getElementById("instr-screen").style.display = "none"; }

function init() {
    canvas.width = W; 
    H = canvas.height = document.getElementById("game-wrap").offsetHeight;
    targetX = (dogLane * 80) + 40; dogX = targetX;
}

function startGame(catMode) {
    if(!document.getElementById("pName").value) return;
    isCat = catMode;
    document.getElementById("start-screen").style.display = "none";
    if(isCat) {
        document.getElementById("main-bg").style.backgroundImage = "url('image_2.png')";
        document.getElementById("main-title").innerText = "CATS WORLD";
        document.getElementById("main-title").style.color = "var(--cat-purple)";
        catMusic.play();
    } else {
        dogMusic.play();
    }
    active = true; lastTime = performance.now();
    requestAnimationFrame(loop);
}

function mLeft() { if(active && dogLane > 0 && Math.abs(dogX - targetX) < 5) { dogLane--; targetX = (dogLane * 80) + 40; } }
function mRight() { if(active && dogLane < 4 && Math.abs(dogX - targetX) < 5) { dogLane++; targetX = (dogLane * 80) + 40; } }

function loop(t) {
    if(!active) return;
    let dt = (t - lastTime) / 1000; lastTime = t;
    if(dt > 0.1) dt = 0.016;
    ctx.clearRect(0,0,W,H);

    // Level-Timer & Speed
    timeLeft -= dt; energy -= (4 + level * 0.4) * dt;
    if(timeLeft <= 0) { level++; timeLeft = 30; energy = Math.min(100, energy + 20); }

    document.getElementById("energy-fill").style.width = Math.max(0, energy) + "%";
    document.getElementById("score-display").innerText = "🏆 " + Math.floor(score);
    document.getElementById("timer-display").innerText = "⏳ " + Math.ceil(timeLeft) + "s";
    document.getElementById("lvl-display").innerText = "LVL: " + level;
    document.getElementById("hearts-display").innerText = "❤️".repeat(Math.max(0, hearts));

    if(energy <= 0 || hearts <= 0) { active = false; document.getElementById("end-screen").style.display = "flex"; return; }

    // SPAWN SYSTEM (Keine Überschneidungen)
    if(items.length + spiders.length < 3 && Math.random() < 0.02) {
        let lane = Math.floor(Math.random()*5);
        let overlap = items.some(it => it.lane === lane && it.y < 100) || spiders.some(s => s.lane === lane && s.y < 100);
        if(!overlap) {
            if(Math.random() < 0.7) items.push({lane, y: -60, type: Math.random() < 0.1 ? '👮' : (isCat?'🍼':'🦴')});
            else spiders.push({lane, y: 0, d: 1});
        }
    }

    // Gegner
    spiders.forEach((s, i) => {
        s.y += (180 + level * 12) * dt * s.d;
        if(s.y > H - 180) s.d = -1; if(s.y < 0) spiders.splice(i, 1);
        let sx = (s.lane * 80) + 40;
        ctx.strokeStyle = "#fff"; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, s.y); ctx.stroke();
        ctx.font = "40px Arial"; ctx.fillText(isCat?"🐍":"🕷️", sx, s.y + 25);
        if(s.lane === dogLane && s.y > H-180 && s.y < H-80) { 
            energy -= 30; dogShake = 20; floaters.push({x: sx, y: s.y, txt: "-30%", color: "red", life: 1}); spiders.splice(i,1); 
        }
    });

    // Items
    items.forEach((it, i) => {
        it.y += (250 + level * 10) * dt; let ix = (it.lane * 80) + 40;
        ctx.font = "42px Arial"; ctx.textAlign = "center"; ctx.fillText(it.type, ix, it.y);
        if(it.lane === dogLane && it.y > H-160 && it.y < H-80) {
            if(it.type === '👮') { hearts--; dogShake = 20; floaters.push({x: ix, y: it.y, txt: "-❤️", color: "red", life: 1}); }
            else { score += 25; energy = Math.min(100, energy + 10); floaters.push({x: ix, y: it.y, txt: "+25", color: "var(--green)", life: 1}); }
            items.splice(i, 1);
        }
        if(it.y > H) items.splice(i,1);
    });

    dogX += (targetX - dogX) * 0.22;
    ctx.font = "80px Arial";
    ctx.fillText(isCat ? "🐱" : "🐶", dogX + (Math.random()-0.5)*dogShake, H - 110);
    if(dogShake > 0) dogShake *= 0.9;

    // Aufsteigende Punkte
    floaters.forEach((f, i) => { 
        f.y -= 2; f.life -= dt; ctx.globalAlpha = f.life; ctx.fillStyle = f.color;
        ctx.font = "bold 24px Orbitron"; ctx.fillText(f.txt, f.x, f.y); 
        if(f.life <= 0) floaters.splice(i,1); 
    });
    ctx.globalAlpha = 1;
    requestAnimationFrame(loop);
}

async function updateRanks() {
    try {
        let { data } = await supabaseClient.from('leaderboard').select('*').order('s', { ascending: false }).limit(5);
        if(data) document.getElementById("leaderboard").innerHTML = data.map((x, i) => {
            let m = i===0?'🥇':(i===1?'🥈':(i===2?'🥉':(i===3?'🧱':'🪵')));
            return `<div class="rank-row"><span>${m} ${x.n}</span><span>${x.s}</span></div>`;
        }).join('');
    } catch(e) {}
}
window.onload = () => { init(); updateRanks(); };
</script>
</body>
</html>
