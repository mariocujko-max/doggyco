<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOGGYCO MASTER V118</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { 
            --neon: #00f2ff; --green: #00ff88; --red: #ff3131; --gold: #ffd700; 
            --glass: rgba(0, 0, 0, 0.85);
            --milky: rgba(255, 255, 255, 0.15);
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        
        body { background: #000; font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; overflow: hidden; }
        
        /* HINTERGRUND: FESTGEZURRT */
        #main-bg { 
            position: fixed; inset: 0; background-image: url('hintergrund.png'); 
            background-size: 100% 100%; z-index: -2; opacity: 1; 
        }

        header h1 { 
            font-family: 'Orbitron'; font-size: clamp(30px, 10vw, 55px); color: var(--neon); 
            text-align: center; padding: 20px; letter-spacing: 5px; 
            text-shadow: 0 0 15px var(--neon);
        }

        .wrapper { width: 100%; max-width: 450px; padding: 10px; display: flex; flex-direction: column; gap: 15px; margin: 0 auto; z-index: 10; height: 90vh; overflow-y: auto; }

        /* DIE 5 RAHMEN */
        .frame { background: var(--glass); backdrop-filter: blur(20px); border: 2px solid var(--neon); border-radius: 30px; text-align: center; padding: 20px; }
        
        /* GESTRECKTER START-RAHMEN */
        .f1 { min-height: 450px; display: flex; flex-direction: column; justify-content: center; background: var(--milky); }

        #pName { width: 100%; padding: 18px; background: #000; border: 2px solid var(--neon); border-radius: 15px; color: #fff; text-align: center; font-family: 'Orbitron'; font-size: 20px; margin-bottom: 20px; }

        .btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 15px; margin: 8px 0; border: none; border-radius: 15px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .btn:active { transform: scale(0.95); }
        
        .b-dog { background: var(--neon); color: #000; }
        .b-cat { background: #bc13fe; color: #fff; }
        .b-rab { background: #ff8e00; color: #fff; }

        /* RANKING */
        .rank-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); font-family: 'Orbitron'; font-size: 14px; }
        .r1 { color: var(--gold); }

        /* GAME OVERLAY */
        #game-view { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; }
        #hud { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; font-family: 'Orbitron'; z-index: 100; font-size: 14px; }
        #energy-bar { position: absolute; top: 40px; left: 10%; width: 80%; height: 10px; background: #333; border: 1px solid var(--neon); border-radius: 5px; }
        #energy-fill { height: 100%; width: 100%; background: var(--green); }
        
        canvas { display: block; width: 100%; height: 100%; }
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-evenly; }
        .arrow { width: 80px; height: 80px; border: 3px solid var(--neon); border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 30px; background: rgba(0,0,0,0.5); }
    </style>
</head>
<body onclick="unlockAudio()">

<div id="main-bg"></div>

<div class="wrapper" id="menu-ui">
    <header><h1>DOGGYCO 🐶</h1></header>
    
    <div class="frame f1">
        <input type="text" id="pName" placeholder="ENTER NAME" maxlength="12">
        <button class="btn b-dog" onclick="bootGame('dog')">DOGGY ADVENTURE</button>
        <button class="btn b-cat" onclick="bootGame('cat')">CATS WORLD 🔒</button>
        <button class="btn b-rab" onclick="bootGame('rab')">RABBIT LAND 🔒</button>
    </div>

    <div class="frame">
        <h3 style="font-family:'Orbitron'; color:var(--neon); font-size:14px;">GLOBAL RANKING</h3>
        <div id="ranking-list">Syncing...</div>
    </div>

    <div class="frame" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <button class="btn" style="background:#000; border:1px solid var(--neon);" onclick="window.open('https://tiktok.com')">TIKTOK</button>
        <button class="btn" style="background:#003087;" onclick="window.open('https://paypal.me')">PAYPAL</button>
    </div>

    <div class="frame">
        <h3 style="font-family:'Orbitron'; color:var(--green); font-size:14px;">MANUAL</h3>
        <p style="font-size:12px; margin-top:5px;">Arrows to move • Collect Food • Avoid Police 👮</p>
    </div>

    <div class="frame" style="opacity:0.6; font-size:10px;">© 2026 DOGGYCO PRO V118</div>
</div>

<div id="game-view">
    <div id="hud">
        <div id="h-n">-</div><div id="h-l">❤️❤️❤️</div><div id="h-s">🏆 0</div>
    </div>
    <div id="energy-bar"><div id="energy-fill"></div></div>
    <canvas id="game-canvas"></canvas>
    <div class="controls">
        <div class="arrow" onmousedown="mv(-1)" ontouchstart="mv(-1)"><i class="fas fa-chevron-left"></i></div>
        <div class="arrow" onmousedown="mv(1)" ontouchstart="mv(1)"><i class="fas fa-chevron-right"></i></div>
    </div>
</div>

<audio id="bgMusic" src="musik.mp3" loop></audio>



<script>
const S_URL = 'https://ovmsstdroxkinisqwlhw.supabase.co';
const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92mXNzdGRyb3hraW5pc3F3bGh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMzM3OTEsImV4cCI6MjA4NzgwOTc5MX0.SOsi-Aeb_wSp40_TTymaiiU0Kn_3rhG_LnvLjJP66z8';
let supabase = null;

let active = false, score = 0, hearts = 3, energy = 100, lane = 2, lastT = 0;
let charX = 200, targetX = 200, items = [], enemies = [], floaters = [], mode = 'dog';

function unlockAudio() {
    const a = document.getElementById("bgMusic");
    if(a.paused) a.play().catch(()=>{});
}

// ASYNC RANKING - BLOCKIERT NICHT
window.onload = () => {
    try {
        if(typeof window.supabase !== 'undefined') {
            supabase = window.supabase.createClient(S_URL, S_KEY);
            fetchRank();
        }
    } catch(e) { console.log("DB Offline"); }
};

async function fetchRank() {
    if(!supabase) return;
    const { data } = await supabase.from('leaderboard').select('n, s').order('s', { ascending: false }).limit(5);
    if(data) {
        document.getElementById("ranking-list").innerHTML = data.map((r,i) => `
            <div class="rank-row ${i==0?'r1':''}"><span>${i+1}. ${r.n}</span><span>${r.s}</span></div>
        `).join('');
    }
}

function bootGame(m) {
    const name = document.getElementById("pName").value.trim();
    if(!name) return alert("ENTER NAME!");
    
    mode = m;
    document.getElementById("menu-ui").style.display = "none";
    document.getElementById("game-view").style.display = "flex";
    document.getElementById("h-n").innerText = name.toUpperCase();
    
    const audio = document.getElementById("bgMusic");
    if(m === 'cat') {
        document.getElementById("main-bg").style.filter = "hue-rotate(280deg)";
        audio.src = "cats_world_theme.mp3";
    }
    audio.play().catch(()=>{});
    
    // START ENGINE
    active = true;
    lastT = performance.now();
    const cvs = document.getElementById("game-canvas");
    cvs.width = window.innerWidth;
    cvs.height = window.innerHeight;
    requestAnimationFrame(loop);
}

function mv(d) { 
    lane = Math.max(0, Math.min(4, lane + d)); 
    targetX = (window.innerWidth / 5) * lane + (window.innerWidth / 10);
}

function loop(t) {
    if(!active) return;
    const ctx = document.getElementById("game-canvas").getContext("2d");
    const cvs = document.getElementById("game-canvas");
    let dt = (t - lastT) / 1000; lastT = t;
    if(dt > 0.1) dt = 0.016;

    ctx.clearRect(0,0,cvs.width,cvs.height);

    energy -= 5 * dt;
    document.getElementById("energy-fill").style.width = Math.max(0, energy) + "%";

    // SPAWN
    if(Math.random() < 0.04) {
        let l = Math.floor(Math.random()*5);
        items.push({ x: (cvs.width/5)*l + (cvs.width/10), y: -50, lane: l, type: Math.random() < 0.8 ? '🦴' : '🥩' });
    }
    if(Math.random() < 0.02) {
        let l = Math.floor(Math.random()*5);
        enemies.push({ x: (cvs.width/5)*l + (cvs.width/10), y: -50, lane: l, type: Math.random() < 0.5 ? '🕷️' : '👮' });
    }

    // ITEMS
    items.forEach((it, i) => {
        it.y += 300 * dt;
        ctx.font = "40px Arial"; ctx.textAlign = "center";
        ctx.fillText(it.type, it.x, it.y);
        if(it.lane === lane && it.y > cvs.height - 150 && it.y < cvs.height - 50) {
            score += it.type === '🦴' ? 10 : 50;
            energy = Math.min(100, energy + 15);
            items.splice(i,1);
        }
        if(it.y > cvs.height) items.splice(i,1);
    });

    // ENEMIES
    enemies.forEach((en, i) => {
        en.y += 400 * dt;
        ctx.fillText(en.type, en.x, en.y);
        if(en.lane === lane && en.y > cvs.height - 150 && en.y < cvs.height - 50) {
            hearts--; energy -= 20;
            enemies.splice(i,1);
        }
        if(en.y > cvs.height) enemies.splice(i,1);
    });

    // PLAYER
    charX += (targetX - charX) * 0.2;
    ctx.font = "80px Arial";
    let icon = mode === 'dog' ? "🐶" : (mode === 'cat' ? "🐱" : "🐰");
    ctx.fillText(icon, charX, cvs.height - 100);

    // HUD
    document.getElementById("h-s").innerText = "🏆 " + Math.floor(score);
    document.getElementById("h-l").innerText = "❤️".repeat(Math.max(0, hearts));

    if(hearts <= 0 || energy <= 0) {
        if(supabase) supabase.from('leaderboard').insert([{ n: document.getElementById("pName").value, s: Math.floor(score) }]);
        active = false; location.reload();
    }
    requestAnimationFrame(loop);
}
</script>
</body>
</html>
